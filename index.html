距離供公眾使用之水療池一‧五米外，可視及範圍內之可輕易觸及處應裝設有
明顯標識之緊急停止或控制開關，以停止電動循環及噴射系統。

第八百二十七條
水療池裝設於室外者，除依下列規定外，應符合本節第一款及第二款規定，並
依第四章規定之配線方法連接。
一、套件式水療池或自給式水療池之控制盤或配電箱者，得採用下列規定方法
    連接：
    (一)液密型金屬可撓導線管或非金屬可撓導線管，且在水療池封閉箱體外
        面長度不超過一‧八米。
    (二)附插頭可撓軟線連接裝置，長度不超過四‧六米，且有漏電啟斷裝置
        保護。
二、得利用配裝於共同構架或基座之金屬與金屬作搭接。

第八百二十八條
水療池裝設於室內者，除依下列規定外，應符合本節第一款及第二款規定，並
依第四章規定之配線方法連接：
一、水療池之套件式機組額定二十安培以下者，得採用附插頭可撓軟線連接，
    以利拆卸或隔離組件作保養及維修。
二、自給式水療池裝設於完工之地面不適用第八百二十五條第二款規定之周圍
    平台表面等電位搭接。
三、插座：
    (一)應與水療池內壁保持水平距離一‧八米以上。
    (二)距離水療池內壁三米範圍內，額定一百五十伏特以下、三十安培以下
        之插座應有漏電啟斷裝置保護。
    (三)供電給水療池之插座應有漏電啟斷裝置保護。
    (四)本款規定距離之量測為電源軟線連接至插座之最短直線路徑。
四、照明燈具、照明出線口及懸吊式風扇：
    (一)除水中照明燈具外，位於水療池上方或距離其內壁一‧五米範圍內之
        照明燈具、照明出線口及懸吊式風扇裝設高度，依下列規定辦理：
        1.無漏電啟斷裝置保護者，不得小於三‧七米。
        2.有漏電啟斷裝置保護者，不得小於二‧三米。
        3.照明燈具為下列規定之一，且有漏電啟斷裝置保護者，得裝設於水
          療池溢水口上方二‧三米以內：
          (1) 嵌入式照明燈具有防護罩、非金屬飾條，或有電氣隔離之金屬
              飾條，且適用於濕氣場所。
          (2) 吸頂式照明燈具有非金屬防護外殼或有電氣隔離之金屬外殼，
              且適用於濕氣場所。
    (二)水中照明燈具之配線應依第八百二十二條規定。
五、開關應位於距離水療池內壁水平方向一‧五米外之處。
六、除非帶電之導電性表面外，下列組件應加以搭接：
    (一)水療池範圍內之所有金屬配件。
    (二)水療池水循環系統之幫浦電動機，及其附屬用電器具之金屬組件。
    (三)距離水療池內壁一‧五米範圍內，未以永久式隔板隔開之金屬管槽及
        所有金屬表面。
    (四)不屬於水療池之配電裝置，且距離水療池一‧五米範圍內者，應搭接
        至水療池。
七、水療池之所有金屬組件，應以下列規定之一搭接：
    (一)以有絞牙之金屬導線管與管配件連接。
    (二)配裝於共同構架或基座之金屬與金屬作搭接。
    (三)以八平方毫米以上導線搭接。
八、下列設備應加以接地：
    (一)距離水療池內壁一‧五米範圍內之所有用電設備。
    (二)水療池循環系統之所有附屬用電設備。

第八百二十九條
除下列規定外，套件式、自給式或現場組裝之水療池電源出線口，應有漏電啟
斷裝置保護：
一、套件式或自給式之組件已包含漏電啟斷裝置，且能保護幫浦、鼓風機、加
    熱器、燈具、控制器、消毒產生器、配線等所有組件者。
二、現場組裝之額定為三相式或電壓超過二百五十伏特，或加熱器負載大於五
    十安培，其分路裝有漏電斷路器者。

        第四款  噴水池
第八百三十條
於噴水池裝設照明燈具、沉水幫浦及其他沉水設備依下列規定辦理：
一、除運轉電壓在低電壓接觸限制以下，且由符合第八百二十二條第一款第一
    目規定之變壓器或電源供電者外，應有漏電啟斷裝置保護。
二、照明燈具電源電路之電壓不得超過一百五十伏特，沉水幫浦及其他沉水設
    備電源電路之電壓不得超過三百伏特。
三、照明燈具防護罩：
    (一)除裝設於水面上外，照明燈具防護罩頂部應在噴水池正常水位下方之
        位置。
    (二)朝上照射之照明燈具應有防護罩或具相同功能者，以免人員接觸。
四、需浸泡於水中以達安全運轉之用電器具應有在低水位時斷電或其他保護措
    施，以免未浸水而過熱。
五、配線：
    (一)噴水池內每一條暴露之可撓軟線最長不得超過三米。
    (二)與水接觸之金屬組件應為黃銅或其他耐蝕金屬。
六、照明燈具不得永久嵌入噴水池結構內。

第八百三十一條
噴水池線路之接線盒及其他封閉箱體裝設於水面下者，依下列規定辦理，並應
符合第八百二十三條規定：
一、接線盒及其他封閉箱體應能浸泡於水中，並以銅、黃銅或其他耐蝕性材質
    製成。
二、裝設：
    (一)封閉箱體應填滿防止水氣滲入之填充物。
    (二)封閉箱體應牢固裝設於支架，或直接固定於噴水池表面。
    (三)接線盒僅以金屬導線管支撐者，該導線管應為銅、黃銅、不鏽鋼或其
        他耐蝕金屬。
    (四)連接非金屬導管之接線盒應另有銅、黃銅或其他耐蝕材質之支撐架及
        固定元件。

第八百三十二條
噴水池所有金屬管路應搭接至噴水池電源分路之設備接地導線。

第八百三十三條
下列噴水池之用電設備或器具應加以接地：
一、噴水池內部或距離其內壁一‧五米範圍內之所有用電設備或器具。
二、噴水池循環系統之所有附屬用電設備或器具。
三、供電給噴水池附屬用電設備或器具之配電箱。
前項接地方式依下列規定辦理：
一、接地應依第八百二十條第一項、第八百二十二條第二款第三目、第六款第
    一目與第二目，及第八百二十三條第三款規定辦理。
二、用電設備或器具以可撓軟線供電者，應以可撓軟線所附之設備接地導線，
    將所有暴露非帶電金屬部分作接地，且該設備接地導線應連接至電源接線
    盒、變壓器封閉箱體、電源封閉箱體或其他封閉箱體之設備接地端子。

第八百三十四條
於噴水池裝設附插頭可撓軟線連接之用電器具依下列規定辦理：
一、所有用電器具應有漏電啟斷裝置保護。
二、浸泡或暴露於水中之可撓軟線，應為適用於水中者。
三、密封：
    (一)可撓軟線被覆末端及其連接至用電器具之導體終端，應以防止水氣滲
        入之填充物覆蓋或封裝。
    (二)用電器具之接地連接應採用前目規定方法處理。
四、除接地型附接插頭及插座外，可撓軟線與用電器具之連接應為永久式。

        第五款  按摩浴缸
第八百三十五條
按摩浴缸及其附屬電氣組件應以專用分路供電，並裝有可輕易觸及之漏電斷路
器保護。
距離按摩浴缸內壁水平方向一‧八米範圍內之單相一百五十伏特以下、三十安
培以下之所有插座，應有漏電啟斷裝置保護。

第八百三十六條
按摩浴缸以附插頭可撓軟線連接電源插座，且插座僅能經由檢修口可觸及者，
該插座面應裝設於距離檢修口三百毫米以內可視及範圍內。

第八百三十七條
按摩浴缸所有金屬管路及非帶電金屬部分與循環水接觸者，應以八平方毫米以
上銅質搭接導線連接至循環幫浦電動機上供搭接用之端子，以達到按摩浴缸區
域之等電位。
若有使用雙重絕緣循環幫浦電動機者，搭接導線應有足夠長度連接至備用非雙
重絕緣幫浦電動機，且搭接導線終端應連接至電動機分路之設備接地導線。

      第十二節  電動機驅動之消防幫浦
第八百三十八條
電動機驅動之消防幫浦電力電源及互連之電路、驅動器專用之開關及控制設備
等配線及裝設，除經消防幫浦認可基準認可之整套型設備或各類場所消防安全
設備設置標準之耐燃、耐熱保護規定外，應依本節規定辦理。
消防幫浦系統之性能、維護及驗收試驗，及系統組件之內部配線或消防持壓幫
浦，不適用本節規定。

第八百三十九條
本節用詞定義規定如下：
一、現場發電設施：指在現場可持續發電之經常電源。
二、現場備用發電機：指在現場不持續發電，而作為替代電源用之發電設施。

第八百四十條
電動機驅動之消防幫浦應有可靠之電源能持續承載消防幫浦電動機與持壓幫浦
電動機之堵轉電流，加上消防幫浦有關附屬設備滿載電流之總和，其電源依下
列規定辦理：
一、單獨電源：
    (一)消防幫浦得以單獨之用戶總開關供電，或於用戶總開關前端引接供電
        。其引接位置及配置應能避免受火災或暴露於危險之損害。
    (二)由現場發電設備供電，其電源設施裝設位置及保護，應能降其受火災
        之損害。
二、依前款規定不能取得可靠電源者，應由下列規定之一方式供電。但有備援
    之引擎驅動或蒸汽渦輪機驅動消防幫浦者，不在此限。
    (一)由二個以上符合前款規定之單獨電源供電。
    (二)由一個以上符合前款規定之單獨電源，及符合第四款規定之現場備用
        發電機供電。
三、多棟複合建築物園區不能依第一款規定取得可靠電源時，其幹線電源符合
    下列規定之一，且每一個隔離設備之過電流保護裝置與任何其他供電側之
    過電流保護裝置保持選擇性協調者，得以該幹線電源供電。
    (一)二回路以上之幹線引接作為多個電源。該幹線之連接、過電流保護裝
        置及隔離設備應符合第八百四十一條第二項規定。
    (二)幹線有單獨之替代電源作為經常電源。該幹線之連接、過電流保護裝
        置及隔離設備應符合第八百四十一條第二項規定。
四、現場備用發電機作為替代電源使用時依下列規定辦理：
    (一)容量：
        1.發電機應有足夠容量，以承載消防幫浦之電動機正常起動及運轉，
          並供電給其他所有同時運轉之負載。
        2.一個以上次要負載得採選擇性自動卸載功能，使發電機具備足夠容
          量。
    (二)不適用第二百十三條第一項規定。
五、配置：
    (一)所有電源之位置及配置應保護其不受用戶配線範圍內之火災，及暴露
        於危險所造成之損害。
    (二)多重電源之配置應使其中之一電源發生火災時，不致引起其他電源啟
        斷。
六、換相器不得裝設於消防幫浦。

第八百四十一條
供電給電動機驅動消防幫浦之電路，應避免不經意隔離下列規定之連接：
一、電源導線直接連接電源至消防幫浦控制器，或消防幫浦控制器與電源切換
    開關之組合裝置。
二、經由隔離設備與過電流保護裝置之連接。
除經檢驗通過之整套型設備外，前項第二款規定之連接依下列規定辦理：
一、隔離設備：
    (一)單一隔離設備及過電流保護裝置，得裝設於消防幫浦電源與下列任一
        設備之間﹕
        1.消防幫浦控制器。
        2.消防幫浦電源切換開關。
        3.消防幫浦電源控制器與電源切換開關之組合裝置。
    (二)僅裝設於前條第三款規定之幹線電源系統，加裝隔離設備及過電流保
        護裝置得視為符合本規則之保護規定。
    (三)以現場備用發電機供電給消防幫浦者，得採用加裝之隔離設備及過電
        流保護裝置。
二、過電流保護裝置之選用：
    (一)單獨電源：
        1.連接至單獨電源時，過電流保護裝置之安培額定應能持續承載消防
          幫浦電動機與持壓幫浦電動機之堵轉電流，及消防幫浦有關附屬設
          備滿載電流之總和。
        2.若堵轉電流與過電流保護裝置之標準安培額定不能配合時，得選用
          較高一級者。
        3.除消防幫浦電動機電路之過電流保護裝置外，其他導線或配電裝置
          不適用持續承載堵轉電流之規定。
    (二)現場備用發電機與消防幫浦控制器間之過電流保護裝置，應選用能瞬
        間承載幫浦機房內所有負載電流，而不大於短路保護之額定值。
三、隔離設備專屬於消防幫浦負載者：
    (一)經常電源用之隔離設備應為用戶總開關，且在閉合位置可上鎖，位於
        消防幫浦之負載設備範圍內，並遠離其他建築物或其他消防幫浦電源
        隔離設備，又有足夠距離不致意外同時操作。
    (二)現場備用發電機作為備用電源時，其配線應符合第九百七十六條第二
        款緊急電源電路規定，且隔離設備在閉合位置應可上鎖。
    (三)隔離設備應有標明消防幫浦隔離設備之標識，文字高度應至少二十五
        毫米，且應為不需打開封閉箱體箱門或蓋板，即可視及者。
    (四)鄰近消防幫浦控制器處應設有其隔離設備之位置之標識。該隔離設備
        上鎖者，應標明鑰匙之位置。
    (五)隔離設備於閉合位置時，應以下列規定之一加以監督，或依消防相關
        法規規定辦理：
        1.中央控制台、專用或遙控站之信號裝置。
        2.於平時有人值班之處，裝設可產生聲響之警示信號。
        3.隔離設備鎖在閉合位置。

第八百四十二條
消防幫浦電動機之用電電壓與受電電壓或系統電壓不同時，得依下列規定之一
在系統電源與消防幫浦控制器之間，裝設具隔離設備及過電流保護裝置之變壓
器。僅符合第三款規定之變壓器，得供電給與消防幫浦系統無直接關聯之負載
。
一、供電給電動機驅動消防幫浦之變壓器額定容量至少為消防幫浦電動機與持
    壓幫浦電動機負載合計一‧二五倍，再加上該變壓器供電之消防幫浦附屬
    設備負載。
二、過電流保護裝置之選用：
    (一)一次側過電流保護裝置之安培額定，能持續承載消防幫浦電動機與持
        壓幫浦電動機之堵轉電流，及消防幫浦有關附屬設備滿載電流之總和
        。
    (二)不得裝設二次側過電流保護裝置。
    (三)除消防幫浦電動機電路之過電流保護裝置需持續承載堵轉電流外，其
        他導線或配電裝置不適用。
三、幹線電源：
    (一)符合第八百四十條第三款規定之幹線電源，供電給消防幫浦系統之變
        壓器者，得供電給其他負載。其他負載之計算，包括適用之需量因數
        ，依第二章第二節規定。
    (二)變壓器之額定容量及過電流保護裝置：
        1.額定容量至少為消防幫浦電動機與持壓幫浦電動機負載合計一‧二
          五倍，加上該變壓器供電之其他負載。
        2.過電流保護：
          (1) 變壓器額定電流、幹線線徑大小及過電流保護裝置應加以協調
              ，使變壓器之過電流保護裝置符合第二百六十七條，幹線過電
              流保護裝置符合第五十條第二款規定，且使過電流保護裝置之
              安培額定能持續承載消防幫浦電動機、持壓幫浦電動機之堵轉
              電流，及相關消防幫浦附屬設備滿載電流合計，加上該變壓器
              供電之其他負載電流。
          (2) 除消防幫浦電動機電路之過電流保護裝置需持續承載堵轉電流
              外，其他導線或配電裝置不適用。

第八百四十三條
由電動機驅動消防幫浦之電源電路及配線依下列規定，或依消防安全設備設置
相關法規所定之耐燃保護規定辦理：
一、電源導線：
    (一)消防幫浦專用電源由用戶總開關供電者，其進屋線及由建築物外現場
        發電設備供電之導線，應敷設於建築物外側，並依第二章第三節規定
        裝設。
    (二)消防幫浦位於第八百四十一條第二項規定最後隔離設備及過電流保護
        裝置負載側之電源導線，或直接連接至現場備用發電機之導線，應符
        合下列規定：
        1.導線僅供電給與消防幫浦系統直接相關之負載。
        2.導線路徑與其他配線保持完全獨立。
        3.導線有防止火災、結構破壞或運轉事故引起潛在損害之保護。
        4.導線以下列任一方式裝設穿過建築物。但源自電氣機房至消防幫浦
          機房之電源導線保護系統，得免具有防火時效二小時以上。
          (1) 包封於混凝土厚度五十毫米以上。
          (2) 使用具有防火時效二小時以上之組件保護，且專用於消防幫浦
              電路。
          (3) 使用具有防火時效二小時以上之電氣電路保護系統。
二、導線之線徑：
    (一)供電給消防幫浦電動機、持壓幫浦及消防幫浦附屬設備之導線，其電
        流額定不得小於消防幫浦電動機及持壓幫浦電動機滿載電流合計一‧
        二五倍，加上消防幫浦附屬設備電流。
    (二)僅供電給消防幫浦電動機之導線最小安培容量應符合第二百十四條規
        定，電壓降應符合第八百四十四條規定。
三、過載保護：
    (一)電源電路不得裝設過載之自動保護。
    (二)除依前條第三款第二目規定裝設變壓器一次側保護器外，分路及幹線
        之導線應僅能有短路保護。
    (三)若以分接電路供電給消防幫浦時，其配線應視為進屋線。
    (四)蓄電池與引擎間之導線，得免裝設過電流保護裝置或隔離設備。
    (五)現場備用發電機額定連續電流大於消防幫浦電動機滿載電流二‧二五
        倍者，現場發電機與消防幫浦切換開關控制器組合裝置間，或與分開
        裝設之切換開關間之導線，應符合第一款第二目規定。其保護裝置應
        符合消防幫浦切換開關控制器組合裝置或分開配裝之切換開關之短路
        電流額定。
四、自控制器至消防幫浦電動機間之所有導線，應採用金屬導線管、液密型金
    屬可撓導線管或非金屬可撓導線管 MI 電纜或金屬被覆電纜配線。
五、消防幫浦之控制器及電源切換開關不得供電給消防幫浦以外之任何負載。
六、自引擎控制器及蓄電池引接之所有配線，應有防護以免遭受外力損傷，且
    應依其製造廠家說明書指示辦理。
七、消防幫浦不得有設備接地故障保護裝置。
八、電氣電路保護系統：
    (一)接線盒應裝設於消防幫浦控制器之前，距離界定防火區劃之防火牆或
        樓地板至少三百毫米。
    (二)接線盒與消防幫浦控制器間之管槽，應依本規則規定及製造廠家說明
        書指示，在接線盒末端應加以密封。
九、接至或引自消防幫浦控制器之配線經過接線盒裝設者：
    (一)接線盒應牢固於裝設位置。
    (二)接線盒之裝設不得破壞消防幫浦控制器封閉箱體之防護等級。
    (三)接線盒之裝設不得破壞消防幫浦控制器之完整性，且不得影響控制器
        之短路電流額定。
    (四)裝設於消防幫浦機房者，應採用防滴型封閉箱體。該箱體應符合消防
        幫浦控制器封閉箱體之防護等級。
    (五)應採用適用之端子、配線端子台、電線連接器及接續組件。
    (六)消防幫浦之控制器或電源切換開關不得經由接線盒供電給持壓消防幫
        浦及其他設備。
十、管槽終端接於消防幫浦控制器者，應採用適用之導線管接頭。導線管接頭
    之防護等級應至少等於該消防幫浦控制器之防護等級。消防幫浦控制器之
    安裝應依製造廠家說明書指示辦理。

第八百四十四條
由電動機驅動消防幫浦控制器及電動機端電壓之電壓降依下列規定辦理：
一、在電動機起動時，消防幫浦控制器線路端之電壓降不得超過正常電壓（控
    制器額定電壓）百分之十五。但於緊急運轉機械起動時，不在此限。
二、電動機運轉於滿載電流一‧一五倍時，電動機端之電壓降不得超過電動機
    額定電壓百分之五。

第八百四十五條
電動機驅動之消防幫浦相關設備之位置裝設依下列規定辦理：
一、電動機驅動之消防幫浦控制器及電源切換開關應儘可能靠近，且在其所控
    制之電動機處可視及範圍內。
二、引擎驅動之消防幫浦控制器應儘可能靠近，且在其所控制之引擎處可視及
    範圍內。
三、供引擎驅動消防幫浦用之蓄電池應牢固裝設於地面，且不致遭受外力損傷
    淹水、溫度過熱或過度震動等。
四、所有帶電部分應位於地面上方三百毫米以上。
五、消防幫浦控制器及電源切換開關之位置或保護，應使其不致因幫浦漏水而
    受損。
六、所有消防幫浦控制設備應牢固裝設於不可燃性之支撐結構物。

第八百四十六條
由電動機驅動消防幫浦控制電路之配線依下列規定或依消防安全設備設置相關
法規所定之耐熱保護規定辦理：
一、控制電路故障：
    (一)延伸至室外消防幫浦機房之外部控制電路配線，應使任何外部電路故
        障（開路或短路），不致妨礙其他裝置操作消防幫浦。
    (二)前目外部控制電路故障不得影響消防幫浦繼續運轉，及妨礙控制器啟
        動消防幫浦。
    (三)消防幫浦機房範圍內不能承受故障之所有控制電路導線，應有防護以
        免遭受外力損傷。
二、不得裝設欠壓、欠相、頻率敏感或其他感知器，以防止電動機接觸器之自
    動或手動驅動。但欠相感知器為消防幫浦控制器之組件者，不在此限。
三、引擎驅動消防幫浦之控制電路配線：
    (一)控制器與柴油引擎間之所有配線應為絞線，其線徑應能持續承載製造
        廠家說明書指示之充電或控制電流。
    (二)應有防護以免遭受外力損傷。
    (三)應依控制器製造廠家說明書對距離及導線線徑之指示辦理。
四、電動機驅動消防幫浦之所有控制電路應採用厚金屬導線管、薄金屬導線管
    液密型金屬可撓導線管、非金屬可撓導線管、MI  電纜或金屬被覆電纜配
    線。
五、發電機之控制電路配線：
    (一)裝設於消防幫浦電源切換開關與經常電源斷電時供電給消防幫浦之備
        用發電機間之控制電路導線，應與其他配線保持完全獨立。
    (二)控制電路之配線應有防止火災或結構破壞所引起潛在損害之保護。
    (三)控制電路導線得以下列任一方式穿過建築物裝設：
        1.包封於混凝土厚度五十毫米以上。
        2.使用具有防火時效二小時以上之組件保護，且專用於消防幫浦電路
          。
        3.使用具有防火時效二小時以上之電氣電路保護系統。

    第七章  電動車充電與儲能及其他先進系統
      第一節  電動車充電系統
第八百四十七條
供電動車達到充電、電力輸出或雙向電流流動目的之用電器具，連接至用戶配
線系統裝設，應依本節規定辦理。

第八百四十八條
本節用詞定義規定如下：
一、充電連接器：指為達到電能轉移及資訊交換目的，以傳導或感應方式耦合
    電動車充電接口，建立電動車電氣連接之配電裝置。
二、電動車充電電纜：指為直接提供電動車電能之組件，係由一段可撓電纜及
    一個充電連接器組成。
三、人員保護系統：指人員保護之配電裝置與構造特點結合使用，以保護人員
    避免遭受電擊之系統。
四、電動車充電設備：指為達到於用戶配線與電動車間轉移能量目的之非接地
    導線、被接地導線、設備接地導線、電動車充電電纜、附接插頭、人員保
    護系統，及其他配件、配電裝置、電源出線口或用電器具。
五、可攜式：指可攜帶至充電位置，且不使用時可車載之電動車充電裝置。
六、扣件式：指經過專門設計可在不需使用工具情形下進行拆卸，以重新定位
    互換、維護或修理之電動車充電設備裝設方法。
七、固定式：指使用扣件掛於牆面、立於地面或以其他形式固定，需使用工具
    始能移除電動車充電設備之裝設方法。
八、電動車電力輸出設備：指以電動車輛為電源，提供交流三十伏特或直流六
    十伏特以上電能給車輛外部負載之設備。
九、能源管理系統（ EMS）：係指利用電子科技、科學及數據化將用電器具之
    能源消耗，透過採集、追蹤、記錄、統計、分析各方面能源數據，集中監
    視調控及有效管理能源使用率之智慧化管理系統。
十、無線充電：指透過一次側與二次側裝置間電場、磁場或電磁波，以非接觸
    感應式將電能傳輸至負載。
十一、無線充電電源轉換器：指將電能從電網轉換成高頻輸出，以進行無線電
      力傳輸之配電裝置。
十二、無線充電板：為無線充電系統之一部分，透過非接觸式耦合傳輸電能至
      電動車之外部設備。
十三、無線充電設備：由無線充電電源轉換器及無線充電板組成之設備。此二
      個設備得為各別之單元，或容納在同一個箱體中。
十四、無線充電板充電電纜：指無線充電電源轉換器與無線充電板之間，承載
      高頻電能及狀態信號之多芯遮蔽電纜。

第八百四十九條
電動車充電設備輸入電壓應採用交流六百伏特以下或直流一千伏特以下。

第八百五十條
電動車充電設備或無線充電設備連接至用戶配線系統，得採用可攜式充電設備
、扣件式充電設備或固定式充電設備。固定式充電設備應永久配線固定於支撐
物表面。

第八百五十一條
電動車充電設備應具足夠額定容量以承載負載。電動車充電負載應視為連續負
載。
進屋線及幹線之線徑大小應考量納入電動車充電設備額定容量。使用自動負載
管理系統或能源管理系統者，進屋線及幹線上最大設備負載，應為該系統容許
之最大負載。
固定式充電設備得以調整充電設定值。調整值與銘牌標示不一致者，此調整值
應符合製造廠家說明書指示。

第八百五十二條
電動車充電設備之電源導線及可撓電纜依下列規定辦理：
一、導線應為適用於電動車充電，且可暴露於油、濕氣場所及潮濕場所。
二、電源導線總長度：
    (一)人員保護系統啟斷裝置位於充電設備內或充電設備之封閉箱體內者，
        電源導線總長度不得超過下列規定之一：
        1.可攜式充電設備：○‧三米。
        2.扣件式充電設備及固定式充電設備：一‧八米，且該設備須裝設於
          高處，使其連接插座時，電源導線不致觸及地面。
    (二)人員保護系統啟斷裝置位於附接插頭，或在電源導線連接起始○‧三
        米內者，電源導線總長度不得超過四‧六米。
三、電動車充電設備除配有充電電纜管理系統外，其充電設備連接電動車之可
    撓電纜總長度不得超過七‧五米。

第八百五十三條
電動車充電之出線口應為專用分路。
電動車充電設備經設計者確認可由多條幹線或分路供電者，得由一條以上幹線
或分路供電。
電動車充電設備包括無線充電設備之幹線及分路過電流保護裝置應為連續責務
型，其安培額定不得小於最大負載一‧二五倍。非連續負載由同一幹線供電者
，其過電流保護裝置安培額定不得小於連續負載一‧二五倍，加上非連續負載
之總和。

第八百五十四條
電動車充電設備額定電流大於六十安培，或對地額定電壓超過一百五十伏特者
，應具有可輕易觸及處之隔離設備。該隔離設備不可視及者，應配裝附有啟斷
位置可上鎖之固定式裝置。

第八百五十五條
電動車充電設備應有人員保護系統。但充電電壓小於直流六十伏特者，不在此
限。
採用附插頭可撓軟線連接電動車充電設備者，其人員保護系統應裝設啟斷裝置
。
電動車充電連接之所有插座，除依第八十九條規定辦理外，應裝有漏電啟斷裝
置。但充電電纜等設備裝設有漏電啟斷裝置者，不在此限。

第八百五十六條
電動車充電連接之所有插座裝設於潮濕場所者，應有封閉箱體能於插入或拔除
附屬插頭蓋時防風雨。其出線盒蓋板應能適用於所裝設之環境。

第八百五十七條
當電業或其他電力系統電壓中斷時，應有使電動車及其充電設備之電能不會反
饋至用戶配線系統之配電裝置。但符合第八百五十八條規定者，不在此限。

第八百五十八條
電動車充電設備具備電力輸出功能作為電力電源或提供雙向電力饋送者，應使
其不會逆送電力至電力網。但電動車電池及其電力輸出裝置作為儲能設備與其
他電力電源連接，並符合第八百九十七條規定者，得逆送電力至電力網。
前項電動車充電設備為選擇性備用電源系統之一部分者，應符合第九章第二節
規定；作為電力電源者，應符合第九章第三節規定。

第八百五十九條
電動車充電設備應裝設於充電連接器與電動車充電接口可直接電氣耦合處。
除製造廠家說明書有指示裝設位置外，電動車充電設備之耦合裝置應裝設於室
內距離地面高度四百五十毫米以上，或室外距離地面高度六百毫米以上。但為
可攜式電動車充電設備者，不在此限。
快速充電站場所內裝設電動車直流快速充電設備容量達一百萬瓦特以上者，依
下列規定辦理：
一、充電設備應裝設能源管理系統，監視、控制及優化多輛電動車充電，不致
    影響電力網供電。
二、充電設備周圍應保持五百毫米以上之間隔，或依設備製造廠家建議留設維
    修空間，以供檢修。

第八百六十條
電動車於室內充電不需通風者，得免裝設機械式通風裝置。
電動車於室內充電必須通風者，依下列規定辦理：
一、室內應裝設風扇等機械式通風裝置，且該裝置應同時具有進氣及排氣設備
    ，並永久裝設於可直接引入外面空氣之通風口。
二、正壓通風系統僅適用於經特殊設計及供電動車充電之建築物或區域。
三、機械式通風依下列規定辦理：
    (一)可供多輛電動車充電之區域，在某一時段車輛可同時充電之最小通風
        量，為每輛車依表八六○規定計算後之總和。
    (二)表八六○未規定之供電電壓及電流，依下列公式計算最小需要通風量
        ：
        1.單相交流或直流：
        2.三相交流：
    (三)通風系統為建築物總通風系統之一部分者，其最小需要通風量得依工
        程計算書規定。
    (四)電源電路：
        1.機械式通風裝置電源電路應與電動車充電設備電氣互鎖，且於電動
          車充電期間內全程保持通電。
        2.單相一百二十五伏特、十五安培或二十安培之電動車充電設備插座
          應裝設開關，且該開關與機械式通風系統有電氣互鎖。
        3.由直流五十伏特以下供電之電動車充電設備應能啟斷與閉合，且機
          械式通風系統應能在電源電路切換至該設備時為電氣互鎖。

第八百六十一條
無線充電設備除經設計者確認為具雙重絕緣系統外，無線充電板底板材質應為
非鐵質金屬，並應加以接地，且該底板尺寸應與無線充電板封閉箱體尺寸匹配
。
裝設無線充電設備依下列規定辦理：
一、充電電源轉換器整合於無線充電板者，應符合第三款規定。該轉換器非屬
    無線充電板之一部分者，其封閉箱體 IP 等級裝設於室內應為 IP41 以上
    ，裝設於室外應為 IP44 以上。
二、充電電源轉換器非屬無線充電板之一部分者，應裝設於室內距離地面高度
    四百五十毫米以上，或室外距離地面高度六百毫米以上，並應設置於臺座
    牆壁或桿柱、建築物或增高之混凝土墊。
三、無線充電板：
    (一)無線充電板應裝設在地面，嵌裝於地面下，使充電板頂部與地面齊平
        或略低於地面。充電電源轉換器位於無線充電板封閉箱體者，亦同。
    (二)封閉箱體 IP 等級應符合國家標準規定。若無線充電板位於易於受淹
        水等惡劣氣候條件之區域，其等級應為適合所裝設環境條件者。
四、無線充電板充電電纜：
    (一)全長應加以固定，以免移動及連接點處被緊拉。
    (二)裝設於可能被車輾壓處者，該電纜應有加強保護。
    (三)充電電源轉換器為無線充電板之一部分者，供電給無線充電板之電源
        線應加以防護。
五、其他配線及配件適用於無線充電設備者，亦適用之。

      第二節  太陽光電系統
        第一款  一般規定
第八百六十二條
太陽光電系統 [Solar Photovoltaic（PV） Systems，以下簡稱 PV 系統 ]，
包含組列電路、變流器及控制器等組成，與其他電源併聯、獨立運轉，或兼具
併聯與獨立運轉，得以交流或直流輸出，其配線及裝設應依本節規定辦理；本
節未規定者，應依其他章節規定辦理。

第八百六十三條
本節用詞定義規定如下：
一、太陽能電池：指暴露於日照下，能產生電力之基本 PV 裝置。
二、模組：指由太陽能電池與其他組件組成，能產生直流電力之完整裝置。
三、交流模組：指由太陽能電池、變流器與其他組件組成，能產生交流電力之
    完整裝置。PV  電源電路、導線及變流器視為交流模組或交流模組系統之
    內部元件。
四、交流模組系統：指內含交流模組、配線方法、材料及子組件，可被認定為
    系統之組合。
五、組列：指數個模組與支撐架以機械性及電氣性整合而成之組合，包含附屬
    之系統元件，例如變流器或直流對直流轉換器，及附屬相關配線。
六、直流匯流箱：指內含用於連接二條以上並聯 PV 系統直流電路配電裝置之
    封閉箱體。
七、電子式電力轉換器：指使用電力電子技術將一種形式電力轉換成另一種形
    式電力之配電裝置，例如變流器、直流對直流轉換器、電子式充電控制器
    等。
八、PV  電源電路：指介於模組間，或自模組至直流匯流箱、電子式電力轉換
    器或直流 PV 系統隔離設備間之直流電路。
九、PV  輸出電路：指自二條以上 PV 電源電路連接點，連接至其終端點之直
    流電路。
十、直流對直流轉換器電源電路：指介於直流對直流轉換器間，以及自直流對
    直流轉換器至該直流系統之共接點間之電路。
十一、直流對直流轉換器輸出電路：指連接至直流對直流轉換器電源電路用直
      流匯流箱輸出端之直流電路。
十二、PV  系統直流電路：指位於 PV 電源電路、PV  輸出電路、直流對直流
      轉換器電源電路及直流對直流轉換器輸出電路之任一直流電路。
十三、變流器輸出電路：指連接至變流器交流輸出端之電路。
十四、功能性接地：指為運轉目的具有對地參考電位，而非屬直接接地之電氣
      接地，通常透過變流器或充電控制器內建之電子裝置提供直流接地故障
      保護連接至大地。
十五、併聯型系統：指與電力網併聯運轉，且得輸送電力至電力網之 PV 系統
      。
十六、獨立型系統：指獨立於電力網外供電之 PV 系統。

第八百六十四條
PV  系統得作為建築物之電源系統，其裝設依下列規定辦理：
一、用於 PV 系統之變流器、模組、交流模組與交流模組系統、直流匯流箱、
    直流對直流轉換器、直流電路控制器及充電控制器等設備（以下簡稱 PV
    設備），應為適用於 PV 系統者，並於現場有標識，且該標識為反光材質
    。
二、前款規定 PV 設備之裝設及相關配線、與其他電力電源互連，應由合格人
    員辦理。
三、單一建築物得裝設多套 PV 系統。裝設多套 PV 系統者，PV  系統相隔距
    離無法彼此可視及者，於每一具 PV 系統隔離設備處應有標明場址內所有
    電源隔離設備位置之耐久標識，及標明多重電源之警告標識。
四、PV  系統設備及隔離設備不得裝設於浴室，其電路不得緊鄰或經過避難用
    通路。
五、電子式電力轉換器及其相關裝置，搭配符合第八百七十二條規定之隔離設
    備者，得裝設於非可輕易觸及之屋頂或其他外部區域。
六、PV  組列場內應設置維護安全通道。PV  組列裝設於地面者，主要通道寬
    度應為一‧五米以上，裝設於屋頂者，主要通道寬度應為○‧六米以上。
七、裝設於水面上之 PV 設備應為適用於其裝設位置者，其配線應能使 PV 設
    備隨水位移動，並能耐潮濕、抗腐蝕及可承受機械與結構應力。

第八百六十五條
本節有關 PV 電源電路之規定，不適用於交流模組或交流模組系統。
交流模組或交流模組系統之輸出應視為變流器輸出電路。

        第二款  電路規定
第八百六十六條
PV  系統電路之電壓計算依下列規定辦理：
一、直流電路最大電壓：
    (一)PV  系統直流電路之最大電壓應為電路導線間之最高電壓。絕緣導線
        、電纜、設備、工作空間及其他應用之電壓限制及額定應採最大電壓
        。
    (二)PV  系統直流電路裝設於建築物屋頂、牆面或內部者，其最大電壓不
        得超過一千伏特。裝設於獨棟或雙拼住宅場所，且無合格人員管理者
        ，其最大電壓不得超過六百伏特。
    (三)直流 PV 設備額定最大電壓未超過一千五百伏特，且非位於建築物屋
        頂、牆面或內部者，其裝設得免依第九百零五條及第九百十五條至第
        九百十七條規定辦理。
    (四)用於 PV 系統直流電路之設備額定電壓在一千伏特以下者，不適用第
        一千零十二條規定。
二、PV  電源電路或輸出電路之最大系統電壓應依下列規定計算，並依最低預
    期周圍溫度作溫度修正後之串聯模組額定開路電壓之總和：
    (一)採用模組之製造廠家說明書指示或設備銘牌提供之開路電壓溫度係數
        。
    (二)單晶矽或多晶矽模組之製造廠家說明書指示或設備銘牌未提供開路電
        壓溫度係數者，採用表八六六提供之開路電壓溫度係數。
三、直流對直流轉換器電源及輸出電路之最大電壓應依下列規定之一計算：
    (一)單一直流對直流轉換器輸出電路之最大電壓依該轉換器設備銘牌或製
        造廠家說明書指示決定。該指示未提供決定最大電壓之方法時，其最
        大電壓為該轉換器輸出之最大額定電壓。
    (二)二個以上直流對直流轉換器串接之輸出電路，其最大電壓依該轉換器
        之設備銘牌或製造廠家說明書指示決定。該指示未提供決定最大電壓
        之方法時，其最大電壓為該等串接之直流對直流轉換器輸出最大額定
        電壓之總和。

第八百六十七條
各電路之最大電流計算應依下列規定辦理：
一、PV  系統電路：
    (一)PV  電源電路之最大電流為並聯模組額定短路電流之總和乘以一‧二
        五倍。
    (二)PV  輸出電路之最大電流為前目並聯電源電路之電流總和。
    (三)直流對直流轉換器電源電路之最大電流為該轉換器連續輸出額定電流
        。
    (四)直流對直流轉換器輸出電路之最大電流為依前目計算所得並聯電源電
        路最大電流之總和。
    (五)變流器輸出電路之最大電流為變流器連續輸出額定電流。
二、連接至電子式電力轉換器輸入端之電路裝有過電流保護裝置，且該裝置安
    培額定未大於該電路導線安培容量者其最大電流為所接線之該電子式電力
    轉換器輸入端額定輸入電流。
電路導線應能承載依下列規定之一計算所得較大之安培容量：
一、導線安培容量未依表二五～六規定導線數及表二五～七規定周圍溫度作修
    正調整者，依前項計算所得最大電流一‧二五倍。但電路裝有過電流保護
    裝置，且該過電流保護裝置經設計者確認適用於以百分之一百額定連續運
    轉者，該導線安培容量得以前項計算所得之最大電流選用。
二、導線安培容量依表二五～六規定導線數及表二五～七規定周圍溫度作修正
    調整者，依前項計算所得之最大電流。
PV  電源具備多組之輸出電路電壓，且共用同一回流導線者，該共用回路導線
之安培容量不得小於個別輸出電路過電流保護裝置安培額定之總和。
採用單一過電流保護裝置保護二串以上並聯模組電路者，每一模組互連導線之
安培容量不得小於該單一過電流保護裝置安培額定，加上其他並聯模組短路電
流一‧二五倍之總和。

第八百六十八條
PV  系統直流電路及變流器輸出電路之導線與設備應有過電流保護。符合前條
第一項第二款規定之導線安培容量者，應裝設過電流保護裝置。
每個電路過電流保護依下列規定之一辦理：
一、符合下列規定者，得免裝設過電流保護裝置：
    (一)導線具有足夠安培容量能承受最大電路電流。
    (二)來自所有電源之電流未大於依 PV 模組或電子式電力轉換器依需求指
        定之最大過電流保護裝置安培額定。
二、電路導線一端連接至有限制電流之電源，其導線安培容量依該電源計算且
    亦連接數個最大電路電流大於該導線安培容量之電源者，在與較大電流電
    源之接點處應裝設過電流保護裝置。
三、不屬於前二款規定之電路者，其過電流保護依下列規定之一辦理：
    (一)導線超過三米者，於導線兩端應有過電流保護。
    (二)導線非位於建築物內，且長度不超過三米者，於該導線一端應有過電
        流保護。
    (三)導線位於建築物內，且長度不超過三米者，於該導線一端應裝設過電
        流保護裝置，並採用管槽或金屬被覆電纜配線。
    (四)非裝設於建築物內部、屋頂或牆面之導線，符合下列規定者，得於電
        路一端有過電流保護：
        1.導線採用金屬管槽或金屬被覆電纜配線、裝設於封閉之金屬電纜架
          、採用地下管路，或直接進入亭置式封閉箱體。
        2.每一導線終端處以斷路器或限流熔線保護。
        3.導線之過電流保護裝置為隔離設備之整體一部分，或過電流保護裝
          置距離隔離設備在導線長度三米範圍內。
        4.導線之隔離設備裝設於建築物外部且混凝土包覆厚度五十毫米以上
          ，或最靠近建築物內部導線進屋點之可輕易觸及處。
直流電路之過電流保護裝置應適用於 PV 系統者。防止 PV 系統直流電路中反
饋電流之電子式裝置，得用於防止該裝置 PV 組列側導線之過電流。依本節規
定須裝設過電流保護裝置者，其安培額定應依下列規定之一選定，並得依第七
十九條第一項第二款規定選用高一級者：
一、不小於依前條第一項計算所得最大電流一‧二五倍。
二、加入過電流保護裝置之組合適用於百分之一百額定連續運轉者，得以前條
    第一項計算所得最大電流選用。
依本節規定須裝設過電流保護裝置時，得以單一過電流保護裝置保護 PV 模組
、直流對直流轉換器，及每一電源電路或輸出電路之導線。以單一過電流保護
裝置保護電源電路或輸出電路者，PV  系統中所有電路之所有過電流保護裝置
應置於相同極性，且應裝設於可觸及處。
電力變壓器之每側各有一個以上電源時，應裝有符合第二百六十七條或第九百
三十九條規定之過電流保護裝置，並應先考慮第一側為一次側後，再考慮另一
側。但電力變壓器一側連接至併聯型變流器輸出，且該側額定電流不小於變流
器輸出連續電流之額定值者，該變流器側得免裝設過電流保護裝置。

第八百六十九條
連接至獨立型系統之用戶配線系統，應符合第二章第二節或第三節規定。
建築物隔離設備之電源側配線除依下列規定辦理者外，應符合本規則其他章節
適用之規定：
一、電源輸出：由獨立型系統供電至用戶配線系統者，電源輸出容量得低於所
    計算之負載。由獨立型系統供電之所有電源容量總和，不得小於連接至系
    統之最大單一用電器具負載。納入計算之一般照明負載不得視為單一負載
    。
二、導線線徑與保護：介於獨立型系統電源與建築物隔離設備間之電路導線，
    其線徑應以獨立型系統電源輸出額定總和決定。三相併聯之各相負載應受
    控制或平衡，使其能與電源總容量規格相容。
三、單相一百十伏特以下供電：
    (一)獨立型系統得供電一百十伏特至單相三線一百十伏特或二百二十伏特
        之用戶總開關或配電箱，該總開關或配電箱應無二百二十伏特出線口
        ，且無多線式分路。所有供電電源額定值總和應小於用戶總開關中性
        匯流排之額定值。
    (二)前目用戶總開關應有標明單相一百十伏特供電不得連接多線式分路之
        耐久且明顯警告標識。
四、獨立型系統得供電給三相三線式或三相四線式系統。
五、插入式反饋斷路器連接至併聯電源者，應以附加固定件固定，使其不能被
    拉離固定處，並應有標明電源側及負載側之斷路器不得反饋之標識。
六、獨立型系統供電應控制其電壓及頻率維持在適合所連接負載限制範圍內。

第八百七十條
PV  系統之直流電路，其任兩導線線間電壓八十伏特以上者，得裝設 PV 電弧
故障啟斷裝置或具同等效果保護之其他系統組件。
裝設前項啟斷裝置者，該裝置應能偵測及中斷 PV 直流電路之導線、連接器、
模組或其他系統組件所引發之電弧故障。

        第三款  隔離設備
第八百七十一條
PV  系統應裝設隔離設備，使該系統與所有電源系統、儲能系統、用電器具，
及其相關用戶配線系統隔離；其隔離設備裝設依下列規定辦理：
一、PV  系統之隔離設備應裝設於可輕易觸及處。系統之電壓超過三十伏特，
    其隔離設備為非合格人員可輕易觸及，且開啟箱門或蓋板時會暴露帶電部
    分者，該箱門或蓋板應上鎖或需使用工具始得開啟。
二、標識：
    (一)每個 PV 系統隔離設備應有標明啟斷及閉合位置，且有 PV 系統隔離
        之耐久標識。
    (二)PV  系統隔離設備之電源側及負載側於啟斷位置可能帶電者，其配電
        裝置上或鄰近處應有標明電擊危險、電源側及負載側於啟斷位置可能
        帶電之耐久且明顯警告標識。
三、每套 PV 系統之隔離設備裝設於單一封閉箱體，或同群組之個別封閉箱體
    者，其開關、斷路器或二者組合之合計數量不得超過六具。在併聯型系統
    中，由一具以上變流器，或數個交流模組，合併之交流輸出，得裝設單一
    PV  系統隔離設備。
四、PV  系統之隔離設備應有足夠額定容量以承受最大電路電流與故障電流，
    及出現在 PV 系統隔離設備終端之電壓。
五、PV  系統之隔離設備應為下列規定之一，並應能同時隔離 PV 系統與其他
    用戶配線系統之非接地導線，且該隔離設備、其遙控裝置或可觸及該隔離
    設備之封閉箱體應配裝附有啟斷位置可上鎖之固定式裝置：
    (一)手動操作之開關或斷路器。
    (二)啟斷額定電流不會對操作人員造成危害之連接器，或為設備附屬之連
        接器，或依設備說明書使用之連接器。
    (三)具所需啟斷容量之抽出型開關。
    (四)於控制電源中斷時，可在現場操作並自動啟斷之遙控開關或斷路器。
    (五)其他適用之配電裝置。

第八百七十二條
交流 PV 模組、熔線、直流對直流轉換器、變流器及充電控制器等 PV 設備，
應與所有非接地導線隔離，並依下列規定辦理：
一、隔離直流電路之 PV 設備，其最大電流大於三十安培者，應裝設符合下列
    規定之隔離設備：
    (一)有足夠額定容量以承受最大之電路電流與故障電流及終端電壓。
    (二)能同時隔離與其連接之所有載流非接地導線。
    (三)為可外部操作，使操作人員不致碰觸帶電部分，並應有啟斷位置或閉
        合位置之標識。隔離設備未在 PV 設備三米範圍內或可視及範圍內者
        ，隔離設備、其遙控裝置或可觸及該隔離設備之封閉箱體應配裝附有
        啟斷位置可上鎖之固定式裝置。
    (四)為前條第五款規定型式之一。
    (五)電源端及負載端於啟斷時仍可能導電者，除符合第八百七十八條規定
        之 PV 專用連接器外，隔離設備應依前條第二款規定辦理。
二、隔離最大電流三十安培以下之電路者，得裝設符合下列規定之隔離裝置：
    (一)隔離裝置不需有啟斷容量。無啟斷電路電流額定之隔離裝置，應有在
        有載下不得操作之標識。隔離裝置不需同時隔離電路之所有帶電導線
        。
    (二)隔離裝置為下列規定之一：
        1.符合第八百七十八條規定且可配合特定設備使用之 PV 專用連接器
        。
        2.可保護手指之熔線座。
        3.需使用工具始能啟斷之隔離裝置。
        4.其他適用之隔離裝置。
前項 PV 設備之隔離設備或隔離裝置應裝設於連接至 PV 設備之電路，或 PV
設備三米範圍內可視及處。隔離設備在 PV 設備三米範圍內可以遙控方式操作
者，得免裝設於 PV 設備附近。
隔離設備用於隔離運轉電壓超過三十伏特之 PV 設備，且為非合格人員可輕易
觸及時，開啟箱門或蓋板時會暴露帶電部分者，該箱門或蓋板應上鎖或需使用
工具始得開啟。

        第四款  配線方法
第八百七十三條
PV  系統之配線依下列規定辦理：
一、配線：
    (一)本規則規定之管槽、電纜架或電纜配線，及其他專用於 PV 組列之配
        線方法及其配件，得作為 PV 組列之配線。
    (二)採用有整合封閉箱體之接線裝置者，其電纜應有足夠之長度以利更換
        。
    (三)運轉電壓超過三十伏特之 PV 電源電路及輸出電路，裝設於可輕易觸
        及處者，應採用管槽或金屬被覆電纜配線。
二、PV  系統直流電路不得與變流器輸出電路或其他非 PV 系統之導線裝設於
    同一管槽、電纜架、電纜或封閉箱體。但屬 PV 系統之遙控線路、通訊線
    路，或三十伏特以下且一千瓦以下有限功率線路，或 PV 系統直流電路以
    隔板隔離者，不在此限。
三、屋頂型 PV 組列支撐系統應裝設定位，且所使用之配線方法應能容許組列
    做預期之位移。
四、併聯型系統之單相變流器交流輸出電路不得連接至三相四線式電力系統。

第八百七十四條
PV  系統直流電路之識別依下列規定辦理：
一、導線於終端、接續點及分接點，應以色碼、標示帶、標籤或具同等效果之
    方法加以標明。
二、非直接接地之正極導線應有標明「＋」、正極、POSITIVE  或 POS  之耐
    久標識，導線識別不得為綠色、白色或灰色。
三、非直接接地之負極導線應有標明「－」、負極、NEGATIVE  或 NEG  之耐
    久標識，導線識別不得為綠色、白色灰色或紅色。
二套以上 PV 系統之導線裝設於具有可移除蓋板之封閉箱體或管槽，每一套系
統之 PV 系統導線每隔一‧八米以內應以紮線綁紮成束或類似方法個別組群。
但從單一電纜或管槽進入之電路，可清楚分組者，不在此限。

第八百七十五條
PV  系統直流電路配線採用單芯電纜者，依下列規定辦理：
一、位在 PV 組列範圍內之 PV 系統直流電路，其暴露於室外之單芯電纜應為
    PV  電纜，或其他適用於 PV 系統之耐日照電纜。
二、暴露之電纜每隔○‧六米以內應以電纜束帶、捆扎帶、吊架或類似配件加
    以固定及支撐。
三、單芯 PV 電纜敷設於室外之電纜架者，電纜於每○‧三米以內應加以支撐
    ，且每一‧四米以內應加以固定。
PV  系統直流電路配線採用多芯電纜者，依下列規定辦理：
一、屬整套型 PV 組件之一部分者，應依製造廠家說明書裝設。
二、非屬整套型 PV 組件之一部分者，依下列規定裝設：
    (一)裝設於建築物內部或牆面者，應採用管槽配線。但裝設於屋頂者不在
        此限。
    (二)未採用管槽配線者，應依下列規定辦理：
        1.暴露於室外者，採用標示為耐日照者。
        2.有防護以免遭受外力損傷。
        3.緊貼於支撐結構之表面。
        4.每隔一‧八米以內加以固定。
        5.距離 PV 專用連接器或封閉箱體接口處○‧六米以內加以固定。
連接至追日型 PV 組列之可撓軟線或可撓電纜應為防水、耐日照、適用於室外
者，並應符合第四章第九節規定，且其載流導線安培容量依表三六八規定決定
。位於周圍溫度非為攝氏三十五度之場所，其安培容量應乘以表二五～七規定
之修正係數。
可撓細絞電纜終端應以壓力接線端子、壓力接頭或其他連接裝置，依第二十三
條規定作電氣連接。

第八百七十六條
建築物屋頂、牆面或內部之 PV 系統直流電路裝設，依下列規定辦理：
一、PV  系統直流電路超過三十伏特或大於八安培者，應採用金屬管槽、金屬
    封閉箱體，或採用有效接地故障電流回路之金屬被覆電纜配線。
二、可撓配線方法：
    (一)PV  電源電路導線穿在管徑小於二十一毫米金屬可撓導線管，或採用
        直徑小於二十五毫米之金屬被覆電纜配線，橫越天花板或樓地板托梁
        時，應有相當於該導線管或電纜高度之防護條保護。
    (二)配線為暴露裝設者，應緊貼於建築物表面，或有防護以免遭受外力損
        傷。但連接至設備在一‧八米以內者，不在此限。
三、識別：
    (一)內含 PV 系統直流電路之配線方法或封閉箱體，於下列規定位置應有
        標明 PV 電源或 PV 直流電路之耐久標識。但裝設方式或設置位置易
        於識別者，不在此限：
        1.暴露之管槽、電纜架或其他配線方法。
        2.線盒或匯流箱之蓋板或箱體。
        3.預留導線管開口處之管體。
    (二)識別之標識或標誌於裝設後應為明顯可視及，字體為紅底白字，且為
        反光材質。配線每隔三米以內應有適合所在環境之標識或標誌；其被
        封閉箱體、牆壁、隔板、天花板或樓地板分隔者，每一段應有標識或
        標誌。

第八百七十七條
適用於現場組裝被隱蔽之配件及連接器，得用於現場模組或其他組列組件之連
接。
前項配件及連接器應與現場之配線方法有相同之絕緣、溫升及短路電流額定，
且能承受工作環境所造成之影響。

第八百七十八條
除依前條規定外，PV  專用連接器之選用依下列規定辦理：
一、PV  專用連接器構造應有正、負極性，且與用戶配線系統之插座有不可互
    換性。
二、PV  專用連接器構造及裝設應能防止人員誤觸帶電部分。
三、PV  專用連接器應為閂式或鎖式。用於運轉電壓超過三十伏特之直流電路
    或交流電路，且為可輕易觸及者，應採用需工具解開之型式。所用之型式
    或品牌不同時，應採用製造廠家說明書指示為可互換性者。
四、PV  專用連接器用於啟斷電路者，應符合下列規定之一：
    (一)具備足夠啟斷電流額定，不會危害操作人員。
    (二)為需要使用工具解開之型式，且標明有負載下不可切離或不具備電流
        啟斷能力。
    (三)為 PV 設備之一部分，且依所連接設備之說明書裝設。

第八百七十九條
匯流箱或線盒裝設於模組後方者，其內部配線應能直接接取，或利用拆移模組
可拆式之固定扣件及可撓配線之連接等方式接取。

        第五款  接地
第八百八十條
PV  系統應採用下列規定一種以上之系統接地架構：
一、二線式 PV 組列，其一導線被功能性接地。
二、PV  組列未與被接地之變流器輸出電路隔離。
三、非接地 PV 組列，其正端與負端均未被接地。
四、符合第二項規定之直接接地 PV 組列。
五、與第九十條規定接地系統具有相同系統保護之其他接地方法。
PV  系統直流電路電壓超過三十伏特或電流大於八安培，應有符合下列規定之
直流接地故障保護：
一、接地故障保護裝置或系統能偵測 PV 系統直流電路導線，含功能性被接地
    導線之接地故障，且為適用於 PV 接地故障保護者。直流對直流轉換器無
    接地保護功能者，得採用適用之直流對直流轉換器與接地故障保護裝置之
    組合設備，作接地故障保護。
二、故障電路以下列規定之一加以控制：
    (一)自動啟斷故障電路之載流導線。
    (二)接地故障保護裝置能自動停止供電至輸出電路，並自功能性接地系統
        之接地參考點啟斷故障電路。
三、接地故障保護裝置在可輕易觸及處顯示接地故障。
變流器具備前項規定功能，或直接接地 PV 電源電路具二個以下並聯模組且非
位於建築物屋頂、牆面或內部者，得免裝設直流接地故障保護。

第八百八十一條
具有前條第二項規定接地故障保護裝置之 PV 系統，任一直流導線應透過該接
地故障保護裝置對地連接。
直接接地 PV 系統之直流電路接地連接，應設置在 PV 輸出電路之任一單點上
。

第八百八十二條
PV  系統模組框架、用電設備及導線箱盒之暴露非載流金屬組件應連接至設備
接地導線。其設備接地之裝設依下列規定辦理：
一、用於支撐 PV 模組之固定系統及設施，同時作為模組框架之搭接時，應為
    經設計者確認適用於搭接 PV 模組者。支撐相鄰模組之設施，得搭接相鄰
    PV  模組。但鹽害地區或發散腐蝕性物質環境不得適用本款規定。
二、經設計者確認適用於 PV 系統搭接及接地之金屬部分裝置，得供 PV 設備
    搭接至被接地之金屬支撐架。不同區段之金屬支撐結構應以搭接導線連接
    或經設計者確認適用於作為 PV 設備之搭接，並應連接至設備接地導線。
三、PV  組列與支撐結構之設備接地導線應與 PV 組列之 PV 直流導線裝設於
    同一管槽或電纜內，或於 PV 組列引出處與 PV 直流導線共同裝設。
四、金屬管槽連接處應以銅片或銅線搭接，以保持電氣連續性。

第八百八十三條
PV  系統電路之設備接地導線線徑應依表九三～二規定選定。
設備接地導線得不考慮電壓降而加大線徑。

第八百八十四條
建築物或 PV 系統支撐架應採用第二章第五節規定之接地電極系統。PV  組列
設備接地導線應依第一百零三條規定連接至接地電極系統，該連接應為第八百
八十二條第三款規定以外之額外連接。PV  組列設備接地導線線徑應依前條規
定選用。
第八百八十條第一項規定之 PV 系統接地架構，應符合下列規定之一：
一、非直接接地 PV 系統輸出端之設備接地導線，若連接至接地電極系統相連
    之配電箱者，得作為該系統對地之唯一連接。
二、直接接地 PV 系統應以十四平方毫米以上之接地電極導線，連接至接地電
    極系統。
PV  系統之接地電極不得與輸配電業或用戶配線系統接地搭接。該接地電極得
直接連接至 PV 模組框架或支撐結構。接地電極導線線徑應依表九三～一規定
選用，其接地電阻適用表九二規定。地面型 PV 組列之支撐結構符合第九十八
條規定者，得作為接地電極。

        第六款  標識
第八百八十五條
PV  模組應依其適用之 CNS、IEC 標準或其他經各目的事業主管機關認可之標
準規定加以識別。

第八百八十六條
PV  系統於下列規定之一位置應有標明依第八百六十六條計算所得之直流電路
最大電壓之耐久且明顯標識：
一、直流隔離設備。
二、電子式電力轉換設備。
三、直流配線相關設備。

第八百八十七條
所有併聯型系統與其他電源之連接點，應於隔離設備之可觸及處標明電源及其
額定交流輸出電流與標稱運轉交流電壓。

第八百八十八條
PV  系統裝設儲能系統者，應於其輸出電路導線連接至儲能系統處標明極性。

第八百八十九條
PV  系統之電源識別依下列規定辦理：
一、由獨立型系統供電給建築物者，在每個用戶總開關箱或其明顯可視及範圍
    內，應有標明建築物每個電源之隔離設備位置，或與其他現場電源群組位
    置之耐久且明顯標識。有多重電源供電給建築物者，應有標明多重電源警
    語之耐久標識。
二、由電力網與 PV 系統併聯供電給建築物者，在每個用戶總開關箱或其明顯
    可視及範圍內，應有標明建築物每個電源之隔離設備位置，或與其他現場
    電源群組位置，及多重電源警語之耐久且明顯標識。

        第七款  連接其他電源
第八百九十條
PV  系統連接至其他電源者，應依第九章第三節規定辦理。

第八百九十一條
連接至 PV 系統之儲能系統，應符合本章第三節規定。

第八百九十二條
獨立型 PV 系統之電源電路具備下列規定條件者，應視為符合第九百零一條規
定：
一、PV  電源電路與互連電池模組之電壓及充電電流要求匹配。
二、最大充電電流乘以一小時所得之值，小於以安培－小時為單位之電池模組
    額定容量百分之三，或製造廠家建議值。

      第三節  儲能系統
第八百九十三條
交流電壓超過五十伏特或直流電壓超過六十伏特，主要目的在經常電源運轉期
間進行充放電，可獨立運轉或與其他電力電源互連之固定式儲能系統配線及保
護，應依本節規定辦理。
本節未規定者，應適用第三章第十二節或其他章節規定。

第八百九十四條
本節用詞定義規定如下：
一、電池模組：指以串聯、並聯或兩者混合方式連接二個以上電池芯之電池集
    合，以提供所需之運轉電壓及電流。本規則電動車充電系統所稱之蓄電池
    亦屬之。
二、充電控制器：指儲能裝置充電過程中，將電力從對儲能裝置充電轉換至其
    他直流負載，或經由變流器至交流負載電力網之調節設備。
三、儲能系統：指由一個以上組件組成能夠儲存、轉換及輸出入電能之系統，
    包含變流器、轉換器、控制器及儲能組件等。其中儲能組件不限於電池模
    組、電容器及飛輪與壓縮空氣等動能裝置。分類如下：
    (一)整套型儲能系統：指儲能系統包含電池芯或電池模組，及必要之控制
        、通風、照明、滅火或警報系統等組件，組裝成單一儲能貨櫃或儲能
        單元。
    (二)套件型儲能系統：指使用單一廠家提供完整系統之個別組件，其經預
        先設計製造，並於現場組裝完成之儲能系統。
    (三)其他型儲能系統：指非整套型及非套件型之儲能系統，由個別組件組
        成之系統。
四、變流器輸入電路：指介於變流器與電池模組間之導線。
五、變流器輸出電路：指介於變流器與另一個電力電源間之導線。
六、變流器輸出至用電設備電路：指在孤島運轉時，變流器與用電器具間之導
    線。

第八百九十五條
用於儲能系統之監測器、控制器、開關、熔線、斷路器、電源轉換系統、變流
器、變壓器及儲能組件等儲能設備，應為適用於儲能系統者。整套型儲能系統
或套件型儲能系統，其單一儲能貨櫃、儲能單元或個別組件依第五條第一項規
定標準檢驗通過者，亦得裝用。
前項儲能設備之裝設、維護及相關配線、與其他電力電源互連，應由合格人員
辦理。

第八百九十六條
儲能系統隔離設備之裝設依下列規定辦理：
一、自儲能系統引接之所有非接地導線皆應有隔離設備，其裝設位置依下列規
    定：
    (一)隔離設備應裝設於儲能系統處可視及範圍內之可輕易觸及處。無法位
        於可視及範圍內者，該隔離設備應配裝附有啟斷位置可上鎖之固定式
        裝置，緊鄰儲能系統，並在儲能系統上或鄰近處現場有標明隔離設備
        所在位置之耐久標識。
    (二)前目規定之隔離設備得整合於儲能設備內。
    (三)獨棟或雙併住宅場所之儲能系統隔離設備或其遙控器，應裝設於建築
        物外可輕易觸及處，以供緊急使用。
二、啟動儲能系統隔離設備之控制器若不在儲能系統處可視及範圍內者，在隔
    離設備上應有現場標識，標明控制器所在位置。
三、每個儲能系統隔離設備應明顯指示啟斷位置或閉合位置，並有隔離儲能系
    統之耐久標識。現場應有標明下列資訊之明顯標識：
    (一)儲能系統之標稱交流電壓及最大直流電壓。
    (二)儲能系統可能產生之故障電流。
    (三)電弧閃絡標識。
四、儲能系統隔離設備之電源側與負載側端子於啟斷位置可能帶電者，其配電
    裝置應有標明電擊危險、端子電源側及負載側於啟斷位置可能帶電之耐久
    且明顯警告標識。
五、儲能系統內儲能組件輸入或輸出端之電路穿過牆壁、樓地板、天花板或隔
    板者，應裝設可輕易觸及之隔離設備位於儲能組件處可視及範圍內。其隔
    離得採用熔線型之隔離設備或斷路器。

第八百九十七條
儲能系統連接其他電力電源依下列規定辦理：
一、二個以上電力電源供電之負載隔離設備於啟斷位置時，應能啟斷所有電源
    。
二、與其他交流電力電源併聯運轉之儲能系統，應採用併聯型變流器。
三、輸配電業電源中斷時，儲能系統之併聯型變流器應自動隔離與輸配電業電
    源連接之所有非接地導線，並應於輸配電業電源恢復供電時，始得重新閉
    合。但與輸配電業有約定於其規定時間內自動隔離者，依其約定辦理。
四、儲能系統與其他交流電力電源間之不平衡連接，應符合第一千零三條規定
    。
五、儲能系統與電力電源之連接，應符合第九百九十四條規定。
六、與輸配電業責任分界點之系統保護協調符合輸配電業所訂有關併聯技術要
    點規定者，得逆送電力至電力網。
七、獨立運轉之儲能系統輸出，應符合第八百六十九條規定。

第八百九十八條
儲能系統之裝設依下列規定辦理：
一、儲能系統之儲存裝置若會產生氣體者，應採取適用於儲能之通風技術，使
    氣體充分流通及散逸，避免危害人體或爆炸性混合之氣體累積。套件型或
    整套型之儲能系統通風措施得依製造廠家說明書指示辦理。
二、儲能系統之排氣口不得朝向避難出口及人車通道。
三、獨棟或雙併住宅場所之儲能系統直流線間電壓或對地電壓，不得超過一百
    伏特。但儲能系統直流最大電壓在六百伏特以下，且於例行維護儲能系統
    時不會觸及帶電部分者，不在此限。
四、儲能系統之工作空間：
    (一)最小工作空間應符合表八規定。其工作空間量測應從儲能系統電池模
        組、電池箱體、機櫃或托架之邊緣開始。
    (二)電池模組機櫃之電池槽與維護時不需接近之牆壁或結構間，應保持二
        十五毫米以上之間隔。
    (三)套件型及整套型之儲能系統內組件之工作空間，得依製造廠家說明書
        指示辦理。
五、儲能系統及其設備與組件之工作空間應裝設照明燈具。該燈具不得僅以自
    動裝置控制。若有相鄰光源照射之工作空間，得免加裝照明燈具。照明燈
    具之位置不得使人員在儲能系統空間內維修照明燈具時，暴露於該系統之
    帶電部分，或於照明燈具故障時，對儲能系統或系統組件造成危害。
六、儲能系統裝置容量達二十千瓦小時以上者，應裝設於獨立空間且不易遭受
    外力損傷之處，其出入門應朝出口方向對外開啟，並配裝緊急或消防出口
    適用之門把。該空間牆壁、地板、天花板或隔板應有二小時以上之防火時
    效。

第八百九十九條
每套儲能系統裝設後應有標明下列資訊之耐久且明顯標識：
一、製造廠家名稱、商標或其他負責供應儲能系統之組織。
二、額定頻率。
三、交流相數。
四、容量（kW  或 kVA）。
五、儲能系統輸出端最大輸出與輸入之電壓與電流，及可能之故障電流。
六、與電力網併聯之容量。
儲能系統之電源識別應依第八百八十九條規定辦理。

第九百條
儲能系統電路之電流計算依下列規定辦理：
一、特定電路之最大電流：
    (一)電路電流應為儲能系統銘牌或系統驗證文件指示之額定電流。儲能系
        統輸入及輸出電路或額定分開者，應個別認定。儲能系統充放電使用
        同一端子者，其額定電流應取兩者中較大者。
    (二)變流器輸出電路最大電流應為變流器連續輸出電流之額定值。
    (三)當變流器在最低輸入電壓下產生額定功率時，變流器輸入電路最大電
        流應為變流器連續輸入電流之額定值。
    (四)當變流器產生額定功率時，變流器輸出至用電設備電路最大電流應為
        變流器連續輸出交流電流之額定值。
    (五)直流對直流轉換器輸出最大電流應為該轉換器連續輸出電流之額定值
        。
二、儲能系統供電至負載之配線，其幹線之導線安培容量不得小於前款第一目
    規定銘牌或系統驗證文件指示之額定電流，或儲能系統過電流保護裝置安
    培額定之較大者。
三、單相二線式儲能系統輸出至被接地導線或中性線，及三線式系統或三相四
    線式 Y  接系統之單獨非接地導線，其最大不平衡中性線負載電流加上儲
    能系統輸出額定值，不得大於被接地導線或中性線之安培容量。

第九百零一條
儲能系統電路導線過電流保護應符合第二章第四節規定。儲能系統電路之保護
裝置依下列規定辦理：
一、過電流保護裝置之安培額定應符合第二章第四節規定及儲能系統之額定電
    流，且不得小於依前條第一款計算所得最大電流一‧二五倍。
二、用於儲能系統直流部分之過電流保護裝置，應為適用於直流電路者，且有
    適用於直流之額定電壓、額定電流及啟斷容量。
三、儲能系統直流輸出電源端應裝設適用之限流型過電流保護裝置。但儲能系
    統已有直流輸出之限流型過電流保護裝置者，得免裝之。
四、熔線二側皆有電源者，其二側皆應裝設隔離設備，以隔離儲能系統設備及
    其組件。開關、抽出或類似配電裝置額定適用於隔離熔線者，得作為隔離
    所有電源之設備。
五、儲能系統之輸入或輸出端之電路穿過牆壁、樓地板、天花板或隔板，該儲
    能組件電路終端應有過電流保護裝置。

第九百零二條
儲能系統應有控制器調控其充電過程。用於控制充電過程之可調節裝置，僅限
合格人員可觸及。
充電控制器之裝設依下列規定辦理：
一、儲能系統採用充電控制器作為調節充電之單一裝置，應配備第二個獨立裝
    置，防止儲存裝置過度充電。
二、充電控制器及轉換負載之電路：
    (一)轉換負載額定電流不得大於充電控制器額定電流；其額定電壓應超過
        儲能系統之最大電壓；其額定功率應為充電電源額定功率一‧五倍以
        上。
    (二)電路之導線安培容量及過電流保護裝置之安培額定，應為充電控制器
        最大額定電流一‧五倍以上。
三、使用與電力網併聯型變流器之儲能系統，將多餘功率轉移至電力網，控制
    能量儲存充電狀態，依下列規定：
    (一)此系統不受前款規定限制。
    (二)此系統應有備援機制控制儲能系統充電過程，以因應電力網中斷或原
        充電控制器故障或失能時運用。
裝設之充電控制器及其他直流對直流轉換器，其輸出電壓及電流隨輸入而變動
者，應符合下列規定：
一、輸出電路導線之安培容量以在所選擇輸出電壓範圍下，充電控制器或轉換
    器最大額定連續輸出電流值為基準。
二、輸出電路導線之額定電壓以在所選擇輸出電壓範圍下，充電控制器或轉換
    器之最大電壓輸出值為基準。

    第八章  高壓用電設備及配線方法
      第一節  通則
第九百零三條
超過六百伏特之高壓用電設備裝設，應依本章規定辦理。本章未規定者，應依
其他章節之適用規定辦理。
超過三十五千伏特之特高壓用電設備裝設於本規則未規定者，應依輸配電設備
裝置規則規定辦理。

第九百零四條
本章用詞定義規定如下：
一、高壓用電設備：指超過六百伏特之配電盤、變壓器、開關設備、保護設備
    、計器或儀表等受電裝置。
二、變電室：指在建築物內裝設高壓用電設備之房間或隔間。裝設低壓用電設
    備之處所，若緊臨高壓用電設備，且未以建築物或其他方法隔離者，該處
    所亦屬變電室之一部分。
三、電子致動式熔線：指通常由控制模組及啟斷模組組成之過電流保護裝置；
    其控制模組具有電流感測裝置，透過電子電路導出時間電流特性，通電觸
    發跳脫；其啟斷模組則於過電流發生時啟斷電流。依所選擇控制類型，得
    以限流或非限流方式操作。
四、排氣式電力熔線：指在啟斷電路期間，讓電弧氣體、液體或固體微粒逸散
    至周圍空氣之熔線。
五、熔線鏈開關：指藉由電弧及熔線座內襯產生氣體驅弧效果完成消弧，或在
    消弧期間同時藉助彈簧之作用完成消弧之附裝熔線筒、熔線或隔離閘刀支
    撐之熔線組合。

第九百零五條
高壓用電設備之配線及保護於現場組裝者，其暴露帶電部分間、暴露帶電部分
與大地間，在空氣中之最小間隔不得小於表九○五規定。
高壓用電設備內部配置或設備之外部端子間隔，依前項規定保持之間隔，得酌
量縮小。

第九百零六條
高壓電力電纜之最小線徑應符合表九○六規定。

第九百零七條
高壓電力電纜不得暴露於陽光直接照射場所。但特別為該場所設計者，不在此
限。
非合格人員可觸及之場所，高壓電力電纜不得採用暴露方法敷設。
高壓電力電纜之終端及接續應由取得相關技術證照或資格之合格人員裝設、處
理及測試。

第九百零八條
高壓電力電纜各種裝設之安培容量決定依下列規定辦理：
一、裝設於地下管路者，電纜安培容量應依表九○八～一至表九○八～三規定
    。
二、於空氣中架設，不考慮日照強度及風速影響者，電纜安培容量應依表九○
    八～四至表九○八～六規定。
三、裝設於空氣中單一導線管內者，電纜安培容量應依表九○八～七及表九○
    八～八規定。
高壓電力電纜裝設環境土壤溫度超過攝氏二十度，或空氣中周圍溫度超過三十
五度者，其安培容量應乘以表九○八～九規定之修正係數。

第九百零九條
高壓用電設備若有帶電部分露出者，應裝設於有上鎖之封閉箱體；其屬開放式
裝置者，依下列規定辦理：
一、設備應裝設於變電室內，或設置高度二‧五米以上之圍牆或圍籬加以隔離
    ，或裝設位置高度可防止非合格人員接觸。
二、裝設於僅合格人員可觸及之變電室者，應符合第九百四十八條第二項規定
    。
三、裝設於建築物外者，應依輸配電設備裝置規則規定辦理。

第九百十條
高壓用電設備裝設於非合格人員可觸及處者，依下列規定辦理：
一、設備通風口或類似開口設計應使外物從該開口插入時會偏離帶電部分。
二、設備暴露於可能因車輛碰撞而遭受外力損傷者，應設有防護裝置。
三、設備暴露之螺栓及螺帽不得輕易被取下，以免因此接觸帶電部分。
四、設備封閉箱體之底部距離地平面或樓地板高度低於二‧五米者，該箱體之
    門或鉸鏈蓋應加以上鎖。
五、封閉箱體僅供拉線、接續或分接者，其門或鉸鏈蓋應加以上鎖或用螺栓拴
    緊。
六、地下封閉箱體之孔蓋重量應超過四十五公斤。

第九百十一條
高壓線路與低壓線路在建築物內應保持三百五十毫米以上之間隔，在建築物外
應保持五百毫米以上之間隔。
除光纖電纜外，高壓線路與電信線路、水管、燃氣供給管路及其他金屬物間，
應保持五百毫米以上之間隔。
高壓線路及低壓線路皆採用電纜敷設者，得不受前二項間隔規定限制。

      第二節  高壓用電設備
第九百十二條
高壓進屋線裝設依下列規定辦理：
一、架空導線不得小於二十二平方毫米。採用電纜者，其最小線徑應配合電纜
    額定電壓依表九○六規定選用。
二、進屋線配裝位置若為非合格人員可觸及者，應採用厚金屬導線管、PVC 管
    、金屬導線槽或電纜架配線。
三、在僅合格人員可觸及處，進屋線得按露出礙子工程裝設。
四、進屋線及其支持物之強度應能確保於電路發生短路時，導線間保持符合表
    九○五規定之安全間隔。
五、露出之礙子配線在非合格人員可觸及處應加掩護。

第九百十三條
在非合格人員可能接近高壓用電設備帶電部分之處所，應有標明高電壓危險之
警告標識。

第九百十四條
高壓用戶應在責任分界點附近裝設隔離電源之隔離設備，並依下列規定辦理：
一、位置應位於最接近導線引入口可輕易觸及之處。若有困難者，應於可輕易
    觸及之處能遙控操作。
二、選用：
    (一)每棟建築物之隔離設備應同時隔離其所控制之所有非接地進屋線，且
        其承受故障閉合電流之額定應高於供電端最大短路電流。
    (二)隔離設備為附熔線開關者，其熔線特性得彌補隔離設備故障閉合電流
        額定之不足。
三、負載啟斷開關具有啟斷電流能力，並位於明顯可視及啟閉位置者，得視為
    隔離設備。
以絕緣油、真空、六氟化硫等斷路器作為前項規定之隔離設備者，應於電源側
裝設隔離開關，其隔離開關裝設依下列規定辦理：
一、一般要求：
    (一)應具有完全隔離用電設備所有非接地導線之設施，且可明顯指示啟閉
        位置。
    (二)應與電路啟斷設備互鎖。但標明有載下不得操作者，不在此限。
    (三)應具備於隔離電源後，易於將負載側導線接至接地電極系統、設備接
        地匯流排或被接地鋼構之配電裝置。
二、抽出型斷路器於電路啟斷始能抽出或抽離正常運轉位置即自動啟斷電源者
    ，得免加裝該隔離開關。
三、若一組熔線可作為隔離開關操作者，得作為隔離開關。
四、隔離開關應僅限合格人員可操作。
裝設於建築物外且進屋線僅接一具或一組變壓器，並符合下列規定者，得採用
熔線鏈開關附裝熔線或隔離開關附裝熔線替代隔離設備：
一、變壓器組一次側額定電流不超過二十五安培。
二、變壓器二次側之電路符合下列規定之一者：
    (一)不超過六路，且各裝有啟斷電路滿載電流之斷路器或附熔線之負載啟
        斷開關。
    (二)超過六路，且變壓器二次側加裝主斷路器。

第九百十五條
高壓用電設備除避雷器外，應具有能隔離所有非接地導線之隔離設備，裝設該
隔離設備依前條適用規定辦理。但一次側之幹線裝有三極連動之斷路器或負載
啟斷開關作為隔離設備者，得裝設熔線鏈開關或隔離開關附裝熔線替代變壓器
之隔離設備。

第九百十六條
高壓進屋線、幹線或分路之過電流保護裝置應採用斷路器、電力熔線、熔線鏈
開關附裝熔線或第九百十七條規定之負載啟斷開關。
以斷路器、電力熔線、熔線鏈開關附裝熔線作為過電流保護裝置者，其額定電
壓及額定電流不得小於電路最高電壓及最大連續電流值，且其啟斷額定電流不
得小於裝置點可能發生之最大短路電流值。
斷路器作為過電流保護裝置之裝設依下列規定辦理：
一、裝設於建築物內之斷路器，應採用有不燃性絕緣物者，或裝設於金屬封閉
    箱體或防火裝置內。若屬開放式裝置者，其裝設處所應僅合格人員可觸及
    。
二、操作：
    (一)斷路器應有與控制電源無關而可觸及之機械或手動操作跳脫裝置。
    (二)斷路器應具有自由跳脫（ Trip Free）特性。
    (三)在加壓情況下，斷路器應具有可手動啟斷或閉合，且主接觸子之動作
        不受手動操作速度影響。
    (四)斷路器本身應具有啟斷或閉合之機械位置指示器，可判別主接觸子係
        在啟斷位置或閉合位置。
    (五)配電盤盤面等操作斷路器處應有紅、綠燈等明顯之閉合及啟斷指示。
電力熔線作為過電流保護裝置之裝設依下列規定辦理：
一、以電力熔線保護導線與設備時，應裝設於每一非接地導線。
二、排氣式電力熔線不得裝設於建築物內、地下或金屬封閉箱體內。
三、熔線啟斷電路時，不得使電弧或火焰傷及人員或設備。
四、熔線座應在不帶電情形下始能更換熔線。但由合格人員使用工具及防護設
    備可於帶電情形下作業者，不在此限。
五、內裝電力熔線之高壓配電盤及變電室（站），該熔線電源側應裝設三相連
    動之負載啟斷開關。但開關之負載啟斷裝置具有機械性或電氣性互鎖，能
    使負載降低至開關啟斷能力之下者，不在此限。
熔線鏈開關作為過電流保護裝置之裝設依下列規定辦理：
一、熔線鏈開關應裝設於易於操作及更換熔線處，且在熔線熔斷時，其消弧過
    程不致傷及人員。
二、熔線鏈開關不得裝設於建築物內、地下室或金屬封閉箱體內。
三、操作：
    (一)熔線鏈開關應有標明不得在有載下操作之明顯警告標識。
    (二)熔線鏈開關不得在有載下手動啟斷電路。但利用輔助操作器可切斷負
        載電流者，不在此限。
四、在建築物外鐵構上裝設熔線鏈開關者，其最底帶電部分包括啟斷位置或閉
    合位置之高度，應符合第九百四十八條規定。

第九百十七條
能同時啟斷電路中各相線滿載電流之負載啟斷開關，配置適當之熔線者，得作
為高壓進屋線、幹線或分路之過電流保護裝置；其額定電壓及電流不得小於電
路最高電壓及最大連續電流值；其裝設依下列規定辦理：
一、負載啟斷開關得與熔線或斷路器連接以啟斷故障電流。此組合裝置應具有
    電氣性協調，可安全承受閉合、承載或啟斷設計之最大短路電流。
二、裝設二具以上之負載啟斷開關，且負載端子互相連接，由不同電源導線供
    電時每具開關應有明顯標識，以辨識其危險性。
三、附熔線之負載啟斷開關之電源端子應裝設於開關箱之上方。若電源端子裝
    於別處，開關應裝設隔板，防止人員意外碰觸帶電部分，或防止工具或熔
    線掉落至帶電部分。
四、若熔線可能因逆送電而帶電者，封閉箱體之箱門上應有警告標識。

第九百十八條
自電源側引出之幹線若不超過三路，且各裝設符合第九百十六條規定之斷路器
，或前條規定之負載啟斷開關附裝熔線者，其進屋線或主幹線之主保護設備得
予省略。

第九百十九條
高壓進屋線、幹線及分路之每一非接地導線應裝有符合下列規定之過電流保護
裝置，且其保護位置應位於導線電源端：
一、以斷路器作為三相電路之過電流保護裝置者，至少有三個分別由三個比流
    器驅動之過電流電驛元件，或一組整套型智慧型電子元件保護電驛（IED
    ）。
二、以熔線作為過電流保護裝置者，每條非接地導線串接一具熔線。
三、保護裝置能偵測及啟斷其裝設位置所流過超過其跳脫設定或熔點之所有電
    流。
四、保護裝置之動作時間具有良好之保護協調，不得因短路電流造成導線之溫
    升而傷及導線或其絕緣。

第九百二十條
高壓進屋線、幹線及分路過電流保護裝置安培額定依下列規定辦理：
一、斷路器跳脫元件之始動電流標置，或電子致動式熔線之最小跳脫電流額定
    ，不得大於導線安培容量六倍。
二、熔線之連續電流額定不得大於導線之安培容量三倍。

      第三節  高壓配線
第九百二十一條
高壓配線應採用厚金屬導線管、非金屬導線管、電纜架、金屬被覆電纜、匯流
排槽或其他適用之管槽。
暴露型之高壓電纜、裸銅線及裸匯流排，得裝設於僅合格人員可觸及處。
配電盤或配電箱之匯流排得為銅質或鋁質。

第九百二十二條
高壓地下配線依下列規定辦理：
一、一般要求：
    (一)地下配線應考慮電路電壓及裝設條件。
    (二)裝設地下電纜應符合下列規定之一：
        1.有遮蔽電纜及金屬被覆電纜，其金屬被覆應依第九十條第四款規定
          有效接地，遮蔽導體在電纜之連接處應有電氣連續性，並應採用非
          金屬導線管或適用於潮濕場所之厚金屬導線管配線。
        2.無遮蔽電纜或非金屬被覆電纜應採用非金屬導線管或適用於潮濕場
          所之厚金屬導線管配線，並包覆混凝土厚度七十五毫米以上。
二、埋設深度：
    (一)採用非金屬導線管配線者，三十五千伏特以下電纜最小埋設深度應為
        六百毫米以上；超過三十五千伏特電纜最小埋設深度應為七百五十毫
        米以上。
    (二)採用厚金屬導線管配線者，最小埋設深度應為一百六十毫米以上。
    (三)若無法達到前二目規定之深度者管路應採用同等強度之鋼筋混凝土包
        覆。
三、潮濕場所：
    (一)封閉箱體或管槽裝設於地下者，其內部應視為潮濕場所。敷設其中之
        電纜應為適用於潮濕場所者。
    (二)地下配線之中間接續應為適用於潮濕場所者。
四、回填料不得含有大塊岩石、鋪路材料、煤渣、大塊或尖角物料或腐蝕性材
    料。
五、地下管路進入建築物，於建築物內側之管口，應加以密封，以防止水氣滲
    入或氣體進入。
六、保護：
    (一)導線由地下引出地面時，應以導線管保護。
    (二)導線裝設於電桿時，應採用金屬導線管、硬質非金屬導線管或具有同
        等強度之導線管，且該導線管之高度由地面起算應為二‧五米以上。
    (三)導線進入建築物時，自地面至進屋點應以封閉箱體或導線管保護，且
        其非帶電金屬部分應加以接地。

第九百二十三條
高壓電纜裝設於鐵磁性金屬封閉箱體、鐵磁性金屬導線管或金屬導線槽者，應
依第三百零一條規定保持磁場平衡。

第九百二十四條
單芯電纜之彎曲內側半徑，無遮蔽層者，應為電纜外徑八倍以上；有遮蔽層者
，應為電纜外徑十二倍以上。
多芯電纜之彎曲內側半徑應為其中個別電纜外徑十二倍以上，或整體包覆電纜
之外徑七倍以上，兩者之較大者。
前二項規定於電纜製造廠家說明書另有指示者，從其指示辦理。

第九百二十五條
電纜終端施工時，遮蔽電纜之金屬及半導電絕緣遮蔽層，應依製造廠家說明書
指示電路電壓及絕緣等級剝除，遮蔽層應配裝應力釋放錐。
電纜之金屬絕緣遮蔽層材質若為銅帶、銅線、銅編織或三者之組合者，應連接
於設備接地導線、接地匯流排或接地電極。

第九百二十六條
高壓配線用拉線盒、接線盒、導管穿線匣及手孔之最小容積依下列規定辦理：
一、直線拉線：長度不得小於最大有遮蔽層電纜外徑四十八倍，或最大無遮蔽
    層電纜外徑三十二倍。
二、轉彎或Ｕ型拉線：
    (一)電纜進入側至另一側之長度，不得小於最大電纜外徑三十六倍，加上
        同一側之其他電纜外徑之總和。
    (二)入口與出口之距離：不得小於電纜外徑三十六倍。但無遮蔽層之電纜
        得縮減為電纜外徑二十四倍以上。

第九百二十七條
高壓配線之線盒裝設依下列規定辦理：
一、線盒應以防腐蝕性之材料製成，或將線盒之內外面上釉、鍍鋅、電鍍或以
    其他方式保護。
二、絕緣導線或電纜通過隔板及其他必要隔室，應採用圓形平滑邊緣之套管、
    遮蔽或配件。
三、線盒應能完全封閉其所包含之絕緣導線或電纜。
四、線盒及管匣裝設後，在不需移開建築物任何固定部分情形下，導線應為可
    觸及，並應提供符合第九百四十八條規定之工作空間。
五、蓋板：
    (一)線盒應採用蓋板牢固鎖住。
    (二)地下配線線盒蓋板重量超過四十五公斤者，視為符合前目規定。
    (三)線盒之蓋板上應有標明高電壓危險之耐久且明顯警告標識。

第九百二十八條
高壓電纜敷設於單一電纜架之數量不得超過下列規定：
一、單芯電纜及三芯電纜之直徑總和，不超過電纜架寬度，且電纜僅容許單一
    層敷設。
二、單芯電纜每一回路以三條或四條綁紮成一束者，單芯電纜之直徑總和不超
    過電纜架寬度，且電纜僅容許單一層敷設。

第九百二十九條
高壓電纜依前條規定敷設於電纜架之安培容量依下列規定選定：
一、多芯電纜：
    (一)多芯電纜單一層敷設於電纜架，其安培容量應依表九○八～七選定。
        敷設於有堅實不透風蓋板一‧八米以上之電纜架者，其安培容量不得
        大於表九○八～七所示值百分之九十五。
    (二)多芯電纜單一層敷設於電纜架，且電纜之間隔為電纜直徑以上者，其
        安培容量不得大於表九○八～四規定。
二、單芯電纜：
    (一)單芯電纜敷設於電纜架者，其容許安培容量不得大於表九○八～五所
        示值百分之七十五；敷設於有堅實不透風蓋板一‧八米以上之電纜架
        者，其容許安培容量不得大於表九○八～五所示值百分之七十。
    (二)單芯電纜單一層敷設於電纜架，且電纜之間隔為電纜直徑以上者，五
        十平方毫米以上之電纜安培容量應符合表九○八～五規定。
    (三)單芯電纜以三條或四條綁紮成一束敷設於電纜架，彼此間隔為最大電
        纜直徑二‧一五倍以上者，五十平方毫米以上之電纜安培容量應依表
        九○八～六規定。

第九百三十條
建築物外高壓幹線或分路進入各別建築物應依第九百十四條規定裝設隔離設備
，並應配裝附有啟斷位置可上鎖之固定式裝置。
建築物有任何供電或穿過之進屋線、幹線或分路者，於每一幹線及分路之隔離
設備處，應有標明該建築物之供電區域及其相關電路路徑之耐久標識。

第九百三十一條
建築物外高壓架空導線之支撐依下列規定辦理：
一、系統導線間支撐之設計應依輸配電設備裝置規則相關規定，其設計應考量
    下列因素之影響：
    (一)線路電壓。
    (二)導線截面積。
    (三)支持物間之距離。
    (四)支持物型式。
    (五)風壓及冰荷重。
    (六)突波保護。
二、支持物應以木桿、金屬桿、水泥桿或其組合結構物等作為高壓架空導線之
    支撐。每一支持物之設計及裝設應依輸配電設備裝置規則相關規定，其設
    計應考量下列因素之影響：
    (一)土壤狀況。
    (二)基礎及支持物配置。
    (三)所有架設導線及設備之重量。
    (四)氣候及冰、風力、溫度及雷擊等特殊狀況計算之容許荷重。
    (五)方向改變之角度。
    (六)相鄰支持物之間距。
    (七)終端結構之效應。
    (八)支線及支線錨之強度。
    (九)支持物大小及材質。
    (十)硬體構件。
三、支撐導線之絕緣礙子應評估下列事項：
    (一)相間電壓。
    (二)每一個別裝設所要求之機械強度。
    (三)表九○五規定之基準衝擊絕緣強度（ BIL）。

第九百三十二條
高壓架空導線支持物上之支吊線、絕緣導線、電纜、設備及橫擔等與地面、道
路、軌道或水面之垂直間隔應符合輸配電設備裝置規則相關規定。

第九百三十三條
高壓架空導線之支吊線、絕緣導線、電纜及硬質帶電部分，與建築物、交通號
誌、告示板、煙囪、無線電及電視天線、桶槽及其他裝置之垂直與水平間隔應
符合輸配電設備裝置規則相關規定。

      第四節  高壓接地及搭接
第九百三十四條
高壓用電設備之金屬支撐架及金屬封閉箱體等非帶電金屬部分之接地或搭接，
應依第二章第五節規定辦理。

第九百三十五條
高壓電路所裝設之避雷器應依本章第八節規定接地。
高壓變比器之二次側應依第三種接地辦理。

第九百三十六條
符合下列條件者，得採用中性點阻抗接地系統：
一、由合格人員維修及管理監督者。
二、系統有裝設接地檢示器。
三、不供電給相線對中性線之負載。
裝設中性點阻抗接地系統依下列規定辦理：
一、接地阻抗應裝設於供電系統變壓器或發電機之中性點與接地電極之間。
二、中性點阻抗接地系統之中性線應加以識別，並與相導線具有相同等級之絕
    緣。
三、非金屬帶電部分之設備接地導線得為裸銅線，並應連接至接地匯流排或接
    地電極導線。

第九百三十七條
高壓系統及電路之用電設備接地依下列規定辦理：
一、用電設備之所有非帶電金屬部分、圍籬、封閉箱體及支持物，應加以接地
    但與大地絕緣，且可防止與大地接觸之人員與該金屬組件碰觸者，不在此
    限。
二、接地電極導線線徑應符合表九三～一規定，且不得小於十四平方毫米。
三、設備接地導線：
    (一)設備接地導線非屬整體電纜組合之一部分者，其線徑不得小於十四平
        方毫米。
    (二)電纜金屬遮蔽層不得作為直接被接地系統之設備接地導線。但電纜金
        屬遮蔽層可耐受接地故障電流保護裝置於故障清除時間內動作而不損
        壞者，不在此限。
    (三)設備接地導線之線徑應依熔線電流額定或保護電驛動作電流設定決定
        ，並符合表九三～二規定。

      第五節  高壓變壓器及變電室
        第一款  高壓變壓器
第九百三十八條
高壓變壓器除變比器、特殊用途及附裝於機器設備內之變壓器外，其配線及保
護應依本節規定辦理。
每具用電設備裝填之易燃性油超過三十八公升者，其裝設處所依本節規定辦理
。

第九百三十九條
高壓變壓器之過電流保護應依表九三九規定辦理。
前項所稱變壓器指三相一台或三個單相變壓器所組成之三相變壓器組。
特高壓變壓器之過電流保護裝置應配合輸配電業保護協調標置辦理。

第九百四十條
乾式變壓器裝設於室內依下列規定辦理：
一、一百二十五千伏安以下之變壓器應以耐火隔熱板與可燃性材質分離，或距
    離可燃性材質至少三百毫米。但標稱電壓六百伏特以下，除通風口外完全
    封閉且製造廠家說明書未另指示距離者，不在此限。
二、超過一百二十五千伏安之變壓器應裝設於具有一小時以上防火時效之室內
    。但為攝氏一百五十五度或 F  級以上絕緣系統之變壓器，且符合下列規
    定之一者，不在此限：
    (一)以耐火隔熱板與可燃性材質分離，或水平距離一‧八米以上且垂直高
        度三‧七米以上。
    (二)除通風開口外完全封閉。

第九百四十一條
乾式變壓器裝設於室外者，應具有耐候之封閉箱體。超過一百二十五千伏安之
變壓器不得裝設於距離建築物可燃性材質三百毫米內。但為攝氏一百五十五度
或 F  級以上絕緣系統之變壓器，除通風開口外完全封閉者，不在此限。

第九百四十二條
變壓器絕緣油燃點超過攝氏三百度者，其裝設依下列規定辦理：
一、符合下列規定之一者，得裝設於室內：
    (一)變壓器額定電壓三十五千伏特以下，室內無貯存可燃性物質，而設有
        絕緣油洩漏之儲存槽，裝設符合其絕緣油之使用標準，且室內防火時
        效一小時以上。
    (二)變壓器額定電壓三十五千伏特以下，設有絕緣油洩漏之儲存槽，且室
        內裝有自動之滅火設備。
    (三)符合第九百四十三條規定。
二、符合下列規定之一者，得裝設於室外、附屬建築物、鄰近建築物或建築物
    屋頂：
    (一)裝設符合其絕緣油之使用標準，且建築物具防火時效一小時以上。
    (二)符合第九百四十四條規定。

第九百四十三條
油浸式變壓器裝設於室內者，應設置於變電室。但有下列情形者，不在此限：
一、變壓器總容量小於一百二十五千伏安，室內以厚度超過一百毫米之鋼筋混
    凝土建造者。
二、變壓器標稱電壓六百伏特以下，在可燃性建築物中，有防止絕緣油燃燒引
    燃其他物質措施，且總容量小於十千伏安者，或周圍結構為耐火構造，且
    其總容量小於七十五千伏安者。
三、電氣爐用變壓器總額定容量小於七十五千伏安，有防止變壓器油燃燒擴及
    其他可燃材質者。
四、變壓器為整套型荷電粒子加速設備之一部分，總額定容量不超過七十五千
    伏安，供電電壓六百伏特以下，有防止變壓器油燃燒擴及其他可燃材質者
    。
五、建築物及其內部建材不會造成火災危害，且建築物僅作供電及僅合格人員
    可觸及者。
六、用於電動挖掘機等移動式及可攜式採礦設備，且符合下列所有規定者：
    (一)裝設排放設施以預防絕緣油洩漏於地面。
    (二)裝設人員安全出口。
    (三)裝設厚度六毫米以上之鋼製隔板保護人員安全。

第九百四十四條
油浸式變壓器裝設於室外者，依下列規定辦理：
一、變壓器裝設於屋頂、附屬建築物、鄰近建築物或可燃性物質者，其可燃性
    物質、可燃性建築物及建築物部分、防火逃生通道及門窗開口，應有避免
    變壓器引起火災之安全防護設施。
二、變壓器裝置可能引起火災危害者，應依其危害程度採取下列一項以上之安
    全防護設施：
    (一)空間隔離。
    (二)防火屏板。
    (三)自動之滅火設備。
    (四)變壓器油箱破裂時，限制絕緣油外漏之圍阻體。
三、變壓器油外漏之圍阻體：
    (一)得為阻油堤或洩油池設施。
    (二)應設有排洩閥，以利移除外漏之變壓器油。

        第二款  變電室
第九百四十五條
變電室之牆壁及屋頂混凝土厚度應為一百二十毫米以上，磚造厚度應為二百五
十毫米以上。變電室之地板混凝土厚度應為一百二十毫米以上；若下方有其他
樓層者，樓地板應能承載其荷重。
變電室門口之保護依下列規定辦理：
一、由建築物內部進入變電室之每一個門口，應裝設緊密且具有一小時以上防
    火時效之門。
二、變電室應具有足以阻止變電室內最大變壓器漏油溢出門外高度之門檻或護
    欄，其高度不得小於一百毫米。
三、變電室門應配裝門鎖，且應加以上鎖，僅合格人員可進出。逃生門開啟方
    向應向外，並配有緊急推把。

第九百四十六條
變電室通風口設置依下列規定辦理：
一、位置應儘可能遠離門口、窗戶、逃生通道及可燃性物質。
二、通風口之排列應將所需開口面積之一半設於近地板處，另一半設於屋頂上
    或近於屋頂之壁上；或將所有之通風口全部開口面積，皆設在近屋頂處，
    達到自然通風。
三、變壓器容量在五十千伏安以下者，通風口之總面積應扣除窗口上網蓋等所
    占之面積後，不小於○‧一平方米；超過五十千伏安者，每超過一千伏安
    應增加二千平方毫米。
四、通風口應有耐用窗格、百葉窗或網罩保護。
五、變電室對室內之所有通風口，應配置對變電室火災感應之自動關閉防火閘
    板，且該防火閘板應採不鏽材質，並裝有不鏽鋼網，且防火時效達一‧五
    小時以上。
六、通風管應以耐火材質建造。

第九百四十七條
變壓器容量超過一百千伏安之變電室應配置排水或其他設施，排除變電室內積
油或積水。
與電氣或防火無關之管道不得經過或進入變電室。
變電室應有防止鳥獸等異物侵入之措施。

第九百四十八條
變電室應設於易檢點及維護之處所。變電室內用電設備之配置應考慮平時運轉
維護及設備不良時更換所需之工作空間等條件。
變電室之工作空間及防護依下列規定辦理：
一、變壓器、配電盤、控制盤、開關、斷路器、電動機操作器、電驛或其他類
    似高壓用電設備之前面應有最小工作空間。除本規則另有規定者外，高壓
    用電設備最小工作空間不得小於表九四八～一規定。高壓用電設備帶電部
    分露出者，工作空間距離應自帶電部分算起；若為封閉型設備者，應自封
    閉箱體前端或箱門算起。
二、變電室或內裝有超過六百伏特帶電部分之封閉箱體，其進出口應加以上鎖
    但經常有合格人員值班者，不在此限。
三、在用電設備周圍之工作空間應有照明裝置，且照明出線口、手捺開關等位
    置之安排，應使更換燈泡、修理照明燈具或控制燈具時，不致觸及帶電部
    分。
四、在工作空間上方未防護之帶電部分，距離地面高度不得小於表九四八～二
    規定。

第九百四十九條
變電室依下列規定設置警告標識：
一、下列區域應有標明高電壓危險之耐久且明顯警告標識：
    (一)所有用電設備變電室及裝有用電設備之房間、區域或封閉箱體之入口
        。
    (二)接近所有高電壓管路及電纜之導線處。
    (三)裝有高電壓電纜之電纜架上，每隔三米以內有一個標識。
二、隔離開關處除該設備被互鎖，使其於有載下不能操作外，應有標明在有載
    下不能操作之耐久且明顯警告標識。
三、若有逆送電可能性存在，應採取下列規定方法：
    (一)每一群組動作之隔離開關或隔離設備應有該裝置之任一側均可能帶電
        之警告標識。
    (二)每一連接點可視及範圍內應有標明每一高電壓區段連接點之耐久且明
        顯變電室開關操作配置單線圖。
四、裝設高壓配電盤者，在人員可接近之帶電部分面板或門上，應有標明高電
    壓危險之耐久且明顯警告標識。

      第六節  高壓電動機
第九百五十條
高壓電動機電路之裝設應依本節規定辦理；本節未規定者，應依其他適用之章
節規定辦理。

第九百五十一條
金屬可撓導線管得作為管槽與高壓電動機端子封閉箱體間之連接，其長度不得
超過一‧八米。

第九百五十二條
高壓電動機分路導線安培容量，及操作器與隔離設備之連續額定電流，不得小
於該電動機過載保護設備所選用之跳脫電流。

第九百五十三條
高壓電動機電路之過電流保護依下列規定辦理：
一、每一電動機電路應具有可協調之保護設備，以啟斷電動機及其分路與控制
    設備之過載及故障電流。電動機對特定機器運轉極為重要，並須運轉至故
    障為止者，得將感測裝置連接至監控之指示器或警報器。
二、電動機之過載保護：
    (一)每一具電動機應由其內部積熱保護器或外部電流感測裝置，或兩者同
        時觸發保護設備動作，防止電動機因過載或起動失敗導致過熱。每一
        具電動機電路保護裝置之標置，應在合格人員管理監督下選定。
    (二)繞線型轉子交流電動機之二次電路，包括所使用之導線、控制器及電
        阻器，得以電動機過載保護設備作為過電流保護。
    (三)過載啟斷裝置之動作應能同時隔離所有非接地導線。
    (四)過載感測裝置動作跳脫後，其控制電路不得自動復歸而自行起動電動
        機。但該項自動復歸對人員及機器不會造成危險者，不在此限。
三、故障電流保護：
    (一)每一電動機電路應採用下列規定之一作為故障電流保護：
        1.斷路器能以設備內部或外部之感測元件偵測出故障電流，同時隔離
          所有非接地導線。
        2.熔線有專用之隔離開關，或有可當作隔離開關之功能，且其配置使
          其在有載下不得維護。
    (二)故障電流啟斷裝置不得自動復閉電路。但電路係屬暫態故障，且該自
        動復閉對人員不導致造成危害者，不在此限。
四、高壓電動機電路及電動機之接地故障保護，應依其電源系統為接地或非接
    地而配置專用之接地故障保護設備。
五、過載保護、過電流保護及接地保護得藉由同一保護設備，以配裝不同功能
    之電驛達到目的。

第九百五十四條
高壓電動機控制器之隔離設備應配裝附有啟斷位置可上鎖之固定式裝置。

第九百五十五條
高壓電動機之起動電流應依下列規定辦理：
一、高壓供電用戶：
    (一)以三千伏特級供電，每具容量不超過二百馬力者，不加限制。
    (二)以十一千伏特級供電，每具容量不超過四百馬力者，不加限制。
    (三)以二十二千伏特級供電，每具容量不超過六百馬力者，不加限制。
    (四)每具容量超過前三目所列之容量限制者，不超過該電動機額定電流三
        ‧五倍。
二、特高壓供電用戶：
    (一)以三十三千伏特以上特高壓供電，每具容量不超過二千馬力者，不加
        限制。
    (二)每具容量超過前目所列之容量限制者，以不大於該電動機額定電流三
        ‧五倍為原則。但用戶契約容量在五百萬瓦特以上，經設計者計算一
        具最大電動機之直接全壓起動時，在責任分界點處所造成之瞬時電壓
        降不超過百分之五者，不在此限。

      第七節  高壓電容器
第九百五十六條
高壓電容器容量決定應依第二百七十三條規定辦理；其電源導線安培容量不得
小於電容器額定電流一‧三五倍。

第九百五十七條
高壓電容器開關依下列規定辦理：
一、電容器或電容器組啟閉之開關：
    (一)連續載流量不得小於電容器額定電流一‧三五倍。
    (二)應具有啟斷電容器或電容器組之最大連續負載電流能力。
    (三)應能承受最大湧入電流，包括來自鄰近電容器開關之投入電流。
    (四)應能承受電容器側之故障電流。
二、隔離：
    (一)電容器或電容器組應裝設隔離設備，以隔離所有電源，且該設備於啟
        斷位置時，應有適合其電路運轉電壓之明顯可見間隙。
    (二)未具啟斷額定電流能力之隔離開關，應與負載啟斷開關互鎖，或附有
        在有載下不得操作之明顯警告標識。
三、串聯電容器啟閉操作應為下列規定方法之一：
    (一)以機械式順序操作隔離及旁路開關。
    (二)互鎖。
    (三)在操作位置明顯標明操作程序。

第九百五十八條
高壓電容器及電容器組之過電流保護依下列規定辦理：
一、電容器組由多具電容器串聯或並聯組成者，每一具電容器應有個別之過電
    流保護裝置。
二、電容器組之過電流保護裝置應符合下列規定之一：
    (一)符合前條第一款規定附裝熔線之負載啟斷開關。
    (二)具有自動跳脫且有足夠啟斷容量之斷路器。
    (三)高壓幹線已裝設隔離開關及斷路器者，其所屬各電容器組可採用附裝
        熔線之熔線鏈開關，或配裝熔線之隔離開關作過電流保護。

第九百五十九條
高壓電容器外殼應連接於設備接地導線，電容器組裝設於與大地絕緣之支撐架
構上者，其外殼不得連接於設備接地導線。若電容器中性點連接於接地電極導
線，其連接應依第二章第五節或本章第四節規定辦理。

第九百六十條
高壓電容器應有放電設備，且該放電設備有適當容量之阻抗器或電阻器，其裝
設依下列規定辦理：
一、放電設備應能於電源啟斷後五分鐘內將殘餘電壓降至五十伏特以下。
二、放電電路應與電容器或電容器組之端子永久連接，或裝設自動設備連接至
    電容器組端子，以消除線路殘餘電壓。
三、若電容器直接接於高壓電動機或變壓器之操作器負載側，中間不加裝開關
    及過電流保護裝置者，該電動機之線圈或變壓器得視為放電設備，不必另
    裝阻抗器。

第九百六十一條
高壓電容器之封閉及掩護應依第二百七十一條規定辦理。

      第八節  避雷器
第九百六十二條
高壓以上用戶之變電站應裝設避雷器，以保護用戶用電設備；該避雷器配線及
保護應依本節規定辦理。

第九百六十三條
高壓電路之每一條非接地導線應裝設一具避雷器。電路切離避雷器後仍不致遭
受雷擊突波者，得以一組避雷器保護下游互連之電路。

第九百六十四條
避雷器之位置裝設依下列規定辦理：
一、避雷器應裝設於進屋線隔離開關之電源側或負載側。責任分界點以下用戶
    自備線路採地下配線，且受電變壓器裝設於建築物外者，應於該變壓器一
    次側加裝避雷器。
二、避雷器裝設於建築物內者，其位置應遠離通道及建築物之可燃性物質，並
    應裝設於金屬封閉箱體，或與被保護之設備共同裝設於金屬封閉箱體內。
三、避雷器不得裝設於非合格人員可觸及處。

第九百六十五條
避雷器與電源線或匯流排間之導線，及避雷器與大地間之接地電極導線應採用
銅質導線且線徑不得小於十四平方毫米。該導線應儘量縮短，避免彎曲，且不
得以金屬管槽保護。若必須以金屬管槽保護者，導線管兩端應與接地電極導線
妥為連接。

第九百六十六條
避雷器之接地電阻應在十歐姆（Ω）以下。

      第九節  其他高壓設備
第九百六十七條
電弧爐等遽變負載應符合下列規定：
一、電弧爐等遽變負載在共同點之電壓閃爍值，其每秒鐘變化十次之等效電壓
    最大值（△V10MAX）以不超過百分之○‧四五為準。
二、為求三相負載平衡，大容量之交流單相電弧爐以不使用為原則。

第九百六十八條
裝設高壓電阻器及電抗器依下列規定辦理：
一、電阻器及電抗器應有防護以免遭受外力損傷。
二、電阻器及電抗器應以封閉箱體或高架裝置加以隔離，以免人員意外碰觸其
    帶電部分。
三、與可燃性物質應保持三百毫米以上之間隔。
四、距離被接地之表面應配合其額定電壓有足夠之間隔。
五、裝設金屬封閉箱體及其鄰近金屬物體，不得使其感應電流導致溫升，造成
    危險。

第九百六十九條
高壓電阻器及電抗器之外殼或封閉箱體，應連接至設備接地導線。但裝設於與
大地絕緣之支撐架構上者，不得接地。

    第九章  特殊狀況及電度表裝置
      第一節  緊急電源系統
第九百七十條
於經常電源中斷時，供應人員生命安全必要之照明、電力或依其他法規規定連
接緊急電源之配線及保護，應依本節規定辦理。

第九百七十一條
若於經常電源中斷後，緊急電源系統為單一電源者，得裝設永久開關裝置以連
接可攜式或臨時備用電源，作為該單一電源維護作業期間之替代電源。

第九百七十二條
緊急電源系統應具有足以供電所有緊急負載同時運轉之容量及額定，且能承受
可能發生之最大故障電流。但緊急供電電源能自動選擇負載轉供，確實依序提
供緊急供電電路、選擇性備用電路所需電力者，不在此限。

第九百七十三條
緊急電源系統切換設備應為雙投自動切換開關（ ATS），或開關間有電氣性與
機械性之互鎖裝置，並應能避免在切換操作時，不慎導致經常電源與緊急電源
供電端相連。但開關設置於不同配電盤者，得僅有電氣性互鎖裝置。
若需短暫併聯者，應經輸配電業或再生能源發電業同意。用戶電源發電系統及
切換設備設計與經常電源併聯運轉者，應符合本章第三節規定。
切換設備得予旁路及隔離。使用旁路隔離開關之電路直接供電時，應避免不慎
與電源併聯運轉。

第九百七十四條
緊急電源系統於下列情形時應有聲光信號指示裝置：
一、緊急電源故障。
二、緊急電源承載中。
三、蓄電池充電器停止運作。
四、對地電壓超過一百五十伏特且電路過電流保護裝置安培額定一千安培以上
    Y接中性點直接接地緊急電源系統之接地故障。
前項第四款之接地故障信號指示裝置規定如下：
一、接地故障感測器應裝設於緊急電源主系統隔離設備之處或電源側，且該裝
    置之接地故障電流最大設定值為一千二百安培。
二、處理接地故障方法之說明應置於感測器處或附近。

第九百七十五條
緊急電源系統之標識依下列規定辦理：
一、緊急電源標識應設置於用戶總開關箱，標明每個現場緊急電源之型式及位
    置。
二、由經常電源供電之設備內拆除接地或搭接連接，會啟斷接地電極導線至緊
    急電源被接地導線間之連接者，該設備端應有備用電源供電時，若設備之
    接地電極導線或搭接導線之連接被拆除，將會發生電擊危險之警告標識。

第九百七十六條
緊急電源系統之配線依下列規定辦理：
一、緊急電路之所有線盒及封閉箱體，包含切換開關、發電機及電力盤，應有
    耐久且明顯標識，以識別其為緊急電路或緊急系統之一部分。
二、配線：
    (一)由相同電源供電給二個以上緊急電路之配線，得裝設於同一管槽、電
        纜、線盒或配電箱。
    (二)從緊急電源或其過電流保護裝置至緊急負載間之配線，應與其他非緊
        急電源配線及設備完全分開。但裝設於緊急電源自動切換開關箱者，
        不在此限。

第九百七十七條
緊急電源系統應能於經常電源中斷後十秒內供電為原則，使緊急照明、緊急電
力或兩者之電源可依序自動恢復運轉。但其他法規另有規定者，從其規定，並
依序自動恢復運轉。

第九百七十八條
選用緊急電源應考量場地空間及供電服務類型，使其能在經常電源或其他供電
電源中斷時，於最短時間內轉換為緊急電源供電，且其設備應位於可降低水災
、火災、人為破壞等危險造成電路故障之位置。

第九百七十九條
緊急電源系統應由下列規定一種以上系統組成：
一、蓄電池：
    (一)應具有可供應及維持全部緊急負載至少一‧五小時所需電力之額定及
        容量，且其電壓不得小於標稱電壓百分之八十七‧五。
    (二)酸性或鹼性蓄電池之設計及裝設應符合緊急供電需求，且與其充電器
        相容。
    (三)應有電池自動充電設備。
二、發電機組：
    (一)以原動機驅動發電機組者，發電機組容量應符合第九百七十二條規定
        ，並應能於經常電源故障時，自動啟動原動機，使所有指定之電路自
        動切換及運轉。經常電源復電後，發電機組應有十五分鐘持續運轉之
        延時功能，避免經常電源短時間復電所引起之切換動作。
    (二)以內燃機作為原動機者，現場應有供應全載運轉至少二小時之日用燃
        料。輸送燃料至發電機組日用槽之燃料輸送幫浦運轉需要電力時，該
        燃料輸送幫浦應連接至緊急電源系統。
    (三)蓄電池電力及發電機組調節風門：
        1.若以蓄電池作為控制、信號電力或啟動原動機之方法，蓄電池應為
          適合此用途者，且應配備自動充電裝置，獨立於發電機組之外。
        2.若發電機組之運轉需要蓄電池充電器者，該充電器應連接至緊急電
          源系統。
        3.若發電機組通風調節風門運轉需要電力者，該調節風門應連接至緊
          急電源系統。
    (四)屋外發電機組：裝設於建築物外之發電機組，若設有可輕易觸及之隔
        離設備，且位於建築物處可視及範圍內，穿過該建築物之電源導線得
        免加裝隔離設備。
三、不斷電系統（ UPS）應符合前二款之適用規定。

第九百八十條
裝設單元緊急供電設備依下列規定辦理：
一、緊急照明用之單元設備應由下列規定組成：
    (一)可充電之蓄電池。
    (二)蓄電池充電裝置。
    (三)設備上配裝一個以上燈具，或有供連接遠端燈具之端子。
    (四)於設備供電中斷時，能自動供電給燈具之切換裝置。
二、蓄電池應具有可供應及維持緊急用全部燈具負載至少一‧五小時所需電力
    之額定及容量，且其電壓不得小於標稱電壓百分之八十七‧五。酸性或鹼
    性蓄電池之設計及裝設應符合緊急供電需求。
三、單元緊急供電設備應為固定式，其所有配線應符合第四章規定。

第九百八十一條
緊急照明應具備出口照明、出口標示燈，及其他經法規規定為必要之照明燈具
。其他法規另有規定者，依其規定辦理。
使用高壓及低壓鈉燈、水銀燈、金屬鹵素燈等高強度放電管燈作為唯一經常照
明來源者緊急照明系統應運轉至該經常照明燈具回復運轉為止。

第九百八十二條
當供電給照明之經常電源中斷時，應有符合第九百七十九條規定之緊急電源提
供緊急照明，應以下列規定之一裝設。其他法規另有規定者，依其規定辦理。
一、獨立於經常照明電源，應能於經常照明故障時，自動切換至緊急照明。
二、二個以上電源由不同系統供電：
    (一)二個系統中之一應為緊急電源系統之一部分；另一得為經常電源系統
        之一部分。每個系統應能提供足夠容量之緊急照明電力。
    (二)除二個系統均供電給經常照明，且須維持其照明者外，其中之一照明
        系統故障時，應能自動供電給另一照明系統。

      第二節  選擇性備用電源系統
第九百八十三條
自動或手動選擇供電給非關人員生命安全必要之公共或私人設施之電源系統，
包括原動機之整套固定裝置，及從可攜式備用電源連接至用戶配線系統之裝設
，應依本節規定辦理。

第九百八十四條
選擇性備用電源系統之容量及額定依下列規定辦理：
一、選擇性備用電源系統之設備應能承受其最大短路電流。
二、電源之負載計算應符合第二章第二節規定，電源系統容量及額定依下列規
    定辦理：
    (一)若使用手動切換設備時，電源系統應具有足以供電給同一時間運轉所
        有選擇性負載之容量及額定。
    (二)若使用自動切換設備時，應符合下列規定之一：
        1.備用電源具有經由自動切換設備切換之總負載供電能力。
        2.備用電源容量具有足以提供經由負載管理系統連接之最大負載供電
          能力。

第九百八十五條
選擇性備用電源系統應有切換設備，並能避免在切換操作時，不慎導致經常電
源與備用電源相連。電源發電系統及切換設備設計與經常電源併聯運轉者，應
符合本章第三節規定。位於分路保護負載側之切換設備，得加裝過電流保護裝
置，且其啟斷容量足以啟斷由發電機產生之故障電流。
若以可上鎖之隔離設備或隔離經常電源供電導線方法，與經常電源確實隔離，
且由合格人員維修及管理監督者，得暫時由無切換設備之可攜式發電機供電。

第九百八十六條
除可攜式備用電源外，選擇性備用電源系統應有下列規定之聲光信號指示裝置
：
一、備用電源故障。
二、備用電源承載中。

第九百八十七條
選擇性備用電源系統之標識應依第九百七十五條規定辦理。

第九百八十八條
選擇性備用電源系統之配線得與一般經常電源配線裝設於同一管槽、電纜、線
盒或配電箱。

第九百八十九條
可攜式發電機之接地應連接至個別之接地電極，或以設備接地導線搭接至用戶
配線系統之接地電極。

第九百九十條
裝設於建築物外之選擇性備用發電機組，在建築物可視及範圍內之可輕易觸及
處，若裝有符合第二百六十四條規定之隔離設備者，其供電給該建築物或穿過
該建築物之非接地導線得免加裝隔離設備。

      第三節  發電電源併聯
第九百九十一條
一個以上發電電源系統與源自輸配電業或再生能源發電業經常電源併聯運轉之
配線及保護，應依本節規定辦理。
前項規定應由合格人員辦理。

第九百九十二條
在每個用戶總開關箱內或其明顯可視及範圍內，應有標明多重電源之警語，及
標明建築物每個電源隔離設備位置之耐久標識，且與其他現場電源之標識並列
。

第九百九十三條
連接至用戶總開關電源側之發電電源依下列規定辦理：
一、併聯之發電電源連續電流輸出額定總和不得大於進屋線之安培容量。但依
    第九百九十五條規定控制者，不在此限。
二、自進屋線連接點至發電電源輸出電路第一具過電流保護裝置之導線，其線
    徑應符合第九百九十九條規定，且不得小於十四平方毫米。
三、過電流保護：
    (一)發電電源輸出電路導線應有符合第一千條規定之過電流保護裝置。熔
        線與隔離設備分開裝設者，隔離設備應位於熔線之進屋線側。
    (二)若發電電源輸出電路導線引接至建築物外進屋線者，其過電流保護裝
        置應裝設於建築物外可輕易觸及處，或發電電源導線進入建築物內第
        一個可輕易觸及處。
    (三)若發電電源輸出電路導線引接至建築物內進屋線者，過電流保護裝置
        之連接點至進屋線引接點之導線長度，於住宅場所應在三米以內，於
        非住宅場所應在五米以內。
四、既有設備之接線修改，應依製造廠家說明書指示，或針對修改提出說明，
    並於現場有標識說明。輸配電業管制之電度表等設備接續，應經該電業同
    意。
五、連接至對地電壓超過一百五十伏特、相間電壓不超過六百伏特之 Y  接中
    性點直接接地系統，額定電流一千安培以上之進屋線，應裝設符合第七十
    八條規定之接地故障保護裝置。

第九百九十四條
併聯發電電源之輸出，得連接至用戶任一配電箱內含其他電源之用戶總開關負
載側。
前項配電箱內設備或引接幹線，由經常電源及其他電源同時供電，且能供電給
多個分路或幹線者，其電源併聯依下列規定辦理：
一、有一個以上電源系統，每一個電源之併聯應採用專用斷路器或附熔線之隔
    離設備。
二、導線或匯流排安培容量之計算依下列規定：
    (一)發電電源輸出引接至幹線，其幹線之導線安培容量應為發電電源輸出
        電流一‧二五倍以上，引接至經常電源過電流保護裝置負載側之幹線
        者，在發電電源引接點負載側之幹線依下列規定之一保護：
        1.幹線之導線安培容量應為經常電源過電流保護裝置安培額定與發電
          電源輸出電流額定一‧二五倍之總和以上。
        2.裝設於發電電源與幹線引接點負載側之過電流保護裝置安培額定應
          為幹線之導線安培容量以下。
    (二)發電電源輸出引接至幹線，其分接導線長度不超過八米，且安培容量
        為所有發電電源輸出電流額定一‧二五倍，加上幹線過電流保護裝置
        安培額定之總和三分之一以上，且終端所裝之一具斷路器或一組熔線
        之安培額定不大於該分接導線之安培容量，並有防護使其不易遭受外
        力損傷者，在分接點得免裝設過電流保護裝置。
    (三)匯流排安培容量依下列規定之一選定。但既設匯流排汰換有困難，以
        電力監控系統或其他卸載措施能確保匯流排不會超載，並經電業檢驗
        通過者，不在此限：
        1.所有發電電源輸出電流額定一‧二五倍，加上匯流排過電流保護裝
          置安培額定之總和應為匯流排安培容量以下。
        2.若有二個電源，經常電源與另一發電電源引接於匯流排相對之不同
          端，電源輸出電流額定一‧二五倍加上匯流排過電流保護裝置安培
          額定之總和，不得大於依第二章第二節計算之匯流排安培容量一‧
          二倍。發電電源引接過電流保護裝置處應有標明發電電源引接過電
          流保護裝置不可移位之耐久警告標識。
        3.除保護匯流排之過電流保護裝置外，所有配電箱過電流保護裝置安
          培額定之總和，包括負載及配電裝置，不得大於匯流排安培容量。
          匯流排之過電流保護裝置安培額定不得大於匯流排額定。內含其他
          電源之配電箱應有標明本箱體內有多種電源，除主保護過電流保護
          裝置外之所有過電流保護裝置安培額定之總和，不得大於匯流排安
          培容量之耐久警告標識。
        4.連接住宅場所用中央饋供型匯流排配電箱之任一端時，所有發電電
          源輸出電流額定一‧二五倍加上匯流排過電流保護裝置安培額定之
          總和，不得大於匯流排安培容量一‧二倍。
三、電力監控系統依第九百九十五條規定裝設者，其控制器之設定值應視為前
    款規定之電源輸出電流。
四、配電箱內含多個發電電源供電給匯流排或導線之過電流保護裝置者，該箱
    體應有標識，標明所有連接之發電電源。
五、除製造廠家說明書另有指示外，附熔線之隔離設備視為適合用於反饋電路
    斷路器未標示電源側或負載側，視為適用於反饋電路。

第九百九十五條
電力監控系統應為可監控一個以上發電電源系統、儲能系統及其他設備之輸出
。
電力監控系統應能限制其所供電之匯流排及導線之電流及負載，其限制所連接
之匯流排及電路導線電流，並依下列規定辦理：
一、電力監控系統應監控其內部所有電流。在用戶總開關負載側之匯流排或導
    線若未受監控者，該匯流排或導線應符合前條規定。電力監控系統若依第
    九百九十三條規定連接者，應監控進屋線電流，以免過載。
二、電力監控系統監控之所有電流加上監測之其他發電電源供應電流之總和，
    不得大於任何發電電源供電給匯流排或導線之安培容量。電力監控系統連
    接至未受其監控之匯流排或導線過電流保護裝置者，其控制器設定值應在
    過電流保護裝置之安培額定內。
三、電力監控系統應有過電流保護裝置或其本身有類似過電流保護功能。
四、電力監控系統監控之單一發電電源過電流保護裝置安培額定，不得大於其
    所連接之匯流排或導線之安培容量。
五、電力監控系統設定值僅限於合格人員可觸及。

第九百九十六條
發電電源與經常電源併聯運轉者，其電壓、波形、頻率應能相容。有同步發電
機併聯運轉時，應具備可維持同步之必要設備。

第九百九十七條
併聯系統之啟斷容量及短路電流容量額定，應考量所有併聯發電電源所產生之
故障電流。

第九百九十八條
發電電源輸出電路導線應裝設隔離設備，以隔離其他電源系統之導線，且該隔
離設備應符合下列規定：
一、為下列型式之一：
    (一)手動操作開關或斷路器。
    (二)抽出型負載啟斷開關。
    (三)電動或遙控開關，或可現場手動操作及控制電源中斷時自動啟斷之斷
        路器。
    (四)其他適用之方法。
二、同時隔離電路上所有非接地導線。
三、位於可輕易觸及處。
四、可外部操作，使人員不致碰觸帶電部分。
五、位於非合格人員可輕易觸及處者，暴露帶電部分之封閉箱體箱門或隔板有
    上鎖，或需使用工具始得開啟。
六、清楚指示在啟斷或閉合狀態。
七、有足夠之負載電流、故障電流及電壓額定值。
八、有標明隔離設備開路狀態下，電源側及負載側均可能帶電之標識。

第九百九十九條
併聯電路之導線線徑及電流計算依下列規定辦理：
一、除本規則另有規定外，電路最大電流應為發電電源連續輸出電流額定。
二、除本規則另有規定外，電路導線安培容量不得小於下列規定電流之最大者
    ：
    (一)導線安培容量為發電電源連續輸出電流額定一‧二五倍，且不依表二
        五～六規定導線數及表二五～七規定周圍溫度作修正調整。
    (二)導線安培容量為發電電源連續輸出電流額定之一倍，且依表二五～六
        規定導線數及表二五～七規定周圍溫度作修正調整。
    (三)連接至幹線者，導線安培容量不小於幹線過電流保護裝置安培額定三
        分之一。
三、中性線依下列規定之一辦理：
    (一)除本規則另有規定外，依前款規定辦理。
    (二)電源設備之中性線僅用於儀表、電壓偵測、相位檢測者，得依表九三
        ～一規定選用。

第一千條
併聯系統之過電流保護裝置依下列規定辦理：
一、發電電源輸出電路及設備應有過電流保護裝置。輸出電路連接至多個電源
    ，應有過電流保護裝置，對所有電源提供過電流保護。
二、除發電機外，過電流保護裝置安培額定不得小於發電電源連續輸出電流額
    定一‧二五倍。過電流保護裝置之安培額定得依第七十九條規定辦理。
三、發電機之過電流保護裝置依第二百六十一條規定辦理。
四、電力變壓器一次側與二次側皆有發電電源者，變壓器過電流保護裝置應依
    第九百三十九條規定辦理，一次側應連接至產生最大故障電流之發電電源
    。發電電源輸出併聯至電力變壓器二次側，二次側電流額定不小於發電電
    源輸出連續電流額定值之和者，該電力變壓器二次側得免裝設過電流保護
    裝置。

第一千零一條
併聯系統若依第九百九十三條第五款規定裝設接地故障保護者，其輸出應連接
至接地故障保護裝置之電源側。所有接地故障電流源流經之設備已有接地故障
保護者，併聯輸出得連接至接地故障保護裝置之負載側。

第一千零二條
當併聯系統欠相時，發電電源設備輸出電路應能自動隔離所有併聯系統非接地
導線，直至所有相線恢復正常時始得再連接。但發電電源設備為緊急電源者，
不在此限。
當併聯系統欠相時，得採用併聯變流器跳脫或自動停止輸出電力，不須與經常
電源之所有非接地導線自動隔離。於所有相線恢復正常時，併聯變流器得自動
或手動恢復輸出電力。
併聯電源設備得以孤島模式運轉，供電給與電源系統及電力網隔離之負載。

第一千零三條
併聯系統之單相發電電源連接至三相電力系統者，應限制連接點之不平衡電壓
在百分之三以下。
併聯系統之三相發電電源在電壓欠相或不平衡時，應自動斷電。但併聯系統之
設計不致產生較大之不平衡電壓者，不在此限。

      第四節  電度表裝置
第一千零四條
電度表不得裝設於下列地點：
一、潮濕或低窪容易淹水地點。
二、有震動之地點。
三、隱蔽地點。
四、有累積油汙及塵埃之地點。
五、第四百六十四條第一項規定之危險場所地點。
六、發散腐蝕性物質之地點。
七、其他經電業認為不便裝設電度表之地點。

第一千零五條
電度表裝設依下列規定辦理：
一、電度表中心點距離地面高度應在一‧八米以上，二米以下。現場場地受限
    制，施工確有困難時，得予增減，除嵌入牆壁內可低至一米外，最高不超
    過二‧五米，最低不低於一‧五米。
二、電度表應裝設於門口附近或電業易於抄表處，且該處具安全性，可利於操
    作及維護。
三、電度表裝設應垂直、穩固，以免影響其準確性。
四、電度表裝設於室外者，應置於防雨型封閉箱體內，所有低壓引接線應採用
    導線管或電纜配線。
五、同一棟樓房，樓上與樓下分層設戶者，樓上用戶之電度表以裝於樓下為原
    則。
六、電度表接線箱以集中設置且併排為原則，並應儘量與建築物齊平。若無法
    齊平，電度表接線箱邊緣銳角處應採防碰撞處理或修繕凸出角。
七、電度表集中設置者，應設置於同一盤內，且集中電度表表前幹線應有斷路
    器或隔離設備。

第一千零六條
電度表之最大容許載流容量不得小於用戶之最大負載。該負載得依據裝接負載
及其用電性質加以估計。

第一千零七條
電度表裝設表前及表後開關，依下列規定辦理：
一、插座型電度表：
    (一)集中設置者，每戶應裝設表後開關，該開關應為適當容量之斷路器，
        作為各進屋線過電流保護。超過三具電度表者，其電源側非接地導線
        應加裝總隔離設備，且須裝設於可封印之封閉箱體內。
    (二)單獨電度表應裝設表後開關，該開關應為適當容量之斷路器，作為各
        進屋線過電流保護。距離用戶總開關三米以內，或位於用戶總開關處
        可視及範圍內且距離在八米以內者，得免裝設表後開關。電度表電源
        側之導線線徑在二十二平方毫米以上者，其電源側非接地導線應加裝
        斷路器或隔離設備，且裝設於可封印之封閉箱體內。
二、接線型電度表：每戶應裝設表後開關，該開關應為適當容量之斷路器，作
    為各進屋線過電流保護。距離用戶總開關三米以內，或位於用戶總開關處
    可視及範圍內且距離在八米以內者，得免裝設表後開關。電源側非接地導
    線線徑在二十二平方毫米以上者，應加裝隔離設備，且須裝設於可封印之
    封閉箱體內。

第一千零八條
自進屋點至電度表及總開關間，其全部線路應為完整無破損及無接頭者。但再
生能源發電系統或儲能系統併接於高壓以上之輸配電線路，經電業同意得不適
用。

第一千零九條
表前線路及電度表接線箱之裝設依下列規定辦理：
一、配線：
    (一)電度表電源側至進屋點之線路應採用金屬導線管、PVC 管或可封印之
        金屬導線槽配裝。以明管裝設者，其配管應全部露出，不加任何外物
        掩護。
    (二)自受電箱至集中電度表接線箱之幹線應採用金屬導線管或 PVC  管配
        裝；同一集中電度表用電戶，其受電箱至集中電度表接線箱之管線得
        以密閉可封印供進屋線專用之金屬導線槽或匯流排槽配裝。裝設鋁匯
        流排槽者，其銅鋁異質導體之連接應採用經檢驗通過之專用銅鋁合金
        接頭及配件。
二、電度表應以加封印之接線箱體保護。但電度表如屬插座型，裝設於非鹽害
    地區雨線以內之乾燥場所，其進屋線採用導線管配線，並與電度表底座緊
    密連接者不在此限。
三、接線箱：
    (一)電度表接線箱應為堅固、密封、耐候及不燃性材質。
    (二)低壓電度表接線箱箱體若採用鋼板者，其表面處理前厚度應在一‧六
        毫米以上；採用不鏽鋼板者，應為 CNS8499  之 304  等級以上，厚
        度應在一‧二毫米以上。
    (三)高壓電度表接線箱箱體若採用鋼板者，其表面處理前厚度應在二．三
        毫米以上；採用不鏽鋼板者，應為 CNS8499  之 304  等級以上，厚
        度應在二‧五毫米以上。
    (四)裝設於鹽害地區或雨線外處所，低壓及高壓電度表接線箱應採用符合
        前二目規定之不鏽鋼板或具同等效果者。
    (五)採用不燃性非金屬板者，其強度應符合國家標準規定。
四、低壓電度表接線箱前方工作空間應至少保持○‧九米；高壓電度表接線箱
    前方工作空間應至少保持一‧五米。

第一千零十條
電度表之變比器，包括比壓器及比流器裝設依下列規定辦理：
一、變比器應為計量專用。電度表共用變比器計量者，應經輸配電業同意。
二、比壓器之一次側各極不得裝設熔線。
三、變比器皆應依第三種接地辦理。
四、電度表之變比器應裝設於具有耐燃性，且可封印之保護箱內，或與隔離設
    備共同裝設於可封印之開關箱內，且電度表部分應裝於便利抄表處。

第一千零十一條
自電度表接至變比器之引線，低壓用戶得採用 PVC  導線或電纜，高壓以上用
戶應採用七股以上絞線構成之 PVC  電纜，且該引線應以導線管密封。
電度表接線箱及變比器保護箱等應妥加封印。

    第十章  附則
第一千零十二條
下列主要用電設備額定電壓超過六百伏特者，應經本條指定之單位，依有關標
準試驗合格，並附有試驗報告者，始得裝用：
一、避雷器、電力及配電變壓器、比壓器、比流器、熔線、氣體絕緣開關設備
    （ GIS）、斷路器及高壓配電盤，應由中央主管機關或其認可之檢驗機構
    或原製造廠家試驗。
二、既設高壓配電盤之改善或汰換，得由甲級電器承裝業於用電現場承裝，並
    由其監造電機技師會同用電設備檢驗維護業與該甲級電器承裝業試驗。有
    特殊需求須於現場組裝，並經輸配電業同意者，亦得適用之。
三、氣體絕緣開關設備試驗有困難者，得以整套及單體型式試驗報告送經中央
    主管機關或其認可之檢驗機構審查合格取得證明後裝用。該設備內之比壓
    器、比流器及避雷器規格有變動者，得以該單體之型式試驗報告送審查合
    格取得證明後組合裝用。

第一千零十三條
本規則中華民國一百十四年五月九日修正發布之條文施行前，用戶用電設備設
計資料或竣工報告已送輸配電業審查之工程，或另有其他法規規定者，得適用
修正施行前之規定。既有設施之維修，亦得適用修正施行前之規定。

第一千零十四條
本規則自發布日施行。但中華民國一百十四年五月九日修正發布之第五章第十
一節至第七章及第九章第一節至第三節條文，自發布後一年施行。
</script>

<script>
    let ruleBook = [];
    const mainContent = document.getElementById('mainContent');

    function zhToNum(zh) {
        const numMap = {'零':0, '〇':0, '○':0, '一':1, '二':2, '三':3, '四':4, '五':5, '六':6, '七':7, '八':8, '九':9};
        const unitMap = {'十':10, '百':100, '千':1000};
        
        let hasUnit = false;
        for (let i = 0; i < zh.length; i++) {
            if (unitMap[zh[i]] !== undefined) hasUnit = true;
        }
        
        if (!hasUnit) {
            let res = "";
            for (let i = 0; i < zh.length; i++) {
                if (numMap[zh[i]] !== undefined) res += numMap[zh[i]];
            }
            return parseInt(res, 10);
        }
        
        let result = 0;
        let tmp = 0;
        for (let i = 0; i < zh.length; i++) {
            let char = zh[i];
            if (numMap[char] !== undefined) {
                tmp = numMap[char];
            } else if (unitMap[char] !== undefined) {
                if (tmp === 0 && char === '十') tmp = 1; 
                result += tmp * unitMap[char];
                tmp = 0;
            }
        }
        result += tmp;
        return result;
    }

    function replaceZhNums(str) {
        const exceptions = ["一般", "一定", "一致", "萬一", "單一", "唯一", "一律", "一併", "一旦", "一體", "一經", "同一", "進一步", "一切", "一部分", "一端", "一側", "一角", "一向", "一直", "一帶", "一連", "一齊", "一再", "一生", "一如", "一旁", "一起", "一概", "一時", "一面", "第一"];
        let tempStr = str;
        
        exceptions.forEach((word, idx) => {
            tempStr = tempStr.split(word).join(`__EX${idx}__`);
        });

        tempStr = tempStr.replace(/[一二三四五六七八九十百千零〇○]+/g, function(match) {
            return zhToNum(match);
        });

        exceptions.forEach((word, idx) => {
            tempStr = tempStr.split(`__EX${idx}__`).join(word);
        });

        return tempStr;
    }

    function autoLinkTables(str) {
        return str.replace(/(?:附)?表\s*(\d+)(?:\s*[～~-－]\s*(\d+))?/g, function(match, p1, p2) {
            let isFuBiao = match.startsWith("附表");
            let prefix = isFuBiao ? "附表" : "表";
            let btnText = p2 ? `📊 ${prefix}${p1}-${p2}` : `📊 ${prefix}${p1}`;
            let fileName = p2 ? `${prefix}${p1}-${p2}.png` : `${prefix}${p1}.png`;
            return `<span class="inline-table-btn" onclick="openTable('${fileName}')">${btnText}</span>`;
        });
    }

    // 🚀 法條交叉參照功能：掃描內文中的「第XXX條」變成橘色按鈕
    function autoLinkArticles(str) {
        return str.replace(/第\s*(\d+)\s*條(?:之\s*(\d+))?/g, function(match, mainNum, subNum) {
            let targetTitle = `第${mainNum}條`;
            if (subNum) targetTitle += `之${subNum}`;
            return `<span class="inline-article-btn" onclick="openArticlePopup('${targetTitle}')">📖 ${targetTitle}</span>`;
        });
    }

    // 📸 開啟與關閉圖片燈箱
    window.openTable = function(src) {
        let img = document.getElementById('lightboxImg');
        let hint = document.getElementById('lightboxHint');
        img.style.display = 'block';
        img.src = src;
        hint.innerHTML = '🔍 點擊背景即可關閉';
        hint.style.color = '#bdc3c7';
        document.getElementById('tableLightbox').style.display = 'flex';
    };
    window.handleImageError = function(img) {
        img.style.display = 'none';
        let hint = document.getElementById('lightboxHint');
        let targetFileName = img.src.substring(img.src.lastIndexOf('/') + 1);
        hint.innerHTML = `⚠️ 找不到圖片檔案 <br><br><span style='font-size:14px;'>請確認您有上傳該截圖，且檔名必須為：<br>👉 <b>${targetFileName}</b></span>`;
        hint.style.color = '#ff7675';
    };
    window.closeTable = function(event) {
        if (event.target.id === 'tableLightbox' || event.target.tagName.toLowerCase() === 'button') {
            document.getElementById('tableLightbox').style.display = 'none';
            document.getElementById('lightboxImg').src = '';
        }
    };

    // 📖 開啟與關閉法條參照燈箱
    window.openArticlePopup = function(title) {
        let found = false;
        let contentHtml = "";
        
        // 去大腦 (ruleBook) 裡面翻找對應的條文
        for(let sec of ruleBook) {
            for(let art of sec.articles) {
                if (art.title === title) {
                    contentHtml = art.content;
                    found = true;
                    break;
                }
            }
            if (found) break;
        }

        if (found) {
            document.getElementById('lightboxTextTitle').innerText = title;
            document.getElementById('lightboxTextBody').innerHTML = contentHtml;
            document.getElementById('articleLightbox').style.display = 'flex';
        } else {
            alert('⚠️ 找不到 ' + title + ' 的內容！可能是法規中尚無此條文。');
        }
    };
    window.closeArticleLightbox = function(event) {
        if (event.target.id === 'articleLightbox' || event.target.tagName.toLowerCase() === 'button') {
            document.getElementById('articleLightbox').style.display = 'none';
        }
    };

    function parseTextToRuleBook(text) {
        let sections = [];
        let currentSectionObj = null;
        let currentArticle = null;
        
        let currentChapterName = "";
        let currentSectionName = "";
        let currentSubsectionName = ""; 
        let currentItemName = "";       
        let currentBlockType = 'none'; 

        const lines = text.split('\n');

        function closeCurrentBlock() {
            if (currentBlockType === 'normal') return '</div>';
            if (currentBlockType === 'flex') return '</div></div>'; 
            if (currentBlockType === 'flex3rd') return '</div></div>'; 
            return '';
        }

        function saveArticle() {
            if(currentSectionObj && currentArticle && currentArticle.content) {
                currentArticle.content += closeCurrentBlock(); 
                
                // 🌟 所有拼接完成的段落，最後一併通過「中文變數字」、「掃描表格」、「掃描法條」三大引擎
                currentArticle.content = autoLinkArticles(autoLinkTables(replaceZhNums(currentArticle.content)));
                
                currentSectionObj.articles.push(currentArticle);
            }
            currentArticle = null;
            currentBlockType = 'none';
        }

        for(let line of lines) {
            let rawLine = line.trim();
            if(!rawLine) continue;
            if(rawLine === "[請把法規全部貼在這裡]") continue;

            let chMatch = rawLine.match(/^第([一二三四五六七八九十百千]+)章([\s　]+[^。]+)$/);
            let secMatch = rawLine.match(/^第([一二三四五六七八九十百千]+)節([\s　]+[^。]+)$/);
            let subsecMatch = rawLine.match(/^第([一二三四五六七八九十百千]+)款([\s　]+[^。]+)$/);
            let itemMatch = rawLine.match(/^第([一二三四五六七八九十百千]+)目([\s　]+[^。]+)$/);
            let articleMatch = rawLine.match(/^第([一二三四五六七八九十百千零〇]+)條(?:之([一二三四五六七八九十百千零〇]+))?$/);

            if(chMatch) {
                saveArticle();
                currentChapterName = `第${zhToNum(chMatch[1])}章${chMatch[2]}`;
                currentSectionName = "";
                currentSubsectionName = "";
                currentItemName = "";
                currentSectionObj = { title: currentChapterName, articles: [] };
                sections.push(currentSectionObj);
            } 
            else if (secMatch) {
                saveArticle();
                currentSectionName = `第${zhToNum(secMatch[1])}節${secMatch[2]}`;
                currentSubsectionName = "";
                currentItemName = "";
                if (currentChapterName) {
                    currentSectionObj = { title: currentChapterName + " - " + currentSectionName, articles: [] };
                    sections.push(currentSectionObj);
                }
            } 
            else if (subsecMatch) {
                saveArticle();
                currentSubsectionName = `第${zhToNum(subsecMatch[1])}款${subsecMatch[2]}`;
                currentItemName = "";
                
                let combinedTitle = currentChapterName;
                if (currentSectionName) combinedTitle += " - " + currentSectionName;
                combinedTitle += " - " + currentSubsectionName;
                
                currentSectionObj = { title: combinedTitle, articles: [] };
                sections.push(currentSectionObj);
            }
            else if (itemMatch) {
                saveArticle();
                currentItemName = `第${zhToNum(itemMatch[1])}目${itemMatch[2]}`;
                
                let combinedTitle = currentChapterName;
                if (currentSectionName) combinedTitle += " - " + currentSectionName;
                if (currentSubsectionName) combinedTitle += " - " + currentSubsectionName;
                combinedTitle += " - " + currentItemName;
                
                currentSectionObj = { title: combinedTitle, articles: [] };
                sections.push(currentSectionObj);
            }
            else if (articleMatch) {
                saveArticle();
                if(!currentSectionObj) {
                    currentSectionObj = { title: "未分類條文", articles: [] };
                    sections.push(currentSectionObj);
                }
                
                let mainNum = zhToNum(articleMatch[1]);
                let newTitle = `第${mainNum}條`;
                if (articleMatch[2]) {
                    let subNum = zhToNum(articleMatch[2]);
                    newTitle += `之${subNum}`;
                }
                
                currentArticle = { title: newTitle, content: "" };
                currentBlockType = 'none'; 
            } 
            else {
                if(currentArticle) {
                    let isMainList = rawLine.match(/^([一二三四五六七八九十百]+)、/);
                    let isSubListZh = rawLine.match(/^\(([一二三四五六七八九十百]+)\)/);
                    let isSubListNum = rawLine.match(/^[0-9]+\./);
                    
                    if (currentArticle.content === "") {
                        currentArticle.content = `<div class="normal-text">${rawLine}`;
                        currentBlockType = 'normal';
                    } 
                    else if (isMainList) {
                        let prefixNum = zhToNum(isMainList[1]);
                        let content = rawLine.substring(isMainList[0].length).trim();
                        currentArticle.content += closeCurrentBlock() + `<div class="flex-list"><div class="list-prefix">${prefixNum}、</div><div class="list-content">${content}`;
                        currentBlockType = 'flex';
                    }
                    else if (isSubListZh) {
                        let prefixNum = zhToNum(isSubListZh[1]);
                        let content = rawLine.substring(isSubListZh[0].length).trim(); 
                        currentArticle.content += closeCurrentBlock() + `<div class="sub-flex-list"><div class="list-prefix">(${prefixNum})</div><div class="list-content">${content}`;
                        currentBlockType = 'flex';
                    }
                    else if (isSubListNum) {
                        let prefix = isSubListNum[0];
                        let content = rawLine.substring(prefix.length).trim(); 
                        currentArticle.content += closeCurrentBlock() + `<div class="sub-flex-list-3rd"><div class="list-prefix">${prefix}</div><div class="list-content">${content}`;
                        currentBlockType = 'flex3rd';
                    }
                    else {
                        if (currentArticle.content.match(/[。：；]$/)) {
                            currentArticle.content += `<br>${rawLine}`;
                        } else {
                            currentArticle.content += rawLine;
                        }
                    }
                }
            }
        }
        saveArticle(); 
        return sections;
    }

    const chapterColors = [
        { header: '#2980b9', body: '#e3f2fd' }, 
        { header: '#27ae60', body: '#e8f5e9' }, 
        { header: '#e67e22', body: '#fff3e0' }, 
        { header: '#8e44ad', body: '#f3e5f5' }, 
        { header: '#f1c40f', body: '#fffde7' }, 
        { header: '#16a085', body: '#e0f2f1' }  
    ];

    window.toggleChapter = function(headerElement) {
        const itemsDiv = headerElement.nextElementSibling;
        const icon = headerElement.querySelector('.toggle-icon');
        
        if (itemsDiv.style.display === 'none' || itemsDiv.style.display === '') {
            itemsDiv.style.display = 'block'; 
            icon.style.transform = 'rotate(90deg)'; 
        } else {
            itemsDiv.style.display = 'none'; 
            icon.style.transform = 'rotate(0deg)'; 
        }
    };

    window.changeFontSize = function(size) {
        document.documentElement.style.setProperty('--reading-font-size', size + 'px');
        document.documentElement.style.setProperty('--reading-title-size', (parseInt(size) + 7) + 'px');
    };

    window.changeLineHeight = function(height) {
        document.documentElement.style.setProperty('--reading-line-height', height);
    };

    function renderHomeTOC() {
        let htmlContent = `
            <div class="book-toc-wrapper">
                <div class="toc-header-title">⚡ 用電裝置規則</div>
                <div class="toc-header-subtitle">法規總目錄．共收錄 ${ruleBook.length} 個目錄節點</div>
        `;
        
        let currentChapterParsed = "";
        let colorIndex = -1;
        let currentSectionParsed = "";

        ruleBook.forEach((section, index) => {
            if(section.articles.length === 0) return;
            
            let titleParts = section.title.split(' - ');
            let chapterNameFull = titleParts[0]; 
            let sectionNameFull = titleParts.length > 1 ? titleParts[1] : "";

            if (chapterNameFull !== currentChapterParsed) {
                if(currentChapterParsed !== "") {
                    htmlContent += `</div></div>`; 
                }
                currentChapterParsed = chapterNameFull;
                currentSectionParsed = ""; 
                colorIndex = (colorIndex + 1) % chapterColors.length; 
                
                let chapterSections = ruleBook.filter(s => s.title.startsWith(currentChapterParsed) && s.articles.length > 0);
                let totalArticlesInChapter = chapterSections.reduce((sum, s) => sum + s.articles.length, 0);

                let firstChArt = chapterSections[0].articles[0].title;
                let lastChSection = chapterSections[chapterSections.length - 1];
                let lastChArt = lastChSection.articles[lastChSection.articles.length - 1].title;
                let chRangeText = (firstChArt === lastChArt) ? firstChArt : `${firstChArt} ~ ${lastChArt}`;

                htmlContent += `
                    <div class="toc-chapter-group" style="border: 1px solid ${chapterColors[colorIndex].header};">
                        <div class="toc-chapter-header" style="background-color: ${chapterColors[colorIndex].header};" onclick="toggleChapter(this)">
                            <div style="display:flex; align-items:center;">
                                <span class="toggle-icon">▶</span>
                                <span>${currentChapterParsed}</span>
                            </div>
                            <div class="toc-chapter-count">
                                <div style="font-size: 15px; font-weight: bold;">${chRangeText}</div>
                                <div style="font-size: 13px; opacity: 0.85;">共 ${totalArticlesInChapter} 條</div>
                            </div>
                        </div>
                        <div class="toc-chapter-items">
                `;
            }

            if (sectionNameFull && sectionNameFull !== currentSectionParsed) {
                currentSectionParsed = sectionNameFull;

                if (titleParts.length >= 3) {
                    htmlContent += `
                        <div class="toc-item" style="background-color: ${chapterColors[colorIndex].body}; padding-left: 20px; cursor: default; border-bottom: 1px dashed rgba(0,0,0,0.1);">
                            <div class="toc-title" style="font-weight: bold; color: #2c3e50;">📂 ${sectionNameFull}</div>
                        </div>
                    `;
                }
            }

            let displayTitle = titleParts.length > 1 ? titleParts[titleParts.length - 1] : "本章通則";
            
            let depth = titleParts.length;
            let paddingLeft = 20; 
            let prefixIcon = "";
            
            if (depth === 3) {
                paddingLeft = 40;
                prefixIcon = "↳ ";
            } else if (depth === 4) {
                paddingLeft = 60;
                prefixIcon = "&nbsp;&nbsp;↳ ";
            }

            let firstArt = section.articles[0].title;
            let lastArt = section.articles[section.articles.length - 1].title;
            let rangeText = (firstArt === lastArt) ? firstArt : `${firstArt} ~ ${lastArt}`;

            htmlContent += `
                <div class="toc-item" style="background-color: ${chapterColors[colorIndex].body}; padding-left: ${paddingLeft}px;" onclick="renderSection(${index})">
                    <div class="toc-title" style="${depth > 2 ? 'color: #555; font-size: 15px;' : ''}">${prefixIcon}${displayTitle}</div>
                    <div class="toc-leader"></div>
                    <div class="toc-page">(${rangeText})</div>
                </div>
            `;
        });
        
        if(currentChapterParsed !== "") {
            htmlContent += `</div></div>`; 
        }
        
        htmlContent += `</div>`;
        mainContent.innerHTML = htmlContent;
        window.scrollTo(0, 0);
    }

    function renderSection(index) {
        const section = ruleBook[index];
        
        let htmlContent = `
            <button class="fixed-home-btn" onclick="renderHomeTOC()">🏠 回到總目錄</button>
            
            <div class="font-slider-panel">
                <div class="slider-row">
                    <span class="font-icon" style="font-size: 14px;">A</span>
                    <input type="range" min="14" max="32" value="17" oninput="changeFontSize(this.value)">
                    <span class="font-icon" style="font-size: 20px;">A</span>
                </div>
                <div class="slider-row">
                    <span class="font-icon" style="font-size: 12px;">↕</span>
                    <input type="range" min="1.2" max="3.0" value="1.8" step="0.1" oninput="changeLineHeight(this.value)">
                    <span class="font-icon" style="font-size: 18px;">↕</span>
                </div>
            </div>

            <div class="articles-viewer-body">
                <h2>${section.title}</h2>
                <div class="articles-container">
        `;
        
        section.articles.forEach((art, a_index) => {
            htmlContent += `
                <div class="article-block" id="art${a_index}">
                    <div class="article-title">${art.title}</div>
                    <div class="article-text">${art.content}</div>
                </div>
            `;
        });
        
        htmlContent += `</div></div>`; 
        
        mainContent.innerHTML = htmlContent;
        window.scrollTo(0, 0); 
    }

    const style = document.createElement('style');
    style.innerHTML = `
        .fixed-home-btn {
            position: fixed; top: 15px; left: 20px; z-index: 1000;
            padding: 10px 20px; background-color: #e67e22; border: none; 
            color: white; border-radius: 5px; cursor: pointer; font-weight: bold; 
            font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .fixed-home-btn:hover { background-color: #d35400; transform: translateY(-2px); }
    `;
    document.head.appendChild(style);

    window.onload = function() {
        const text = document.getElementById('rawData').textContent.trim();
        if (text.length > 50 && text !== "[請把法規全部貼在這裡]") { 
            ruleBook = parseTextToRuleBook(text);
            renderHomeTOC(); 
        }
    };
</script>
