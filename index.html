<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用戶用電裝置規則 - 專業工程版</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .content-area {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 60px 20px; 
            background-color: transparent;
            flex-grow: 1; 
            width: 100%;
            box-sizing: border-box;
        }

        h2 { 
            color: #2c3e50; 
            border-bottom: 3px solid #f39c12; 
            padding-bottom: 10px; 
            font-size: 26px;
            margin-top: 0px;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        
        /* 📖 目錄排版 */
        .book-toc-wrapper {
            background: #fff; padding: 40px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #2980b9;
        }
        .toc-header-title {
            text-align: center; color: #2c3e50; font-size: 32px; font-weight: bold;
            letter-spacing: 5px; margin-bottom: 10px;
        }
        .toc-header-subtitle {
            text-align: center; color: #7f8c8d; font-size: 15px; margin-bottom: 30px;
        }

        .toc-chapter-group {
            margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden;
        }
        
        /* 📂 讓大章節標題變成可點擊的按鈕 */
        .toc-chapter-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; font-size: 18px; font-weight: bold; color: white;
            cursor: pointer; 
            user-select: none; 
            transition: 0.2s;
        }
        .toc-chapter-header:hover { filter: brightness(0.95); }
        
        /* 旋轉小箭頭動畫 */
        .toggle-icon {
            display: inline-block;
            margin-right: 10px;
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .toc-chapter-count { font-size: 14px; opacity: 0.95; font-weight: normal; text-align: right; line-height: 1.4; }

        /* 預設隱藏子目錄 */
        .toc-chapter-items { display: none; }

        .toc-item {
            display: flex; align-items: baseline; padding: 12px 20px; 
            cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .toc-item:hover { filter: brightness(0.97); } 
        
        .toc-title { font-size: 16px; color: #333; }
        .toc-leader {
            flex-grow: 1; border-bottom: 2px dotted #aaa;
            margin: 0 15px; position: relative; top: -4px;
        }
        .toc-page { font-size: 14px; color: #666; white-space: nowrap; font-family: monospace; }
        
        .articles-viewer-body { margin-top: 60px; }

        .article-block {
            background-color: #fff; border-left: 4px solid #3498db;
            padding: 25px; margin-bottom: 25px; border-radius: 0 8px 8px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
        }
        .article-title { 
            font-size: 24px; font-weight: bold; color: #2980b9; 
            margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 8px;
        }
        
        .article-text { line-height: 1.8; text-align: justify; font-size: 17px; }
        .normal-text { display: block; margin-top: 5px; }
        .flex-list { display: flex; margin-top: 8px; }
        .sub-flex-list { display: flex; margin-top: 8px; padding-left: 2.5em; color: #444; }
        .list-prefix { flex-shrink: 0; white-space: nowrap; }
        .list-content { flex-grow: 1; }

        /* 🛡️ 專業版權與免責宣告頁尾 */
        .legal-footer {
            text-align: center;
            padding: 25px 20px;
            color: #7f8c8d;
            font-size: 13px;
            line-height: 1.6;
            border-top: 1px solid #e0e6ed;
            background-color: #ebf0f0;
            margin-top: auto; 
        }
        .legal-footer strong { color: #2c3e50; }

        /* 🧮 右上角計算機按鈕 */
        .fixed-calc-btn {
            position: fixed; top: 15px; right: 20px; z-index: 1000;
            padding: 10px 20px; background-color: #27ae60; border: none; 
            color: white; border-radius: 5px; cursor: pointer; font-weight: bold; 
            font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s;
            text-decoration: none; display: inline-block;
        }
        .fixed-calc-btn:hover { background-color: #219653; transform: translateY(-2px); }

        /* 📱 手機版高資訊密度優化 */
        @media (max-width: 768px) {
            .content-area { padding: 10px 6px 40px 6px; } 
            .book-toc-wrapper { padding: 15px 10px; }
            .fixed-home-btn { 
                padding: 6px 12px !important; font-size: 13px !important; 
                top: 8px !important; left: 8px !important; 
            }
            .fixed-calc-btn { 
                padding: 6px 12px !important; font-size: 13px !important; 
                top: 8px !important; right: 8px !important; 
            }
            .articles-viewer-body { margin-top: 45px; }
            h2 { font-size: 17px; margin-bottom: 15px; line-height: 1.3; }
            .article-block { padding: 12px 10px; margin-bottom: 15px; border-left-width: 3px; }
            .article-title { font-size: 19px; margin-bottom: 8px; padding-bottom: 4px; }
            .article-text { font-size: 14px; line-height: 1.5; }
            .sub-flex-list { padding-left: 1.2em; margin-top: 4px; } 
            .flex-list { margin-top: 4px; }
            .legal-footer { padding: 15px 10px; font-size: 12px; }
            .toc-chapter-count { font-size: 12px; }
        }
    </style>
</head>
<body>

    <a href="vd-calc.html" target="_blank" class="fixed-calc-btn">🧮 壓降計算機</a>

    <div class="content-area" id="mainContent">
        <h2 style="color:#e74c3c; text-align:center;">⚠️ 尚未貼上法規資料</h2>
        <p style="text-align:center;">請用記事本打開這個 HTML 檔案，找到 <b>[請把法規全部貼在這裡]</b> 的地方，將幾萬字的法規貼上去並存檔。</p>
    </div>

    <div class="legal-footer">
        <strong>© 2026 [你的名字/暱稱]. All Rights Reserved.</strong><br>
        本網站之程式解析邏輯與介面排版為創作者所有，法規內容引用自政府公開資料。<br>
        <span style="color: #e74c3c; font-weight: bold;">【免責聲明】</span>本網站提供之法規整理及相關工具僅供初步設計與學術參考，不保證數據之絕對正確性與即時性。<br>

    </div>

<script id="rawData" type="text/template">
[請把法規全部貼在這裡]
</script>

<script>
    let ruleBook = [];
    const mainContent = document.getElementById('mainContent');

    // 🔢 中文數字轉阿拉伯數字翻譯機
    function zhToNum(zh) {
        const numMap = {'零':0, '〇':0, '一':1, '二':2, '三':3, '四':4, '五':5, '六':6, '七':7, '八':8, '九':9};
        const unitMap = {'十':10, '百':100, '千':1000};
        let result = 0;
        let tmp = 0;
        for (let i = 0; i < zh.length; i++) {
            let char = zh[i];
            if (numMap[char] !== undefined) {
                tmp = numMap[char];
            } else if (unitMap[char] !== undefined) {
                if (tmp === 0 && char === '十') tmp = 1; 
                result += tmp * unitMap[char];
                tmp = 0;
            }
        }
        result += tmp;
        return result;
    }

    // 🏆 終極大腦解析器
    function parseTextToRuleBook(text) {
        let sections = [];
        let currentSectionObj = null;
        let currentArticle = null;
        
        let currentChapterName = "";
        let currentSectionName = "";
        let currentSubsectionName = ""; 
        let currentItemName = "";       
        let currentBlockType = 'none'; 

        const lines = text.split('\n');

        function closeCurrentBlock() {
            if (currentBlockType === 'normal') return '</div>';
            if (currentBlockType === 'flex') return '</div></div>'; 
            return '';
        }

        function saveArticle() {
            if(currentSectionObj && currentArticle && currentArticle.content) {
                currentArticle.content += closeCurrentBlock(); 
                currentSectionObj.articles.push(currentArticle);
            }
            currentArticle = null;
            currentBlockType = 'none';
        }

        for(let line of lines) {
            let rawLine = line.trim();
            if(!rawLine) continue;
            if(rawLine === "[請把法規全部貼在這裡]") continue;

            if(rawLine.match(/^第[一二三四五六七八九十百千]+章[\s　]+[^。]+$/)) {
                saveArticle();
                currentChapterName = rawLine;
                currentSectionName = "";
                currentSubsectionName = "";
                currentItemName = "";
                currentSectionObj = { title: currentChapterName, articles: [] };
                sections.push(currentSectionObj);
            } 
            else if (rawLine.match(/^第[一二三四五六七八九十百千]+節[\s　]+[^。]+$/)) {
                saveArticle();
                currentSectionName = rawLine;
                currentSubsectionName = "";
                currentItemName = "";
                if (currentChapterName) {
                    currentSectionObj = { title: currentChapterName + " - " + currentSectionName, articles: [] };
                    sections.push(currentSectionObj);
                }
            } 
            else if (rawLine.match(/^第[一二三四五六七八九十百千]+款[\s　]+[^。]+$/)) {
                saveArticle();
                currentSubsectionName = rawLine;
                currentItemName = "";
                
                let combinedTitle = currentChapterName;
                if (currentSectionName) combinedTitle += " - " + currentSectionName;
                combinedTitle += " - " + currentSubsectionName;
                
                currentSectionObj = { title: combinedTitle, articles: [] };
                sections.push(currentSectionObj);
            }
            else if (rawLine.match(/^第[一二三四五六七八九十百千]+目[\s　]+[^。]+$/)) {
                saveArticle();
                currentItemName = rawLine;
                
                let combinedTitle = currentChapterName;
                if (currentSectionName) combinedTitle += " - " + currentSectionName;
                if (currentSubsectionName) combinedTitle += " - " + currentSubsectionName;
                combinedTitle += " - " + currentItemName;
                
                currentSectionObj = { title: combinedTitle, articles: [] };
                sections.push(currentSectionObj);
            }
            else {
                let articleMatch = rawLine.match(/^第([一二三四五六七八九十百千零〇]+)條(?:之([一二三四五六七八九十百千零〇]+))?$/);
                
                if (articleMatch) {
                    saveArticle();
                    if(!currentSectionObj) {
                        currentSectionObj = { title: "未分類條文", articles: [] };
                        sections.push(currentSectionObj);
                    }
                    
                    let mainNum = zhToNum(articleMatch[1]);
                    let newTitle = `第${mainNum}條`;
                    if (articleMatch[2]) {
                        let subNum = zhToNum(articleMatch[2]);
                        newTitle += `之${subNum}`;
                    }
                    
                    currentArticle = { title: newTitle, content: "" };
                    currentBlockType = 'none'; 
                } 
                else {
                    if(currentArticle) {
                        let isMainList = rawLine.match(/^[一二三四五六七八九十百]+、/);
                        let isSubList = rawLine.match(/^\([一二三四五六七八九十百]+\)/) || rawLine.match(/^[0-9]+\./);
                        
                        if (currentArticle.content === "") {
                            currentArticle.content = `<div class="normal-text">${rawLine}`;
                            currentBlockType = 'normal';
                        } 
                        else if (isMainList) {
                            let prefix = isMainList[0];
                            let content = rawLine.substring(prefix.length);
                            currentArticle.content += closeCurrentBlock() + `<div class="flex-list"><div class="list-prefix">${prefix}</div><div class="list-content">${content}`;
                            currentBlockType = 'flex';
                        }
                        else if (isSubList) {
                            let prefix = isSubList[0];
                            let content = rawLine.substring(prefix.length); 
                            currentArticle.content += closeCurrentBlock() + `<div class="sub-flex-list"><div class="list-prefix">${prefix}</div><div class="list-content">${content}`;
                            currentBlockType = 'flex';
                        }
                        else {
                            if (currentArticle.content.match(/[。：；]$/)) {
                                currentArticle.content += `<br>${rawLine}`;
                            } else {
                                currentArticle.content += rawLine;
                            }
                        }
                    }
                }
            }
        }
        saveArticle(); 
        return sections;
    }

    const chapterColors = [
        { header: '#2980b9', body: '#e3f2fd' }, 
        { header: '#27ae60', body: '#e8f5e9' }, 
        { header: '#e67e22', body: '#fff3e0' }, 
        { header: '#8e44ad', body: '#f3e5f5' }, 
        { header: '#f1c40f', body: '#fffde7' }, 
        { header: '#16a085', body: '#e0f2f1' }  
    ];

    // 📂 點擊章節展開/收合的動畫邏輯
    window.toggleChapter = function(headerElement) {
        const itemsDiv = headerElement.nextElementSibling;
        const icon = headerElement.querySelector('.toggle-icon');
        
        if (itemsDiv.style.display === 'none' || itemsDiv.style.display === '') {
            itemsDiv.style.display = 'block'; 
            icon.style.transform = 'rotate(90deg)'; 
        } else {
            itemsDiv.style.display = 'none'; 
            icon.style.transform = 'rotate(0deg)'; 
        }
    };

    // 📖 渲染多階層總目錄
    function renderHomeTOC() {
        let htmlContent = `
            <div class="book-toc-wrapper">
                <div class="toc-header-title">⚡ 用電裝置規則</div>
                <div class="toc-header-subtitle">法規總目錄．共收錄 ${ruleBook.length} 個目錄節點</div>
        `;
        
        let currentChapterParsed = "";
        let colorIndex = -1;
        let currentSectionParsed = ""; // 🛡️ 追蹤目前的「節」，用來揪出幽靈節點

        ruleBook.forEach((section, index) => {
            if(section.articles.length === 0) return;
            
            let titleParts = section.title.split(' - ');
            let chapterNameFull = titleParts[0]; 
            let sectionNameFull = titleParts.length > 1 ? titleParts[1] : "";

            if (chapterNameFull !== currentChapterParsed) {
                if(currentChapterParsed !== "") {
                    htmlContent += `</div></div>`; 
                }
                currentChapterParsed = chapterNameFull;
                currentSectionParsed = ""; // 換章時重置節的追蹤
                colorIndex = (colorIndex + 1) % chapterColors.length; 
                
                let chapterSections = ruleBook.filter(s => s.title.startsWith(currentChapterParsed) && s.articles.length > 0);
                let totalArticlesInChapter = chapterSections.reduce((sum, s) => sum + s.articles.length, 0);

                let firstChArt = chapterSections[0].articles[0].title;
                let lastChSection = chapterSections[chapterSections.length - 1];
                let lastChArt = lastChSection.articles[lastChSection.articles.length - 1].title;
                let chRangeText = (firstChArt === lastChArt) ? firstChArt : `${firstChArt} ~ ${lastChArt}`;

                htmlContent += `
                    <div class="toc-chapter-group" style="border: 1px solid ${chapterColors[colorIndex].header};">
                        <div class="toc-chapter-header" style="background-color: ${chapterColors[colorIndex].header};" onclick="toggleChapter(this)">
                            <div style="display:flex; align-items:center;">
                                <span class="toggle-icon">▶</span>
                                <span>${currentChapterParsed}</span>
                            </div>
                            <div class="toc-chapter-count">
                                <div style="font-size: 15px; font-weight: bold;">${chRangeText}</div>
                                <div style="font-size: 13px; opacity: 0.85;">共 ${totalArticlesInChapter} 條</div>
                            </div>
                        </div>
                        <div class="toc-chapter-items">
                `;
            }

            // 🐛 抓出幽靈節點：如果我們進入了新的「節」，但它本身沒有直接的條文（例如第八節），手動把它印出來！
            if (sectionNameFull && sectionNameFull !== currentSectionParsed) {
                currentSectionParsed = sectionNameFull;

                if (titleParts.length >= 3) {
                    htmlContent += `
                        <div class="toc-item" style="background-color: ${chapterColors[colorIndex].body}; padding-left: 20px; cursor: default; border-bottom: 1px dashed rgba(0,0,0,0.1);">
                            <div class="toc-title" style="font-weight: bold; color: #2c3e50;">📂 ${sectionNameFull}</div>
                        </div>
                    `;
                }
            }

            let displayTitle = titleParts.length > 1 ? titleParts[titleParts.length - 1] : "本章通則";
            
            let depth = titleParts.length;
            let paddingLeft = 20; 
            let prefixIcon = "";
            
            if (depth === 3) {
                paddingLeft = 40;
                prefixIcon = "↳ ";
            } else if (depth === 4) {
                paddingLeft = 60;
                prefixIcon = "&nbsp;&nbsp;↳ ";
            }

            let firstArt = section.articles[0].title;
            let lastArt = section.articles[section.articles.length - 1].title;
            let rangeText = (firstArt === lastArt) ? firstArt : `${firstArt} ~ ${lastArt}`;

            htmlContent += `
                <div class="toc-item" style="background-color: ${chapterColors[colorIndex].body}; padding-left: ${paddingLeft}px;" onclick="renderSection(${index})">
                    <div class="toc-title" style="${depth > 2 ? 'color: #555; font-size: 15px;' : ''}">${prefixIcon}${displayTitle}</div>
                    <div class="toc-leader"></div>
                    <div class="toc-page">(${rangeText})</div>
                </div>
            `;
        });
        
        if(currentChapterParsed !== "") {
            htmlContent += `</div></div>`; 
        }
        
        htmlContent += `</div>`;
        mainContent.innerHTML = htmlContent;
        window.scrollTo(0, 0);
    }

    function renderSection(index) {
        const section = ruleBook[index];
        
        let htmlContent = `
            <button class="fixed-home-btn" onclick="renderHomeTOC()">🏠 回到總目錄</button>
            <div class="articles-viewer-body">
                <h2>${section.title}</h2>
                <div class="articles-container">
        `;
        
        section.articles.forEach((art, a_index) => {
            htmlContent += `
                <div class="article-block" id="art${a_index}">
                    <div class="article-title">${art.title}</div>
                    <div class="article-text">${art.content}</div>
                </div>
            `;
        });
        
        htmlContent += `</div></div>`; 
        
        mainContent.innerHTML = htmlContent;
        window.scrollTo(0, 0); 
    }

    const style = document.createElement('style');
    style.innerHTML = `
        .fixed-home-btn {
            position: fixed; top: 15px; left: 20px; z-index: 1000;
            padding: 10px 20px; background-color: #e67e22; border: none; 
            color: white; border-radius: 5px; cursor: pointer; font-weight: bold; 
            font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .fixed-home-btn:hover { background-color: #d35400; transform: translateY(-2px); }
    `;
    document.head.appendChild(style);

    window.onload = function() {
        const text = document.getElementById('rawData').textContent.trim();
        if (text.length > 50 && text !== "[請把法規全部貼在這裡]") { 
            ruleBook = parseTextToRuleBook(text);
            renderHomeTOC(); 
        }
    };
</script>

</body>
