二、設備接地：採用金屬可撓導線管或液密型金屬可撓導線管配線者，應附加
    一條符合第九十三條、第九十四條第七款、第九十六條規定之設備接地導
    線。但在 2  區之設備非屬動力負載，電路過電流保護裝置安培額定在十
    安培以下，採用液密型可撓金屬導線管長度在一‧八米以下，並搭配適用
    之接地用配件者，該導線管內得免附加設備接地導線。

第五百四十九條
0 區、1 區及 2  區之製程設備連接處密封，應依第四百八十條規定辦理。

      第六節  存在可燃性粉塵、纖維或飛絮之 20 區、21 區及 22 區
第五百五十條
於可能存在可燃性粉塵、纖維或飛絮而有火災或爆炸危險之 20 區、21  區及
22  區等危險場所內，所有電壓等級之用電設備或器具配線及裝設，應依本節
規定辦理。可燃性金屬粉塵不適用本節規定。

第五百五十一條
空氣中存在或可能累積可燃性粉塵、纖維或飛絮，其濃度或含量足以產生爆炸
性或可引燃性混合物之場所，並依其發生機率及持續存在時間，分「區」如下
：
一、20  區：可燃性粉塵、纖維或飛絮持續存在或長時間存在，達到可引燃濃
    度或含量之場所。
二、21  區如下列規定之一：
    (一)於正常運轉下，可燃性粉塵、纖維或飛絮可能存在達到可引燃濃度或
        含量之場所。
    (二)於進行修護、保養或洩漏時，可燃性粉塵、纖維或飛絮時常存在達到
        可引燃濃度或含量之場所。
    (三)當設備、製程故障或操作不當時，可能釋放出可燃性粉塵、纖維或飛
        絮達到可引燃濃度或含量，同時可能導致用電設備或器具故障，使該
        設備或器具成為點火源之場所。
    (四)鄰近 20 區，且可燃性粉塵、纖維或飛絮可能由 20 區擴散而存在達
        到可引燃濃度或含量之場所，不包括有裝設引進乾淨空氣之正壓通風
        系統防止上述擴散，且於通風系統失效時有安全防護機制之場所。
三、22  區如下列規定之一：
    (一)於正常運轉下，可燃性粉塵、纖維或飛絮存在達到可引燃濃度或含量
        之機率極低，且可引燃濃度或含量發生時間極短之場所。
    (二)製造、使用或處理可燃性粉塵、纖維或飛絮之場所，於正常情況下，
        該粉塵、纖維或飛絮裝在密閉之容器或封閉式系統內，僅於該容器或
        系統發生意外破裂、損毀或設備不正常運轉時，始會外洩。
    (三)鄰近 21 區，且可燃性粉塵、纖維或飛絮可能由 21 區擴散而存在達
        到可引燃濃度或含量之場所，不包括有裝設引進乾淨空氣之正壓通風
        系統防止上述擴散，且於通風系統失效時有安全防護機制之場所。

第五百五十二條
20  區、21  區及 22 區之危險物質，在非濃氧情況下，分「群」如下：
一、ⅢC 群：可燃性金屬粉塵。ⅢC 群等同於第二類場所之危險物質 E  群。
二、ⅢB 群：可燃性金屬粉塵以外之可燃性粉塵。ⅢB 群等同於第二類場所之
    危險物質 F  群及 G  群。
三、ⅢA 群：纖維等固體顆粒，粒徑超過五百微米，可懸浮於空氣中，亦可因
    自身重量從大氣中沉積下來。ⅢA 群環境等同於第三類場所。

第五百五十三條
為確保 20 區、21  區及 22 區之用電設備或器具在正常使用及維修下能安全
運轉，依下列規定辦理：
一、於危險場所執行業務之人員應依第四百六十五條規定辦理。
二、同時存在易燃性氣體及可燃性粉塵、纖維或飛絮之處，選用及裝設用電設
    備、器具或配線方法時，應考慮此種同時存在條件，包括訂定該設備或器
    具之安全運轉溫度。

第五百五十四條
20  區、21  區或 22 區之電氣與電子設備或器具得採用之保護技術依下列規
定辦理：
一、防塵燃：得用於 20 區、21  區或 22 區。
二、正壓：得用於 21 區或 22 區。
三、本質安全：得用於 20 區、21  區或 22 區。
四、塵密：得用於 22 區。
五、模鑄構造「mD」：得用於 20 區、21  區或 22 區。
六、非引火性電路：得用於 22 區。
七、非引火性設備：得用於 22 區。
八、封閉箱體保護「tD」：得用於 21 區或 22 區。
九、正壓保護「pD」：得用於 21 區或 22 區。
十、本質安全保護「iD」：得用於 21 區或 22 區。

第五百五十五條
20  區、21  區及 22 區之用電設備或器具選用依下列規定辦理：
一、設備適用性：
    (一)適用於 20 區之設備或器具得裝設於有相同可燃性粉塵、纖維或飛絮
        之 21 區或 22 區；適用於 21 區之設備或器具得裝設於有相同可燃
        性粉塵、纖維或飛絮之 22 區。
    (二)設備或器具得依其商品標示裝設於適用之特定可燃性粉塵、纖維或飛
        絮，或數種粉塵、纖維或飛絮之任何特定組合環境。
二、設備或器具之商品標示：
    (一)適用於第二類場所之設備或器具如適用於以「區」劃分之危險場所者
        ，其商品標示應包括第四百七十一條第二項規定及下列規定之資訊：
        1.適用於 20 區、21  區或 22 區。
        2.第五百五十二條規定之危險物質「群」別。
        3.第三款規定之表面最高溫度，以攝氏表示，並於前面加上「 T」符
          號。
    (二)設備或器具符合前條規定保護技術之一者，其商品標示應包括下列資
        訊：
        1.適用之「區」別。
        2.「Ex」符號。
        3.保護型式符號。
        4.第五百五十二條規定之危險物質「群」別。
        5.第三款規定之表面最高溫度，以攝氏表示，並於前面加上「 T」符
          號。
        6.第三款規定之周圍溫度。
        7.設備保護等級（ EPL）。
三、溫度：
    (一)設備或器具在周圍溫度攝氏四十度時，或其額定適用於周圍溫度超過
        攝氏四十度時之表面最高溫度。
    (二)設備或器具裝設於 20 區或 21 區時，以粉塵、纖維或飛絮可能累積
        於設備或器具上最大數量情況下運轉時為基準之運轉溫度。
    (三)設備或器具適用於周圍溫度攝氏負二十度至正四十度者，得免有周圍
        溫度標識。適用於周圍溫度低於攝氏負二十度或超過攝氏四十度者，
        應有其特殊周圍溫度範圍標識，以攝氏表示，並包含「Ta」或「Tamb
        」符號。
    (四)導線管配件等屬非發熱型之設備或器具，得免有運轉溫度標識。
    (五)適用於第二類場所之設備或器具，符合第五百五十九條第一項第二款
        及第三款規定者，其商品標示得依第四百七十一條第二項及表四七一
        規定。
四、設備或器具與導線管及其管配件螺紋銜接依下列規定辦理：
    (一)導線管或管配件之螺紋應以標準牙模車絞。螺紋型式應為斜口螺紋（
        NPT） 或公制螺紋。
    (二)導線管及管配件應扭緊，以防止故障電流通過導線管系統時產生火花
        ，確保該導線管系統之完整性。
    (三)設備或器具配有銜接口供現場配線連接者，依下列規定辦理：
        1.設備或器具配有斜口螺紋銜接口供斜口螺紋導線管或管配件連接者
          ，應採用適用之導線管、管配件或電纜配件，且該導線管或管配件
          之螺紋應以斜口螺紋牙模車絞。
        2.設備或器具配有銜接口供公制螺紋導線管或管配件連接者，應採用
          適用之管配件或電纜配件，且其銜接口應為公制螺紋，或有適用之
          轉接頭可連接導線管或斜口螺紋管配件。公制螺紋管配件連接設備
          銜接口，應有五個全牙以上之銜接。
        3.未使用之開口應以適用之金屬管塞封閉，且該管塞之螺紋及銜接應
          符合本目之 1  或之 2  規定。
五、複合型光纖電纜內含有可通電之導線者，其裝設應依第五百五十六條及第
    五百五十七條規定辦理。

第五百五十六條
20  區、21  區及 22 區之配線方法應維持其設備或器具保護技術之完整性。
20  區之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)有螺紋之厚金屬導線管。
    (二)MI  電纜，搭配適用於 20 區或第二類第一種場所之終端配件，其裝
        設及支撐能防止終端配件承受拉應力。
    (三)於不對外開放且由合格人員維修及管理監督之工業廠區，採用適用於
        20  區或第二類第一種場所之金屬被覆電纜，且該電纜有氣密性金屬
        被覆及適合之聚合物材料外皮，並內含一條符合第九十三條規定之設
        備接地導線，及搭配適用之電纜封函蓋或終端配件。
二、需可撓連接者，得採用下列規定方法之一。若可撓連接易遭受油污或有其
    他腐蝕情況，導線之絕緣應為適用於該情況之類型，或具有適合之被覆保
    護。
    (一)液密型金屬可撓導線管，搭配適用之管配件。
    (二)液密型非金屬可撓導線管，搭配適用之管配件。
    (三)符合第五百五十八條規定情形，採用適用於 20 區之可撓軟線，終端
        搭配可維持接線隔間保護型式之軟線連接頭。
    (四)適用於第二類第一種場所之可撓導線管、軟管及軟線配件。
三、線盒及管配件應為適用於 20 區或第二類第一種場所者。
21  區得採用下列規定方法：
一、符合前項規定之配線方法。
二、線盒及管配件為塵密型，並具有螺紋銜接口供導線管連接，用於內部無導
    線接續、分接或終端連接，且非裝設於存在金屬粉塵之場所。
22  區之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)符合前項規定之配線方法。
    (二)厚金屬導線管、薄金屬導線管、無螺紋金屬導線管或塵密型導線槽。
    (三)MI  電纜或金屬被覆電纜，搭配適用之電纜封函蓋或終端配件。
    (四)MI  電纜、金屬被覆電纜或有金屬遮蔽之高壓電纜，搭配適用之電纜
        封函蓋或終端配件，單一層敷設於梯型、通風底板型或通風槽型電纜
        架，且電纜之間隔為最大電纜直徑以上。
    (五)於不對外開放且由合格人員維修及管理監督之工業廠區，裝設金屬導
        線管不具足夠抗腐蝕性能時，採用規格相當於號數 SCH80  之 PVC
        管、廠製彎頭及其附屬管配件。
    (六)本質安全「ic」型設備或器具配線應依第五百三十七條第四項第一款
        第五目規定辦理。
二、線盒及管配件應為塵密型。

第五百五十七條
20  區、21  區及 22 區內，有必要防止可燃性粉塵、纖維或飛絮進入或維持
保護技術型式者，應加以密封。
依前項規定密封之裝置應能阻擋可燃性粉塵、纖維或飛絮進入，或能維持保護
技術型式該密封裝置得免為耐壓防爆「 d」型或防爆（XP）型。

第五百五十八條
20  區、21  區及 22 區採用可撓軟線配線者，該軟線裝設應符合下列規定：
一、為適用於 20 區、21  區及 22 區者。
二、內含一條符合第九十三條及第九十四條規定之設備接地導線。
三、以適用之方法連接至終端或電源導線。
四、採用線夾或其他可確保終端連接不會承受拉力之方法支撐。
五、終端採用可維持其接線隔間保護技術型式之軟線連接器。

第五百五十九條
20  區、21  區及 22 區之用電設備或器具裝設依下列規定辦理：
一、20  區：
    (一)裝設於 20 區應為適用於 20 區者。
    (二)設備或器具為適用於第二類第一種場所，並有適用於 20 區之溫度等
        級者，得裝設於 20 區。
二、21  區：
    (一)裝設於 21 區應為適用於 21 區者。
    (二)設備或器具為適用於第二類第一種場所，並有適用於 21 區之溫度等
        級者，得裝設於 21 區。
    (三)正壓設備或器具為適用於第二類第一種場所者，得裝設於 21 區。
三、22  區：
    (一)裝設於 22 區應為適用於 22 區者。
    (二)設備或器具為適用於第二類第一種場所或第二種場所，並有適用於
        22  區之溫度等級者，得裝設於 22 區。
    (三)正壓設備或器具為適用於第二類第一種場所或第二種場所者，得裝設
        於 22 區。
四、設備或器具為適用於 ⅢC  群環境者，得裝設於 ⅢA  群或 ⅢB  群環境
    ；適用於 ⅢB  群環境者，得裝設於 ⅢA  群環境。
用電設備或器具之安裝應依製造廠家說明書指示辦理。
依第五百五十五條第二款第二目之 5  規定標明之表面最高溫度應符合下列規
定之一：
一、在可燃性粉塵環境，其溫度為低於特定可燃性粉塵層或粉塵雲引燃溫度，
    二者之較低者。在可能乾燥或碳化之有機粉塵環境，其溫度為不超過最低
    之引燃溫度或攝氏一百六十五度，二者之較低者。
二、在可燃性纖維或飛絮環境，設備或器具不會過載者，其溫度為低於攝氏一
    百六十五度；如為電動機或電力變壓器等會過載之設備或器具者，其溫度
    為低於攝氏一百二十度。

第五百六十條
20  區、21  區及 22 區之配線及設備應依第五百四十八條規定接地及搭接。

      第七節  本質安全系統
第五百六十一條
本質安全器具、配線及系統之裝設，應依本節規定辦理。

第五百六十二條
本質安全系統之器具或其他用電設備裝設依下列規定辦理：
一、本質安全器具、相關器具及其他用電設備應依控制圖說指示裝設。但不會
    與本質安全電路互連之簡易器具，不在此限。
二、適用場所：
    (一)具有本質安全商品標示之器具得裝設於其適用之危險場所。
    (二)本質安全器具得裝設於一般型封閉箱體內。
    (三)本質安全相關器具得裝設於其適用之危險場所，或以符合本章第二節
        至第五節規定之其他型式保護者，得裝設於該保護型式適用之危險場
        所。
    (四)簡易器具表面最高溫度不超過裝設處所易燃性氣體或揮發氣、易燃性
        液體、可燃性粉塵、纖維或飛絮等之引燃溫度者，得裝設於所有危險
        場所。

第五百六十三條
本質安全器具裝設得採用適用於非危險場所之配線方法；其密封應符合第五百
六十七條規定，導線隔離應符合第五百六十四條規定。

第五百六十四條
本質安全電路導線之隔離依下列規定辦理：
一、與非本質安全電路導線之隔離：
    (一)本質安全電路導線不得與非本質安全電路導線裝設於同一管槽、電纜
        架或電纜內。但符合下列規定之一者，不在此限：
        1.本質安全電路導線與非本質安全電路導線間保持五十毫米以上之間
          隔，並加以固定，或採用被接地之金屬隔板或絕緣隔板隔離。
        2.所有本質安全電路導線或非本質安全電路導線，具有被接地金屬被
          覆，或為金屬被覆電纜且其被覆足以承載接地故障電流。
        3.位於第二種場所、2 區或 22 區之本質安全電路導線，依第二款規
          定裝設者，得與非引火性現場電纜裝設於同一管槽、電纜架或電纜
          內。
        4.本質安全電路導線穿過第一類第二種場所或 2  區，供電給位於第
          一類第一種場所、0 區或 1  區之器具，依第二款規定裝設者，得
          與非引火性現場電路裝設於同一管槽、電纜架或電纜內。第二類及
          第三類場所亦同。
    (二)在封閉箱體內，本質安全電路導線應牢固裝設，使其從端子鬆脫後不
        致與其他端子碰觸，並應以下列規定之一方法，與非本質安全電路導
        線隔離：
        1.與非本質安全電路導線保持五十毫米以上之間隔。
        2.採用厚度○‧九一毫米以上之被接地金屬隔板。
        3.採用絕緣隔板。
        4.所有本質安全電路導線或非本質安全電路導線，具有被接地金屬被
          覆電纜，或為金屬被覆電纜且其被覆足以承載接地故障電流。
    (三)非裝設於管槽或電纜架之本質安全電路導線，與非本質安全電路導線
        應保持五十毫米以上之間隔，並加以固定。但符合下列規定之一者，
        不在此限：
        1.所有本質安全電路導線皆採用 MI 電纜或金屬被覆電纜。
        2.所有非本質安全電路導線皆裝設於管槽、MI  電纜或金屬被覆電纜
          內，且電纜之被覆足以承載接地故障電流。
二、不同本質安全電路導線之隔離：
    (一)供不同本質安全電路導線現場接線之端子間應保持六毫米以上之間隔
        。但控制圖說允許減少此間隔者，不在此限。
    (二)不同本質安全電路導線間應依下列規定之一方法互相隔離：
        1.每條電路導線皆有被接地之金屬遮蔽。
        2.每條電路導線之絕緣厚度為○‧二五毫米以上。

第五百六十五條
本質安全系統之接地依下列規定辦理：
一、具有金屬材質之本質安全器具、封閉箱體及管槽等應連接至設備接地導線
    。
二、本質安全相關器具或電纜遮蔽物應依控制圖說指示加以接地。
三、需連接至接地電極者，該接地電極應依第九十八條至第一百零三條規定施
    作。

第五百六十六條
本質安全系統之搭接依下列規定辦理：
一、在危險場所內，本質安全器具應於該危險場所內作搭接。
二、在非分類場所內，採用金屬管槽作為危險場所內之本質安全系統配線者，
    本質安全相關器具應依第四百八十三條規定作搭接。

第五百六十七條
本質安全系統配線之導線管或電纜依第四百七十五條至第四百七十九條、第四
百九十九條、第五百三十八條至第五百四十二條及第五百五十七條規定須密封
者，應加以密封，使氣體、揮發氣或粉塵通過之數量極小化。
密封裝置在正常使用下能使氣體、揮發氣或粉塵通過之數量極小化，且該裝置
為可觸及者，得免為防爆（XP）型或耐壓防爆「 d」型。
僅收容本質安全器具之封閉箱體，除第四百八十條規定外，得免密封。

第五百六十八條
本質安全系統之標識應適合其所裝設環境者，且考慮暴露於化學物質或陽光下
之情況，並依下列規定辦理：
一、本質安全電路應在端子處或連接處作識別，以防止測試及檢修中與電路互
    相干擾。
二、配線：
    (一)用於本質安全系統配線之管槽、電纜架或其他配線方法，應有標明本
        質安全配線之耐久標識，且裝設於可視及範圍內，並能追蹤全部配線
        。
    (二)封閉箱體、牆壁、隔板、屏障或地板所分隔之各配線段應顯示本質安
        全電路標識。
    (三)線路每隔七‧五米以內應有一個標識。地下電路之標識，得設置於引
        上地面之處。
三、若淺藍色未使用於其他導線，本質安全導線得以淺藍色作識別。僅用於本
    質安全導線之管槽、電纜架及接線盒得以淺藍色識別。

      第八節  車輛保養、維修及停放場所
第五百六十九條
於保養、維修及停放使用易燃性液體或氣體等燃料之汽車、公車、卡車及牽引
機等車輛之場所，其用電設備或器具配線及裝設，應依本節規定辦理。
本節所稱供車輛大修之廠房指供車輛引擎翻修、噴漆、烤漆、車體修理、需要
卸除汽車油箱修理或其他可能導致洩漏易燃性液體或氣體之作業場所。

第五百七十條
車輛保養、維修及停放場所內危險區域如下：
一、供車輛大修之廠房：
    (一)保養、維修以易燃性液體或較空氣重之易燃性氣體（ LPG）作為燃料
        之車輛者，如表五七○～一所示。
    (二)保養、維修或停放以較空氣輕之易燃性氣體（氫氣或天然氣）作為燃
        料之車輛者，如表五七○～二所示。
二、供車輛大修之廠房具燃料分送裝置者，該裝置之場所如表五八七～一或表
    五八七～二所示。
三、用於停放車輛之場所僅進行檢查及例行維護而不進行修理者，屬非分類場
    所。
第一類場所或0區、1區、2區範圍之邊界以無開口之牆壁、屋頂或其他堅固隔
間牆為界處，不受前項距離之限制。

第五百七十一條
車輛保養、維修及停放場所經劃分為第一類場所或 0  區、1 區、2 區之內部
配線、用電設備或器具裝設，應符合本章第二節或第五節規定，並依下列規定
辦理：
一、燃料分送裝置（不含液化石油氣）：
    (一)位在建築物內時，應依本章第十節規定辦理。
    (二)分送區域若有機械通風者，應設置互鎖裝置，使燃料分送裝置在通風
        情況下始得運轉。
二、可攜式照明設備：
    (一)應裝設握把、燈座、掛鉤，及附加在燈座或握把上之堅固防護體。
    (二)外表可能接觸到電池端子或接線端子等處，應由不導電材質製成，或
        以絕緣體保護。
    (三)燈座應為無開關式，且不得提供插頭可插入之構件。
    (四)外殼應為模鑄式或其他相當之材料。
    (五)燈具與其引線除經固定使其無法進入第一類場所或 0  區、1 區、2
        區外，應為適用於第一類第一種場所或 1  區者。

第五百七十二條
車輛保養、維修及停放場所經劃分為第一類場所或 0  區、1 區、2 區之上方
配線、用電設備或器具裝設依下列規定辦理：
一、固定式配線應採用金屬管槽、PVC 管、MI  電纜或金屬被覆電纜。
二、懸吊式裝置應採用可供懸吊且為適用於第一類場所或 0  區、1 區、2 區
    之可撓軟線。
三、設備或器具：
    (一)固定式設備或器具應裝設於第一類場所或 0  區、1 區、2 區之高度
        以上，或採用適用於該場所者。
    (二)產生電弧之設備或器具如開關、充電機之控制箱、發電機、電動機，
        或其他可能產生電弧、火花或熱金屬微粒逸散之設備或器具，不包括
        插座及燈頭，距離地面高度小於三‧六米者，應為全密封型，或其構
        造能避免火花或熱金屬微粒之逸散者。
    (三)固定式照明燈具裝設於車輛通行路線上方，距離地面高度應為三‧六
        米以上，以免車輛進出時碰撞損傷。

第五百七十三條
車輛保養、維修及停放場所內電力及控制配線導線管或電纜系統之密封，應依
第四百七十五條至第四百七十九條，或第五百三十八條至第五百四十二條規定
辦理。

第五百七十四條
於車輛保養、維修及停放場所裝設特殊用電設備或器具依下列規定辦理：
一、電池充電器與其控制設備及充電中之電池，不得裝設於第一類場所或 0
    區、1 區、2 區場所內。
二、電動車充電設備不得裝設於第一類場所或 0  區、1 區、2 區場所內。

第五百七十五條
車輛保養、維修及停放場所內單相一百二十五伏特、十五安培及二十安培之插
座裝設於供電機檢測設備、手持電動工具，或可攜式照明設備使用區域者，應
設置保護人員之漏電啟斷裝置。

第五百七十六條
車輛保養、維修及停放場所之接地依下列規定辦理：
一、所有金屬管槽、電纜之金屬被覆，及固定式或可攜式用電器具之非帶電金
    屬部分，應加以接地。
二、第一類場所或 0  區、1 區、2 區附有被接地導線及設備接地導線之電源
    電路：
    (一)第一類場所之接地應符合第四百八十三條規定；0 區、1 區及 2  區
        之接地應符合第五百四十八條規定。
    (二)供電給可攜式或懸吊式裝置之電路附有被接地導線者，其插座、附接
        插頭、接頭及類似裝置應為接地型，且其可撓軟線內之被接地導線應
        連接至燈頭之螺紋殼，或用電器具之被接地端子。
    (三)應維持固定式配線與懸吊式照明燈具、可攜式燈具及可攜式用電器具
        之非帶電金屬部分間設備接地導線之電氣連續性。

      第九節  飛機棚庫
第五百七十七條
於停放飛機之棚庫內，飛機裝填有易燃性液體，或裝填有可燃性液體且周圍溫
度高於閃火點之場所，其用電設備或器具配線及裝設應依本節規定辦理。
專供停放未裝填前項規定燃料飛機之場所，不適用本節規定。

第五百七十八條
飛機棚庫內危險區域如下：
一、窪坑或低於地面之全部空間屬第一類第一種場所或 1  區。
二、無隔離或通風區域：飛機棚庫之全部空間，包含與飛機棚庫無牆壁或隔間
    之任何鄰近或連通區域，自地面向上至四百六十毫米高度範圍內，屬第一
    類第二種場所或2區。
三、鄰近飛機區域：
    (一)維修及停機棚：自飛機發動機或燃料箱水平展開一‧五米，自地面向
        上至機翼或引擎封閉箱體上緣上方一‧五米高度範圍內，屬第一類第
        二種場所或2區。
    (二)飛機油漆棚：
        1.自飛機表面水平展開三米，地面向上至飛機上方三米高度範圍內，
          屬第一類第一種場所或 1  區。
        2.自飛機表面水平展開三米至九米，地面向上至飛機上方九米高度範
          圍內，屬第一類第二種場所或 2  區。
四、隔離及通風區域：儲存室、電控室及其他類似場所等鄰近飛機棚庫區域，
    有換氣之通風，或有牆壁或隔間有效與飛機棚庫隔離者，屬非分類場所。

第五百七十九條
飛機棚庫第一類場所或 0  區、1 區、2 區之配線、用電設備或器具選用依下
列規定辦理：
一、裝設或運轉於第一類場所或 0  區、1 區、2 區之所有配線、用電設備或
    器具，應符合本章第二節或第五節規定。
二、裝設或使用於第一類場所或 0  區、1 區、2 區之附接插頭與插座應為適
    用於第一類場所或 0  區、1 區、2 區，或在連接或拔除過程中無法帶電
    者。

第五百八十條
飛機棚庫非裝設於第一類場所或 0  區、1 區、2 區之配線、用電設備或器具
選用依下列規定辦理：
一、固定式配線應採用金屬管槽、MI  電纜或金屬被覆電纜。
二、懸吊式裝置應採用可供懸吊且為適用於第一類場所或 0  區、1 區、2 區
    之可撓軟線，且每條可撓軟線應內含一條設備接地導線。
三、產生電弧之設備或器具如開關、充電機之控制箱、發電機、電動機，或其
    他可能產生電弧、火花或熱金屬微粒逸散之設備或器具，若位於飛機機翼
    與引擎封閉箱體上方三米範圍內者，應為全密封型。

第五百八十一條
飛機棚庫地下配線依下列規定辦理：
一、裝設於飛機棚庫地面下之所有配線與設備，應符合第一類第一種場所或 1
    區規定；其配線若位於地窖、窪坑或管溝處，應設有洩水設施，以免積水
    。
二、裝設於飛機棚庫地面下之連續管槽內應視為第一類場所或 0  區、1 區、
    2 區。

第五百八十二條
飛機棚庫內電力及控制配線導線管或電纜系統之密封，應依第四百七十五條至
第四百七十九條，或第五百三十八條至第五百四十二條規定辦理。

第五百八十三條
於飛機棚庫裝設特殊用電設備或器具依下列規定辦理：
一、飛機電氣系統：
    (一)當飛機停放於飛機棚庫時，應將飛機電氣系統斷電。
    (二)當飛機全部或部分停放在飛機棚庫內時，裝設於飛機上之電池不得進
        行充電。
二、飛機電池充電及相關設備或器具：
    (一)飛機電池充電器及其控制設備不得裝設於第一類場所或 0  區、1 區
        、2 區場所內。
    (二)充電之工作檯、線架、托架及配線不得置於第一類場所或 0  區、1
        區、2 區內。
三、供電給飛機之外加電源：
    (一)飛機供電設備及固定式配線應距離地面高度四百六十毫米以上，且不
        得在第一類場所或 0  區、1 區、2 區內操作用電器具。
    (二)飛機供電設備及地面支援服務設備使用之可撓軟線應為適用於第一類
        場所或 0  區、1 區、2 區者，並內含一條設備接地導線。
四、移動式用電器具：
    (一)吸塵器、空氣壓縮機及空氣動力機等移動式用電器具，裝有不適用於
        第一類第二種場所或 2  區之用電器具及配線者，應使所有用電器具
        及固定式配線距離地面高度四百六十毫米以上，且不得在第一類場所
        或 0  區、1 區、2 區內操作用電器具。
    (二)移動式用電器具之可撓軟線應為適用於第一類場所或 0  區、1 區、
        2 區者，並內含一條設備接地導線。附接插頭與插座應為適用於其所
        裝設場所者，且有供設備接地導線連接之設施。
    (三)不適用於第一類第二種場所或 2  區之設備或器具，不得於維修時可
        能釋出易燃性液體或揮發氣之場所內操作。
五、可攜式設備或器具應為適用於所在之分類場所者；其可撓軟線應為適用於
    第一類場所或 0  區、1 區、2 區者，並內含一條設備接地導線。

第五百八十四條
飛機棚庫內單相一百二十五伏特、十五安培或二十安培、六十赫茲之插座裝設
於供電機檢測設備、手持電動工具或可攜式照明設備使用區域者，應設置保護
人員之漏電啟斷裝置。

第五百八十五條
飛機棚庫之接地應依第五百七十六條規定辦理。

      第十節  發動機燃料分送設施
第五百八十六條
於分送燃料至車輛或船舶發動機之燃料箱，或至其他經設計者確認適用容器之
固定式發動機燃料分送設施所在場所，其用電設備或器具配線及裝設，包括與
其連接之部分，應依本節規定辦理。於專供儲存發動機易燃性液體燃料之場所
，亦同。

第五百八十七條
發動機燃料分送設施所在場所內危險區域如下：
一、儲存、處理或分送發動機易燃性液體燃料者，如表五八七～一及圖五八七
    所示。
二、壓縮天然氣（ CNG）及液化石油氣（ LPG）：
    (一)處理或分送如表五八七～二所示；儲存如表五八七～一所示。
    (二)壓縮天然氣加氣機裝設於遮棚下方或封閉箱體，且該遮棚或箱體會累
        積可引燃揮發氣者，該遮棚下方或箱體內屬第一類第二種場所或2區
        。
專供儲存發動機易燃性液體燃料之場所如表五八七～三所示。
液化石油氣分送裝置與任何易燃性液體分送裝置應保持一‧五米以上之間隔。
不用於處理發動機燃料之場所屬非分類場所。
第一類場所或 0  區、1 區、2 區範圍之邊界以無開口之牆壁、屋頂或其他堅
固隔間牆為界處，不受第一項及第二項距離之限制。

第五百八十八條
發動機燃料分送設施所在之第一類場所或 0  區、1 區、2 區之配線、用電設
備或器具選用依下列規定辦理：
一、內部之配線、設備或器具選用應符合第五百八十九條規定，及本章第二節
    或第五節規定。
二、上方之配線、設備或器具選用應符合第五百七十二條規定。

第五百八十九條
發動機燃料分送設施所在場所之地下配線依下列規定辦理：
一、埋設深度應依表三○三規定。
二、配線方法應採用有螺紋之厚金屬導線管或 MI 電纜。符合下列規定者，得
    採用 PVC  管：
    (一)埋設深度超過六百毫米。
    (二)從地下至引出點，或與地上管槽連接口之最後六百毫米採用有螺紋之
        厚金屬導線管，且導線管內附加一條設備接地導線，提供管槽系統之
        電氣連續性及非帶電金屬部分之接地。
三、第一類場所或 0  區、1 區、2 區之地下配線，自地面引出點三米範圍內
    應加以密封。導線管密封處與地面引出點之間，除裝在密封裝置上之防爆
    （EX d  或 XP ）型大小管接頭外，不得裝設由令、管接頭、線盒或其他
    管配件。

第五百九十條
發動機燃料分送設施所在場所之電力及控制配線導線管或電纜系統之密封依下
列規定辦理：
一、導線管或電纜直接進出燃料分送裝置，或任何與燃料分送裝置相通之腔室
    或封閉箱體處，應裝設適用之密封裝置。導線管從地面或水泥地露出後之
    第一個管件應為密封裝置。
二、密封應依第四百七十五條至第四百七十九條，或第五百三十八條至第五百
    四十二條規定。

第五百九十一條
發動機燃料分送設施所在場所裝設電池充電設備及電動車充電設備者，應依第
五百七十四條規定辦理。

第五百九十二條
每一進入或穿過燃料分送裝置之電路，包含電力、通信、數據視訊等電路，及
遠方幫浦系統之設備，應位於遠離燃料分送裝置之位置且應有明顯標識，及有
可輕易觸及之操作開關或其他緊急控制設施，能同時自電源端隔離此電路之所
有導線，包含被接地導線；該操作開關不得使用以連桿連結多個單極斷路器。

第五百九十三條
發動機燃料分送設施所在場所內每具燃料分送裝置應裝設隔離設備，能於維修
保養期間隔離所有電力、通信、數據、視訊回路或外接之外部電源。
前項隔離設備配裝啟斷位置可上鎖之固定式裝置者，得裝設於燃料分送裝置外
部或鄰近處。

第五百九十四條
發動機燃料分送設施所在場所內所有金屬管槽、電纜之金屬鎧裝或金屬被覆，
及固定式或可攜式用電設備或器具，其非帶電金屬部分應加以接地。
前項配線、設備或器具裝設於第一類場所或 0  區、1 區、2 區者，其接地應
符合第四百八十三條或第五百四十八條規定。

      第十一節  噴塗、浸染及塗裝作業場所
第五百九十五條
於經常使用易燃性液體、可燃性液體與可燃性粉末作為噴塗材料，及應用易燃
性液體或高於閃火點溫度之可燃性液體作為浸染、塗裝或其他相關用途之場所
內用電設備或器具配線及裝設，應依本節規定辦理。

第五百九十六條
本節用詞定義規定如下：
一、噴塗區：指建築物外或較大房間或空間內，通常配有揮發氣抽氣或通風設
    備之局部作業區。在自動化作業情況下，該區域範圍為施行噴塗作業直接
    路徑之最大空間。在手動作業情況下該區域範圍為對著噴塗目標物所能達
    到之最大空間。
二、噴塗亭：指大空間內施行噴塗、塗裝、浸染作業之封閉箱體或嵌入空間，
    可為全密閉式，或前方有開口，可包含個別輸送帶之進出口，並配有專屬
    之通風設備。
三、噴塗室：指為施行噴塗、塗裝、浸染作業所建置之密閉房間，且裝有專屬
    之通風供氣、排氣設施，通常設計成能夠收容被塗裝之物品，並有可觸及
    該物品或作業過程之通道。
四、靜電噴塗設備：指利用靜電荷以霧化、充電或沉積危險性物質於物件表面
    當作塗層或類似目的之設備。

第五百九十七條
噴塗、浸染及塗裝作業空間危險區域如下：
一、第一類第一種場所或 0  區：
    (一)開放或封閉式之易燃性液體容器內部。
    (二)浸泡槽或塗裝槽內部。
二、第一類第一種場所、1 區或第二類第一種場所：
    (一)除第四款規定外，噴塗亭或噴塗室之內部。
    (二)排風管內部。
    (三)施行噴塗作業直接路徑上之任何區域。
    (四)開放式浸染與塗裝工作區，從揮發氣源表面向外展開一‧五米範圍，
        並向下至地板之空間。
    (五)位於揮發氣源水平距離七‧五米範圍內之污水坑、漥坑或低於地面之
        溝渠。若該污水坑、漥坑或溝渠延伸至距離揮發氣源七‧五米以外，
        未裝設揮發氣阻擋裝置者，整個污水坑、漥坑或溝渠皆為第一類第一
        種場所。
    (六)位於開放容器、供應容器、噴塗槍清潔器，及含有可燃性液體之溶劑
        蒸餾設備之外，九百毫米範圍內之全部空間。
三、第一類第二種場所、2 區或第二類第二種場所：
    (一)開放式噴塗：如按前二款劃分為第一類第一種場所或 1  區範圍外之
        開放式噴塗區，水平向外延伸六米，垂直延伸三米範圍內，且未被隔
        間牆所區隔者，如圖五九七～一。
    (二)在頂部封閉且表面開放或前端開放之噴塗亭或噴塗室：
        1.排氣通風系統與噴塗作業之設備互鎖：從噴塗亭或噴塗室之開放表
          面或開放前端邊界水平延伸一‧五米，垂直延伸九百毫米，如圖五
          九七～二上圖所示。
        2.排氣通風系統與噴塗作業之設備未互鎖，從噴塗亭或噴塗室之開放
          表面或開放前端邊界水平延伸三米，垂直延伸九百毫米，如圖五九
          七～二下圖所示。
    (三)在頂部開放之噴塗亭，從該亭垂直向上延伸九百毫米，及該亭其他開
        口九百毫米範圍內。
    (四)密閉噴塗亭或噴塗室之任何開口向外展開九百毫米範圍內，如圖五九
        七～三所示。
    (五)浸染槽與承滴板之周圍空間：環繞浸染槽與承滴板第一類第一種場所
        或 1  區之外九百毫米範圍內，如圖五九七～四。
    (六)浸染槽與承滴板之地板上空間：浸染槽與承滴板第一類第一種場所或
        1 區之外水平展開六米，且自地板向上九百毫米範圍內。但符合下列
        規定之一者，非為危險場所：
        1.揮發氣源面積為○‧四六平方米以下，且開放式容器之容積未超過
          十九公升者。
        2.在運轉與停機期間，第一類第一種場所或 1  區外揮發氣濃度不超
          過引燃下限值百分之二十五者。
    (七)開放式容器：環繞開放式容器、供應容器、噴槍清潔器，及含有易燃
        性液體之溶劑淨化裝置之第一種場所或 1  區向外展開六百毫米範圍
        內，及該第一種場所或 1  區水平展開一‧五米，自地板向上四百六
        十毫米高度範圍內。
四、密閉式塗裝與浸染作業：毗鄰密閉式塗裝或浸染器具之空間，屬非分類場
    所。但封閉箱體之開口向外展開九百毫米範圍內，屬第一類第二種場所或
    2區。
五、與第一類場所或第二類場所毗鄰，而以密實而無開口之隔間牆分隔，且釋
    出易燃性揮發氣或可燃性粉末機會極低之區域，屬非分類場所。
六、非分類場所：使用乾燥、凝固或熔解器具，並裝有正壓機械通風系統能避
    免累積可燃濃度或含量之揮發氣，及互鎖裝置能於通風設備無法運作時，
    啟斷所有非適用於第一類場所用電器具電源之區域，屬非分類場所。
本條所稱揮發氣源係指作業過程中暴露之液體、承滴板，及任何浸染或塗裝物
件，且距離該物件任何方向三百毫米處，可測量揮發氣濃度超過引燃下限百分
之二十五者。

第五百九十八條
噴塗、浸染及塗裝作業空間經劃分為第一類場所或 0  區、1 區、2 區之配線
、用電設備或器具選用依下列規定辦理：
一、場所內僅有揮發氣、無殘留物，裝設所有用電設備或器具應符合本章第二
    節或第五節規定。
二、噴塗區若會累積可燃性殘留物者，不得有用電設備或器具。但使用適用於
    該場所者，且其裝設符合前款規定者不在此限。
三、於容易引燃之區域，僅得透過玻璃隔板，或其他透明或半透明材料提供照
    明，並應符合下列規定：
    (一)使用固定式燈具為光源。
    (二)隔板能有效隔離第一類場所或 0  區、1 區、2 區與燈具裝設之位置
        。
    (三)燈具適用於其裝設場所者。
    (四)隔板使用不易破損之材質，或加以防護使其不易破損。
    (五)其配置能免於光源之輻射熱或傳導熱使累積在隔板表面上之可燃性殘
        留物溫度升高至引發危險之程度。
四、噴塗作業進行中，不得在噴塗區使用可攜式之照明燈具及其他用電器具。
    但符合下列規定之一者，不在此限：
    (一)噴塗區內固定式燈具照明不足，仍有需要使用可攜式照明設備，且在
        會累積引燃性殘留物處使用適用於第一類第一種場所或 1  區者。
    (二)於噴塗亭內使用可攜式乾燥器具，且符合下列規定者：
        1.於噴塗作業時，該器具與其電氣連接點不位於噴塗室內。
        2.在地板垂直向上延伸四百六十毫米範圍內之用電設備或器具，採用
          適用於第一類第二種場所或 2  區者。
        3.該器具之所有金屬部分施作接地及搭接。
        4.設有互鎖裝置使該乾燥器具位於噴塗室內時不能進行噴塗作業，且
          於該乾燥器具送電前能對噴塗室吹驅至少三分鐘，並於通風系統故
          障時，停止乾燥器具之運轉。
五、靜電噴塗或除餘漆設備僅於符合第六百條規定者，始得裝設及使用。
經劃分為第二類場所或 20 區、21  區、22  區之配線、用電設備或器具選用
應符合本章第三節或第六節規定。

第五百九十九條
噴塗、浸染及塗裝作業空間經劃分為第一類場所、第二類場所或 0  區、1 區
、2 區以外之配線、用電設備或器具選用依下列規定辦理：
一、位於第一類場所或第二類場所上方之所有固定式配線，應採用金屬管槽、
    非金屬導線管、MI  電纜或金屬被覆電纜。
二、固定式照明燈泡或燈座、開關、插座、電動機，或其他有接通與啟斷或滑
    動接點之固定式設備，可能會產生電弧火花或熱金屬微粒，裝設於第一類
    或第二類場所上方，或處理剛完成塗裝物件之場所上方者，應為全密閉型
    ，或其構造能避免火花或熱金屬微粒逸出。

第六百條
噴塗、浸染及塗裝作業之特殊設備使用依下列規定辦理：
一、固定式靜電噴塗設備之充電或霧化裝置裝設於機械支撐、操縱器或機械手
    臂：
    (一)於高電壓噴塗過程中，機械手臂或程序控制需要手動運轉機械手臂者
        ，應依第二款規定。自動化靜電設備應依第五百九十八條第一項第一
        款至第四款規定。
    (二)變壓器、高電壓供電設備、控制器具及該設備中所有電氣組件，除高
        電壓極板、電極、靜電霧化頭及其接線，或採用適用於第一類場所或
        1 區者外，應裝設於第一類場所或 1  區以外。
    (三)電極與靜電霧化頭應支撐在固定地點，且應對地絕緣。
    (四)高電壓引出線應有絕緣與防護，以免遭受外力損傷或暴露於破壞性化
        學物質。暴露於高電壓之任何元件應固定在絕緣體上，且應有防護以
        免意外接觸或接地。
    (五)被塗裝物件應支撐在輸送帶或掛鉤上。該輸送帶或掛鉤之排列應確保
        被塗裝物件均被接地，接地電阻在一百萬歐姆（MΩ） 以下，且避免
        物件擺盪。
    (六)靜電器具應裝設自動化設備，於下列規定之一情形發生時，能迅速啟
        斷高電壓組件之電源：
        1.風扇或通風設備因故停止運作。
        2.輸送物件通過高電壓電場之輸送裝置停止，除非因正常噴塗程序之
          需要而停止。
        3.高電壓系統中任一點產生超過原製造廠規範之洩漏電流。
        4.電源供應器之一次側停電。
    (七)在噴塗區內之所有導電性物件，包括塗料容器、洗滌容器、防護物、
        水管接頭、托架等，除因製程需要其處於高電壓者外，應加以接地。
    (八)設備四周或內部應設置柵欄、欄杆、互鎖裝置或其他防護設施，利用
        其位置或特性確保製程之安全性隔離。
    (九)應標明下列資訊：
        1.製程區域為火災或感電意外之危險場所。
        2.在噴塗區中所有導電性物件之接地規定。
        3.僅限合格人員進出。
    (十)所有絕緣體應保持清潔與乾燥。
    (十一)不屬非引火性之噴塗設備：
          1.輸送裝置或掛鉤裝置之配置，應使被塗裝之物件與電極、靜電霧
            化頭或帶電荷導體間保持至少二倍火花間隙之安全距離，並應有
            此距離之標識。
          2.應設有自動設施，於被塗裝之物件與電極或靜電霧化頭間之距離
            少於本目之 1  規定時，迅速啟斷高電壓物件之電源。
二、可攜式或手動操作式靜電噴塗設備：
    (一)一般規定：
        1.高電壓電路之設計應使其不致產生足夠火花能點燃易燃性揮發氣，
          或在正常運轉下碰觸被接地物件仍不致產生可感知之電擊。
        2.可攜式噴塗槍之靜電荷暴露組件應僅能由控制供應塗層材料之驅動
          器使之通電。
    (二)變壓器、電源組、控制器具及設備中其他電氣組件，除可攜式噴塗槍
        本身及其電源線，或採用適用於第一類場所或0區、1區、2區者外，
        應裝設於第一類場所或0區、1區、2區以外。
    (三)噴塗槍之握柄應透過金屬連接作接地，且其裝設應使操作員在正常操
        作位置能與接地之握柄緊密接觸，防止操作員身體累積靜電荷，並應
        標明進入噴塗區人員接地之必要性。
    (四)在噴塗區內之所有導電性物件，包括塗料容器、洗滌容器等，應加以
        接地。設備上應有標明接地必要性之耐久且明顯標識。
    (五)物件支撐：
        1.被塗裝物件應與輸送裝置或其他被接地之支撐保持接地電阻在一百
          萬歐姆（MΩ） 以下。
        2.掛鉤應定期清理，碰觸區域儘可能為鋒利點或鋒利邊緣。
        3.支撐點應加以遮蔽以免遭受隨機噴塗。噴塗物件以輸送帶支撐者，
          物件附掛於輸送帶之點應能避免正常操作時累積噴塗物質。
三、可燃性乾粉末塗裝：
    (一)一般規定：
        1.用電設備或器具與點火源應符合本章第三節或第六節規定。
        2.進行噴塗作業時，第二類場所或 20 區、21  區、22  區不得使用
          可攜式照明設備及其他用電器具。
        3.進行清理或修復期間，在第二類第一種場所或 20 區、21  區使用
          可攜式照明設備或用電器具者，該器具應為適用於該場所者，且其
          所有暴露之金屬部分應連接至設備接地導線。
        4.若噴塗區內固定式燈具照明不足，仍有需要使用可攜式燈具者，在
          可能存在可燃性殘留物處，應採用適用於第二類第一種場所或 20
          區、21  區者。
    (二)固定式靜電噴塗設備應符合第一款及前目規定。
    (三)可攜式靜電噴塗設備應符合前款及第一目規定。
    (四)靜電流體化床：
        1.靜電流體化床及相關設備應為適用於其所裝設之場所者。
        2.高電壓電路之設計應使帶靜電之電極接近或碰觸地面時不致產生足
          夠放電能點燃可燃性粉末，或導致可感知之電擊。
        3.變壓器、電源組、控制器具及設備中其他電氣組件，應裝設於粉末
          塗層區域以外。但帶電電極及其電源線得於粉末塗層區域內。
        4.粉末塗層區內之所有導電性物件應加以接地。粉末塗裝層設備上應
          有標明接地必要性之耐久且明顯標識。
        5.被塗裝物件應與輸送帶或其他被接地之支撐保持接地電阻一百萬歐
          姆（MΩ） 以下。掛鉤應定期清理，碰觸區儘可能為鋒利點或鋒利
          邊緣。
        6.用電設備或器具及壓縮空氣源應與通風系統互鎖，並於通風扇正常
          動作時，該設備或器具始得運轉。

第六百零一條
噴塗、浸染及塗裝作業危險場所內所有金屬管槽、電纜之金屬被覆，及固定式
或可攜式之用電設備或器具非帶電金屬部分，應依第四百八十三條、第五百零
一條或第五百四十八條規定加以接地及搭接。

      第十二節  發散腐蝕性物質場所
第六百零二條
於氫氧化鈉（或稱燒鹼）、漂白粉、染料、化學肥料、電鍍、硫酸、鹽酸、蓄
電池等發散腐蝕性物質之製造及貯藏場所內，其用電設備或器具配線及裝設，
應依本節規定辦理。

第六百零三條
於發散腐蝕性物質場所用電設備或器具之配線，依下列規定辦理：
一、配線應採用非金屬導線管或非金屬被覆電纜。
二、採用金屬導線管或金屬被覆電纜者，應全部埋入建築物內部或地下。但環
    境不許可時，於金屬導線管及電纜表面加塗防腐材料以免腐蝕者，不在此
    限。採用金屬導線管配線者，其附屬配件應與金屬導線管為相同金屬材質
    ，以免二者間發生電化學腐蝕作用。

第六百零四條
發散腐蝕性物質場所之導線連接時，連接處之線盒或連接器應能防止腐蝕氣體
進入。

第六百零五條
發散腐蝕性物質場所之插座、開關及熔線等配電裝置皆應裝設於密封之封閉箱
體或絕緣油內，且該箱體及油箱之表面應有防腐蝕處理。
照明燈具出線頭應裝設防腐蝕之金屬吊管或彎管，燈頭應為密封以防腐蝕。

第六百零六條
發散腐蝕性物質場所不得裝設懸吊式線盒、矮腳燈頭及可撓軟線。

第六百零七條
發散腐蝕性物質場所裝設之電動機及其他用電器具，應採用能防止腐蝕性氣體
及液體進入者，其外殼應有防腐蝕塗料或其他防腐蝕方法保護。

      第十三節  潮濕場所
第六百零八條
潮濕場所內之用電設備或器具得採用金屬導線管、非金屬導線管或電纜配線。

第六百零九條
在浴室或其他潮濕場所不得裝設懸吊式線盒。但有防水氣滲入之設施者，不在
此限。
若裝設懸吊式線盒者，應採用防水導線，且不得有接續或分接；該線盒以下應
採用防水之無開關燈頭。

第六百十條
浴室內裝設插座者，應依第八十七條規定辦理，其裝設位置應遠離浴盆、浴缸
或淋浴間等處，使人不可觸及該插座。
浴室內裝設之照明燈具應能防水及防鏽，其控制開關之位置應遠離浴盆、浴缸
或淋浴間等處，使人不可觸及該開關。

第六百十一條
在潮濕場所裝設之電動機及其他用電器具應採用具備防濕或防水功能者。

第六百十二條
裝設於潮濕場所之電路除本規則另有規定外，應依第八十七條規定裝設漏電斷
路器保護。

      第十四節  醫療照護場所
        第一款  一般規定及配線保護
第六百十三條
於提供人員醫療照護服務之場所內用電設備或器具配線及裝設，應依本節規定
辦理。
建築物內僅提供人員醫療照護服務之個別處所用電設備或器具配線及裝設，應
符合本節第一款至第三款之適用規定。
下列場所或區域不適用本節規定：
一、綜合診所、牙醫診所、醫務室及門診部之辦公室、通道、候診室等類似場
    所或區域。
二、護理之家及長照機構內僅作病患寢室之區域，且其配線符合第一章至第四
    章規定者。

第六百十四條
本節用詞定義規定如下：
一、醫療照護場所：指提供內科、牙科、精神科、產科或外科醫療及護理之建
    築物或建築物之一部分，包含醫院、護理之家、長照機構、綜合診所、牙
    醫診所、醫務室及流動式照護中心等永久或移動之場所。
二、醫院：指依「醫療機構設置標準」設立之醫院。
三、護理之家：指依「護理機構分類設置標準」設立護理之家。
四、長照機構：指依「老人福利機構設立標準」設立之長期照顧機構，或依「
    身心障礙福利機構設施及人員配置標準」設立之住宿機構。
五、護理站：指在醫療照護場所中配置照料臥床病患之護理人員集中工作區域
    。
六、病患診療區：指醫療照護場所中提供病患檢驗或治療之場所，並依病患診
    療類型區分下列區域：
    (一)一般診療區：指病患可接觸護士呼叫系統、電動病床、檢驗燈、電話
        及電視等一般用電器具之病房、檢驗室、治療室、診所及其他相類之
        區域。
    (二)緊要診療區：指病患接受侵入性手術，並與線路操作之電子醫療裝置
        連接之特殊照護室、加護病房、冠狀動脈病房、血管造影室、心導管
        室、產房、手術室及其他類似之區域。
    (三)潮濕手術區：指有病患進行手術而正常情況下潮濕之病患診療空間，
        包括因病患或醫療人員而使地板上滯留液體或淋濕之工作區域。
七、病患診療處：指在病患接受經常照護之區域內，病患或可碰觸病患之照護
    人員可能接觸到之空間，為病床或診療床等正常位置之床緣向外延伸一‧
    八米，地板垂直向上延伸二‧三米所包圍之空間。
八、病床位置：指放置一張病患臥床，或緊要診療區中所用之病床或手術台之
    位置。
九、麻醉區域：指在醫療照護場所內被指定作為保管於治療或檢查過程所用吸
    入式麻醉劑之區域，包括使病患吸入濃度不足以喪失意識之麻醉氣體，達
    鎮靜及局部止痛狀態之相對止痛麻醉區域。
十、易燃性麻醉區域：指使用易燃性吸入式麻醉劑之麻醉區域。
十一、易燃性麻醉劑：指可與空氣、氧氣或氧化亞氮等還原性氣體，形成易燃
      性或爆炸性混合物之麻醉劑。
十二、備用電源：指作為經常電源供應中斷期間提供電力之一個以上發電機組
      或電池系統。
十三、重要電力系統：指內含備用電源及所有相連結之配電系統及其附屬設備
      之系統，作為經常電源中斷情況下，確保醫療照護場所指定區域及功能
      之供電連續性。
十四、電力維生設備：指對維持病患生命不可或缺之電力持續運轉設備。
十五、緊要回路：指供電給病患診療有關區域及功能之工作照明、固定式設備
      、特定插座及特定電力電路，並在經常電源中斷期間，透過切換開關自
      動連結至備用電源之幹線及分路。
十六、安全回路：指供電給安全逃生照明、插座及設備，並在經常電源中斷期
      間透過切換開關自動連結至備用電源之幹線及分路。
十七、設備回路：指供電給主要電力設備，而以延遲、自動或手動方式連接至
      備用電源之幹線及分路。
十八、工作照明：指在執行必要工作之區域，所供應之最低限度照明，包括至
      供應區與設備之安全通道，及至出口之通道照明。
十九、特定插座：指提供現場工作用電器具或可能用於緊急病患診療用之插座
      。
二十、參考接地點：指連接病患診療區之配電箱、配電盤或隔離電源系統盤之
      接地端子板或匯流排。
二十一、病患設備接地點：指作為病患診療處之電子用電器具備援接地匯集點
        ，或其他消除電磁干擾問題接地匯集點之插座或終端。
二十二、隔離電源系統：指內含隔離變壓器、線路隔離監視器及其非接地導線
        之系統。
二十三、隔離變壓器：指一次與二次繞組有實體分離之變壓器。
二十四、線路隔離監視器：指作為連續檢測隔離電路每一線對地之阻抗，且內
        建測試線路，在不增加漏電危險電流之條件下，執行警報之測試儀器
        。
二十五、危險電流：指隔離電源系統中流經被隔離導線與大地低阻抗連接之電
        流，並區分為下列三種：
    (一)故障危險電流：指不包含線路隔離監視器在內之所有裝置，連接至隔
        離系統時之危險電流。
    (二)監視危險電流：指線路隔離監視器之危險電流。
    (三)總危險電流：指包含線路隔離監視器在內之所有裝置，連接至隔離系
        統時之危險電流。
二十六、X 光設備額定：
    (一)長時額定：指額定運轉期間為五分鐘以上。
    (二)瞬間額定：指額定運轉期間不超過五秒鐘。

第六百十五條
供電給病患診療區之分路應採用金屬管槽、全程附有底板或蓋板之金屬電纜架
，或具有金屬被覆之電纜配線，在管槽、電纜架或電纜內應附加或內含一條設
備接地導線，提供有效接地故障電流路徑。
裝設設備接地導線及搭接導線依下列規定辦理：
一、下列規定應直接連接至前項規定管槽或電纜內之附加設備接地導線：
    (一)所有插座之接地端子。
    (二)金屬出線盒及封閉箱體。
    (三)運轉電壓超過一百伏特之所有固定式設備或器具中非帶電露出金屬部
        分。
二、符合下列情形者，得免依前款規定辦理：
    (一)金屬面板以金屬螺絲固定於被接地之出線盒或被接地之配電裝置。
    (二)照明燈具距離地面高度超過二‧三米，其開關位於病患診療處外，且
        連接至符合前項規定之設備接地路徑。
三、設備接地導線及搭接導線之線徑，應符合表九三～二規定。

第六百十六條
經常回路及緊要回路之配電箱或配電盤供電給同一獨立病患診療處者，其設備
接地端子匯流排應以五‧五平方毫米以上之絕緣導線連接。
二個以上配電箱或配電盤供電給同一獨立病患診療處，若由重要電力系統之獨
立切換開關供電者，其設備接地端子匯流排應以五‧五平方毫米以上之絕緣導
線連接。
前二項規定之導線需連接至每一個配電箱或配電盤內之設備接地端子匯流排者
，得分段連接。

第六百十七條
一般診療區之配線依下列規定辦理：
一、病床位置之分路：
    (一)每一病床位置應至少由二個分路供電，一個以上分路接自緊急電源系
        統，及一個以上分路接自經常電源系統。
    (二)緊急電源系統供電之插座本體或其蓋板應有明顯可區別之顏色或可快
        速辨識之標識，且應標明其供電來源之配電箱或配電盤及電路編號。
    (三)供電給病床位置之分路，不得為多線式分路之一部分。
    (四)符合下列情形者，不受前三目限制：
        1.綜合診所、門診部及精神科、藥物戒護、復健醫院之病床位置、護
          理之家及長照機構內僅作為病患寢室，且其配線符合第一章至第四
          章規定之區域。
        2.由緊急電源系統之二個獨立切換開關供電之一般診療區病床位置，
          不需有來自經常電源系統之電路。
二、病床位置之插座：每一病床位置應設置插座數量至少為八個，可為單連插
    座、雙連插座或四連插座之組合。所有插座應為醫院等級。每一插座接地
    端子應連接至表九三～二規定線徑之設備接地導線。但符合下列規定之一
    者，不在此限：
    (一)僅作為病患寢室，且其配線符合第一章至第四章規定之精神科、藥物
        戒護及復健之醫院。
    (二)不需裝設插座出線口之精神科安全室。
三、小兒科區域之房間、浴室、遊戲間、活動間及診療區之插座，應為防觸電
    者或具有鎖或扣之蓋板。

第六百十八條
緊要診療區之配線依下列規定辦理：
一、病床位置之分路：
    (一)每一病床位置應至少由二個分路供電，一個以上分路接自緊急電源系
        統，及一個以上分路接自經常電源系統。其接自緊急電源系統之分路
        ，應有一個分路僅供電給該病床位置之一個出線口。
    (二)同一診療區所有接自經常電源系統之分路應源於單一配電箱或配電盤
        。
    (三)緊急電源系統供電之插座本體或其蓋板應有明顯可區別之顏色或可快
        速辨識之標識，且應標明其供電來源之配電箱或配電盤及電路編號。
    (四)供電給病床位置之分路，不得為多線式分路之一部分。
    (五)符合下列情形者，不受前四目限制
        1.僅供電給特殊用途之插座、設備之分路，得由其他配電箱或配電盤
          供電。
        2.由緊急電源系統之二個獨立切換開關供電之緊要診療區病床位置，
          不需有來自經常電源系統之電路。
二、病床位置之插座：每一病床位置應設置插座數量至少為十四個，可為單連
    插座、雙連插座或四連插座之組合，其中至少有一個連接至經常電源系統
    之分路，或其他非同一切換開關之緊要回路。所有插座應為醫院等級。每
    一插座接地端子應以設備接地導線連接至參考接地點。
三、手術室之插座：每一間手術室應至少設有三十六個插座，可為單連插座、
    雙連插座或四連插座之組合，其中十二個以上且不超過二十四個連接至經
    常電源系統之分路，或其他非同一切換開關之緊要回路。所有插座應為醫
    院等級。每一插座接地端子應以設備接地導線連接至參考接地點。
四、病患診療處之接地及搭接：病患診療處得裝設一個病患設備接地點，其可
    包含一個以上之接地及搭接插接器。所有接地型插座接地端子連接至病患
    設備接地點，須選用五‧五平方毫米以上之設備接地導線，其搭接導線得
    以集中或環路方式配置。
五、設備之接地及搭接：採用金屬管槽、MI  電纜或金屬被覆電纜配線，並附
    加或內含一條設備接地導線者，在該管槽或電纜每一終端或連接點應以下
    列規定之一搭接，確保其設備及封閉箱體之接地：
    (一)設備接地導線及搭接導線之線徑符合表九三～二規定，且搭接導線連
        接至接線封閉箱體之接地端子板。
    (二)金屬管槽、MI  電纜或金屬被覆電纜，連接至終端封閉箱體之螺紋接
        頭。
    (三)採用搭接型制止螺絲圈或套管或具同等效果之方法。
六、緊要診療區之附加保護機制：隔離電源系統符合第六百四十六條及第六百
    四十七條規定，且其設備經設計確認適用者，得用於緊要診療區。線路隔
    離監視器之聲響及顯示器，得設於該區域之護理站。
七、隔離電源系統設備接地：使用隔離非接地電源，且將第一次接地故障電流
    抑制在低電流者，得將二次側電路之設備接地導線裝設於該電路導線封閉
    箱體之外部。
八、特殊用途之插座接地：供移動式 X  光設備用之插座等特殊用途插座之設
    備接地導線，應接自供電給特殊用途插座分路之參考接地點。若該電路由
    隔離非接地系統供電，設備接地導線得免與電源導線配裝一起。

第六百十九條
潮濕手術區之配線依下列規定辦理：
一、插座及固定式用電設備或器具位於潮濕手術區域之病患診療區，應裝設下
    列規定之一保護，以免觸電：
    (一)配電系統發生第一次接地故障時，可抑制接地故障電流在低電流，且
        不中斷供電。
    (二)配電系統實際接地故障電流大於六毫安即中斷供電。
二、採用隔離電源系統者，其系統應符合第六百四十六條及第六百四十七條規
    定。

第六百二十條
緊要診療區之病房內裝設衛生設備及水盆者，該區之插座得免裝設漏電啟斷裝
置。

        第二款  重要電力系統
第六百二十一條
醫院、護理之家、長照機構、綜合診所、牙醫診所、醫務室、門診部及其他服
務病患之醫療照護場所於經常電源供應中斷期間，應有供應最低限度照明、生
命安全及依序斷電所需電力之能力。
重要電力系統之安全回路除依本節規定外，應符合第九章第一節規定。

第六百二十二條
醫院之重要電力系統電源裝設依下列規定辦理：
一、重要電力系統應至少有二個獨立電源，一個為經常電源，通常供電給整個
    電力系統，及一個以上備用電源，於經常電源中斷時供電。
二、備用電源應為下列規定之一，且位於用戶配線系統者：
    (一)原動機驅動之發電機。
    (二)經常電源發電機組以外之其他發電機組。
    (三)經常電源發電機組以外之外部電業供電。
    (四)電池系統。

第六百二十三條
醫院之重要電力系統裝設依下列規定辦理：
一、重要電力系統應具備緊要回路、安全回路及設備回路三種獨立之回路，於
    經常電源中斷期間，供應安全逃生及醫院有效運轉重要部分所需之最低限
    度照明及電力。
二、重要電力系統每一回路應有一個以上切換開關。該系統為一百五十千伏安
    以下者，其一個以上回路得由同一個切換開關供電。非屬醫療照護場所之
    選擇性負載由發電設備供電者，於下列情形下應另設切換開關供電：
    (一)開關切換時會使發電設備過載。
    (二)發電設備過載時，該負載須被自動卸除。
三、容量：
    (一)重要電力系統額定容量應能滿足所有連接負載之最大實際需量。
    (二)幹線線徑應符合第二章第二節規定。
    (三)發電機組之額定容量應能滿足任何時刻負載之需量。
四、醫院之電源及備用電源得供電給鄰近或同區域之重要電力系統。
五、與其他電路分離：
    (一)安全回路及緊要回路應獨立於其他配線及設備，且不得進入其他配線
        之管槽、線盒或配電箱。但符合下列情形之一者，不在此限：
        1.切換設備封閉箱體。
        2.由二個電源供電之出口或緊急照明燈具，或其附掛之共同接線盒。
        3.由同一分路及同一切換開關供電之二個以上電路。
        4.安全回路得與消防設備電源合併為同一電力系統。
    (二)設備回路之配線得與非重要電力系統之電路同一管槽、線盒或電氣箱
        。
六、安全回路及緊要回路之配線應有機械保護，並僅能採用下列規定之配線方
    法：
    (一)非可撓之金屬管槽、全程附有底板或蓋板之金屬電纜架、MI  電纜、
        規格相當於號數 SCH80  之 PVC  管。病患診療區之分路不得採用非
        金屬管槽配線。
    (二)包封於混凝土厚度五十毫米以上之 PVC  管、非金屬可撓導線管或金
        屬管槽。但病患診療區之分路不得採用非金屬管槽配線。
    (三)在下列情形下，得採用金屬可撓導線管及金屬被覆電纜：
        1.預鑄型醫療牆。
        2.辦公室家俱設備。
        3.非可觸及且不致遭受外力損傷之既設牆壁內或天花板上。
        4.有必要可撓連接至設備者。
    (四)用電設備或器具之可撓軟線或可撓電纜，用於連接至重要電力系統。
七、由重要電力系統供電之插座本體或其蓋板，應有明顯可區別之顏色或可快
    速辨識之標識。

第六百二十四條
醫院內病患診療所需之照明、用電設備或器具連接至重要電力系統者，應依第
六百二十五條及第六百二十六條規定分成安全回路及緊要回路。
醫院重要電力系統之安全回路及緊要回路應連接至備用電源，該電源能於經常
電源中斷後十秒內供電，使其所有功能可依序自動恢復運轉。

第六百二十五條
下列規定之醫院照明、插座及用電設備或器具應連接至重要電力系統之安全回
路：
一、走廊、通道、樓梯間、逃生門之平臺及所有通往出口必要之逃生路徑照明
    。
二、出口及出口方向之標示燈。
三、下列警報及警戒系統：
    (一)火災警報。
    (二)非易燃性醫療用氣體管路系統之警報。
    (三)有效操作安全逃生系統所需之設施。
四、於緊急狀況期間，用於發布指令之醫院通訊系統。
五、發電機組場所：
    (一)工作照明。
    (二)緊急照明之電池充電器。
    (三)位於發電機組及重要電力系統切換開關所在之特定插座。
六、發電機運轉所需之重要附屬設備，且連接至安全回路或經過電流保護裝置
    連接至發電機之輸出端子。
七、升降機車廂內之照明、控制、通訊及信號系統。
八、建築物出口之自動門。

第六百二十六條
下列規定之醫院照明、插座及用電設備或器具，及與病患診療有關之特殊電源
電路，應由重要電力系統之緊要回路供電：
一、緊要診療區內使用麻醉氣體、工作照明、特定插座及固定式設備或器具。
二、隔離電源系統。
三、下列病患診療空間之工作照明及特定插座：
    (一)嬰兒房。
    (二)醫藥準備區。
    (三)配藥區。
    (四)特定急性護理區。
    (五)精神科病床區，不含插座。
    (六)治療室。
    (七)護理站。
四、病患特殊診療增加之工作照明及插座。
五、護士呼叫系統。
六、血液、骨頭及組織之庫房。
七、電話、資訊之設備室及機櫃。
八、下列之工作照明、特定插座及特定電源電路：
    (一)一般診療區之病床，每一病房至少一個雙連插座。
    (二)血管造影室。
    (三)心導管室。
    (四)冠狀動脈診療器具。
    (五)血液透析室或區域。
    (六)急診室之特定治療區域。
    (七)生理實驗室。
    (八)加護病房。
    (九)手術恢復室。

第六百二十七條
醫院重要電力系統之設備回路應連接至備用電源，使第一款規定之用電設備或
器具能於重要電力系統啟動後，得於適當之時間延遲後自動恢復運轉，並隨後
連接至第二款規定之設備或器具。
一、下列設備或器具得安排延遲自動連接至備用電源；必要時得自動依序順延
    連接至備用電源，以免發電機過載：
    (一)提供醫療及外科功能之中央真空系統，包含控制裝置。
    (二)污水幫浦及主要設施安全運轉所需之其他設備，包含其輔助控制系統
        及警報。
    (三)提供醫療及外科功能之壓縮空氣系統，包含控制裝置。
    (四)廚房油煙罩內部或下方發生火災時，必須運轉之廚房油煙罩供氣或排
        氣系統。
    (五)空氣傳染隔離室、防護環境室、實驗室氣罩之排氣扇、使用放射性物
        質之核子醫學區、乙烯氧化物及麻醉劑排氣之供氣、回風及排氣之通
        風系統。不適合延遲自動連接時，此通風系統得接至緊要回路。
    (六)手術室及產房之供氣、回風及排氣通風系統。
    (七)電話、資訊科技設備室及機櫃之供氣、回風、排氣等通風空調系統。
二、下列設備或器具得自動或手動延遲連接至備用電源：
    (一)升降機。
    (二)高壓治療設施。
    (三)減壓治療設施。
    (四)自動門。
    (五)電熱消毒鍋。
    (六)前款及本款所列設備之控制裝置。
    (七)其他經指定之設備或器具。

第六百二十八條
護理之家及長照機構之重要電力系統應符合第六百二十九條至第六百三十二條
規定。提供病患電力維生設備之醫療照護者，其重要電力系統應符合第六百二
十二條至第六百二十七條規定。
緊鄰醫院或與醫院同一院區內之護理之家及長照機構，得由該醫院供電給其重
要電力系統。

第六百二十九條
護理之家及長照機構之重要電力系統電源裝設依下列規定辦理：
一、重要電力系統應至少有二個獨立電源，一個為經常電源，通常供電給整個
    電力系統，及一個以上備用電源，於經常電源中斷時供電。
二、備用電源應為原動機驅動之發電機，且位於用戶配線系統。但為下列情形
    者，不需位於用戶配線系統：
    (一)經常電源發電機組以外之其他發電機組。
    (二)經常電源發電機組以外之外部電業供電。
    (三)電池系統或整合於設備之自給式電池。

第六百三十條
護理之家及長照機構之重要電力系統裝設依下列規定辦理：
一、重要電力系統應具備安全回路及設備回路二種獨立之回路，於經常電源中
    斷期間，供應安全逃生及該機構有效運轉重要部分所需之最低限度照明及
    電力。
二、重要電力系統每一回路應有一個以上切換開關。該系統為一百五十千伏安
    以下者，其一個以上回路得由同一個切換開關供電。
三、重要電力系統容量應能滿足每一回路上所有功能及設備運轉之一次需量。
四、安全回路應獨立於其他配線及設備，且不得進入其他配線之管槽、線盒或
    配電箱。但符合下列情形之一者，不在此限：
    (一)切換開關。
    (二)由二個電源供電之出口或緊急照明燈具，或其附掛之共同接線盒。
    (三)安全回路得與消防設備電源合併為同一電力系統。
五、由重要電力系統供電之插座本體或其蓋板，應有明顯可區別之顏色或可快
    速辨識之標識。

第六百三十一條
護理之家及長照機構重要電力系統之安全回路應連接至備用電源，該電源能於
經常電源中斷後十秒內供電，使其所有功能可依序自動恢復運轉。
前項系統之安全回路應供電給下列規定之照明、插座及用電設備或器具，除消
防設備外不得與其他負載共用安全回路：
一、走廊、通道、樓梯間、逃生門之平臺及所有通往出口必要之逃生路徑照明
    。
二、出口及出口方向之標示燈。
三、下列警報及警戒系統：
    (一)火災警報。
    (二)非易燃性醫療用氣體管路系統之警報。
四、於緊急狀況期間，用於發布指令之通訊系統。
五、用餐及休閒區之照明，包括至其出口通道。
六、發電機組場所內之工作照明及特定插座。
七、升降機車廂內之照明、控制、通訊及信號系統。

第六百三十二條
護理之家及長照機構重要電力系統之設備回路應連接至備用電源，使第一款規
定之用電設備或器具能於安全回路恢復運轉後，得於適當之時間延遲後自動恢
復運轉，並藉自動或手動延遲運轉使其再連接至第二款規定之設備或器具。
一、下列設備或器具得連接至設備回路，並能自動延遲連接至備用電源：
    (一)醫藥準備區、配藥區、護理站之病患診療區工作照明及特定插座。
    (二)污水幫浦及主要設施安全運轉所需之其他設備，包含其輔助控制系統
        及警報。
    (三)廚房油煙罩內部或下方發生火災時，必須運轉之廚房油煙罩供氣或排
        氣系統。
    (四)空氣傳染隔離室之供氣、回風及排氣之通風系統。
二、升降機得連接至設備回路，並能延遲自動或手動連接至備用電源。

第六百三十三條
其他醫療照護場所之重要電力系統依下列規定辦理：
一、重要電力系統應為電池系統或發電機系統，並依第九章第一節規定裝設。
二、設有緊要診療區，或有必要裝設電力維生設備者，應符合第六百二十二條
    至第六百二十七條規定。

        第三款  吸入式麻醉區域
第六百三十四條
麻醉區域之危險區域如下：
一、第一類第一種場所或 1  區：
    (一)使用區域：使用易燃性麻醉劑之整個區域從地板向上至一‧五米處之
        空間，屬第一類第一種場所或 1  區。其超過一‧五米至天花板之剩
        餘空間，屬第一類第一種場所或 1  區上方區域。
    (二)儲存區域：儲存易燃性麻醉劑或揮發易燃性消毒劑之任何房間或區域
        ，從地板向上至天花板之區域屬第一類第一種場所或 1  區；儲存容
        器內屬 0  區。
二、非分類場所：使用非易燃性麻醉劑之任何吸入式麻醉區域，屬非分類場所
    。

第六百三十五條
麻醉區域之配線及用電設備或器具裝設依下列規定辦理：
一、位於第一類第一種場所或 1  區內部：
    (一)除第六百四十六條及第六百四十七條規定外，電力電路全部或部分位
        於第一類第一種場所或 1  區內部，應採用隔離電源系統，使其與任
        何配電系統隔離。
    (二)使用隔離電源系統之場所，應採用適用之隔離電源設備，其設計及裝
        設應依第六百四十六條及第六百四十七條規定辦理。
    (三)線間運轉電壓超過十伏特之所有固定式配線及設備、可攜式設備或器
        具，包含燈泡，應為適用於其所裝設之環境，並應符合第一類第一種
        場所或 1  區之相關規定。
    (四)線盒、配件或封閉箱體僅有局部位於第一類第一種場所或 1  區，該
        場所範圍應延伸包含整個線盒、配件或封閉箱體。
    (五)插座與附接插頭應為適用於第一類 C  群場所者，並附有供接地導線
        連接之處。
    (六)可撓軟線用於第一類第一種場所或 1  區連接可攜式設備或器具，包
        含線間運轉電壓超過八伏特之燈泡，應為適用於其所裝設場所者，並
        內含一條設備接地導線，以供接地。
    (七)對可撓軟線應備有收納裝置，且該裝置不得使軟線之彎曲半徑小於七
        十五毫米。
二、位於第一類第一種場所或 1  區上方區域：
    (一)導線應採用金屬導線管、MI  電纜或具連續性氣密金屬被覆之金屬被
        覆電纜配線。
    (二)固定式照明燈具之燈泡及燈座、斷流器、開關、發電機、電動機，或
        有開閉或滑動接點之其他設備，可能產生電弧、火花或熱金屬微粒者
        ，應為全密閉型，或其構造應能避免火花或熱金屬微粒逸散。但壁式
        插座不在此限。
    (三)外科用及其他照明燈具裝設應符合第四百九十條第二款規定。但符合
        下列規定者，不在此限：
        1.未達第四百九十條第二款第一目規定之表面溫度限制。
        2.位於上方之內建式或懸吊式開關，不會下降至第一類第一種場所或
          1 區，照明燈具不需為防爆（XP）型或耐壓防爆「d」型。
    (四)密封應依第四百七十五條至第四百七十九條規定裝設適用之密封裝置
        ，且裝設之水平與垂直邊界，依第四百七十五條第四款規定。
    (五)標稱電壓一百五十伏特以下之插座及附接插頭應為醫院等級。
    (六)使用額定二百五十伏特供連接五十安培及六十安培交流醫療設備或器
        具用之插座及附接插頭者，該插座額定不得小於附接插頭。
三、位於非分類場所：
    (一)導線應採用金屬管槽、MI  電纜或金屬被覆電纜配線。但懸吊高度自
        地板起算超過一‧八米者，不在此限。
    (二)標稱電壓一百五十伏特以下之插座及附接插頭，應為醫院等級。
    (三)採用額定二百五十伏特供連接五十安培及六十安培交流電醫療設備或
        器具之插座及附接插頭，該插座額定不得小於附接插頭。

第六百三十六條
在麻醉區域內，所有金屬管槽、金屬被覆電纜及固定式用電設備或器具之非帶
電部分，應連接至設備接地導線。但設備線間運轉電壓不超過十伏特者，不在
此限。
第一類場所之接地及搭接應符合第四百八十三條規定。

第六百三十七條
麻醉區域之接地電源系統裝設依下列規定辦理：
一、電源系統應裝設一個以上附電池供電之照明裝置。該裝置得接自該區域之
    照明緊要回路，且連接在任一現場照明開關電源端。
二、分路僅供電給永久裝設於第一類第一種場所或1區上方及非分類場所之固
    定式治療及診斷設備或器具，符合下列規定者，得由被接地系統單相或三
    相供電：
    (一)被接地電路與隔離電路之配線不裝設於同一管槽或電纜。
    (二)設備或器具之所有導電性表面均連接至設備接地導線。
    (三)除封閉式 X  光管及接至 X  光管之導線外，第一類第一種場所或 1
        區上方設備位於地板上方二‧五米以上或麻醉區域之外。
    (四)被接地分路之開關位於第一類第一種場所或 1  區之外。
三、分路僅供電給固定式照明燈具，符合下列規定者，得由被接地系統供電：
    (一)燈具位於地板上方二‧五米以上。
    (二)燈具之所有導電性表面均連接至設備接地導線。
    (三)供電給燈具之電路配線不與供電給隔離電力之電路裝設於同一管槽或
        電纜。
    (四)開關為壁式，且位於第一類第一種場所或 1  區上方。惟非分類場所
        不適用。
四、運轉電壓二十四伏特以下遙控開關之壁式遙控裝置，得裝設於麻醉區域。
五、若使用隔離電源系統者，應採用適用之隔離電源設備；其設備及電源電路
    若裝設於第一類第一種場所或 1  區上方或非分類場所者，得位於麻醉區
    域。
六、除前款規定外，麻醉區域之電源電路全部或部分位於第一類第一種場所或
    1 區內部，應與任何供電給非麻醉區域之配電系統隔離。

第六百三十八條
麻醉區域之特別低壓用電設施或儀器依下列規定辦理：
一、經常與人體碰觸，或有暴露帶電部分之特別低壓設備或器具，應符合下列
    規定之一：
    (一)運轉電壓十伏特以下。
    (二)為本質安全或為雙重絕緣之設備。
    (三)具有耐濕性。
二、特別低壓設備或器具應由下列規定之一供電：
    (一)以專用之附插頭可撓軟線連接獨立可攜式隔離變壓器至隔離電路插座
        ，且不採用自耦變壓器。
    (二)裝設於非分類場所之一般低壓隔離變壓器。
    (三)獨立乾式電池。
    (四)位於非分類場所之蓄電池組。
三、供電給特別低壓電路之隔離變壓器一次側電路至二次側電路應加以絕緣，
    其鐵心及外殼應連接至設備接地導線。
四、電阻及阻抗裝置不用於分壓作為限制設備之最大可用電壓者，得用於控制
    低壓設備或器具。
五、由電池供電之設備或器具，除其充電電路內含隔離型變壓器外，運轉時不
    得充電。

        第四款  X光設備
第六百三十九條
裝設 X  光設備電源電路依下列規定辦理：
一、固定式及定置式之 X  光設備連接電源之配線方法，應依本節本款規定辦
    理本節本款未規定者，應依第一章至第四章之適用規定辦理。但由額定三
    十安培以下分路供電之設備，得透過專用之附接插頭及適用所裝設環境之
    電纜或可撓軟線供電。
二、可攜式、移動式及運送式之 X  光設備額定電流不大於六十安培者，得免
    使用專用分路。
三、線路及設備之運轉電壓超過六百伏特者，應依第八章之適用規定辦理。

第六百四十條
X 光設備之隔離設備依下列規定辦理：
一、電源電路應裝設隔離設備，其容量為 X  光設備瞬間額定輸入百分之五十
    以上，或長時及其他額定輸入百分之一百，二者取其較大者。
二、隔離設備應裝設於 X  光控制位置可輕易觸及處。
三、X 光設備連接至一百十伏特、三十安培以下分路，得以匹配額定之接地型
    附接插頭及插座作為隔離設備。

第六百四十一條
X 光設備電源導線及過電流保護裝置之額定依下列規定辦理：
一、診斷設備：
    (一)分路導線安培容量及過電流保護裝置之安培額定，不得小於瞬間額定
        百分之五十，或長時及其他額定百分之一百，二者取其較大者。
    (二)幹線：
        1.供電給二個以上 X  光設備回路幹線之導線安培容量及過電流保護
          裝置安培額定，不得小於最大設備瞬間額定百分之五十，加上次大
          設備瞬間額定百分之二十五，再加上其他所有設備瞬間額定百分之
          十。
        2.若 X  光設備同時進行雙面檢查該雙面 X  光設備應以瞬間額定百
          分之一百計算。
二、治療設備導線安培容量及過電流保護裝置安培額定，不得小於 X  光治療
    設備額定電流百分之一百。

第六百四十二條
X 光設備及其輔助設備之控制電路及運轉電路，若使用二十安培以下之過電流
保護裝置者，得採用一‧○平方毫米或一‧二五平方毫米之用電器具引接線及
可撓軟線。

第六百四十三條
X 光設備用之電容器應裝設於絕緣材質或被接地之金屬封閉箱體內。

第六百四十四條
連接至 X  光管及影像增強器之被接地遮蔽電纜，得與 X  光設備控制及電源
導線敷設於同一電纜架或使用同一電纜，不需隔離。

第六百四十五條
X 光設備之防護及接地依下列規定辦理：
一、高壓組件：
    (一)X 光管等所有高壓組件，應裝設於被接地封閉箱體內，且採用空氣、
        油、氣體或其他適合之絕緣介質，使高壓組件與封閉箱體絕緣。
    (二)自高壓設備連接至 X  光管及其他高壓組件，應採用高壓遮蔽電纜。
二、低壓電纜連接至未完全密封之變壓器、冷凝器、油冷卻器及高壓開關等充
    油設備，其絕緣應為耐油型。
三、X 光設備及其附屬設備，包括控制器、金屬桌、X 光管支架、變壓器槽體
    、遮蔽電纜及 X  光管頭等之非帶電金屬部分，除依第六百十五條規定辦
    理外應依第二章第五節或第八章第四節規定之方法連接至設備接地導線。

        第五款  隔離電源系統
第六百四十六條
於醫療照護場所裝設隔離電源系統依下列規定辦理：
一、隔離電路：
    (一)每一隔離電路應由開關或斷路器控制，使該電路每一條導線有一開關
        極，以同時切斷該電路所有電源。
    (二)電路應藉由裝設一個以上隔離變壓器、發電機組或隔離電池加以隔離
        。
    (三)隔離電路之導線應採用專用管槽或封閉箱體。
二、電路特性：
    (一)隔離變壓器電壓不得超過六百伏特，一次側應裝設過電流保護裝置，
        二次側電路應為非接地且每一條導線應有過電流保護裝置。
    (二)由電池或電動發電機組直接供電之電路應為非接地，且採用與變壓器
        二次電路相同方式之過電流保護。
    (三)若有靜電遮蔽時，應連接至參考接地點。
三、隔離變壓器、電動發電機組、電池與電池充電器，及附屬之一次側或二次
    側過電流保護裝置，不得裝設於第四百六十四條第一項規定之危險場所。
    隔離之二次側電路配線延伸進入麻醉危險場所者，其裝設應符合第四百七
    十四條規定。
四、一個隔離變壓器不得供電給超過一間之手術室，且麻醉觀察室視為手術室
    之一部分。但符合下列規定之一者，不在此限：
    (一)作為一間以上手術室之觀察室，得由任一間手術室隔離變壓器供電給
        該觀察室。
    (二)符合下列規定者，隔離變壓器得同時供電給數個病患區之較高電壓單
        連插座：
        1.供電給可攜式 X  光設備等一百五十伏特以上設備之專用插座。
        2.插座及其插頭與該區隔離電源系統之插座不能互用。
五、導線識別：
    (一)第一條隔離電路導線：橘色，且整條至少有一條非白色、綠色或灰色
        之特別顏色條紋。
    (二)第二條隔離電路導線：棕色，且整條至少有一條非白色、綠色或灰色
        之特別顏色條紋。
    (三)三相系統之第三條隔離電路導線：黃色，且整條至少有一條非白色、
        綠色或灰色之特別顏色條紋。
    (四)若隔離電路導線供電給單相一百十伏特、十五安培及二十安培插座，
        橘色有條紋導線應連接至被接地電路導線連接之插座端子。
六、拉線膏會增加介電常數者，不得用於隔離供電系統之二次側導線。

第六百四十七條
醫療照護場所隔離電源系統之線路隔離監視依下列規定辦理：
一、隔離監視器：
    (一)除一般控制及過電流保護裝置外，每一隔離電源系統應裝設連續運轉
        之線路隔離監視器，以顯示總危險電流。
    (二)隔離監視器應有信號燈，可使其供電區內之人員持續可視及，當系統
        與大地有正常隔離時，該信號燈維持點亮之狀態。
    (三)在標稱線路電壓情形下，任一隔離導線對地之總危險電流含可能之電
        阻及電容洩漏電流，達到五毫安，或任一隔離導線絕緣電阻五十千歐
        姆（kΩ） 以下之門檻值時，毗鄰之信號燈及音響式警告信號應啟動
        。若有需要，警告信號可設在遠端。
    (四)若故障危險電流低於三‧七毫安，或總危險電流低於五毫安，亦或絕
        緣電阻高於五十千歐姆（kΩ） 之門檻值，線路隔離監視器不得發出
        警報。
    (五)系統得設計成在較低總危險電流門檻值下運作。該系統隔離監視器之
        故障危險電流值不得低於五毫安或絕緣電阻高於五十千歐姆（kΩ）
        門檻值之百分之三十五，且監視危險電流值不得高於降低後總危險電
        流警報門檻值之百分之五十。
二、阻抗：
    (一)當連接至隔離電源系統，且該系統任一點被接地時，線路隔離監視器
        之內部阻抗應能使通過該監視器之內部電流不大於一毫安或絕緣電阻
        高於一百千歐姆（kΩ） 之門檻值。
    (二)線路隔離監視器得為低阻抗型，在隔離電源系統任一點被接地時，通
        過線路隔離監視器之電流不大於警報門檻值之二倍，且時間不超過五
        毫秒。
三、電流計：
    (一)電流計之系統故障危險電流加上監視危險電流之總危險電流應經校正
        ，且設置於線路隔離監視器處明顯可視及範圍內。
    (二)指針型電流計之警報動作區應趨近於刻度之中央。
    (三)線路隔離監視器得為組合之單元，而其感知部分以電纜連結至有警報
        或測試功能所在之獨立顯示面板上。

      第十五節  聚集場所
第六百四十八條
於供商議、宗教活動、娛樂、餐飲、遊戲、交通等用途，聚集一百人以上之全
部或部分建築物內用電設備或器具配線及裝設，應依本節規定辦理。符合第六
百五十二條規定目的之建築物，應依本章第十六節規定辦理；該節未規定者，
應適用本節規定。
展覽會展示攤位臨時用電設備或器具配線及裝設除依本節規定及下列規定外，
應依本章第十九節規定辦理：
一、採用適用於所裝設環境之可撓軟線或可撓電纜，且有保護能防止碰觸者，
    得裝設於地板上。
二、插座出線口得免依第七百零七條規定裝設漏電啟斷裝置。
三、由合格人員維修及管理監督，且所有導線配管或電纜以單一層敷設，電纜
    架上每隔七‧五米掛有此電纜架僅供臨時配線使用之明顯標識者，得敷設
    於臨時配線之電纜架。

第六百四十九條
聚集場所之配線方法依下列規定辦理：
一、固定式配線應採用金屬管槽、全程附有底板或蓋板之金屬電纜架、包封於
    混凝土厚度五十毫米以上之非金屬管槽、MI電纜或金屬被覆電纜。但由合
    格人員維修及管理監督，且使用低煙無毒耐燃電纜者，得敷設於電纜架。
二、非金屬被覆電纜及非金屬導線管得裝設於建築法規未要求防火構造之建築
    物。
三、符合下列規定者，非金屬導線管得裝設於俱樂部、飯店會議室、法庭、餐
    廳、殯儀館、博物館及宗教活動處所：
    (一)隱藏裝設於具有熱屏障材質，至少十五分鐘之防火時效之牆壁、地板
        及天花板內。
    (二)裝設於具有熱屏障材質，至少十五分鐘之防火時效之懸吊式天花板。

第六百五十條
聚集場所之用電設備或器具應採用設備與系統共同接地，並依第八十七條至第
八十九條規定裝設漏電斷路器保護。

第六百五十一條
可攜式開關盤或配電盤之供電依下列規定辦理：
一、可攜式開關盤或配電盤應由匹配容量之電源出線口供電。
二、電源出線口應有過電流保護裝置。
三、電源出線口及過電流保護裝置不得為公眾可觸及。
四、可攜式開關盤或配電盤應有供設備接地導線連接之配電裝置。
幹線安培容量調整依下列規定辦理：
一、供電給三相四線固態相位控制調光系統之幹線，有諧波電流存在者，中性
    線應視為載流導線。
二、供電給三相四線固態正弦波調光系統之幹線，中性線不視為載流導線。
三、同時供電給使用相位控制及正弦波調光器系統之幹線，中性線應視為載流
    導線。

      第十六節  劇院、電影院、電影製片廠及電視攝影棚之觀眾區、表演區
                及類似場所
        第一款  一般規定
第六百五十二條
於供戲劇演出、音樂演奏、電影放映、發表會、電影及電視製作或類似目的之
建築物用電設備或器具配線及裝設，包括室內或室外，及觀眾座位區，應依本
節規定辦理。

第六百五十三條
本節用詞定義規定如下：
一、分路器組合：指二個以上分路之多極連接器組合。
二、引接線槽：指包含懸吊或嵌入插座之金屬導線槽。
三、立燈：指提供舞台上或觀眾席內照明，附有可攜式支架，或具防護功能燈
    架之一般型照明燈具。
四、條燈：指多個燈泡排列成行之照明燈具。
五、腳燈：指裝設在舞台上或舞台中之邊緣燈。
六、舞台邊框：指分隔舞台及觀眾席之牆及拱門。
七、固態相位控制調光器：指穩態電流波形未與所施加電壓波形一致，使其波
    形為非線性之固態調光器。
八、固態正弦波調光器：指穩態電流波形與所施加電壓波形相同，使其波形為
    線性之固態調光器。

第六百五十四條
劇院、電影院、電影製片廠及電視攝影棚之觀眾區、表演區及類似場所之配線
依下列規定辦理：
一、固定式配線應採用金屬管槽、包覆於五十毫米以上混凝土之非金屬管槽
    MI 電纜或金屬被覆電纜。
二、可攜式開關盤、舞台燈光、舞台效果之配線及其他非固定式配線，使用可
    撓軟線或可撓電纜者，不得採用未絕緣之釘子固定。
三、非金屬被覆電纜、金屬被覆電纜、非金屬導線管得裝設於建築法規未要求
    防火結構之建築物。

第六百五十五條
金屬導線管、非金屬導線管內之導線數不得超過表三二八～八規定。
導線槽內所有導線外徑截面積總和，不得超過該導線槽截面積百分之二十。載
流導線得為三十條以上，且導線安培容量得免依表二五～六規定之修正係數計
算。

第六百五十六條
配線之帶電部分應加以封閉或防護。所有開關應為可外部操作。調光器及其可
變電阻應裝設於封閉所有帶電部分之箱體內。

第六百五十七條
供電給一個以上插座之分路，得供舞台燈光組合使用。
插座額定及分路額定不得小於分路過電流保護裝置之安培額定，且不適用第四
十九條第二款第二目規定。

        第二款  固定式舞台開關盤
第六百五十八條
舞台開關盤所在位置應為可輕易觸及，其所有電源分路應有過電流保護裝置。

第六百五十九條
裝設舞台調光器依下列規定辦理：
一、每組調光器之過電流保護裝置安培額定不得大於調光器額定電流一‧二五
    倍，且當供電給該調光器之電源開關或斷路器位於開路位置時，應能隔離
    所有非接地導線。
二、電阻型或電抗型調光器：
    (一)得裝設於電路之被接地導線或非接地導線。
    (二)調光器設計為可啟斷調光器之輸入或輸出電路者，不得啟斷電路之被
        接地導線。但可同時啟斷全部導線者，不在此限。
三、自耦變壓器型調光器之輸入與輸出電路應共用被接地導線。
四、電子固態型調光器：
    (一)當調光器電源有被接地導線時，其輸入與輸出電路應共用被接地導線
        。
    (二)調光器底座應與設備接地導線連接。

第六百六十條
舞台開關盤應為下列一種或多種型式之組合：
一、調光器及開關以機械連動把手操作控制裝置。
二、裝設可從輔助控制台或控制盤以電氣信號操作。
三、具電路交互連接功能之舞台用開關盤作為中繼開關盤，且有過電流保護裝
    置。調光器盤已具備所需之分路過電流保護者，中繼開關盤得免設過電流
    保護裝設。

第六百六十一條
舞台開關盤之幹線依下列規定辦理：
一、供電幹線應為下列規定之一：
    (一)由單一隔離開關隔離之單一幹線。
    (二)多組幹線連結至中繼舞台開關盤：多組幹線為單一系統之一部分者，
        多組幹線之數量不受限制。若經組合後，於管槽中之中性線應有足以
        承載同一管槽中多組幹線產生之最大不平衡電流之安培容量。並聯之
        中性線應符合第二十二條規定。
    (三)多組個別之幹線連結至單一一次舞台開關盤（調光器組）：
        1.連結至單一一次舞台開關盤之每組個別之分散式幹線應有隔離設備
          。
        2.一次舞台開關盤上應有標明隔離設備數量及所在位置之耐久且明顯
          標識。
        3.若隔離設備位於一個以上電源開關盤中，一次舞台開關盤應對應不
          同位置隔離設備所供電之電路以隔板隔開。
二、中性線之安培容量調整：
    (一)供電給三相四線固態相位控制調光系統之幹線，中性線應視為載流導
        線。
    (二)供電給三相四線固態正弦波調光系統之幹線，中性線不視為載流導線
        。
    (三)同時供電給使用相位控制及正弦波調光器系統之幹線，中性線應視為
        載流導線。
三、開關盤之電源供電容量得以開關盤預計控制之最大裝置設備容量計算，且
    過電流保護裝置之開啟不影響出口指示或緊急照明系統之正常運作。

        第三款  開關盤以外之固定式舞台設備
第六百六十二條
固定式舞台回路負載依下列規定辦理：
一、供電給腳燈、固定式條燈及舞台邊框側燈之分路額定應為二十安培以下。
二、額定大於二十安培回路，僅供電給重責務型燈座之電路，其電路得適用第
    二章第二節重責務型燈座供電回路之規定。

第六百六十三條
腳燈、固定式條燈、舞台邊框燈、可攜式條燈至引接線槽之導線絕緣依下列規
定辦理：
一、導線應有匹配其運轉溫度之絕緣，且不得小於攝氏一百二十五度，並應依
    攝氏六十度之導線安培容量規定選用。
二、自引接線槽引出之可撓軟線或可撓電纜之運轉溫度不得小於攝氏九十度，
    並應依攝氏六十度之導線安培容量選用，且其延伸至引接線槽內之長度不
    得超過一百五十毫米。
三、導線安培容量得免按表二五～六規定之修正係數修正。

第六百六十四條
腳燈之配線依下列規定辦理：
一、金屬溝槽：
    (一)腳燈使用金屬溝槽配線者，容納回路導線之溝槽應採用厚度○‧八毫
        米以上，且金屬板應經防鏽處理。
    (二)金屬溝槽至燈座端子間應保持十三毫米以上之間隔。
    (三)回路導線應銲接在燈座端子上。
二、未使用之金屬溝槽：
    (一)腳燈應由個別出線口及燈座構成，且採用金屬導線管、MI  電纜或金
        屬被覆電纜配線。
    (二)回路導線應銲接在燈座端子上。
三、隱藏式腳燈收回至內嵌存放位置時，應能自動斷電。

第六百六十五條
裝設固定式條燈、舞台邊框側燈、懸吊式線盒及引接線槽依下列規定辦理：
一、固定式條燈與舞台邊框側燈應依前條規定配線，並應加以固定及支撐，及
    保護燈泡不受機械性損壞，或與舞台布景、易燃材質意外碰觸之防護措施
    。
二、懸吊式線盒及引接線槽應有固定及支撐，並應為舞台、攝影棚、製片廠用
    之配電裝置。
三、可撓軟線或可撓電纜：
    (一)僅得用於需要導線可撓情形，並有支撐，且適合所裝設環境，安培容
        量符合表三六八規定。
    (二)適合所裝設環境，且未與內含發熱元件設備直接接觸之多芯可撓軟線
        或可撓電纜，承載之最大負載電流不得大於表六六五規定過電流裝置
        之最大額定值。

第六百六十六條
供可攜式舞台燈光設備連接之插座，應為懸吊式或架設於凹槽或封閉箱體內，
其懸吊式線盒及引接線槽之電源電纜應符合前條第三款規定。

第六百六十七條
一切溫度上升較劇之用電器具應裝設於隔熱箱內，並與其他易燃物質保持一百
毫米以上之間隔。
裝設於後台及供人員進入布置舞台布景輔助區域之照明玻璃裸燈泡，與易燃物
間應保持五十毫米以上之間隔，並應加以防護，以免遭受外力損傷。
裝設於舞台布景之裝飾用燈泡，不視為前項規定之後台照明。

第六百六十八條
舞台排煙設備若由配電裝置操作，應至少有二個可外部操作之開關，一個置於
舞台上可輕易觸及處，另一個依消防相關法規規定設置。

        第四款  可攜式舞台開關盤
第六百六十九條
供室外表演用，以輔助電路連接可攜式舞台開關盤至建築物內固定式照明出線
口之連接盤、輔助電路及出線口依下列規定辦理：
一、輔助電路在可攜式開關盤與固定式照明出線口間轉接時，應同時將所有電
    路導線轉接。
二、輔助電路之供電裝置應以分路過電流保護裝置保護。連接盤內每一輔助電
    路應以裝設於該連接盤內之分路過電流保護裝置保護。

第六百七十條
可攜式舞台開關盤之電源依下列規定辦理：
一、僅得由匹配之額定電壓與額定電流之電源出線口供電，其電源出線口應包
    含僅可外部操作、封閉之熔線開關或斷路器，架設在舞台上，或自舞台地
    板可輕易觸及之永久式開關盤上。
二、可攜式開關盤應提供設備接地導線連接用之配電裝置，其中性線應符合第
    六百六十一條第二款規定。

第六百七十一條
裝設可攜式舞台開關盤依下列規定辦理：
一、可攜式舞台開關盤應裝設於堅固封閉箱體內，且於運轉時可打開箱體。
二、所有開關及斷路器應為可外部操作。
三、調光器端子應裝設於封閉箱體內，調光器面板之配置應能避免意外碰觸面
    板接點。
四、封閉箱體內應附有指示燈，且應連接至開關盤之電源電路，確保在主開關
    啟斷時不會切斷指示燈泡之電源。指示燈應有專用分路，其過電流保護裝
    置安培額定應為十五安培以下。
五、電源導線：
    (一)應為適用於所裝設環境之可撓軟線或可撓電纜，其終端應位於開關盤
        之封閉箱體內，且接至可外部操作之附熔線主開關、斷路器或適用之
        連接器組件。
    (二)單芯電纜：
        1.可攜式電源單芯電纜組合之截面積不得小於三十八平方毫米。設備
          接地導線線徑不得小於十四平方毫米。作為被接地導線或中性線之
          單芯電纜線徑，應符合第八款第二目規定。
        2.多條單芯電纜並聯以增加安培容量者，其線徑及長度應為一致，並
          加以分組，非綑綁成束。設備接地導線得依表九三～二規定選定。
六、電源導線得經連接器分接，於電源供應點與開關盤間之總長度為三十米以
    下者，最多可有三組互連點。超過三十米者，每三十米可增加一組互連點
    。
七、電源導線及連接器應有防護以免遭受外力損傷；其防護方法不限採用管槽
    配線。
八、中性線：
    (一)中性線端子：
        1.可攜式開關盤設備供電給三相四線系統者，電源中性線端子及相關
          匯流排或其等效配線之額定電流，應為最大非被接地電源端導線安
          培容量之二倍以上。
        2.可攜式開關盤平衡三相四線系統供電，轉換為由平衡單相三線系統
          供電者，電源中性線端子及相關匯流排或其等效配線之額定電流，
          應至少為最大非被接地單相電源端導線安培容量。
    (二)電源中性線：
        1.供電給固態相位控制調光器使用者，中性線應視為載流導線。
        2.僅供電給固態正弦波調光器使用者，中性線不視為載流導線。
        3.多相幹線回路使用單芯電纜且非裝設於管槽內，而供電給內含固態
          相位控制調光器者，中性線之安培容量應為供電回路非接地導線安
          培容量一‧三倍以上。該幹線僅供電給內含固態正弦波調光器者，
          中性線之安培容量應至少為供電回路非接地導線之安培容量。
九、可攜式電源導線之裝設、電源連接器與其他電源之連接與隔離，及電源設
    施之送電與斷電，應由合格人員執行且在開關盤上應有標明應由合格人員
    執行之耐久且明顯標識。可攜式開關盤連接至固定式電源插座，其過電流
    保護裝置安培額定為一百五十安培以下，且插座、中間接續及開關盤符合
    下列規定者，得由非合格人員執行連接：
    (一)使用適合每一電源連接用途之多極連接器。
    (二)防止民眾接近電源連接。
    (三)採適用於所裝設環境之多芯可撓軟線或可撓電纜，其安培容量不小於
        負載及連接器電流額定。

        第五款  開關盤以外之可攜式舞台設備
第六百七十二條
弧光燈及相關安定器連結用之可撓軟線或可撓電纜，應為適用於所裝設環境者
。

第六百七十三條
內含插座及過電流保護裝置之可攜式配電箱盒裝設依下列規定辦理：
一、箱盒應為無暴露帶電部分之構造。
二、插座及過電流保護：
    (一)插座於箱盒內應有分路過電流保護。
    (二)熔線及斷路器應有防護以免遭受外力損傷。
    (三)懸吊式插座或附軟線連接器之可撓軟線或可撓電纜應為適用於所裝設
        環境者。
三、匯流排之安培容量應為所有回路電流額定之總和，且應提供電源電纜之接
    線端子。
四、電纜穿過封閉箱體處應以護套保護，並能防止電纜拉力傳至接線端子。

第六百七十四條
裝設可攜式燈軌應依第六百六十五條第一款固定式條燈與舞台邊框側燈之裝置
規定辦理。
電源電纜經過金屬處應以護套保護，且能防止電纜拉力傳至連接點。

第六百七十五條
於燈串上配線之接點應交互錯開。燈座之端子為可穿透絕緣與導體接觸者，僅
得選用絞線型導體。封閉於易燃材質之燈罩或類似裝置內之燈泡，應有避免引
燃易燃材質之防護。

第六百七十六條
可攜式舞台設備之導線依下列規定辦理：
一、供電給可攜式舞台設備之可撓導線，包含其延伸線，應為適用於所裝設環
    境之可撓軟線或可撓電纜。
二、導線安培容量應符合表三六八規定。若為未與具發熱元件設備直接碰觸之
    可攜式多芯軟線，其安培容量得依表六六五規定選用。
三、適用於所裝設環境之可撓軟線無遭受外力損傷之虞，且過電流保護裝置安
    培額定為二十安培以下者，得作為立燈之電源導線。
四、分路器組合符合下列規定者，得採用適用之可撓軟線：
    (一)軟線連接包含二個以上分路之單一多極式連接器。
    (二)軟線在分路器組合中最長不超過六米。
    (三)分路器組合整體長度附著於堅固之支撐物，可免遭受外力損傷。
    (四)供電給分路器組合之所有分路，有額定二十安培以下過電流保護裝置
        。

        第六款  舞台化妝室
第六百七十七條
懸吊式照明燈具不得裝設於舞台化妝室內。

第六百七十八條
舞台化妝室內化妝鏡附近，或化妝台上方之所有燈具及插座，應由裝設於化妝
室牆壁之開關控制。裝設於化妝室內之其他出線口得免設置開關。
前項開關應於化妝室外門口附近設置帶電指示燈。

      第十七節  電視攝影棚、電影製片廠及類似場所
第六百七十九條
除第六百五十二條規定外，於使用軟片或電子式攝影機，可隔離外在噪音及自
然光，供娛樂事業製作電視、電影或商業廣告使用之攝影棚或製片廠，及處理
寬度超過二十二毫米軟片或膠卷之曝光、顯影、印製、剪接、編輯、倒帶、修
復或儲存之影片交換所、工廠、實驗室或建築物之一部分內用電設備或器具配
線及裝設，應依本節規定辦理。

第六百八十條
本節用詞定義規定如下：
一、製片場景：指電視或電影製作中，為特定畫面而設計與布置之臨時性布景
    及道具所構成之特定區域。
二、場燈開關：指供可攜式之可撓軟線或可撓電纜連接，固定於牆壁可外部操
    作之安全開關。
三、場景效果產生器：指造風機、雷擊模擬器、日落投影機等用於模擬特殊視
    覺或聽覺效果之電氣或電動機械之設備。

第六百八十一條
攝影棚或製片廠舞台或場景之固定式配線應採用 MI 電纜、金屬被覆電纜或其
他管槽配線並內含或附加一條設備接地導線，其線徑符合表九三～二規定。

第六百八十二條
攝影棚或製片廠之可攜式配線依下列規定辦理：
一、場景之配線：
    (一)場景燈光之配線及其他未固定於該場地之供電配線，應採用適用於所
        裝設環境之可撓軟線或可撓電纜。
    (二)暴露於易遭受外力損傷之處，應採用適用於所裝設環境之可撓軟線或
        可撓電纜。
    (三)若全部連接之負載未大於電纜之最大安培容量，電纜得有接續或分接
        。
二、場景效果產生器及場景道具之導線若有防護可免遭受外力損傷，且使用電
    纜綑綁線或絕緣Ｕ型釘固定在布景上者，得採用可撓軟線或可撓電纜。

第六百八十三條
作為攝影棚或製片廠場景照明及效果之開關應為可外部操作者。

第六百八十四條
攝影棚或製片廠之帶電部分封閉及防護依下列規定辦理：
一、帶電部分應加以封閉或防護，以防止人員及物體意外碰觸。
二、所有開關應為可外部操作。
三、變阻器應裝設於可封閉所有帶電部分之箱體或箱櫃內，僅外露操作把手。
四、場燈開關、外景燈光控制盤、多組接頭連接器及插座箱之載流組件應封閉
    保護或裝設於人員不會意外碰觸之處。

第六百八十五條
攝影棚或製片廠之可攜式照明燈具及工作立燈應採用可撓軟線，配裝聚合物燈
座或金屬被覆陶瓷燈座，並有堅實保護裝置。
前項照明燈具不包含道具用之可攜式燈具。

第六百八十六條
攝影棚或製片廠之可攜式弧光燈裝設依下規定辦理：
一、可攜式碳棒弧光燈應牢固裝設，並置於封閉箱體阻擋火花與碳粒，及防止
    人員或物體接觸弧光或裸露之帶電部分，且該箱體須有通風。所有開關應
    為可外部操作。
二、可攜式非碳棒弧光放電管燈及其附屬安定器應適用於攝影棚或製片廠者。
    互相連結之軟線組、軟線及電纜，應為適用於所裝設環境者。

第六百八十七條
攝影棚或製片廠場景照明燈具及其供電電纜應有自動過電流保護裝置，並符合
下列規定其絕緣導線、電纜或可撓軟線之最大安培容量應依第二章第一節、第
四章第九節及第八章第一節規定。
一、供電給場景照明燈具之電纜應有符合第二章第一節、第四章第九節及第八
    章第一節規定安培容量之過電流保護裝置。
二、幹線：
    (一)主要供電影製作之場所，其場景之幹線應有過電流保護裝置。該保護
        裝置得為多極或單極連動操作。
    (二)中性線得免裝設過電流保護裝置。
    (三)每一幹線過電流保護裝置安培額定不得大於第二章第一節及第八章第
        一節規定之安培容量。
三、電纜保護：
    (一)電纜穿過封閉箱體處應以護套保護，且能防止電纜拉力傳至連接點。
    (二)於電源導線經過鐵磁金屬處，應符合第三百零一條規定保持磁場平衡
        。
    (三)符合下列規定者，可攜式幹線電纜得臨時穿過具防火等級之牆、地板
        或天花板：
        1.開口為不可燃材質。
        2.於使用時，穿越處使用同等防火等級之阻燃材質，臨時加以密封。
        3.於未使用時，開口使用同等防火等級之材質加以覆蓋。
四、遙控場景燈光控制盤內之過電流保護裝置安培額定，不得大於負載側電纜
    安培容量。
五、使用在錄音棚及拍攝場所之交流電配電箱，應有具極性之接地型插座。

第六百八十八條
攝影棚及製片廠之幹線選用依下列規定選定：
一、表六八八規定之需量因數得用於攝影棚或製片廠之場景照明之最大可能連
    接負載，以選定主場景開關盤、場景配電站或場景燈光控制盤所有固定安
    裝之幹線。
二、可攜式幹線得採用最大可能連接負載百分之五十之需量因數。

第六百八十九條
攝影棚或製片廠之 MI 電纜、金屬被覆電纜、金屬管槽、用電器具之非帶電金
屬部分、配電裝置及設備應連接至設備接地導線。但直流對地運轉電壓一百五
十伏特以下之可攜式設備或器具，不在此限。

第六百九十條
攝影棚或製片廠之單極可攜式電纜連接器應為扣鎖型，其裝設應依第六百七十
一條第九款規定辦理。

第六百九十一條
攝影棚或製片廠內供電給插座之分路，得供電給場景燈光負載。

第六百九十二條
攝影棚或製片廠化妝室內固定式配線應符合第四章之適用規定。

第六百九十三條
修補、檢視、剪接工作檯之燈具應有避免遭受外力損傷、接觸及刮傷底片之防
護，且配裝聚合物燈座或金屬被覆陶瓷燈座。

第六百九十四條
攝影棚或製片廠可攜式變電站之配線及設備應符合固定式變電站之相關規定。
在使用空間有限情況下，設備之配置使操作人員及鄰近區域人員不致意外感電
者，其工作空間得予縮減。

      第十八節  隧道、礦坑等場所
第六百九十五條
隧道、礦坑等場所內不易遭受外力損傷之處得採用適用之電纜配線。

第六百九十六條
在人行隧道內裝設低壓線路者，依下列規定辦理：
一、線路應裝設於隧道兩側距離路面、軌面高度二‧五米以上之處。
二、線路應採用金屬導線管、非金屬導線管或電纜配線。

第六百九十七條
在礦坑及其他坑道內裝設線路者，依下列規定辦理：
一、低壓線路應依前條規定辦理。
二、高壓線路應採用電纜配線，在易遭受外力損傷之處應加裝防護設備。

第六百九十八條
隧道、礦坑等場所之金屬導線管及電纜金屬被覆應採用第三種接地。

第六百九十九條
開關及過電流保護裝置應裝設於隧道、礦坑等場所之入口，其保護箱體應為耐
候型。

第七百條
隧道、礦坑等場所內出線頭處應裝設矮腳燈頭、金屬吊管或彎管。接用於探視
燈等需要移動者，應採用電纜或鋼皮軟管線。

第七百零一條
隧道、礦坑等場所之用戶用電線路與電信線路、水管、燃氣供給管路及其他金
屬物之間隔依下列規定辦理：
一、低壓線路應保持一百五十毫米以上之間隔。但採用金屬導線管或電纜配線
    者，不在此限。
二、高壓線路應保持六百毫米以上之間隔。但採用電纜配線者，得減至三百毫
    米。

      第十九節  臨時用電場所
第七百零二條
臨時用電與臨時照明之配線及保護，應依本節規定辦理。
用戶臨時配線及保護除依本節規定外，應符合本規則永久配線之適用規定。
臨時配線方法僅適用於供臨時裝設。

第七百零三條
符合下列情形者，得裝設臨時電力與照明：
一、於建築物、設備之建造、改建、保養、維修、拆解或其他類似作業期間。
二、於緊急情況、測試、試驗及開發之工作期間。
三、慶祝節慶或舉辦民俗活動。
四、非永久性之展覽會。
五、宣傳、娛樂使用之放映機。
施工完成或裝設臨時用電之目的已達成時，應立即移除臨時用電設備。

第七百零四條
於臨時用電場所裝設用電設備或器具依下列規定辦理：
一、進屋線應依第二章第三節規定裝設。
二、幹線及分路：
    (一)導線得為適用於所裝設環境之電纜或多芯可撓軟線。
    (二)非金屬被覆電纜得裝設於住宅場所或建築物，且無高度限制、無建造
        類型限制，並不須隱藏於牆壁、地板或天花板內。
    (三)單芯絕緣導線得裝設於緊急期間供測試、試驗及開發工作，且僅合格
        人員可觸及之臨時用電設備。
    (四)導線應裝設符合第七十九條、第八十條、第九百十九條及第九百二十
        條規定之過電流保護裝置。
三、所有插座應為接地型。所有分路應附有一條獨立設備接地導線，且所有插
    座應與設備接地導線電氣性連接。施工現場之插座不得由臨時照明分路供
    電。
四、隔離設備：
    (一)每個臨時電路之所有非接地導線應裝設隔離設備。
    (二)多線式分路應有可在其引接電源之出線口或配電箱處同時隔離所有非
        接地導線之隔離設備。
五、照明燈具應有防護，以防止意外碰觸或破損。
六、導線管或金屬被覆電纜系統若轉換裝設方式時，應裝設線盒、管匣或終端
    配件，且導線應有護圈保護。在施工現場，電路導線若為電纜或多芯可撓
    軟線，並可維持設備接地連續性者，該導線之接續得免使用線盒。
七、可撓軟線或可撓電纜應有防護，避免銳角、突出物或意外事故造成損傷；
    在經過出入口或其他夾擠處亦應有防護，避免損壞。
八、可撓軟線或可撓電纜進入含有終端裝置之封閉箱體，應以配件固定於封閉
    箱體內。
九、支撐：
    (一)電纜或可撓軟線應以電纜束帶、吊帶等配件加以支撐，以免遭受外力
        損傷。
    (二)植物不得用於分路或幹線架空跨距之支撐。但節慶用之照明，其導線
        裝有釋放拉力或承受張力裝置，可避免因植物之搖動而造成損壞者，
        不在此限。

第七百零五條
沿建築物外側裝設臨時用電線路者，依下列規定辦理：
一、臨時用電線路裝設之地點有保護箱體等防雨設備，且不易遭受外力損傷，
    並採用電纜者，該線路中之各項距離不予限制。
二、臨時用電線路應裝設於建築物之側面或下方。

第七百零六條
室外臨時照明燈具應採用無開關之防水燈頭。
每一照明分路之總負載電流不得大於二十安培，並應裝設分路過電流保護裝置
。

第七百零七條
臨時用電場所之配線應依第八十七條至第八十九條規定裝設漏電斷路器。分路
未裝設漏電斷路器者，應依下列規定辦理：
一、插座出線口：供電給人員使用設備之臨時插座裝設依下列規定辦理；由合
    格人員維修及管理監督之工業廠區，斷電時會造成更大危險或其設計不適
    用漏電啟斷裝置保護之插座出線口，得採第二款規定之設備接地導線保護
    。
    (一)所有單相一百五十伏特以下、十五安培、二十安培或三十安培之插座
        出線口，非屬建築物永久配線且供人員使用者，應有漏電啟斷裝置。
    (二)十五千瓦特以下可攜式發電機上，所有單相一百五十伏特以下及二百
        五十伏特、十五安培、二十安培或三十安培之插座出線口，應有漏電
        啟斷裝置。用於濕氣場所或潮濕場所時，應符合第三百七十五條第一
        款及第二款規定。
二、其他出線口應有漏電啟斷裝置保護，或依下列規定之設備接地導線保護：
    (一)指定一位以上人員於現場，依照書面之設備接地導線確保程序，以持
        續確保所有非屬建築物永久配線之可撓軟線、插座，及利用附插頭可
        撓軟線連接之設備接地導線，確實依第三百七十三條第三款及第七百
        零四條第三款之相關規定裝設及維護。
    (二)非屬建築物永久配線之可撓軟線組插座及附插頭連接軟線，及須接至
        設備接地導線之設備，應於下列時機測試所有設備接地導線之電氣連
        續性，及每個插座及附接插頭對設備接地導線之連接、設備接地導線
        與專用之端子連接：
        1.第一次現場使用之前。
        2.有損壞跡象時。
        3.設備維修後開始使用之前。
        4.週期不超過三個月之定期檢查。
    (三)前目規定測試應作成紀錄以供查驗。

第七百零八條
開關及其保護箱體應裝設於建築物內。其保護箱體為耐候型且為專用者，得裝
設於室外。

第七百零九條
臨時用電線路與布、紙、汽油等易燃物品間應保持一百五十毫米以上之間隔。

第七百十條
標稱電壓超過六百伏特之臨時用電線路應設置圍籬、屏障或其他有效之措施，
且僅為合格人員可接近。

    第六章  特殊設備及設施
      第一節  招牌廣告燈及造型照明
第七百十一條
招牌廣告燈及造型照明之配線及裝設，應依本節規定辦理。使用發光二極體照
明、霓虹燈管作為招牌廣告燈、裝飾元件、外框燈管等，亦同。

第七百十二條
本節用詞定義規定如下：
一、招牌廣告燈：指附電氣照明，固著於建築物牆面上，或以支架固定，以文
    字或符號，作為傳遞資訊或引人注意之用電器具。
二、造型照明：指透過建築物外型裝飾及其位置擺放而呈現引人注意之造型或
    特徵之放電管燈或其他電力光源。
三、招牌廣告燈殼：指招牌廣告燈之一部分，可提供耐候保護，而非電氣封閉
    箱體。
四、霓虹燈管：指填充各種惰性氣體作成招牌廣告燈、造型照明、文字、外框
    燈管或其他裝飾元件等造型之放電管燈。
六、外框燈管：指其本身即為招牌廣告燈或造型照明燈之霓虹燈管，而未附掛
    於封閉箱體或招牌廣告燈殼。
七、發光二極體照明系統：指由發光二極體（ LED）之光源、電源、電線及連
    接接頭組合而成，用於招牌廣告燈及造型照明之完整照明系統。

第七百十三條
招牌廣告燈及造型照明之分路依下列規定辦理：
一、供電給招牌廣告燈或造型照明應為專用分路，並於行人可接近之每個商業
    大樓或營業場所入口處設置一個以上出線口。
二、供電給招牌廣告燈之分路額定應符合下列規定之一，且計算負載時視為連
    續負載：
    (一)供電給霓虹燈裝置之分路額定三十安培以下。
    (二)供電給其他招牌廣告燈及造型照明系統之分路額定二十安培以下。
三、配線方法：
    (一)用於供電給招牌廣告燈及造型照明系統之配線，其連接或終端應於封
        閉箱體、線盒或管匣內施作。
    (二)招牌廣告燈及其變壓器之封閉箱體得作為其他鄰近招牌廣告燈、造型
        照明系統或投射燈等部分電源導線之拉線盒或接線盒，且可同時容納
        分路及二次側導線。
    (三)支撐招牌廣告燈之金屬桿或非金屬桿及導線裝設符合第一百五十四條
        第二款規定者，得作為電源導線之管槽。

第七百十四條
供電給每一個招牌廣告燈及造型照明系統之幹線或分路，應裝設可外部操作之
開關或斷路器等隔離設備，能啟斷所有非接地導線。若為多線式分路，該開關
或斷路器應能於分路起點同時啟斷多線式分路之所有非接地導線。
前項隔離設備之位置裝設依下列規定辦理：
一、在招牌廣告燈及造型照明可視及範圍：
    (一)隔離設備應位於受其控制之招牌廣告燈及造型照明系統處可視及範圍
        內。
    (二)可能被通電之區段超出視線範圍時，該隔離設備應於啟斷位置可上鎖
        。
    (三)多極隔離設備不得單極獨立操作。隔離設備應配裝附有啟斷位置可上
        鎖之固定式裝置。
二、在招牌廣告燈及造型照明控制器可視及範圍，依下列規定辦理：
    (一)隔離設備得裝設於控制器處可視及範圍內，或與控制器在同一封閉箱
        體內。
    (二)隔離設備應可啟斷該系統及控制器之所有非接地導線。
    (三)應符合前款第三目規定。
三、招牌廣告燈及造型照明系統位於噴水池內者，其隔離設備位置裝設應依第
    八百十九條規定辦理。

第七百十五條
招牌廣告燈與造型照明之接地及搭接依下列規定辦理：
一、接地：
    (一)設備接地：
        1.招牌廣告燈及造型照明系統之金屬設備應連接至設備接地導線。
        2.可攜式可撓軟線連接之招牌廣告燈若具有雙重絕緣或等電位保護，
          且標明雙重絕緣者，得免連接至設備接地導線。
    (二)招牌廣告燈及造型照明系統設備之設備接地導線線徑應依表九三～二
        規定選用。
    (三)設備接地導線之連接應符合第九十一條規定。
    (四)建築物金屬構件不得作為二次回流導線或設備接地導線。
二、搭接：
    (一)招牌廣告燈與造型照明系統之金屬組件及設備應搭接至電源分路或幹
        線上附屬變壓器或電源設施之設備接地導線，並應保持其電氣連續性
        及能承受故障電流。
    (二)搭接導線之連接應符合第九十一條規定。
    (三)建築物金屬構件不得作為搭接裝置。
    (四)搭接導線：
        1.搭接導線應為銅線，且線徑不得小於二‧○平方毫米。
        2.裝設於招牌廣告燈或管槽外部之搭接導線應有防護，以免遭受外力
          損傷。
    (五)裝設於噴水池內之招牌廣告燈或造型照明，其金屬組件應搭接至噴水
        池再循環系統電源分路之設備接地導線。

第七百十六條
招牌廣告燈及造型照明除燈泡外之帶電部分應加以包封。變壓器及電源供應設
施已有封閉箱體，包括一次與二次電路接續封閉箱體者，得免再加裝封閉箱體
。
前項封閉箱體之選用依下列規定辦理：
一、箱體應有足夠之結構強度與硬度。
二、箱體應為金屬材質或具同等效果之材質。
三、金屬封閉箱體應為厚度○‧五毫米以上之銅板或鋁板，或○‧四毫米以上
    之鋼板製成。
四、設備金屬組件應有防蝕保護。

第七百十七條
招牌廣告燈及造型照明系統之位置裝設依下列規定辦理：
一、除可免遭受外力損傷外，該系統設備應裝設於車輛通行區域上方四‧六米
    以上。
二、霓虹燈除可攜式外，位於行人可輕易觸及處，應有防護以免遭受外力損傷
    。
三、招牌廣告燈及造型照明系統不得使鄰近之可燃性物質遭受超過攝氏九十度
    之高溫。高強度放電管燈或燈座與可燃性物質間應保持五十毫米以上之間
    隔。
四、招牌廣告燈及造型照明系統設備裝設於潮濕場所者，除為液密型設備外，
    應為耐候型設備，並設有排水孔。

第七百十八條
裝設招牌廣告燈與造型照明之安定器、變壓器及電源供應器依下列規定辦理：
一、安定器、變壓器及電源供應器應位於可觸及處，並牢固於裝設位置。
二、安定器、變壓器及電源供應器應儘量接近燈泡、燈管或霓虹燈處，使二次
    側導線之長度儘可能縮短。
三、若裝設於潮濕場所，應為耐候型者，並裝設於招牌廣告燈殼或單獨之封閉
    箱體內。
四、安定器、變壓器、電源供應器之封閉箱體外應至少有高度、寬度及深度各
    九百毫米之工作空間。
五、裝設於懸吊式天花板內之安定器、變壓器及電源供應器，不得以可撓軟線
    連接至分路。

第七百十九條
標稱電壓一千伏特以下霓虹燈二次側導線之裝設依下列規定辦理：
一、導線配線應符合第四章規定。
二、導線應有絕緣，且線徑不得小於○‧九平方毫米。
三、管槽內導線數應符合表三二八～八規定。
四、導線應有防護，以免遭受外力損傷。
五、導線穿過金屬開口時，應採用套管保護。

第七百二十條
標稱電壓超過一千伏特霓虹燈二次側導線之裝設依下列規定辦理：
一、配線方法：
    (一)導線應採用厚金屬導線管、薄金屬導線管、金屬可撓導線管、非金屬
        導線管配線，或裝設於金屬封閉箱體內。
    (二)燈管兩端電路應分別採用個別導線管，該導線管僅能有一條導線。
    (三)除與金屬封閉箱體或招牌廣告燈殼之連接處外，非金屬導線管或非金
        屬可撓導線管與被接地或被搭接組件間之間隔依下列規定辦理：
        1.導線管內之導線運轉頻率在一百赫茲以下者，應保持三十八毫米以
          上之間隔。
        2.導線管內之導線運轉頻率超過一百赫茲者，應保持四十五毫米以上
          之間隔。
    (四)建築物之金屬構架不得作為二次回流導線或設備接地導線。
二、絕緣導線應為適用於氣體放電管燈專用電纜，其額定電壓為五千伏特、十
    千伏特或十五千伏特；線徑應為○‧九平方毫米以上，最低溫度額定為攝
    氏一百零五度。
三、導線應有防護，以免遭受外力損傷。
四、絕緣導線應避免急遽彎曲。
五、導線應彼此分開裝設，且除礙子或霓虹燈外，與其他物件間應保持三十八
    毫米以上之間隔。裝設於金屬導線管之氣體放電管燈專用電纜，電纜絕緣
    體與導線管間得免保持任何間隔。
六、供導線使用之礙子與套管應適用於霓虹燈二次側電路電壓超過一千伏特之
    導線。
七、導線絕緣體應伸出金屬導線管六十五毫米以上。
八、導線得作為連接霓虹燈兩側端子間，或變壓器、電源供應器之二次側電路
    兩側端子之引接線。
九、開路電壓超過一千伏特之設備不得裝設於住宅場所或居住場所。
十、從變壓器、電源供應器之高壓端子或引線至第一霓虹燈燈管電極之二次側
    導線長度不得超過下列規定：
    (一)採用金屬導線管配線：六米。
    (二)採用非金屬導線管配線：十五米。
十一、二次側導線之接續應裝設於額定電壓超過一千伏特之封閉箱體內。該封
      閉箱體應位於可觸及處，且為適用於其所裝設之場所者。

第七百二十一條
發光二極體照明系統二次側配線應依製造廠家說明書指示適用第四章規定之配
線方法，並依下列規定辦理：
一、導線暴露於天花板外及側壁者，應加以支撐，以免受損。
二、導線之連接應採用絕緣之配件，且於裝設後可觸及。埋入牆壁者，連接處
    應收納於接線盒內。
三、若有遭受外力損傷之虞者，導線應有防護。
四、接地及搭接應符合第七百十五條規定。

第七百二十二條
霓虹燈之裝設依下列規定辦理：
一、燈管長度及設計不得造成變壓器或電源供應器之連續過電流。
二、燈管應以適用之支撐物加以支撐。霓虹燈位於電極連接處一百五十毫米範
    圍內，應設置燈管支撐物。
三、除支撐物外，燈管與最近之物體表面間應保持六毫米以上之間隔。
四、防護：
    (一)現場裝設之外框燈管應有防護，以免遭受外力損傷。
    (二)燈管若為非合格人員可輕易觸及者，該現場裝設之外框燈管應有防護
        措施。

      第二節  電動起重機及吊車
第七百二十三條
電動起重機、吊車、單軌吊車及所有滑軌之用電設備或器具配線及裝設，應依
本節規定辦理。
本節所稱懸掛電纜，指專供電動起重機、吊車、單軌吊車及所有滑軌用之可撓
單芯電纜或多芯電纜。

第七百二十四條
電動起重機、吊車、單軌吊車及所有滑軌裝設於危險場所者，依下列規定辦理
：
一、在危險場所運轉之所有用電設備應符合第五章規定。
二、電動起重機、吊車或單軌吊車在可燃性物質上方運轉者，其電阻器應裝設
    於下列規定位置：
    (一)以不可燃物質製成且通風良好之封閉箱體內，使其火焰及金屬熔渣不
        致逸散。
    (二)以不可燃性物質製成之箱籠或操作室內，且自地面至電阻器頂端上方
        至少一百五十毫米處加以封閉。

第七百二十五條
電動起重機、吊車、單軌吊車及所有滑軌之導線應採用管槽、MI  電纜或金屬
被覆電纜配線。但滑接導線、電阻器、集電器或其他設備之短截裸露導線不在
此限。
若需可撓連接至電動機及類似設備者，得採用可撓絞線，且採用金屬可撓導線
管、液密型金屬可撓導線管或多芯電纜配線。
若使用之多芯電纜有懸吊式按鈕裝置者，該裝置應有避免電纜承受張力之支撐
。
若需可撓連接至移動組件符合下列規定者，得採用懸掛電纜或適合此用途之可
撓軟線：
一、可釋放張力或有防護，以免遭受外力損傷。
二、在第一類第二種場所或 2  區之危險場所，適用於該環境。

第七百二十六條
電動起重機、吊車、單軌吊車及所有滑軌之導線引出管槽或電纜者，依下列規
定辦理：
一、引出管槽或電纜轉成裸露導線者，每一導線應有個別護管套或終端配件，
    其配件不得作為接續或分接使用，且不得用於照明出線口。
二、若金屬導線管終端連接至滑接導線、集電器、電阻器、制動裝置、電力回
    路極限開關及直流分相電動機等未封閉之控制設備者，其終端得採用護管
    套替代配線盒。

第七百二十七條
電動起重機、吊車、單軌吊車及所有滑軌之導線選用依下列規定辦理：
一、暴露於高溫或連接電阻器之導線，應有耐燃包覆，或以耐燃膠帶個別或綑
    綁成束包覆。
二、沿著滑軌、天車、單軌吊車之滑接導線，得用裸銅、鋼、其他合金或上列
    金屬合成之堅硬材質。
三、若需可撓者，得採用適用之懸掛電纜、可撓軟線或可撓電纜。

第七百二十八條
電動起重機、吊車、單軌吊車及所有滑軌之導線安培容量及線徑依下列規定辦
理：
一、短時間額定功率電動起重機、吊車之電動機絕緣導線安培容量應依表七二
    八～一規定。絕緣導線裝於周圍溫度超過攝氏三十五度之場所，其安培容
    量應乘以表二五～七規定之修正係數。
二、連接至電動機及控制器之導線，不得小於一‧二五平方毫米。但未大於七
    安培之控制電路得選用○‧九平方毫米之多芯可撓軟線。
三、滑接導線之安培容量不得小於表七二八～一攝氏七十五度欄位規定，且線
    徑不得小於表七二八～二規定。
四、電動機負載之計算：
    (一)單具電動機負載應為電動機銘牌標示之滿載電流百分之一百。
    (二)單具電動起重機或吊車上之多具電動機電源導線之最小安培容量，應
        為任一單具電動起重機或吊車運轉時，最大電動機或電動機群銘牌標
        示之滿載電流，加上次大電動機或電動機群銘牌標示之滿載電流百分
        之五十，適用表七二八～一中最長時間額定之欄位。
    (三)多具電動起重機或吊車共用同一導線系統，計算電動機最小安培容量
        應按前目規定計算每台電動起重機之安培容量，並將其全部加總，再
        乘以表七二八～三規定相應之需量因數。

第七百二十九條
電動起重機、吊車、單軌吊車及所有滑軌之滑接導線裝設依下列規定辦理：
一、滑軌之滑接導線應加以防護，橋式滑接導線應加以定位或防護，避免人員
    意外碰觸帶電部分。
二、滑接導線應裝設支持礙子，且其終端應以耐張礙子固定。
三、滑軌之支撐：
    (一)沿著滑軌之主滑接導線應以絕緣支持物支撐。
    (二)沿著滑軌之主滑接導線間隔應為一百五十毫米以上。單軌吊車之導線
        間隔得為七十五毫米以上。
四、橋式吊車配線之滑接導線間應保持六十五毫米以上之間隔，跨距超過二十
    五米者，每隔十五米內應配置一個絕緣鞍型支架。
五、沿滑軌或電動起重機天車之導線為第七百二十七條第二款規定之硬質型式
    且未包覆於封閉組件者，應置於絕緣支持物上，並使導線或相鄰集電器之
    線間距離不得小於二十五毫米。
六、滑接導線不得作為電動起重機及吊車以外其他設備之幹線。

第七百三十條
電動起重機、吊車、單軌吊車及所有滑軌之集電器應使其與滑接導線間之火花
降到最低。在可燃性纖維與物質之儲存室內操作者，應符合第五百二十九條規
定。

第七百三十一條
滑軌滑接導線與電源間，及從滑軌滑接導線引出之導線，應有隔離設備，其連
續電流額定不得小於第七百二十八條第四款規定計算值該隔離設備應由電動機
電路開關或斷路器組成。
前項隔離設備之裝設依下列規定辦理：
一、隔離設備應為可輕易觸及，且可直接從地面操作。
二、隔離設備應配裝附有啟斷位置可上鎖之固定式裝置。
三、隔離設備應能同時啟斷所有非接地導線。
四、隔離設備應置於滑軌之滑接導線處可視及範圍內。
隔離設備在電動起重機或單軌吊車操作台不可輕易觸及者，於操作台應有其他
方法可啟斷電動起重機或單軌吊車所有電動機之電源電路。

第七百三十二條
前條規定之開關或斷路器連續電流額定不得小於所有電動機合併短時電流額定
百分之五十，或任何單一動作中，所有電動機短時額定電流總和百分之七十五
。

第七百三十三條
滑軌電源導線及電動起重機或單軌吊車之主滑接導線應有過電流保護裝置，且
不得大於任一分路過電流保護裝置最大安培額定，加上表七二八～三相應之需
量因數決定其他負載銘牌標示額定電流之總和。

第七百三十四條
電動起重機、單軌吊車及吊車之分路短路及接地故障保護依下列規定辦理：
一、熔線或斷路器額定：
    (一)電動起重機、單軌吊車及吊車之電動機分路應以熔線或反時限斷路器
        保護，其額定應符合表二二○規定。
    (二)若單一動作由二台以上電動機同時運轉者，應視為單具電動機，且其
        電流為各銘牌標示額定之總和。
二、分路分接：
    (一)若二台以上電動機連接至相同分路者，每台電動機分接導線之安培容
        量不得小於分路之過電流保護裝置安培額定三分之一。
    (二)負載側分路保護裝置分接至控制電路時，每條分接導線及每項設備之
        保護，應符合第二百三十六條規定。
    (三)制動線圈之分接導線得免裝設個別過電流保護裝置。

第七百三十五條
電動起重機、單軌吊車、吊車、所有滑軌及附屬設備，包括懸吊式控制器等所
有暴露非帶電金屬部分，應做機械性連接或以搭接導線作搭接，以符合第二章
第五節或第八章第四節規定。
高架吊車構件及天橋構件不得視為經天橋、高架吊車輪及其分別之軌道有電氣
性接地，另應配裝獨立搭接導線。

      第三節  客貨升降機
第七百三十六條
載人或運貨用升降機（即電梯）、升降階梯（即電扶梯）、電動走道、輪椅平
台升降機及樓梯升降椅等客貨升降機之配線及裝設，應依本節規定辦理。

第七百三十七條
客貨升降機之電源導線安培容量依下列規定決定：
一、單具電動機之電源導線安培容量不得小於表二五八～一至表二五八～三電
    動機滿載電流與表二一四所列電動機銘牌標示之電流責務週期百分比之乘
    積。
二、多具電動機之電源導線安培容量不得小於所有電動機銘牌標示電流責務週
    期之額定電流總和。依表七三七規定考慮需量因數者，其幹線之導線安培
    容量得小於前段規定。

第七百三十八條
客貨升降機由多相交流電動機驅動者，應有保護設備，能於相序相反或單相運
轉時，防止電動機起動。

第七百三十九條
客貨升降機之配線方法依下列規定辦理：
一、裝設於機械室之配線，應採用導線管、導線槽、匯流排槽或電纜等方法施
    作於可能遭受油漬損壞之場所，不得採用橡膠被覆電纜。
二、配線應牢固裝設於建築物，避免與移動機槽碰觸而損傷。

第七百四十條
客貨升降機各回路絕緣導線、電纜之使用目的及供電方式不同，若採用相同絕
緣電壓等級，且互相間另有識別者，得共用同一管槽。

      第四節  電銲機
第七百四十一條
電弧電銲機、電阻電銲機及其他類似銲接設備之配線及保護，應依本節規定辦
理。

第七百四十二條
電弧電銲機電源導線安培容量決定依下列規定辦理：
一、個別電弧電銲機電源導線安培容量不得小於電銲機銘牌一次側有效最大電
    流（ I1eff）。若 I1eff  未知，電源導線安培容量不得小於電銲機銘牌
    一次側額定電流乘以表七四二對應電弧電銲機責務週期乘率之乘積。
二、電弧電銲機組電源導線之最小安培容量應依前款決定最大二具電銲機電流
    之和，加上第三大電銲機電流百分之八十五及第四大電銲機電流百分之七
    十，再加上其餘電銲機電流百分之六十之總和。但個別電銲機不可能在高
    運轉責務週期運轉時，得採用小於本款規定之值。

第七百四十三條
電弧電銲機過電流保護之裝設依下列規定辦理：
一、每台電弧電銲機應有過電流保護裝置，其安培額定不得大於該電銲機一次
    側最大額定電流（ I1max）二倍。若 I1max  未知，過電流保護裝置之安
    培額定不得大於電銲機一次側額定電流二倍。當電源導線過電流保護裝置
    之安培額定不大於該電銲機 I1max  或一次側額定電流二倍時，該電銲機
    得免加裝過電流保護裝置。
二、供電給一具以上附變壓器電弧電銲機之電源導線，應有過電流保護裝置，
    其安培額定不得大於電源導線安培容量二倍。
電弧電銲機之過電流保護裝置依前項規定選定之安培額定，與標準安培額定不
能配合，或會使過電流保護裝置有非必要性跳脫時，得選用較高一級者。

第七百四十四條
電弧電銲機未附裝隔離設備者，應於一次側裝設開關或斷路器作為隔離設備，
其安培額定不得小於前條過電流保護裝置規定。

第七百四十五條
電阻電銲機電源導線安培容量決定依下列規定辦理：
一、個別電阻電銲機：
    (一)供電給自動點銲機者，其電源導線安培容量不得小於電銲機一次側額
        定電流百分之七十；供電給人工點銲機者，其電源導線安培容量不得
        小於電銲機一次側額定電流百分之五十。
    (二)供電給特定運轉之電銲機，若實際一次側電流及責務週期已固定者，
        其電源導線安培容量不得小於實際一次側電流乘以表七四五對應責務
        週期乘率之乘積。
二、電阻電銲機組：供電給二具以上電銲機者，其電源導線安培容量不得小於
    前款規定之最大電銲機電流，加上其他電銲機電流百分之六十之總和。

第七百四十六條
電阻電銲機過電流保護之裝設依下列規定辦理：
一、每台電阻電銲機應有過電流保護裝置，其安培額定不得大於該電銲機一次
    側額定電流三倍。當電源導線過電流保護裝置之安培額定不大於該電銲機
    一次側額定電流二倍時，該電銲機得免加裝過電流保護裝置。
二、供電給一具以上電阻電銲機之電源導線，應有過電流保護裝置，其安培額
    定不得大於電源導線安培容量三倍。
電阻電銲機之過電流保護裝置依前項規定選定之安培額定，與標準電流額定或
額定不能配合，或會使過電流保護裝置有非必要性跳脫時，得選用較高一級者
。

第七百四十七條
每台電阻電銲機及其控制設備，應於一次側裝設開關或斷路器作為隔離設備，
其安培額定不得小於第七百四十五條規定之電源導線安培容量。
若電源導線僅供電給一具電阻電銲機者，該導線開關得視為隔離設備。

      第五節  資訊科技設備
第七百四十八條
資訊科技設備室之電源配線、設備互連配線，及設備與系統之接地等裝設，應
依本節規定辦理。

第七百四十九條
本節用詞定義規定如下：
一、資訊科技設備：指產生及處理非屬通訊設備及通訊電路之資料、影音及類
    似信號，額定電壓在六百伏特以下之設備及系統。
二、資訊科技設備室：指在資訊科技設備區內，設置資訊科技設備之房間。
三、專區：指在資訊科技設備室內以隔板或空間分隔成實際可識別之區域，其
    附有專用電力及冷氣系統供應資訊科技設備或系統。
四、遠端隔離控制：指透過電驛或類似裝置，供遠方控制隔離設備之配電裝置
    及其電路。
五、緊要運轉資料系統：指因公共安全、緊急管理、國家安全或商業連續性等
    因素必須連續運轉之資訊科技設備系統。

第七百五十條
資訊科技設備室之電路及設備裝設依下列規定辦理：
一、貫穿防火區劃界接處應以經設計者確認之方法，維持防火時效，以阻止火
    焰及燃燒生成物之蔓延。
二、資訊科技設備室天花板上方之通氣室配線應採用無插入式接頭絕緣匯流排
    、MI  電纜、金屬被覆電纜或金屬管槽配線。

第七百五十一條
資訊科技設備室符合下列規定者，得免適用第一章至第四章規定：
一、設備室有符合第七百五十三條規定隔離設備。
二、設備室有個別專用之空調與通風系統。貫穿防火區劃界接處有偵煙感知器
    動作及隔離設備運轉，驅動防火風門或排煙閘門，其他空間之空調與通風
    系統亦可。
三、設備室僅供資訊科技設備人員維修及操作時進駐及接近。
四、設備室採用防火等級之牆壁、地板及具有保護開口之天花板，與其他非資
    訊科技設備裝設場所隔離。
五、設備室內僅裝設與資訊科技設備運轉有關之用電設備配線及保護。

第七百五十二條
資訊科技設備室之電源電路及互連電纜依下列規定辦理：
一、供電給一組以上資訊科技設備者，分路導線安培容量應為總連接負載一‧
    二五倍以上。
二、資訊科技設備之電源導線得為可撓軟線、附插頭可撓軟線連接至分路，其
    長度不超過四‧五米。
三、個別資訊科技設備得採用適用之電纜及配件互連，互連電纜長度得超過四
    ‧五米。
四、暴露於可能遭受外力損傷之處者，電源電路及互連電纜應有防護。
五、符合下列規定者，資訊科技設備之電纜、附插頭可撓軟線及附屬插座得裝
    設於高架地板下方：
    (一)高架地板下方區域為可觸及。
    (二)供電給插座或現場配線設備之分路，導線採用金屬導線管、金屬可撓
        導線管、非金屬導線管、金屬導線槽、非金屬導線槽、MI  電纜或金
        屬被覆電纜配線，或置於上列管線附屬之金屬及非金屬線盒或封閉箱
        體內，並依第二百九十三條規定固定及支撐。
    (三)符合第二款規定適用於資訊科技設備之可撓軟線。
    (四)除前條第一款規定外，高架地板區域下方之通風系統為資訊科技設備
        室專用，並配置偵煙感知器，在偵測到高架地板下方區域內有火焰或
        燃燒物生成物時，會停止通風循環。
    (五)高架地板供可撓軟線及電纜裝設之開口能保護可撓軟線及電纜避免磨
        損，並儘量減少碎屑進入高架地板下。
    (六)除第二目及第三目規定外，電纜為具有耐燃性，且適用於資訊科技設
        備室高架地板下方。
六、電纜及其附屬接線盒、接頭、插頭、插座等，為資訊科技設備之一部分者
    ，得免固定。
七、作為未來使用之電源電路及互連電纜應有耐久標識。

第七百五十三條
資訊科技設備室或專區，應有隔離設備，能隔離所有電子設備及專用空調與通
風系統之電源，並使所有必要之防火風門或排煙閘門關閉。
遠端隔離控制之裝設依下列規定辦理：
一、遠端隔離控制應位於發生火災時，合格人員及緊急應變人員可輕易觸及處
    。
二、遠端控制電子設備電源及空調與通風系統之隔離設備，應加以分組及標示
    單一隔離設備得控制此二個系統。
三、劃設數個專區者，每一專區應分別有其隔離設備，以限制火焰或燃燒生成
    物在該專區內蔓延。
四、為防止遠端隔離控制錯誤操作，得加裝其他防範措施。
符合下列規定者，緊要運轉資料系統得免裝設遠端隔離控制：
一、對移除資訊科技設備室或專區內之電源及空氣流動有建立作業程序並予維
    護。
二、有合格人員經常駐守，以因應緊急應變，及告知其隔離方法。
三、有設置火災偵煙系統。
四、有設置火災抑制系統。
五、除分路配線及電源可撓軟線裝設符合前條第五款第二目或第三目規定外，
    電纜裝設於高架地板下方。

第七百五十四條
不斷電電源系統裝設於資訊科技設備室者，其電源與輸出電路應依前條規定裝
設隔離設備且能隔離電池之負載。但從不斷電電源設備或電子設備內裝之電池
回路提供之電源在七百五十伏安以下者，不在此限。

第七百五十五條
資訊科技設備所有暴露非帶電金屬部分應依第二章第五節或第八章第四節規定
搭接至設備接地導線或為雙重絕緣。設有信號參考基準設施者，該設施應搭接
至供資訊科技設備用之設備接地導線。

      第六節  敏感性電子設備
第七百五十六條
在商業或工業場所內有合格人員密切管理監督之區域，為降低電氣性雜訊竄入
敏感性電子設備，得裝設線對設備接地導線電壓六十伏特之單相三線一百二十
伏特獨立電源供電系統。前項獨立電源供電系統之裝設應依本節規定辦理。

第七百五十七條
獨立電源供電系統之配線依下列規定辦理：
一、得採用額定電壓較高之標準單相配電箱及配電設備。於配電箱面板或箱門
    內側應標明本系統。
二、所有幹線及分路之非接地導線，應有適用於本系統電壓之兩極同時跳脫斷
    路器或熔線隔離設備，其能同時切離所有非接地導線。
三、接線盒外蓋應標明所屬配電箱及系統電壓。
四、幹線及分路之導線在所有接續及端子處應以顏色、標識、標籤等方法作識
    別，並標明於每一分路配電箱及建築物隔離設備處。
五、電壓降：
    (一)分路直接供電給固定式設備者，其電壓降不得超過標稱電壓百分之一
        ‧五。幹線及分路之導線電壓降總和不得超過標稱電壓百分之二‧五
        。
    (二)分路經由插座供電給可撓軟線連接設備者，其電壓降不得超過標稱電
        壓百分之一。計算其電壓降時，連接至插座出線口之負載視為分路額
        定百分之五十。幹線及分路之導線電壓降總和不得超過標稱電壓百分
        之二。

第七百五十八條
獨立電源供電系統固定式配線之用電設備及插座，應以設備接地導線作接地，
其線徑不得小於表九三～二規定。該設備接地導線應隨電路導線裝設至接地端
子板，且該接地端子板上有標明敏感性電子設備接地之明顯標識，並裝設於電
源分路配電箱內。
前項接地端子板應連接至獨立電源供電系統隔離設備線路端之被接地導線。
敏感性電子設備接地端子板得免搭接至配電箱箱體。

第七百五十九條
敏感性電子設備利用插座連接電源者，依下列規定辦理：
一、十五安培及二十安培之插座應有漏電啟斷裝置保護。
二、插座出線口引接線、轉接器、插座蓋板及面板應有標明敏感性電子設備電
    源，禁止連接照明燈具，僅供敏感性電子設備專用之警告標識。
三、十五安培或二十安培、六○／一二○伏特固定式敏感性電子設備電源系統
    插座之一‧八米範圍內，應有一個單相一百二十五伏特、十五安培或二十
    安培之接地型插座出線口。
四、一百二十五伏特插座用於六○／一二○伏特敏感性電子設備，應有適用於
    此等級系統之專屬極型。

第七百六十條
為降低照明燈具之電氣性雜訊竄入敏感性電子設備，其裝設依下列規定辦理：
一、隔離設備：
    (一)連接至對地電壓六十伏特獨立電源供電系統之所有照明燈具及其附屬
        控制設備，應有隔離設備能同時啟斷所有非接地導線。
    (二)隔離設備應位於照明燈具處可視及範圍內，或配裝附有啟斷位置可上
        鎖之固定式裝置。
二、照明燈具應為永久裝設，且適用於連接線間電壓一百二十伏特及對地電壓
    六十伏特之獨立電源供電系統。
三、照明燈具不能有暴露之燈泡螺紋。

      第七節  工業與非醫療性X光設備
第七百六十一條
本節用詞定義規定如下：
一、定置式：指操作時固定在特定位置。
二、移動式：指架設於有輪子或腳架之永久基座，在組裝完成後可以移動。
三、可運送式：指裝設於車內或以車輛運送時可輕易裝卸。
四、長時額定：每次操作時間五分鐘以上為基準之額定值。
五、瞬時額定：每次操作時間五秒鐘以下為基準之額定值。

第七百六十二條
工業與非醫療性 X  光設備及其附屬設備不得裝設或使用於第四百六十四條第
一項規定之危險場所。但特別為該危險場所設計者，不在此限。

第七百六十三條
工業與非醫療性 X  光設備連接至電源線路依下列規定辦理：
一、固定式及定置式之 X  光設備連接至電源，應依第四章規定之配線方法。
    X 光設備由額定三十安培以下之分路供電者，得以適用之附接插頭及重責
    務型電纜或可撓軟線供電。
二、可攜式、移動式及可運送式 X  光設備：
    (一)容量六十安培以下之可攜式、移動式及可運送式 X  光設備，得免設
        專用分路。
    (二)任何容量之可攜式及移動式 X  光設備，應由適用之重責務型電纜或
        可撓軟線供電。
    (三)任何容量之可運送式 X  光設備，得以適用之連接器及重責務型電纜
        或可撓軟線供電。

第七百六十四條
工業與非醫療性 X  光設備電源電路應裝設隔離設備，其容量至少為瞬時額定
輸入百分之五十，或長時額定輸入百分之一百，兩者取其較大者。
前項隔離設備應位於 X  光控制處可視及，且可輕易觸及處。

第七百六十五條
工業與非醫療性 X  光設備之電源導線及過電流保護裝置額定依下列規定選用
：
一、分路導線安培容量及過電流保護裝置安培額定不得小於瞬時額定百分之五
    十，或長時額定百分之一百，兩者取其較大者。
二、供電給 X  光設備二分路以上之幹線，其導線安培容量及過電流保護裝置
    之安培額定不得小於二套最大 X  光設備瞬時需量額定百分之一百，加上
    其他 X  光設備瞬時額定百分之二十。

第七百六十六條
工業與非醫療性 X  光設備及其輔助設備之控制與操作線路由二十安培以下過
電流保護裝置保護者，得採用一‧○平方毫米以上之可撓軟線。

第七百六十七條
固定式及定置式工業與非醫療性 X  光設備之控制依下列規定辦理：
一、除隔離設備外，個別控制裝置應併入 X  光控制電源或高壓變壓器之一次
    側電路，並應為 X  光設備之一部分。其得設於緊鄰 X  光控制單元之個
    別封閉箱體內。
二、保護裝置得併入個別控制裝置內，以控制高壓電路故障時之負載。
可攜式及移動式工業與非醫療性 X  光設備之控制應依前項規定辦理，並將其
手動控制裝置裝設於設備上。

第七百六十八條
工業與非醫療性 X  光設備作為工業及商業實驗室設備依下列規定辦理：
一、所有 X  光造影與透視型設備應加以有效封閉，或有自動斷電之互鎖裝置
    ，避免人員碰觸帶電部分。
二、繞射與照射型設備或裝置若不能有效封閉，或無互鎖裝置可避免人員在運
    轉時碰觸未絕緣帶電部分者，於其通電時應有明顯指示燈或同等裝置。

第七百六十九條
二台以上工業與非醫療性 X  光設備由相同高壓電路操作者，以每台或每組設
備為一個單位，應有高壓開關或隔離設備，並妥予封閉，或置於避免人員碰觸
帶電部分處。

第七百七十條
工業與非醫療性 X  光設備之電容器應裝設於具絕緣材質或被接地金屬之封閉
箱體內。

第七百七十一條
工業與非醫療性 X  光設備之防護依下列規定辦理：
一、高壓組件：
    (一)X 光管等所有高壓組件應配裝於被接地封閉箱體內。
    (二)空氣、油、氣體或其他適合之絕緣介質得作為被接地封閉箱體與高壓
        組件之絕緣。
    (三)自高壓設備連接至 X  光管及其他高壓組件應採用高壓遮蔽電纜。
二、低壓電纜連接至未完全密封之變壓器、電容器、油散熱器及高壓開關等充
    油機組者，其絕緣應為耐油型。

第七百七十二條
工業與非醫療性 X  光設備及其控制、桌台、X 光管支撐、變壓器外殼、遮蔽
電纜、X 光管頭等附屬之非帶電金屬部分，應依第二章第五節或第八章第四節
規定加以接地。但採用電池供電之設備，不在此限。
可攜式及移動式設備之附接插頭應為接地型。

      第八節  工業用電熱設備
第七百七十三條
工業用紅外線燈、介電加熱、感應加熱、感應熔解及感應熔接等電熱設備及其
配件之配線及保護，應依本節規定辦理。

第七百七十四條
本節用詞定義規定如下：
一、介電加熱：指絕緣材料放在變動之電場內時，材料會因介電損失而加熱。
二、感應加熱／感應熔解／感應熔接：指當導電性材料放在變動之電磁場內時
    ，材料會因自身熱損（ I2R）而加熱、熔解或熔接。
三、轉換裝置：指可將輸入之機械或電能轉化為適合電熱設備之電壓、電流及
    頻率，包括使用商用頻率、所有靜態倍增器與使用真空管之振盪器裝置、
    使用固態裝置之變流器或電動發電機組設備。

第七百七十五條
工業用電熱設備不得裝設於第四百六十四條第一項規定之危險場所。但特別為
該危險場所設計者，不在此限。

第七百七十六條
工業用電熱設備輸出電路包括轉換裝置外接之接觸器、開關、匯流排及其他導
線等輸出組件，在運轉及接地故障情況下，對地之電流應加以限制，使電熱設
備之可觸及組件及其負載對地電壓不超過五十伏特。

第七百七十七條
工業用電熱設備遙控之裝設依下列規定辦理：
一、裝設多點控制供電之電熱設備，應設有互鎖裝置，使該設備一次只能通過
    一個控制點供電，且每一個控制點均可使該設備斷電。
二、腳踏開關之帶電部分不得暴露，其接觸鈕上方應有防護罩，避免意外投入
    。

第七百七十八條
工業用電熱設備之分路應符合第一百八十九條規定，其導線安培容量依下列規
定之一決定：
一、分路供電給一具以上設備之導線安培容量不得小於最大群組同時運轉設備
    銘牌標示額定電流之總和，加上其餘設備百分之一百備轉電流。銘牌未標
    示備轉電流者，銘牌標示之額定電流視為備轉電流。
二、分路供電給電動發電機組設備之導線安培容量應符合第三章第八節電動機
    電路導線規定。

第七百七十九條
工業用電熱設備之過電流保護裝置應依第二章第四節規定辦理。

第七百八十條
每具工業用電熱設備應裝設可輕易觸及之隔離設備，以隔離其電源電路，並依
下列規定辦理：
一、隔離設備應位於控制人員處可視及範圍內，或配裝附有啟斷位置可上鎖之
    固定式裝置。
二、隔離設備之額定不得小於工業用電熱設備銘牌標示之額定。電動發電機組
    設備之隔離設備應符合第三章第八節第二款規定。
三、電源電路僅供電給一具工業用電熱設備者，其隔離設備得作為工業用電熱
    設備之隔離設備。

第七百八十一條
感應加熱、感應熔解及感應熔接等電熱設備之裝設依下列規定辦理：
一、電熱設備之電源裝置端子至該設備間之導線，或至電容器組之導線，依下
    列規定裝設：
    (一)有危害人體之帶電部分應加以隔離。
    (二)導線線徑及配置應避免過熱造成短路及接地等故障。
    (三)導線之接續應避免過熱。
    (四)導線及其支持物應有絕緣及機械強度，避免短路或接地故障時危害操
        作人員。
    (五)位於高溫場所之導線溫升過高部分應裝設冷卻設備，且其絕緣應採用
        耐熱性者。
二、電熱設備應有絕緣及機械強度，避免於短路或接地故障時危害操作人員，
    並應採用耐熱及防塵埃之器材。
三、電熱設備冷卻裝置故障會引起該設備失效者，應有保護措施。

第七百八十二條
工業用電熱設備之防護依下列規定辦理：
一、引至電極或加熱線圈之導線，若有碰觸之虞，應以絕緣物掩蔽或防護。
二、連接組件應加以防護。
三、除連接組件外，轉換裝置應完整裝設於不可燃之封閉箱體內。箱門於打開
    時應有連動裝置啟斷電源。
四、所有控制盤應具正面不帶電構造。

第七百八十三條
工業用介電加熱、感應加熱、感應熔解及感應熔接之電極應設有防護罩或遮蔽
防護。所有鉸鏈檢修門、滑動面板或其他簡易裝置使人員可觸及電極者，應設
有互鎖開關，能於任一檢修門或面板等打開時，切離電極所有電源。

第七百八十四條
工業用紅外線燈電熱設備之裝設依下列規定辦理：
一、分路對地電壓不得超過一百五十伏特。但紅外線燈之裝設依下列規定辦理
    者電路對地電壓得超過一百五十伏特，且在三百伏特以下：
    (一)燈具裝設於不可輕易觸及處。
    (二)燈具不附裝以手操作之開關。
    (三)燈具直接裝設於分路。
二、分路最大電流額定應在五十安培以下。
三、燈頭不得附裝以手操作之開關，其材質應為瓷質或具有同等以上之耐熱及
    耐壓性能者。
四、帶電部分不得裝設於可觸及處。但裝設於僅有合格人員出入之場所者，不
    在此限。
五、內部配線之導線應採用一‧六毫米以上石棉、玻璃纖維等耐熱性絕緣導線
    或套有厚度一毫米以上之瓷套管並固定於瓷質，或具有同等以上效用之耐
    熱絕緣銅線。
六、內部配線之接續應採用溫升在攝氏四十度以下之接續端子。

第七百八十五條
工業用紅外線燈電熱設備之燈座額定電壓不小於電路電壓者，該燈座得串聯於
對地電壓超過一百五十伏特之電路中運轉。
由數個紅外線燈座，含其內部配線區段、面板等組裝而成者，應視為一個用電
器具，其終端接線端子應視為一專用出線口。

第七百八十六條
工業用紅外線電熱燈具之選用依下列規定辦理：
一、紅外線電熱燈具容量三百瓦特以下者，得採用中型無附開關瓷製燈座或其
    他適用之燈座。
二、紅外線電熱燈具容量超過三百瓦特，不得採用螺旋型燈座。

第七百八十七條
工業用電熱設備內部檢修依下列規定辦理：
一、工業用電熱設備裝設位置應僅限合格人員得以進入。但危險之帶電部分已
    封閉者，不在此限。
二、檢修門或可拆卸檢修面板，得作為檢修電熱設備內部之開口。
三、內部隔間有交流或直流一百五十伏特至六百伏特設備之檢修門應配裝於關
    閉時可上鎖之固定裝置，或有互鎖裝置，以避免電源電路通電時打開檢修
    門。
四、內部隔間有交流或直流超過六百伏特設備之檢修門：
    (一)應裝設機械互鎖之隔離設備，以避免工業用電熱設備通電時檢修，或
        於閉合位置上鎖或互鎖，以避免電源電路通電時打開檢修門。
    (二)可拆卸面板非供經常檢修者，應裝設牢固，使其不易移開。

第七百八十八條
工業用電熱設備內部隔間有交流或直流超過一百五十伏特之設備者，該電熱設
備應有高電壓危險之明顯警告標識，且於門打開或關閉或面板拆卸時，能讓進
入人員清楚可見。

第七百八十九條
工業用電熱設備電容器之標稱電壓六百伏特以下者，其放電裝置與時間應符合
第二百七十二條規定；標稱電壓超過六百伏特者，其放電裝置與時間應符合第
九百六十條規定。
工業用電熱設備電容器之內部壓力開關若連接至電路啟斷裝置者，得作為電容
器之過電流保護。

第七百九十條
工業用電熱設備電路運轉，及為限制工業用電熱設備所有暴露非帶電部分與大
地間、所有設備組件與周遭物體間及該周遭物體與大地間之射頻電壓至安全值
以內者，應依第二章第五節或第八章第四節規定搭接至設備接地導線，或於內
部設備互相搭接。

      第九節  電解槽
第七百九十一條
電解槽、電解生產線，及利用電源供生產鋁、鎘、氯、銅、過氧化氫、鎂、鈉
、氯化鈉與鋅等製程之電氣元件及其附屬設備配線及裝設，應依本節規定辦理
。
作為電鍍加工及生產氫氣之槽體，不適用本節規定。

第七百九十二條
本節用詞定義規定如下：
一、電解槽：指利用電能產生電化學反應，以提煉及生產可用物質之桶槽。
二、電解生產線：指以直流電源供電給電氣互連電解槽之組合。
三、電解生產線工作區：指在電解生產線或其附屬設備暴露帶電表面上或其鄰
    近位置，進行例行性操作或維護之空間範圍。
四、電解生產線附屬與輔助設備：指包括輔助槽、製程管路、通風管、結構支
    撐、電解生產線之裸露導線、導線管管槽、幫浦、定位設備及旁通配電裝
    置等。在電解生產線工作區內之輔助設備包括非接地吊車之暴露導電性表
    面，及配裝於吊車上之箱槽支援設備供運轉及維護用之輔助設備包括工具
    電銲機、坩鍋及其他可攜式設備。

第七百九十三條
電解生產線工作區應包含下列規定之任一空間，不含延伸或超出之牆壁、地板
、屋頂、隔間、隔板或類似構件：
一、在電解生產線帶電表面或帶電附屬設備上方二‧五米範圍內。
二、在電解生產線帶電表面或帶電附屬設備下方二‧五米範圍內。
三、從電解生產線帶電表面或帶電附屬設備，或前二款規定範圍向外延伸水平
    距離一米範圍內。

第七百九十四條
裝設電解生產線除下列規定外，應符合第一章至第四章規定：
一、電解生產線之導線、電解生產線工作區內之電解槽、電解生產線附屬設備
    輔助設備及裝置之配線，得免適用第二章第一節、第二節及第三章第五節
    規定。
二、電解槽製程直流電源電路之過電流保護得免適用第二章第四節規定。
三、用電設備或器具位於或使用於電解生產線工作區，或與電解生產線直流電
    源電路相關聯者，其接地得免適用第二章第五節或第八章第四節規定。

第七百九十五條
電解生產線製程之直流電源線路之接地依下列規定辦理：
一、電解生產線製程直流電源導線得免接地。
二、運轉電壓超過五十伏特之電解生產線直流電源設備金屬封閉箱體，應以下
    列規定之一接地，且其接地連接應符合第九十一條及第一百零三條規定：
    (一)經保護電驛接地。
    (二)採用六十平方毫米以上設備接地導線。

第七百九十六條
電解生產線導線選用應依下列規定辦理：
一、採用裸露、被覆或絕緣等方式之銅、銅包鋁或其他適合之材質。
二、有足夠之截面積，在最大負載條件及最高周圍溫度下，溫升不超過導體絕
    緣或導體支撐材質之安全運轉溫度。
電解生產線導線之連接應採用螺栓、熔接、夾接或壓接接頭。

第七百九十七條
裝設電解生產線隔離設備依下列規定辦理：
一、同一電解生產線製程由二個以上直流電源供電者，每個直流電源之電路側
    應有一個隔離設備。
二、可拆卸連接片或可拆卸導線得作為隔離設備。

第七百九十八條
電解生產線分流依下列規定辦理：
一、流經一個以上電解槽之電路電流，得部分或全部加以分流。
二、用來分流一個以上電解槽之導線或開關應符合第七百九十六條規定。

第七百九十九條
用電設備、用電器具及結構元件依本節規定須作接地者，應依第二章第五節或
第八章第四節規定辦理。除不得採用水管接地電極外，得採用第九十八條規定
之任何接地電極。

第八百條
裝設電解生產線工作區內可攜式用電設備或器具依下列規定辦理：
一、在電解生產線工作區內使用之可攜式用電設備或器具框架與封閉箱體不得
    接地。但符合下列規定者，不在此限：
    (一)電解生產線直流電壓不超過二百伏特者。
    (二)框架與封閉箱體設有防護者。
二、在電解生產線工作區內使用可撓軟線連接之可攜式用電設備或器具，有非
    接地框架或封閉箱體者，應連接至隔離變壓器二次側非接地系統供電之插
    座分路。
三、非接地之可攜式用電設備或器具上應有明顯標識，並配有特殊極型之插頭
    與插座組合，以避免該設備或器具連接至接地型插座，或避免非接地與被
    接地可攜式用電設備或器具不經意互換。

第八百零一條
電解生產線工作區內裝設可攜式用電器具電源電路及插座依下列規定辦理：
一、供電給可撓軟線連接可攜式用電器具之非接地型插座電路，應與電解生產
    線工作區以外之任何非接地配電系統隔離。該電路電源應透過隔離變壓器
    供電。其隔離變壓器運轉一次側電壓應為六百伏特以下，且有過電流保護
    裝置；二次側電壓不得超過三百伏特，所有電路不得接地，且於每一條導
    線有匹配額定之過電流保護裝置。
二、非接地型設備或器具之插座與其配套插頭不得有供設備接地導線連接之配
    電裝置，且應設計防止其使用於接地型插座。
三、由隔離變壓器二次側非接地系統供電之插座，應有特殊樣態及標識，且不
    得用於其他地方。

第八百零二條
在電解生產線工作區內裝設固定式與可攜式用電設備或器具依下列規定辦理：
一、由交流系統供電者，得免接地。
二、外殼、配電箱、線盒、電動機、管槽等暴露之導電性表面得免接地。
三、控制器及儀表整體裝設在電解生產線工作區域內者，得免做電路保護。
四、配裝於電解槽之電動機、轉換器、感知器、控制裝置及警鈴等輔助設備，
    或其他帶電表面，應以下列規定之一連接至用戶配線系統：
    (一)採適用於所裝設環境之多芯可撓軟線。
    (二)絕緣導線或電纜採用管槽或電纜架配線。採用金屬管槽、電纜架或類
        似金屬配線者，應選用絕緣材質阻隔其金屬材質接觸面，避免引發潛
        在電氣危險。
五、固定式用電設備或器具得搭接至電解生產線及其附屬設備或輔助設備帶電
    之導電性表面。配裝於帶電之導電性表面者應搭接於該表面。

第八百零三條
連接至電解槽及其附屬設備或輔助設備之空氣軟管、給水軟管等，應為非導電
性材質，不得為有導電性之強化鋼絲、鎧裝、編織物等物質。

第八百零四條
電解生產線工作區內裝設電動起重機及吊車依下列規定辦理：
一、電動起重機及吊車之導電性表面得免接地。高架電動起重機或吊車接觸帶
    電之電解槽或其附屬設備之部分，對地應加以絕緣。
二、電動起重機或吊車進入電解生產線工作區內之控制有引發電氣危險之虞者
    ，應採取下列一種以上之措施：
    (一)採用符合第八百零一條第一款規定之隔離及非接地控制電路。
    (二)採用非導電性纜繩之操作器。
    (三)採用非導電性支撐方式及非導電性表面或非接地暴露導電性表面之懸
        吊式按鈕。
    (四)採用無線電控制。

第八百零五條
電解生產線工作區內若有自然通風系統避免氣體累積者，得裝設一般型封閉箱
體。

      第十節  電鍍
第八百零六條
提供電力與控制作為電鍍、陽極處理、電解拋光及電解剝離等用途之電氣元件
及其附屬設備配線及裝設，應依本節規定辦理。

第八百零七條
分路供電給一個以上電鍍製程設備單元者，其導線安培容量不得小於所有連接
負載之一‧二五倍。

第八百零八條
連接電鍍槽設備至轉換設備之導線裝設依下列規定辦理：
一、五十伏特以下直流系統之絕緣導線若有防護以免遭受外力損傷者，得敷設
    於無絕緣之支持物上。採用裸銅線者，應以絕緣礙子支撐。
二、超過五十伏特直流系統之絕緣導線若有保護以免遭受外力損傷者，得敷設
    於有絕緣之支持物上。採用裸銅線者，應以絕緣礙子支撐，並依第八條規
    定加以防護。
裸銅線所在之處應有警告標識。

第八百零九條
裝設電鍍製程隔離設備依下列規定辦理：
一、直流系統由一個以上電源供電者，每個電源供應之直流側應有一個隔離設
    備。
二、可拆卸連接片或可拆卸導線得作為隔離設備。

第八百十條
電鍍製程之直流導線應有下列規定之一以上之過電流保護裝置：
一、熔線或斷路器。
二、以電流感知器操作之隔離設備。
三、其他適用之方法。

      第十一節  人造水池及類似設施
        第一款  一般規定
第八百十一條
游泳池、戲水池、噴水池、水療池及按摩浴缸等儲水設施內部設備或其周邊設
備，及其幫浦、過濾器等輔助設備之配線及裝設，應依本節規定辦理。
除本規則另有規定外，本節所稱之「水體」指儲存於前項規定設施內之水。

第八百十二條
本節用詞定義規定如下：
一、人造水池：指廠製或現場建造為永久儲水或非永久而長期儲水之設施，供
    游泳、戲水或浸水等用途。
二、噴水池：指裝有噴水設備之水池，供觀賞或展示等用途，不含公共場所提
    供之飲用水流或噴泉式裝置。
三、水療池：包括熱浸浴缸，指讓使用者浸泡，通常裝有濾水器、加熱器及電
    動機驅動鼓風機等之水池，且一般並無於每次使用後排放之設計。
四、按摩浴缸：指配備循環管路系統、幫浦及附屬設備，在每次使用時可接水
    、循環及排水之永久式建造浴缸。
五、套件式：指水療池、醫療用池等儲水設施之水循環、加熱器、幫浦、鼓風
    機、照明燈具、消毒劑產生器及控制設備等，在現場配裝於共同基座之機
    組作運轉之型式。
六、自給式：指水療池、醫療用池等儲水設施附有水循環、加熱器、幫浦、鼓
    風機、照明燈具、消毒劑產生器及控制設備之醫療用浴盆或水槽等醫療用
    池，經工廠組裝成完整機組之型式。
七、乾式壁嵌：指照明燈具裝設於水面下，包括水池、噴水池或水療池等之牆
    壁或地板，並予密封防止池水進入。
八、濕式壁嵌：指照明燈具裝設於成型外殼內，裝設於水面下，包括水池或噴
    水池之牆壁或地板等結構，得免另加密封即能完全浸泡於水中。
九、成型外殼：指一體成型適合支撐濕式壁嵌照明燈具之外殼。
十、穿牆式照明組件：指裝設於水池地板、牆壁或貫穿水池牆壁，被水池牆壁
    分隔之兩組互連照明組件。
十一、低電壓接觸限制：指限制接觸電壓不超過下列值：
      (一)交流正弦波十五伏特（均方根值）。
      (二)交流非正弦波值二十一‧二伏特。
      (三)連續之直流三十伏特。
      (四)以周波十赫茲至二百赫茲脈衝之直流值電壓十二‧四伏特。

第八百十三條
分路供電給本節規定儲水設施已依第八十七條裝設漏電斷路器者，得免依本節
規定於插座或出線口裝設漏電啟斷裝置。
儲水設施之插座或出線口已依本節規定裝設漏電啟斷裝置者，除本節另有規定
者外，得免按第八十七條規定於分路裝設漏電斷路器。

第八百十四條
下列規定之用電設備或器具用於儲水設施者，應加以接地：
一、穿牆式照明組件及水中照明燈具。但無設備接地導線之低電壓照明燈具，
    不在此限。
二、位於水體內壁一‧五米範圍內之所有用電器具。
三、附屬於水體循環系統之所有用電器具。
四、金屬接線盒。
五、變壓器及電源供應封閉箱體。
六、非屬進屋線及設備之一部分，供電給水體內用電設備或器具之配電箱。

第八百十五條
人造水池之照明燈具，除水中照明燈具外，得採用符合下列規定之附插頭可撓
軟線連接：
一、可撓軟線長度不超過九百毫米。
二、可撓軟線有表九三～二規定三‧五平方毫米以上之設備接地導線，且終端
    為接地型之插頭。
三、設備接地導線連接至照明組件之固定式金屬部分，且可拆卸部分配裝或搭
    接至固定式金屬部分。

第八百十六條
人造水池與開放式架空導線之最小間隔，應符合表八一六及圖八一六規定。
前項規定水池與架空導線之最小間隔，應由水體溢水口水位開始量測。

第八百十七條
除本節規定需供電給人造水池內設備外，地下配線不得位於水池下方，或自水
池內壁水平延伸至一‧五米範圍內下方。但採用具防腐蝕性且適用於該場所之
厚金屬導線管、薄金屬導線管或非金屬導線管配線，且埋設深度符合表八一七
規定者，不在此限。

第八百十八條
儲水設施之用電設備不得裝設於無排水設施之設備室或窪坑內。

第八百十九條
儲水設施之所有用電設備或器具，除照明燈具外，應有能同時隔離所有非接地
導線之可輕易觸及隔離設備，且位於該設備或器具處可視及範圍內，並距儲水
設施內壁起算水平距離至少一‧五米。

        第二款  人造水池
第八百二十條
人造水池之電動機配線依下列規定辦理：
一、電動機分路應採用厚金屬導線管、薄金屬導線管、PVC 管或金屬被覆電纜
    配線裝設於建築物內部或屋頂者，得採用無螺紋金屬導線管配線。
二、電動機需採用可撓連接時，得採用液密型金屬可撓導線管或非金屬可撓導
    線管及管件配線。
三、電動機得採用長度九百毫米以下，終端為附接地型插頭之可撓軟線連接。
四、電動機應有表九三～二規定三‧五平方毫米以上之設備接地導線。
附插頭可撓軟線連接雙重絕緣系統之人造水池幫浦，其雙重絕緣系統有接地裝
置僅作為內部使用且不觸及該幫浦雙重絕緣外層之非帶電金屬部分者，該幫浦
之配線應依第四章規定辦理。人造水池接地網已連接至電動機電路之設備接地
導線者，其分路配線應符合前項規定。
供電給人造水池幫浦電動機之出線口，連接至單相二百五十伏特以下、十五安
培或二十安培之分路，應裝設漏電啟斷裝置。

第八百二十一條
人造水池之插座、照明及其他用電器具依下列規定辦理：
一、插座：
    (一)供電給打水幫浦電動機，或其他循環與消毒系統有關負載之插座，與
        水池內壁間應保持一‧八米以上之間隔，且應為接地型，並具有漏電
        啟斷裝置保護。
    (二)其他用途之插座與水池內壁間應保持一‧八米以上之間隔。
    (三)一般分路裝設一個以上插座者，該插座與水池內壁間應保持一‧八米
        至六米之間隔，且距離樓地板、平台或溢水口水平面之高度不超過二
        米。
    (四)距離水池內壁六米以內之所有插座，應有漏電啟斷裝置保護。
    (五)本款規定距離之量測為電源可撓軟線連接至插座之直線路徑。
二、照明燈具、照明出線口及懸吊式風扇：
    (一)裝設於水池上方，或距離水池內壁水平向外延伸一‧五米區域內者，
        應位於水池溢水口水平面上方三‧七米以上。室內水池照明燈具為全
        密閉式，或風扇適用於陽台或露臺等天花板結構，且電源分路有漏電
        斷路器保護者，得位於水池溢水口水平面上方二‧三米以上。
    (二)既設照明燈具及照明出線口距離水池內壁水平向外延伸一‧五米內者
        ，應位於溢水口水平面上方一‧五米以上，且應有漏電啟斷裝置保護
        。
    (三)裝設於距離水池內壁水平向外延伸一‧五米至三米範圍內者，應有漏
        電啟斷裝置保護。但裝設高度超過溢水口水平面一‧五米者，不在此
        限。
    (四)附插頭可撓軟線連接之照明燈具裝設於溢水口水平面任一點直線距離
        四‧九米範圍內，應符合第八百十五條規定。
三、除有圍牆、牆壁或其他永久式隔板將開關裝置與水池隔開外，開關裝置與
    水池內壁之水平距離應保持一‧五米以上。
四、其他出線口與水池內壁間應保持三米以上之間隔。其距離之量測依第一款
    第五目規定。

第八百二十二條
於人造水池正常水位以下裝設所有照明燈具依下列規定辦理：
一、一般要求：
    (一)供電給水中照明燈具之變壓器及電源應為下列規定之一：
        1.隔離繞組型變壓器，且二次側輸出不接地，一次側與二次側繞組間
          有被接地之金屬隔板。
        2.一次側與二次側繞組間有雙重絕緣之系統。
    (二)供電給水中照明燈具之分路，運轉電壓超過低電壓接觸限制者，應裝
        有漏電斷路器。
    (三)水中照明燈具電源電路之電壓不得超過一百五十伏特。
    (四)配裝於牆壁之照明燈具應裝設於水池正常水位下方一百毫米以上。除
        適用於較淺水位使用外，照明燈具鏡片頂部至水池正常水位下方不得
        小於四百五十毫米。
    (五)裝設於水池底部朝上照射之照明燈具應有防護罩或其他具相同功能者
        ，以免人員接觸。
    (六)藉由浸泡水中方能安全運轉之照明燈具應有本質安全保護，以免未浸
        水時過熱引發危險。
二、濕式壁嵌照明燈具：
    (一)成型外殼：
        1.照明燈具裝設於成型外殼內者應配置導線管接口。
        2.照明燈具及成型外殼之金屬部分與池水接觸者，應為黃銅或其他耐
          蝕性金屬。
        3.使用非金屬導線管系統之所有成型外殼，除不需接地之低電壓照明
          系統部分外，應有八平方毫米絕緣導線作接地連接。
    (二)成型外殼至第八百二十三條規定之接線盒或封閉箱體間，應裝設符合
        下列規定之厚金屬導線管、薄金屬導線管、液密型非金屬可撓導線管
        或非金屬導線管：
        1.金屬導線管應為黃銅或其他耐腐蝕性金屬。
        2.非金屬導線管除用於不需接地之低電壓照明系統外，管內應有八平
          方毫米之絕緣導線搭接至成型外殼、接線盒，或變壓器或漏電啟斷
          裝置之封閉箱體。成型外殼上之搭接終端，應以填充物封裝，保護
          接頭避免受池水侵蝕。
    (三)設備接地：
        1.除為低電壓照明系統不需要接地外，照明燈具應有設備接地導線，
          作為燈具所有暴露非帶電金屬部分之接地。
        2.設備接地導線應連接至供電接線盒內、變壓器封閉箱體或其他封閉
          箱體內之接地端子，其線徑不得小於分路之分接導線。
    (四)照明燈具之可撓軟線終端應以填充物封裝。池水可能進入照明燈具者
        ，照明燈具之接地連接處應採用類似方式處理。
三、乾式壁嵌照明燈具：
    (一)照明燈具應有排水設施。除不需接地之低電壓照明燈具外，照明燈具
        每個導線管接口應有可容納設備接地導線之配電裝置。
    (二)照明燈具得不使用接線盒。若需使用接線盒者，其高度及位置得免適
        用第八百二十三條第一款第二目規定。
四、非壁嵌照明燈具之裝設及接地應依第二款規定辦理。若需連接至成型外殼
    者，應連接至固定支架。
五、穿牆式照明組件：
    (一)照明組件應配備螺紋之接頭、管接頭或非金屬導線管接頭，以作為電
        源導線管終端連接。
    (二)照明組件之接地應依第二款第三目規定辦理。
六、分路配線：
    (一)配線方法：
        1.電源側之分路配線經接線盒或封閉箱體連接至照明燈具供現場配線
          用隔室，應採用厚金屬導線管、薄金屬導線管、液密型非金屬可撓
          導線管或非金屬導線管配線。
        2.裝設於建築物屋頂者，得採用無螺紋金屬導線管；裝設於建築物內
          部者，得採用金屬被覆電纜或無螺紋金屬導線管。
        3.若連接至水池照明變壓器者，導線管任何一段之長度未超過一‧八
          米，或分段使用而總長度未超過三米者，得採用液密型金屬可撓導
          線管。
        4.所有配線應有設備接地導線，其線徑依表九三～二規定選用，且為
          三‧五平方毫米以上。
    (二)設備接地：
        1.除不需接地之低電壓照明燈具外，所有穿牆式照明組件及照明燈具
          應連接至電源分路之設備接地導線。
        2.設備接地導線線徑應有表九三～二規定三‧五平方毫米以上。
    (三)低電壓照明變壓器或漏電啟斷裝置負載側之導線，不得與其他導線共
        用管槽、接線盒或封閉箱體。但其他導線為下列情形之一者，不在此
        限：
        1.有漏電啟斷裝置保護。
        2.為設備接地導線。
        3.為漏電啟斷裝置之電源導線。

第八百二十三條
人造水池裝設變壓器或漏電啟斷裝置之接線盒及封閉箱體依下列規定辦理：
一、連接導線管延伸至成型外殼或非壁嵌照明燈具固定架之接線盒及封閉箱體
    (一)構造：
        1.應配有絞牙之金屬管接口、接頭或非金屬導線管接頭。
        2.應為銅、黃銅、適用之塑膠或其他耐腐蝕材質。
        3.應與其連接金屬導線管有電氣連續性。
    (二)封閉箱體及用於照明燈具運轉電壓超過低電壓接觸限制之接線盒位置
        ：
        1.垂直距離：接線盒內側底部至地面或水池平台上方之高度一百毫米
          以上。
        2.水平距離：除有實心圍籬、牆壁或永久式隔板將水池隔開外，距離
          水池內壁一‧二米以上。
    (三)用於照明系統運轉電壓在低電壓接觸限制以下，符合下列規定之接線
        盒得嵌入於平台：
        1.使用填充物填充接線盒，防止濕氣滲入。
        2.接線盒距離水池內壁一‧二米以上。
二、接線盒及封閉箱體除位於跳水台下方、鄰近固定構造物等有額外保護措施
    外不得位於水池走道。
三、濕式壁嵌或非壁嵌照明燈具或乾式壁嵌照明燈具之現場配線隔室之接線盒
    或封閉箱體設備接地導線端子，應連接至配電箱之接地端子板，且該端子
    板直接連接至配電箱體。

第八百二十四條
供電給人造水池設備分路配電箱之電源側幹線、進屋線或獨立電源供電系統負
載側之幹線，應採用厚金屬導線管或薄金屬導線管配線若無遭受外力損傷之虞
者，得採用下列配線方法：
一、非金屬導線管。
二、無螺紋金屬導線管，且裝設於建築物內。
三、金屬被覆電纜，且裝設於建築物內無腐蝕之虞者。

第八百二十五條
人造水池區域依下列規定作等電位搭接，應以八平方毫米以上絕緣導線、裸銅
線，或黃銅導線管、其他耐腐蝕金屬導線管，其連接方式應符合第九十一條規
定。
一、澆灌水泥、施加空氣或噴灑水泥，及油漆或塗料粉刷之水泥磚塊，具有水
    孔隙性及滲透性之導電性水池，應依下列規定之一搭接：
    (一)鋼筋結構於灌漿前以鋼線或同等材質加以搭接。其表面若以非導電性
        化合物封裝者，依第二目規定裝設銅導線柵網。
    (二)銅導線柵網：
        1.以裸銅線在所有交叉處互相搭接，其連接方式依第九十一條規定。
        2.沿水池外形配置垂直交叉導線方格網，其網目為三百毫米乘以三百
          毫米。
        3.牢固裝設於距離水池外殼外形或水池下方一百五十毫米以下範圍內
          。
二、周圍平台表面：
    (一)水池內壁向外水平延伸一米範圍之周圍平台表面應與水池鋼筋或銅導
        線柵網作搭接。
    (二)被高度一‧五米以上永久牆或建築物隔開而小於一米者，在永久牆或
        建築物之水池側應依下列規定之一作搭接，且沿著水池周圍平均間隔
        連接至水池鋼筋或銅導線柵網至少四個點。水池外殼為非導電性者，
        其搭接得少於四個點。
        1.鋼筋結構之搭接依前款第一目規定。
        2.非鋼筋結構，或表面以非導電性化合物封裝至少有一條八平方毫米
          以上裸銅線沿著周圍平台表面裝設一圈。該導線距離水池內壁四百
          五十毫米至六百毫米，並牢固裝設於路基以下一百毫米至一百五十
          毫米。
三、金屬組件及配件：水池結構之所有金屬組件及配件，應加以搭接。鋼筋結
    構表面若以非導電性化合物封裝者，其鋼筋得免搭接。
四、水中照明：所有非壁嵌照明燈具之金屬成型外殼及固定架應加以搭接。
五、用電器具：
    (一)水池循環系統之附屬用電器具，包括幫浦電動機、水池蓋電動機等之
        金屬組件應加以搭接。
    (二)用電器具之金屬組件整合於雙重絕緣系統者，得免搭接。
    (三)水池熱水器額定五十安培以上，且製造廠家說明書對搭接及接地有特
        別指示者，僅得在指定可搭接及接地部分作搭接及接地。
六、固定金屬部分：金屬遮蔽電纜及管槽、金屬雨篷、金屬圍籬及金屬門窗構
    架等所有固定金屬部分應加以搭接。但符合下列規定之一者，不在此限：
    (一)以永久式隔板隔開水池，防止人員碰觸者。
    (二)距離水池內壁水平方向超過一‧五米者。
    (三)距離水池溢水口上方垂直方向，或觀眾台、塔台、平台或跳水結構上
        方垂直方向超過三‧七米者。
人造水池應裝設表面積至少五千八百平方毫米之導電體與池水接觸，該面積得
由前項規定需搭接之水中組件組成。

        第三款  水療池
第八百二十六條
