        。
    (二)管路或管溝之溝底應平滑搗實，並應於管路上方覆蓋砂粒、加標示帶
        或具同等效果之方法，防護其免遭受外力損傷。
七、水氣會滲入帶電部分之導線管一端或兩端，應加以封塞。封塞材料應為可
    與電纜之絕緣、遮蔽或其他元件密封者。備用或未使用之導線管應加以密
    封。
八、纜線引上之地下裝置連接至導線管或其他管槽終端時，應有整套型封塞之
    套管或終端配件。具有外力保護特性之密封護套，得替代上列套管。

第三百零四條
地下配線採用管路或管溝方式裝設於可能需承受車輛或其他重物壓力之處者，
其管路或管溝應有耐受其壓力之強度。

第三百零五條
地下線路用之人孔及手孔裝設依下列規定辦理：
一、人孔及手孔應堅固能耐受車輛或其他重物之壓力，且有防止浸水結構。
二、人孔及手孔應有排除積水之結構。
三、人孔及手孔不宜設置在爆炸性或易燃性氣體可能進入之場所。

第三百零六條
地下配線設備及配件等裝置之非帶電金屬部分、金屬接線箱盒及電纜金屬被覆
層，應依本規則有關規定加以接地。

第三百零七條
導線管裝設於不能檢視之隱蔽處所或建築結構內者，應於部分或全部裝設完成
埋設前，由電器承裝業會同建築監工或監造技師負責檢查，作成紀錄。

第三百零八條
隱蔽於建築物內部之配線工程竣工後，應繪製詳細圖面，指明導線管線盒、導
管匣及其他配件之位置，以便檢修。

      第二節  出線盒、拉線盒、接線盒、導管穿線匣、手孔及配件
第三百零九條
出線盒、拉線盒、接線盒、導管穿線匣、手孔及管槽連接配件、連接管槽或電
纜至上列線盒及管匣配件等之裝設，應依本節規定辦理。

第三百十條
非金屬線盒應僅裝設於非金屬被覆電纜、可撓軟線或非金屬管槽之配線。但裝
設於金屬被覆電纜或金屬管槽之配線，有採用搭接導線保持其電氣連續性者，
不在此限。
採用非金屬導線管配線，其接線盒及裝接線配件應有足夠之強度。

第三百十一條
z線盒、管匣或配件裝設於濕氣場所或潮濕場所，應能防止水氣滲入或聚積於
盒內或匣內；裝設於潮濕場所者，應為適用於潮濕場所者。

第三百十二條
導線進入線盒、管匣或配件應有防止遭受磨損之保護，並依下列規定辦理：
一、導線進入線盒之開口空隙應加以封閉。
二、金屬線盒或管匣：
    (一)採用吊線支撐配線者，導線進入金屬線盒或管匣應以絕緣護套保護，
        其內部配線應牢固裝設於線盒或管匣。
    (二)管槽或電纜以金屬線盒或管匣裝設者，應固定於盒上。
三、二十二平方毫米以上之導線進入、引出線盒或管匣者，應以圓滑絕緣護套
    防護或以固定之絕緣材質與護套隔開。

第三百十三條
導線在終端接點或進入、引出配電箱或類似箱體之轉折依下列規定辦理：
一、除配線空間寬度符合表三一三規定外，導線在配電箱或類似箱體內不得轉
    折。符合第二十二條規定之並聯導線應以並聯導線數為判斷基準。
二、二十二平方毫米以上導線進入、引出配電箱或類似箱體者，應以圓滑絕緣
    護套防護，或以固定之絕緣材質與護套隔開。

第三百十四條
由嵌入式之線盒表面延伸配管時，應另裝延伸框，以延伸及固定於既設線盒，
且延伸框應以蓋板蓋住出線口；其設備接地應符合第二章第五節規定。

第三百十五條
線盒、管匣、手孔或配件之封閉箱體支撐依下列規定辦理：
一、封閉箱體裝設於建築物或其他表面者，應牢固於裝設位置。
二、封閉箱體應直接以建築物結構構件或地面作支撐，或以支架支撐於建築物
    結構構件或地面，並符合下列規定：
    (一)採用釘子及螺絲固定者，其穿過箱體背板或底板在箱體內之部分應保
        持六毫米以內。箱體內部不得有銳利稜角。
    (二)金屬支架應具有防腐蝕性，且由厚度○‧五毫米以上不含塗層之金屬
        製成。
三、封閉箱體裝設於牆面或木板之完成面者，應以適用之固定夾、螺栓或配件
    加以牢固。
四、封閉箱體裝設於懸吊式天花板結構框架者，箱體容積不得超過一千六百五
    十立方厘米，並應以下列規定之一牢固於裝設位置：
    (一)以螺栓、螺絲釘、鉚釘、夾子或具同等效果之方法將箱體固定於天花
        板結構框架。
    (二)以金屬材質吊索作為箱體之支撐，且每一個端點固定於天花板。
五、以管槽支撐封閉箱體：
    (一)箱體容積不得超過一千六百五十立方厘米。
    (二)箱體應有螺紋銜接口或適用之插孔，且有二根以上導線管旋緊於箱體
        ，每根導線管於距離箱體四百五十毫米範圍內有固定。
六、封閉箱體埋入混凝土或磚石作支撐者，應具有防腐蝕性，且牢固埋入混凝
    土或磚石。
七、懸吊式線盒或管匣：
    (一)以多芯可撓導線或可撓電纜支撐者，應以張力釋放接頭等裝置穿入線
        盒或管匣插孔旋緊，保護導線免於承受張力。
    (二)燈座、照明燈具或其他用電器具之懸吊式線盒或管匣以導線管支撐：
        1.導線管應為四百五十毫米以下之金屬導線管節，且應穿入線盒或管
          匣旋緊。
        2.僅由單一導線管支撐者：
          (1) 螺紋連接應採用螺絲釘固定或其他方法防止鬆脫。
          (2) 燈具或器具任一點距離地面高度應為二‧五米以上，且與門、
              窗、走廊、火災逃生通道或類似出入口水平距離九百毫米以上
              。

第三百十六條
線盒、管匣或配電裝置之封閉箱體應有符合下列規定之深度，以妥適容納所裝
設備，並應有足夠之強度，使其裝設於混凝土內或其他場所時，不致造成變形
或傷及箱盒內之導線：
一、箱盒內未裝有配電裝置或用電設備者，內部深度至少有二十五毫米，並加
    裝蓋子。
二、箱盒裝有配電裝置或用電設備者，內部至少有下列規定之深度，且其最小
    深度能容納該裝置或設備背面突出部分及該裝置或設備之電源導線：
    (一)配電裝置或用電設備突出於安裝面板超過四十八毫米者，箱盒深度為
        該裝置或設備厚度再加六毫米。
    (二)依配電裝置或用電設備之電源導線線徑決定箱盒大小：
        1.超過二十二平方毫米：箱盒容積超過一千六百五十立方厘米，且導
          線彎曲空間符合第三百十三條規定。
        2.八平方毫米至二十二平方毫米：箱盒深度為五十二毫米以上。
        3.三‧五平方毫米至五‧五平方毫米：箱盒深度為三十毫米以上。
        4.二‧○毫米以下：箱盒深度為二十五毫米以上。

第三百十七條
全部裝設完成後，每一線盒、管匣及出線口應有蓋板、面板、燈座或燈具罩，
其裝設依下列規定辦理：
一、蓋板及面板採用金屬材質者，應加以接地。
二、暴露於燈具罩邊緣及線盒或管匣間之任何可燃性牆壁或天花板，應以非可
    燃性材質覆蓋。

第三百十八條
出線盒之裝設依下列規定辦理：
一、照明燈具及插座之裝設位置應採用出線盒。但明管配線之末端或類似情況
    得採用木台。
二、出線盒裝設符合第三百十五條規定，並能承受照明燈具、燈座或用電器具
    之重量，且其重量未超過二十三公斤者，得支撐該燈具、燈座或用電器具
    於牆壁或天花板。若該燈具、燈座或用電器具重量超過二十三公斤，以出
    線盒支撐於天花板時，應另有其他獨立且牢固之支撐。
三、以出線盒或其系統作為懸吊式風扇唯一支撐者，應採用製造廠家說明書指
    示適合此用途者，且風扇重量不得超過三十二公斤。
四、出線盒供地板內插座使用者，應採用適合裝設於地板者。

第三百十九條
拉線盒、接線盒或導管穿線匣之裝設依下列規定辦理：
一、導線管內或電纜之載流導線為二十二平方毫米以上者，其線盒或管匣最小
    容積依下列規定辦理：
    (一)直線拉線：線盒或管匣之長度不得小於導線管中最大標稱管徑八倍。
    (二)轉彎、Ｕ型拉線或接續：
        1.導線管進入線盒或管匣側至該盒底部之長度，不得小於導線管最大
          標稱管徑六倍。有其他導線管進入時，其長度應再增加同一側同一
          排其他導線管直徑之總和。
        2.每一排導線管應個別計算，再取其中一排算出之最大距離者為基準
          。
    (三)所有導線外徑截面積總和占導線管截面積小於依表三二八～八規定計
        算之最大容積者，線盒或管匣之最小容積得小於前二目規定。
二、線盒之長度、寬度或高度若超過一‧八米者，盒內所有導線應綁住或放在
    支架上。
三、所有線盒或管匣應有蓋板，其材質應與線盒或管匣具相容性，且適合其使
    用條件。為金屬材質者，應加以接地。
四、若線盒內裝有耐久隔板加以區隔者，每一區間應視為個別線盒。
五、供導體連接用之配線端子台符合下列規定者，得裝設於容積超過一千六百
    五十立方厘米之線盒或管匣內：
    (一)配線端子台尺寸不小於其製造廠家說明書指示。
    (二)配線端子台不會暴露任何未絕緣帶電部分。

第三百二十條
線盒、管匣或手孔之裝設應使作業人員可觸及其內部配線，無需移開建築物任
何部分，或挖開人行道、舖設地面或其他舖設地面之物體。但線盒、管匣或手
孔以碎石、輕質混凝土或無粘著力之粒狀泥土覆蓋，且其設置位置能有效識別
及可觸及以便挖掘者，不在此限。

第三百二十一條
金屬材質線盒、管匣或配件之選用依下列規定辦理：
一、線盒、管匣或配件應為耐腐蝕性者，或內外面鍍鋅、上釉或有其他防腐蝕
    處理。
二、線盒、管匣或配件應有足以承受所裝設備或導線之強度及硬度。
三、每一個金屬線盒或管匣應有可供設備接地導線連接用之設施。該設施得為
    螺紋孔或具同等效果之方法。

第三百二十二條
出線盒或導管穿線匣之蓋板上有孔洞供可撓軟線引出者，應採用護套加以防護
。若同一回路導線分開穿過金屬蓋板，每個孔洞應配有絕緣材質護套保護每條
通過之導線，且孔洞間有切割一條相連狹縫，以保持磁場平衡。

第三百二十三條
金屬導線管、金屬可撓導線管、非金屬導線管及非金屬可撓導線管之彎曲依下
列規定辦理：
一、彎曲時不得使導線管遭受損傷，且其管內直徑不得因彎曲而減少。
二、於兩線盒或管匣間，金屬導線管、金屬可撓導線管、非金屬導線管轉彎不
    得超過四個，非金屬可撓導線管轉彎不得超過三個；其每一內彎角不得小
    於九十度。
三、彎曲處內側半徑不得小於導線管內徑六倍。
四、液密型金屬可撓導線管裝設於暴露場所或可供點檢之隱蔽處所而能將導線
    管卸下者，其彎曲處內側半徑不得小於導線管內徑三倍。

      第三節  金屬導線管配線
第三百二十四條
金屬導線管為鐵、鋼、銅、鋁及合金等製成品。常用導線管按其形式及管壁厚
度如下：
一、厚金屬導線管、薄金屬導線管：有螺紋、圓形鋼製之金屬管，按管壁厚度
    而有厚薄之分。
二、無螺紋金屬導線管（Electric Metallic Tubing,EMT）：無螺紋、薄壁之
    圓形金屬管。

第三百二十五條
金屬導線管不得裝設於下列情形或場所：
一、發散腐蝕性物質場所。
二、含有酸性或腐蝕性之泥土中。
三、潮濕場所。但所有支撐物、螺栓、護管鐵、管夾、螺絲或類似配件具耐腐
    蝕材質，或另有耐腐蝕材質保護者，不在此限。
薄金屬導線管不得裝設於前項規定及下列情形或場所：
一、第四百六十四條第一項規定之危險場所。但另有規定者，不在此限。
二、有重機械碰傷場所。
三、超過六百伏特之高壓配管工程。
無螺紋金屬導線管不得裝設於前二項規定情形或場所，亦不得作為照明燈具或
其他設備之支撐。

第三百二十六條
不同材質金屬導線管之間應避免互相接觸，以免產生電蝕效應。

第三百二十七條
金屬導線管之選用依下列規定辦理：
一、金屬導線管應有足夠之強度，其內部管壁應光滑，以免損傷導線之絕緣。
二、金屬導線管內外表面應鍍鋅。但裝設於乾燥之室內及埋設於不潮濕之建築
    物內者，其內外表面得塗有其他防鏽之物質。

第三百二十八條
金屬導線管管徑之選定依下列規定辦理：
一、線徑相同之導線穿在同一管內時，管徑應依表三二八～一至表三二八～三
    規定選定。
二、管長六米以下無顯著彎曲，導線容易更換，且穿在同一管內之線徑相同，
    並在八平方毫米以下者，管徑得依表三二八～四規定選定，其餘得依表三
    二八～五計算所得之導線外徑截面積總和不超過表三二八～六或表三二八
    ～七規定導線管截面積百分之六十選定。
三、線徑不同之導線穿在同一管內者，管徑得依表三二八～五計算所得之導線
    外徑截面積總和不超過表三二八～六或表三二八～七規定導線管截面積百
    分之四十選定。
四、單芯電纜、多芯電纜或其他絕緣導線穿在管內不依前三款規定辦理者，管
    徑得依表三二八～八規定選定。

第三百二十九條
金屬導線管終端切斷處，應加以整修或去除粗糙邊緣，使導線出入口平滑，不
致有損傷導線絕緣或被覆之虞。金屬導線管若於現場絞牙，應採用絞牙模具處
理。
無螺紋金屬導線管不得絞牙。但採用工廠製造之整套型絞牙連接接頭，並設計
能防止導線管絞牙彎曲者，不在此限。

第三百三十條
金屬導線管以明管裝設時之固定及支撐依下列規定辦理：
一、固定：
    (一)於每一個線盒、管匣、配電箱或導線管終端九百毫米以內，應以護管
        鐵、管夾或類似配件加以固定。
    (二)結構構件若不易固定於九百毫米以內者，得於一‧五米以內加以固定
        。
二、支撐：
    (一)金屬導線管每隔二米以內，應以護管鐵、管夾或類似配件加以支撐。
    (二)從工業機器或固定式設備延伸之暴露垂直導線管，若中間為絞牙連接
        ，導線管最頂端及底端有支撐及固定，且無其他有效之中間支撐方法
        者，得每隔六米以內作支撐。

第三百三十一條
金屬導線管及其配件之連接依下列規定辦理：
一、金屬導線管以管子接頭互相連接時，其絞牙應充分絞合。
二、金屬導線管與其配件之連接，其配件之兩側應用制止螺絲圈銜接或以其他
    方式妥為連接。
三、金屬導線管及其配件應牢固裝設於建築物。
四、金屬導線管進入線盒、配件或其他封閉箱體，管口應裝設護圈或護套保護
    導線，以免導線損傷。但線盒、配件或封閉箱體之設計有此保護者，不在
    此限。

      第四節  金屬可撓導線管配線
第三百三十二條
金屬可撓導線管按其構造分類，常用類型如下：
一、一般型：由金屬片捲成螺旋狀製成者。
二、液密型：由金屬片與纖維組合製成之緊密且有耐水性者。

第三百三十三條
金屬可撓導線管不得裝設於下列情形或場所：
一、易遭受外力損傷之處。但有防護裝置者，不在此限。
二、升降機之升降路。但配線終端至各機器間之可撓配管者，不在此限。
三、第四百六十四條第一項規定之危險場所。但另有規定者，不在此限。
四、直埋地下或混凝土中。但液密型金屬可撓導線管適用直埋地下者，不在此
    限。
五、長度超過一‧八米者。
六、周圍溫度及導線運轉溫度超過導線管耐受溫度者。
一般型金屬可撓導線管除用於連接發電機、電動機等旋轉機具有可撓必要之接
線部分外，不得裝設於下列情形或場所：
一、隱蔽處所。但可供點檢者，不在此限。
二、潮濕場所。
三、蓄電池室。
四、暴露於石油或汽油之場所，且對所裝設之導線有劣化效應者。

第三百三十四條
金屬可撓導線管厚度應在○‧八毫米以上。

第三百三十五條
金屬可撓導線管管徑之選定依下列規定辦理：
一、線徑相同之導線穿在同一一般型金屬可撓導線管內時，管徑應依表三二八
    ～一規定選定。
二、線徑相同之導線穿在同一液密型金屬可撓導線管內時，管徑應依表三三五
    ～一及表三三五～二規定選定。
三、導線管彎曲少，導線容易穿入及更換，且穿在同一管內之線徑相同，並在
    八平方毫米以下者，管徑得依表三三五～三規定選定，其餘得依表三二八
    ～五、表三三五～四計算所得之導線外徑截面積總和不超過表三三五～五
    規定導線管截面積百分之四十八選定。
四、線徑不同之導線穿在同一管內時，管徑得依表三二八～五、表三三五～四
    計算所得之導線外徑截面積總和不超過表三三五～五規定導線管截面積百
    分之三十二選定。

第三百三十六條
金屬可撓導線管及其配件之所有管口，應加以整修或去除粗糙邊緣，使導線出
入口平滑不致有損傷導線絕緣或被覆之虞。但其具螺紋之配件可以旋轉進入導
線管內者，不在此限。

第三百三十七條
金屬可撓導線管以明管裝設時，於每一個線盒、管匣、配電箱或導線管終端三
百毫米以內，應以護管鐵、管夾或類似配件加以固定，且每隔一‧五米以內，
應以護管鐵、管夾或類似配件加以支撐。但於設備終端之固定有困難者，其固
定距離得免受上列規定限制。

第三百三十八條
金屬可撓導線管及其配件之連接依下列規定辦理：
一、金屬可撓導線管與其配件之連接應有良好之機械連續性及電氣連續性，並
    連接牢固。
二、金屬可撓導線管互相連接時，應以管子接頭妥為連接。
三、金屬可撓導線管與接線盒或配電箱連接時，應以終端接頭連接。
四、金屬可撓導線管與金屬導線管或金屬導線槽之配線連接時，應採用管子接
    頭、終端接頭或其他方式妥為連接，並使其具機械連續性及電氣連續性。

第三百三十九條
金屬可撓導線管連接至設備，其接地及搭接應依第二章第五節規定辦理。
金屬可撓導線管應採用一‧六毫米以上裸軟銅線或二‧○平方毫米以上裸軟絞
線作為搭接導線，且此附加之裸軟銅線或裸軟絞線應與金屬可撓導線管一併裝
設，保持導線管兩端有電氣連續性。

      第五節  非金屬導線管配線
第三百四十條
非金屬導線管按其材質分類，常用類型如下：
一、硬質聚氯乙烯導線管（簡稱 PVC  管）：以硬質聚氯乙烯製成之電氣用圓
    形非金屬導線管。
二、高密度聚乙烯導線管（簡稱 HDPE 管）：以高密度聚乙烯製成之電氣用圓
    形非金屬導線管。

第三百四十一條
非金屬導線管不得裝設於下列情形或場所：
一、第四百六十四條第一項規定之危險場所。但另有規定者，不在此限。
二、周圍溫度超過攝氏五十度之場所。但製造廠家說明書指示適用者，不在此
    限。
三、絕緣導線或電纜之絕緣物最高容許溫度超過導線管之額定耐受溫度者。但
    絕緣導線或電纜之安培容量以導線管之額定耐受溫度計算，或符合第二十
    五條第八款規定者，不在此限。
PVC 管不得裝設於前項規定及下列情形或場所：
一、潮濕場所。但管路系統能防止水氣滲入 PVC  管中，且所有支撐物、螺栓
    、護管鐵、管夾、螺絲或類似配件具耐腐蝕材質，或另有耐腐蝕材質保護
    者不在此限。
二、作為照明燈具或其他設備之支撐。
三、易遭受外力損傷之處。
HDPE  管不得裝設於第一項規定及下列情形或場所：
一、暴露場所。
二、建築物內。
三、直埋於混凝土厚度小於五十毫米。

第三百四十二條
非金屬導線管之選用依下列規定辦理：
一、PVC 管：
    (一)裝設於地面上者，應能耐燃、耐壓裂及耐衝擊；使用時可能遭遇溫度
        極大變化者，應能耐熱避免歪曲變形或耐低溫；暴露於陽光直接照射
        者，應能耐日照。
    (二)裝設於地面下者，應能耐濕、耐腐蝕，及具有足夠強度使其於搬運、
        裝設過程中能耐壓裂及耐衝擊。
二、HDPE  管應能耐濕、耐腐蝕，及具有足夠強度使其於搬運、裝設過程中能
    耐壓裂及耐衝擊。非直埋於混凝土內者應能承受裝設後持續之荷重。

第三百四十三條
非金屬導線管管徑之選定依下列規定辦理：
一、線徑相同之導線穿在同一管內時，管徑應依表三四三～一及表三四三～二
    規定選定。
二、管長六米以下無顯著彎曲，導線容易更換，且穿在同一管內之線徑相同，
    並在八平方毫米以下者，管徑得依表三四三～三規定選定，其餘得依表三
    二八～五計算所得之導線外徑截面積總和不超過表三四三～四規定導線管
    截面積百分之六十選定。
三、線徑不同之導線穿在同一管內者，管徑得依表三二八～五計算所得之導線
    外徑截面積總和不超過表三四三～四規定導線管截面積百分之四十選定。
四、單芯電纜、多芯電纜或其他絕緣導線穿在管內不依前三款規定辦理者，管
    徑得依表三二八～八規定選定。

第三百四十四條
非金屬導線管之裝設依下列規定辦理：
一、非金屬導線管之所有管口內外應加以整修或去除粗糙邊緣，使導線出入口
    平滑，不致有損傷導線絕緣或被覆之虞。
二、非金屬導線管互相連接，或與接線盒連接應考慮溫度變化在連接處裝設伸
    縮配件。
三、在混凝土內集中配管不得減少建築物之強度。

第三百四十五條
非金屬導線管進入線盒、配件或其他封閉箱體，管口應裝設護套或施作喇叭口
、擴管保護導線，以免導線損傷。

第三百四十六條
PVC 管以明管裝設時，應依表三四六規定值加以支撐，且距離下列位置三百毫
米以內，應裝設護管鐵、管夾或類似配件加以固定：
一、配管之兩端。
二、管與配件連接處。
三、管與管連接處。
PVC 管互相間，及管與配件相接之長度，應為管徑一‧二倍以上，且其連接處
應裝設牢固。使用粘劑者，相接長度得降低至管徑○‧八倍。

      第六節  非金屬可撓導線管配線
第三百四十七條
非金屬可撓導線管指由合成樹脂材質製成，並搭配專用之接頭及配件，作為電
力及控制導線裝設用，按其特性分類常用類型如下：
一、PF（plastic flexible）管：具有耐燃性之塑膠可撓管，其內壁為圓滑狀
    外層為波浪狀之單層管。
二、CD（ combined duct）管：非耐燃性之塑膠可撓管，其內壁為圓滑狀、外
    層為波浪狀之單層管。

第三百四十八條
非金屬可撓導線管不得裝設於下列情形或場所：
一、電壓超過六百伏特者。
二、第四百六十四條第一項規定之危險場所。
三、作為照明燈具及其他設備之支撐。
四、周圍溫度超過導線管耐受溫度之場所。
五、絕緣導線或電纜之絕緣物最高容許溫度超過導線管之額定耐受溫度者。但
    絕緣導線或電纜之安培容量以導線管之額定耐受溫度計算，或符合第二十
    五條第八款規定者，不在此限。
PF  管不得裝設於前項規定及下列情形或場所：
一、易遭受外力損傷之處。
二、隱蔽處所。但可供點檢者，不在此限。
三、長度超過一‧八米者。但依第三百五十三條規定固定者，不在此限。
CD  管僅得埋設於具防火時效一小時以上之實心牆壁、梁、柱、樓地板內，並
妥為固定。

第三百四十九條
非金屬可撓導線管管徑之選定依下列規定辦理：
一、線徑相同之導線穿在同一管內時，管徑應依表三四九～一及表三四九～二
    規定選定。
二、導線管彎曲少，導線容易穿入及更換，且穿在同一管內之線徑相同，並在
    八平方毫米以下者，管徑得依表三四九～三規定選定；其餘得依表三二八
    ～五、表三四九～四計算所得之導線外徑截面積總和不超過表三四九～五
    規定導線管截面積百分之四十八選定。
三、線徑不同之導線穿在同一管內時，管徑得依表三二八～五、表三四九～四
    計算所得之導線外徑截面積總和不超過表三四九～五規定導線管截面積百
    分之三十二選定。

第三百五十條
非金屬可撓導線管之管口處理、伸縮，及於混凝土內集中配管，應依第三百四
十四條規定。
非金屬可撓導線管不得直接互相連接，連接時應採用接線盒、管子接頭或連接
器。

第三百五十一條
非金屬可撓導線管進入線盒、配件或其他封閉箱體，管口應裝設護套保護導線
，以免導線損傷。

第三百五十二條
採用非金屬可撓導線管配線，其導管穿線匣、接線盒及裝接線配件，應有足夠
之強度。

第三百五十三條
PF  管以明管裝設時，應於導線管每隔九百毫米處或距離下列位置三百毫米以
內處，裝設護管鐵、管夾或類似配件加以固定。但於設備終端之固定有困難者
，其固定距離得免受上列規定限制。
一、配管之兩端。
二、管與配件連接處。
三、管與管連接處。
非金屬可撓導線管互相間，及管與接線盒相接之長度，應依第三百四十六條第
二項規定。

      第七節  電纜架裝置
第三百五十四條
電纜架係一個以上單元或區段組合，組成一個結構系統，在電纜數量較多時，
用於固定或支撐電纜及導線管。
電纜架若直接暴露於陽光直接照射下，電纜架內之導線應為耐日照者。
電纜架不得裝設於吊車或易遭受外力損傷之處。

第三百五十五條
電纜架之選用依下列規定辦理：
一、電纜架應有足夠強度及硬度，以支撐所有配線。
二、不得有尖銳邊緣、鋸齒狀或突出物，以免導線絕緣被覆或外皮損傷。
三、電纜架系統應有耐腐蝕性。
四、電纜架應有邊欄或同等結構之構造。
五、電纜架應有配件或以其他方式改變電纜架系統之方向及高度。
六、非金屬電纜架應以耐燃性之材質製成。

第三百五十六條
電纜架之裝用依下列規定辦理：
一、MI  電纜、金屬被覆電纜、非金屬被覆電纜、金屬導線管、金屬可撓導線
    管 PVC  管、非金屬可撓導線管，得敷設於電纜架系統。
二、在有合格人員維修及管理監督之用電設備場所，單芯電纜符合下列規定之
    一者，得敷設於電纜架系統：
    (一)五十平方毫米以上之單芯電纜。
    (二)小於五十平方毫米單芯電纜敷設於堅實底板型、實底槽型電纜架，或
        依第三百六十一條第一款第四目規定敷設於梯型或通風底板型電纜架
        。
    (三)一百平方毫米以下單芯電纜敷設於梯型電纜架，其電纜架容許橫桿間
        隔為二百二十五毫米以下。
三、設備接地導線得採用單芯之絕緣導線、電纜或裸銅線裝設。計算電纜敷設
    於電纜架之數量時，設備接地導線及搭接導線之截面積得不計入。
四、電纜架裝設於危險場所者，應依第五章有關規定辦理。
五、除本規則另有規定外，非金屬電纜架得裝設於腐蝕性場所及有作電壓隔離
    之場所。

第三百五十七條
電纜架之裝設依下列規定辦理：
一、電纜架裝設應為完整之系統，現場彎曲或整修應保持電纜架系統之電氣連
    續性。
二、電纜架必要時應採用非易燃性之蓋板或封閉箱體加以保護。
三、電纜架穿過隔板、牆壁、台架或地板者，應符合第二百八十八條第一項第
    五款規定。
四、除前款規定外，電纜架應為暴露且可觸及者。
五、電纜架應有足夠空間以供電纜敷設及維護。
六、電纜架連接導線管時，其邊欄不得開孔。
七、電纜架位於由合格人員維修及管理監督之工業廠區內，且電纜架系統可承
    載荷重者，得用於支撐線盒或管匣。若線盒或管匣附掛於電纜架系統之底
    部或側面，其固定及支撐應符合第三百十五條規定。
八、電纜架內之電纜超過六百伏特者，應有標明高電壓危險之耐久且明顯警告
    標識，並設置於電纜架系統處可視及範圍內，且每隔三米以內應有該警告
    標識。

第三百五十八條
金屬電纜架之接地及搭接依下列規定辦理：
一、金屬電纜架不得作為設備接地導線使用。
二、金屬電纜架搭接至接地系統應採用二十二平方毫米搭接導線。
三、金屬電纜架系統連接處或機械性中斷處應以搭接導線或接地銅片將兩區段
    之電纜架，或電纜架與分接之金屬導線管或設備間加以搭接。電纜架區段
    搭接導線線徑或接地銅片截面積不得小於二十二平方毫米。電纜架與分接
    之金屬導線管或設備之搭接導線線徑應為二十二平方毫米或依表九三～二
    規定選用。

第三百五十九條
電纜架內電纜之敷設依下列規定辦理：
一、六百伏特以下之電纜得敷設於同一電纜架。
二、不同電壓等級電纜敷設於同一電纜架時，應符合下列規定之一：
    (一)超過六百伏特之電纜為金屬被覆電纜。
    (二)超過六百伏特之電纜與六百伏特以下之電纜敷設於同一電纜架者，以
        電纜架相容材質之硬隔板加以隔開。
三、電纜連接位置可觸及，且不易遭受外力損傷者，得在電纜架內作連接，惟
    連接後不會凸出電纜架邊欄。

第三百六十條
六百伏特以下之多芯電纜敷設於單一電纜架之數量不得超過下列規定：
一、梯型或通風底板型電纜架：
    (一)敷設電力、控制混合之電纜者，電纜最多數量規定如下：
        1.電纜單條芯線截面積為一百平方毫米以上者，所有電纜直徑總和不
          超過電纜架內淨寬度，且所有電纜僅容許單一層敷設。
        2.電纜單條芯線截面積小於一百平方毫米者，所有電纜截面積總和不
          超過表三六○～一規定電纜架內淨寬度所對應第一欄最大容許敷設
          截面積。
        3.電纜單條芯線截面積一百平方毫米以上與小於一百平方毫米敷設於
          同一電纜架，而小於一百平方毫米之所有電纜截面積總和，不超過
          表三六○～一規定電纜架內淨寬度所對應第二欄最大容許敷設截面
          積。電纜單條芯線截面積一百平方毫米以上者，僅容許單一層敷設
          。
    (二)敷設控制或信號電纜者，電纜最多數量規定如下：
        1.電纜架內部深度為一百五十毫米以下者，在任何區段之所有電纜截
          面積總和不超過電纜架容許敷設截面積百分之五十。
        2.電纜架內部深度超過一百五十毫米者，以一百五十毫米計算電纜架
          容許敷設截面積。
二、堅實底板型電纜架：
    (一)敷設電力、控制混合之電纜者，電纜最多數量規定如下：
        1.電纜單條芯線截面積一百平方毫米以上者，所有電纜直徑總和不超
          過電纜架內淨寬度百分之九十，且電纜僅容許單一層敷設。
        2.電纜單條芯線截面積小於一百平方毫米者，所有電纜截面積總和不
          超過表三六○～一規定電纜架內淨寬度所對應第三欄最大容許敷設
          截面積。
        3.電纜單條芯線截面積一百平方毫米以上與小於一百平方毫米敷設於
          同一電纜架者，小於一百平方毫米之所有電纜截面積總和不超過表
          三六○～一規定電纜架內淨寬度所對應第四欄最大容許敷設截面積
          。電纜單條芯線截面積一百平方毫米以上者，僅容許單一層敷設。
    (二)敷設控制或信號電纜者，電纜最多數量規定如下：
        1.電纜架內部深度為一百五十毫米以下者，在任何區段之所有電纜截
          面積總和不超過電纜架容許敷設截面積百分之四十。
        2.電纜架內部深度超過一百五十毫米者，以一百五十毫米計算電纜架
          容許敷設截面積。
三、通風槽型電纜架敷設任何型式電纜：
    (一)電纜架僅敷設一條多芯電纜者，電纜截面積不超過表三六○～二規定
        電纜架內淨寬度所對應第一欄最大容許敷設截面積。
    (二)電纜架敷設超過一條多芯電纜者，所有電纜截面積總和不超過表三六
        ○～二規定電纜架內淨寬度所對應第二欄最大容許敷設截面積。
四、實底槽型電纜架敷設任何型式電纜：
    (一)電纜架僅敷設一條多芯電纜者，電纜截面積不超過表三六○～三規定
        電纜架內淨寬度所對應第一欄最大容許敷設截面積。
    (二)電纜架敷設超過一條多芯電纜者，所有電纜截面積總和不超過表三六
        ○～三規定電纜架內淨寬度所對應第二欄最大容許敷設截面積。

第三百六十一條
六百伏特以下單芯電纜應平均配置於電纜架，且敷設於單一電纜架區段之數量
不得超過下列規定：
一、梯型或通風底板型電纜架：
    (一)電纜芯線截面積為五百平方毫米以上，或為五十平方毫米至一百平方
        毫米者，所有電纜直徑總和不超過電纜架內淨寬度，且所有電纜僅容
        許單一層敷設。每一回路之所有電纜綁紮成一束者，得免以單一層敷
        設。
    (二)電纜芯線截面積為一百二十五平方毫米至四百五十平方毫米者，所有
        電纜截面積總和不超過表三六一規定電纜架內淨寬度所對應第一欄最
        大容許敷設截面積。
    (三)電纜芯線截面積五百平方毫米以上與一百二十五平方毫米至四百五十
        平方毫米敷設於同一電纜架者，所有一百二十五平方毫米至四百五十
        平方毫米之電纜截面積總和不超過表三六一規定電纜架內淨寬度所對
        應第二欄最大容許敷設截面積。
    (四)電纜芯線截面積小於五十平方毫米，每一回路以三條或四條電纜綁紮
        成一束，並採單一層敷設，有最大電纜直徑二‧一五倍之間隔，且每
        隔一‧五米以內固定。
二、堅實底板型電纜架：
    (一)電纜芯線截面積為五百平方毫米以上，或為五十平方毫米至一百平方
        毫米者，所有電纜直徑總和不超過電纜架內淨寬度百分之九十，且所
        有電纜僅容許單一層敷設。
    (二)電纜芯線截面積為一百二十五平方毫米至四百五十平方毫米者，所有
        電纜截面積總和不超過表三六一電纜架內淨寬度所對應第一欄最大容
        許敷設截面積百分之八十五。
    (三)電纜芯線截面積小於五十平方毫米者，所有電纜直徑總和不超過電纜
        架內淨寬度百分之九十，且每一回路以三條或四條電纜綁紮成一束，
        該成束電纜採單一層敷設。
三、通風槽型電纜架寬度為五十毫米、七十五毫米、一百毫米或一百五十毫米
    者，所有電纜直徑總和不超過通風槽內淨寬度。
四、實底槽型電纜架：依第四百十七條規定辦理。

第三百六十二條
六百伏特以下之電纜敷設於電纜架之安培容量依下列規定選定：
一、多芯電纜依第三百六十條規定單一層敷設於電纜架：
    (一)電纜間未保持間隔者，其安培容量應依表三六二～一規定。敷設於有
        堅實不透風蓋板一‧八米以上之電纜架者，電纜安培容量不得大於表
        三六二～一規定值百分之九十五。
    (二)電纜之間隔為電纜直徑以上者，視同於空氣中配線，其安培容量得依
        表三六二～二規定。
    (三)電纜芯線超過三條者，應依表二五～六規定之修正係數修正。
二、單芯電纜依前條規定敷設於電纜架：
    (一)單芯電纜單一層敷設於電纜架，且電纜之間隔為電纜直徑以上者，其
        安培容量應依表三六二～三規定。敷設於有堅實不透風蓋板一‧八米
        以上之電纜架者，電纜安培容量不得大於表三六二～三規定值百分之
        九十二。
    (二)二百五十平方毫米以下之單芯電纜單一層敷設於電纜架，且電纜間未
        保持間隔者，其安培容量不得大於表三六二～三規定值百分之六十五
        。敷設於有堅實不透風蓋板一‧八米以上之電纜架者，電纜安培容量
        不得大於表三六二～三規定值百分之六十。
    (三)三百平方毫米以上之單芯電纜單一層敷設於電纜架，且電纜間未保持
        間隔者，其安培容量不得大於表三六二～三規定值百分之七十五。敷
        設於有堅實不透風蓋板一‧八米以上之電纜架者，電纜安培容量不得
        大於表三六二～三規定值百分之七十。
    (四)單芯電纜以三條或四條綁紮成一束敷設於電纜架，彼此間隔為最大電
        纜直徑二‧一五倍以上者，電纜安培容量應依表三六二～四規定。敷
        設於有堅實不透風蓋板一‧八米以上之電纜架者，電纜安培容量不得
        大於表三六二～四規定值百分之九十二。
三、同一電纜架敷設多芯電纜及單芯電纜時，多芯電纜截面積占表三六○～一
    規定容許截面積之百分比，與單芯電纜截面積占表三六一規定容許截面積
    之百分比，兩者之和不得超過百分之百，多芯電纜與單芯電纜之安培容量
    應分別依前二款計算。

第三百六十三條
電纜架及其內部電纜應加以固定及支撐，並依下列規定辦理：
一、電纜架之固定及支撐間隔應能承擔纜架上之荷重。
二、水平裝設以外之電纜應牢固裝設於電纜路徑之電纜架橫桿。
三、電纜由電纜架系統進入管槽時，應加以支撐以防止電纜遭受應力。
四、電纜架支撐個別電纜由一電纜架通過另一電纜架，或由電纜架至管槽，或
    由電纜架至設備者，在電纜架之間，或電纜架與管槽、設備之間，其間隔
    不得超過一‧八米。
五、電纜在轉換位置應固定於電纜架，並應有防護設施，或選擇在不致遭受外
    力損傷之處。

      第八節  以吊線支撐配線
第三百六十四條
以吊線支撐配線係指採用吊線支撐電纜之一種暴露配線支撐系統，並依下列規
定之一裝設者：
一、以有吊環及托架之吊線作電纜之支撐。
二、以吊線現場綁紮電纜之支撐方式。
三、工廠組裝之架空電纜。

第三百六十五條
以吊線支撐配線不得裝設於下列情形或場所：
一、支撐 MI 電纜、金屬被覆電纜、多芯電纜、電力及控制電纜以外之電纜。
二、非由合格人員維修及管理監督之工業廠區。
三、升降機之升降路。
四、易遭受外力損傷之處。
以吊線支撐之電纜選用依下列規定辦理：
一、若會暴露於風雨，電纜應為適用於潮濕場所者。
二、若會暴露於陽光直接照射，電纜應為耐日照者。

第三百六十六條
以吊線支撐依下列規定辦理：
一、吊線應在末端及中間位置加以支撐。電纜不得與支撐吊線或任何結構構件
    牆壁或導管等接觸。
二、以吊線架設電纜，其支持點間隔應為十五米以下，且能承受該電纜重量。
    該吊線架設之電纜不得受有張力，並應採用吊鉤或紮線妥為架設，其間隔
    應保持五百毫米以下。

第三百六十七條
吊線及吊設電纜所連結之封閉箱體，於電氣系統為接地系統時，應連接至被接
地系統導線，而為非接地系統時，應連接至設備接地導線。

      第九節  可撓軟線或可撓電纜
第三百六十八條
可撓軟線或可撓電纜之安培容量應符合表三六八規定。

第三百六十九條
可撓軟線或可撓電纜之個別導線應為可撓性絞線，其截面積應為一‧○平方毫
米以上。但為廠製用電器具之附插頭可撓軟線者，不在此限。

第三百七十條
可撓軟線或可撓電纜不得裝設於下列情形或場所：
一、永久性分路配線。
二、穿過牆壁、建築物結構體之天花板、懸吊式天花板或地板。
三、穿過門、窗或其他類似開口。
四、附裝於建築物表面。但符合第四百五十條第二款規定者，不在此限。
五、隱藏於牆壁、地板、建築物結構體天花板或位於懸吊式天花板上方。
六、易遭受外力損傷之處。
附插頭可撓軟線應由插座出線口引接電源。

第三百七十一條
可撓軟線或可撓電纜穿過蓋板、線盒或類似封閉箱體之開口時，應裝設護套保
護導線，以免導線損傷。
可撓軟線或可撓電纜裝設於由合格人員維修及管理監督之場所者，得穿在長度
不超過十五米之地面上管槽內，以免遭受外力損傷。

第三百七十二條
插座、可撓軟線連接器或附接插頭之構造，應採用使其不致誤接不同電壓、電
流額定之裝置。

第三百七十三條
插座出線口應裝設於分路，並符合第四十六條至第四十八條及下列規定：
一、插座裝設於十五安培或二十安培分路應採用接地型，且僅能裝設於符合其
    額定電壓及額定電流之電路。但符合第四十九條規定者，不在此限。
二、插座及可撓軟線連接器配有設備接地導線之接點者，其接點應連接至設備
    接地導線。
三、插座及可撓軟線連接接頭之接地接點，應連接至其電源電路之設備接地導
    線分路配線應有設備接地導線連接至插座或可撓軟線連接接頭之設備接地
    接點。

第三百七十四條
插座以獨立設備接地導線直接連接至內線系統接地之接地端子板，以降低電氣
雜訊干擾者，其裝設依下列規定辦理：
一、插座應有橘色三角標識，標明於插座面板。
二、插座裝設於非金屬線盒應採用非金屬面板。採用金屬面板者，該面板應為
    有效接地，且不得與插座之個別設備接地導線搭接。

第三百七十五條
插座裝設於濕氣場所及潮濕場所者，依下列規定辦理：
一、二百五十伏特以下之十五安培或二十安培非閉鎖型插座：
    (一)裝設於濕氣場所應以附可掀式蓋板、封閉箱體或其他可防止濕氣滲入
        之保護。
    (二)裝設於潮濕場所應以水密性蓋板或耐候性封閉箱體保護。
二、插座不得裝設於浴缸或淋浴間之空間內部或其上方位置。
三、地板插座應能容許地板清潔設備之操作而不致損害插座。
四、插座裝設於嵌入建築物完成面，且位於濕氣場所或潮濕場所者，其封閉箱
    體應具耐候性，採用耐候性面板及組件組成，提供面板與完成面間之水密
    性連接。

第三百七十六條
供移動式用電器具引接電源之插座額定電壓為二百五十伏特以下者，額定電流
不得小於十五安培。

第三百七十七條
可撓軟線或可撓電纜中間不得有接續或分接。
可撓軟線或可撓電纜連接於用電器具或其配件時，接頭或終端處不得承受張力
。

      第十節  非金屬被覆電纜配線
第三百七十八條
非金屬被覆電纜係由絕緣導線及非金屬材質被覆所組成之電纜，按其特性分類
，常用類型包括低壓 PVC  電纜、低壓 XLPE 電纜、低壓 EPR  電纜、低壓
PE  電纜、低煙無毒電纜、耐燃電纜、耐熱電纜或耐腐蝕電纜等。

第三百七十九條
非金屬被覆電纜不得直接敷設於下列情形或場所：
一、第四百六十四條第一項規定之危險場所。
二、非防火構造之戲院及類似場所。
三、電視攝影棚、電影製片廠。
四、鉛酸蓄電池儲存室。
五、暴露於腐蝕性氣體或揮發氣場所。
六、埋入於石造建築、泥磚、填方或灰泥。

第三百八十條
非金屬被覆電纜之安培容量應依表二五～二至表二五～四規定選定。

第三百八十一條
非金屬被覆電纜之裝設依下列規定辦理：
一、暴露裝設時，依下列規定：
    (一)應緊靠並沿建築物完成表面敷設。
    (二)穿過或平行於建築結構構架時應加以防護。
    (三)可能受重物壓力或顯著之機械衝擊者：
        1.應採用金屬導線管、非金屬導線管或具同等效果之方法防護。
        2.於樓地板內應採用金屬導線管、非金屬導線管或具同等效果之方法
          加以包封，並延伸於樓地板上方至少一百五十毫米。
        3.採用導線管防護者，其內徑應超過電纜外徑一‧五倍。但導線管很
          短、無彎曲，且電纜容易更換者，不在此限。\4. 於建築物外之用
          電設備場所範圍內，電纜自地面引上至少一‧五米高度應加以防護
          ；在用電設備場所範圍外，電纜自地面引上至少二米高度應加以防
          護。
        5.耐腐蝕電纜裝設於石造建築、混凝土或泥磚之淺溝槽內者，應加以
          防護，且以溝槽構造材料之類似品包覆。
二、不得直接埋設於樓地板、牆壁、天花板、梁柱等。但符合下列規定之一者
    不在此限：
    (一)將電纜穿在金屬導線管、PVC 管或 PF 管等硬質導線管內。
    (二)很短之貫穿處有孔道可通過。
    (三 )埋設於木造房屋之牆壁內，在可能受釘打之部分以鍍鋅鋼板或同等
        強度保護電纜。
    (四 )在牆壁、屏蔽、門等由水泥、磚、空心磚等石材之建築物外面，挖
        溝埋入或穿過空心磚之空洞部分，並有防止水氣滲入措施。
三、電纜穿入金屬導線管、非金屬導線管等管口應處理光滑，以免電纜損傷。
四、電纜穿入金屬線盒時，應採用電纜固定頭或護套等保護電纜，以免電纜損
    傷。
五、電纜引入用戶用電設備場所範圍內者，應以管路引入方式施工。但為門燈
    、庭園燈或儲倉間之配線，不受重物壓力者，得以保護板覆蓋在電纜上方
    式施工；無受損傷之慮者，得埋入深度三百毫米以上之土壤。
六、易燃性之 PE 電纜不得暴露裝設。

第三百八十二條
非金屬被覆電纜之固定及支撐依下列規定辦理：
一、電纜應採用電纜束帶、護管鐵、管夾、吊架或類似配件加以固定及支撐。
    但電纜穿在管槽內者，得免固定。
二、於每一個線盒、配電箱、配件或電纜終端三百毫米以內，且每隔一‧五米
    以內，應加以固定及支撐。水平裝設者，穿過孔洞或缺口在一‧五米以內
    視為已有固定及支撐。
三、八平方毫米以下電纜沿建築物暴露裝設者，其支撐間隔應符合表三八二規
    定。
四、電纜裝設於隱蔽處所，若不會遭受張力者，得免固定。
五、電纜以支撐架裝設者，該支撐架應為牢固且能承受電纜重量；其支撐架之
    間隔應以電纜不易移動為原則。
六、電纜若不沿建築物裝設，且建築物間隔為二米以上者，應以木板等物件將
    電纜固定或用吊線架設。

第三百八十三條
非金屬被覆電纜彎曲時，不得損傷其絕緣，其彎曲處內側半徑應為電纜外徑六
倍以上。但製造廠家說明書另有指示者，從其指示辦理。

第三百八十四條
非金屬被覆電纜之連接應符合本規則有關導線連接規定，且不得傷及導體或絕
緣，並依下列規定方法辦理：
一、電纜互相間之連接應在線盒或封閉箱體內施行，且連接部分不得露出。
二、電纜與用電器具引線接線時，應在線盒或封閉箱體內連接。但牆壁之空洞
    部分、天花板內或類似處所，器具端子若有堅固之耐燃性絕緣物加以密封
    且電纜之導體絕緣物與建築物有充分隔離者，不在此限。
三、線盒或封閉箱體在其裝設位置，應考慮以後能便利點檢。
四、大線徑之電纜互相連接無法在線盒或封閉箱體內連接時，應有絕緣及保護
    。

第三百八十五條
電纜與絕緣導線連接時，應依絕緣導線互相連接規定施工；在雨線外應將電纜
末端向下彎曲，以免雨水滲入。

      第十一節  扁平導體電纜配線
第三百八十六條
扁平導體電纜（Flat Conductor Cable,FCC）及其相關組件組成分路之現場裝
設配線，作為地毯覆蓋下之配線者，應依本節規定辦理。

第三百八十七條
本節用詞定義規定如下：
一、扁平導體電纜：指由三條以上之個別絕緣扁平銅導線並排後，再將其組合
    被覆之電纜。
二、扁平導體電纜系統：指包括扁平導體電纜及其遮蔽物、接頭、終端接頭、
    轉接器、線盒及插座等完整之分路配線。
三、頂部遮蔽物：指覆蓋於扁平導體電纜系統，保護電纜以免遭受外力損傷之
    被接地金屬遮蔽物。
四、底部遮蔽物：指裝設於地面與扁平導體電纜間，保護電纜以免遭受外力損
    傷之保護物，其得為電纜之一部分。
五、轉接組件：指使扁平導體電纜系統易於連接至其他用戶配線系統，並結合
    電氣互連設施及合適之線盒或蓋板，提供電氣安全保護之組件。

第三百八十八條
扁平導體電纜應裝設於堅硬、平滑、連續之地板，且不得裝設於下列情形或場
所：
一、分路額定：
    (一)電壓：相間電壓超過三百伏特，或相對地電壓超過一百五十伏特。
    (二 )電流：一般分路及用電器具分路之額定大於二十安培；專用分路之
        額定大於三十安培。
二、室外或潮濕場所。
三、腐蝕性揮發氣場所。
四、第四百六十四條第一項規定之危險場所。
五、住宅場所。
六、學校及醫院。但其辦公室區域不在此限。

第三百八十九條
扁平導體電纜系統之金屬組件應具有耐腐蝕性、採用耐腐蝕材質塗層，或與腐
蝕性物質之接觸面隔離。
扁平導體電纜之絕緣材質應具有耐濕性及耐燃性。

第三百九十條
扁平導體電纜應內含一條扁平導線作為設備接地導線。

第三百九十一條
於任何地點不得有三條以上之扁平導體電纜交叉配置。

第三百九十二條
扁平導體電纜系統之組件應採適用之黏著劑或機械性鐵閂系統，錨固於地板或
牆壁上。

第三百九十三條
扁平導體電纜之連接依下列規定辦理：
一、電纜連接及終端絕緣：
    (一 )電纜之連接應採專用連接接頭，且於裝設後具有電氣連續性、絕緣
        及密封，並能防止濕氣及液體滲入。
    (二 )電纜裸露之終端應採用終端接頭加以絕緣及密封，且能防止濕氣及
        液體滲入。
二、導線遮蔽：
    (一 )頂部遮蔽：扁平導體電纜、連接接頭及電纜終端之上方，應裝有金
        屬材質頂部遮蔽物，並應完全覆蓋所有電纜敷設路徑、轉角、連接接
        頭及終端接頭。
    (二 )底部遮蔽：扁平導體電纜、連接接頭及絕緣終端接頭之下方，應裝
        有底部遮蔽物。
三、扁平導體電纜系統應以專用轉接組件與其他配線系統之電力饋供、接地連
    接及遮蔽系統連接。
四、金屬遮蔽物應以金屬遮蔽接頭連接，並以該接頭連接至線盒、插座盒、內
    建式裝置及轉接組件。

第三百九十四條
扁平導體電纜、連接接頭及絕緣終端接頭裝設於地板表面時，應以可拆式遮蔽
物覆蓋，黏著或固定於地板。

第三百九十五條
扁平導體電纜之插座、插座盒及配電裝置裝設依下列規定辦理：
一、扁平導體電纜系統之所有插座、插座盒及內建式配電裝置，應連接至扁平
    導體電纜及金屬遮蔽物。
二、於每個插座處，扁平導體電纜之設備接地導線應連接至金屬遮蔽系統。
三、插座及內建式配電裝置應符合第三百七十三條規定。

第三百九十六條
扁平導體電纜系統之所有金屬遮蔽物、線盒、插座盒及內建式配電裝置等，應
與電源分路之設備接地導線連接，以保持電氣連續性。

第三百九十七條
扁平導體電纜中間接續及分接時，每一轉接組件應有與電纜結合之設施，並使
電纜連接至被接地導體，及使組件至金屬電纜遮蔽物及設備接地導體間有電氣
連續性。
扁平導體電纜系統得予改裝，並依下列規定辦理：
一、新電纜連接處接頭採用新的扁平電纜連接接頭。
二、已裝設而未使用之電纜及相關連接接頭，得保留於方便連接之位置並帶有
    電壓，且電纜終端加以絕緣包覆。

      第十二節  礦物絕緣金屬被覆電纜配線
第三百九十八條
礦物絕緣金屬被覆電纜（Mineral-Insulated,Metal-Sheathed Cable，簡稱
MI  電纜）係由工廠組裝，以高度壓縮耐火礦物質為絕緣體，導體間有適當間
隔，並以具有液密性、氣密性之銅或鋼合金為被覆之單芯或多芯電纜。

第三百九十九條
MI  電纜不得裝設於下列情形或場所：
一、腐蝕處所。但有防腐蝕者，不在此限。
二、易受機械損傷之地下線路。但有防護機械損傷者，不在此限。

第四百條
MI  電纜之導體應為實心銅質、鎳或鎳包銅者。
MI  電纜之外層被覆為銅質者，應有供設備接地用足夠容量之路徑；為鋼質者
，應內含一條設備接地導線。
MI  電纜之外層被覆應為連續結構，提供機械性保護，並應能防止水氣滲入。

第四百零一條
單芯 MI 電纜之安培容量應依表三六二～三規定導線絕緣物最高容許溫度為攝
氏九十度規定選用。
單芯 MI 電纜三條一回線之安培容量應依表三六二～四規定導線絕緣物最高容
許溫度為攝氏九十度規定選用。

第四百零二條
MI  電纜穿過間柱、屋梁、屋椽或類似處所應有防護，以免遭受外力損傷。

第四百零三條
MI  電纜每隔一‧八米以內，應以電纜束帶、護管鐵、管夾、吊架或類似配件
加以固定。但電纜穿在導線管內者，不在此限。

第四百零四條
MI  電纜彎曲時，不得使電纜遭受損傷，其彎曲處內側半徑依下列規定辦理：
一、電纜外徑十九毫米以下者，其彎曲處內側半徑應為電纜外徑五倍以上。
二、電纜外徑超過十九毫米，且在二十五毫米以下者，其彎曲處內側半徑應為
    電纜外徑十倍以上。
三、電纜外徑超過二十五毫米者，其彎曲處內側半徑應依製造廠家說明書指示
    辦理。

第四百零五條
MI  電纜應採用專用之線盒、配電箱或其他配件加以連接，以保持電氣連續性
。
單芯 MI 電纜之配置應將同一回路之所有相線、中性線裝設一起，以降低金屬
被覆之感應電壓。

第四百零六條
MI  電纜之配件及終端裝設依下列規定辦理：
一、用於連接電纜至線盒、配電箱或其他設備之配件，應為適用於 MI 電纜連
    接者。
二、電纜之終端處經削除後應立即密封，以防止濕氣滲入；其露出被覆之導線
    應以絕緣物加以絕緣。

      第十三節  金屬被覆電纜配線
第四百零七條
金屬被覆電纜指單芯或多芯絕緣導線，其外層以鎧裝型連鎖金屬帶、平滑或螺
旋狀之金屬被覆、金屬線被覆或金屬編織被覆。

第四百零八條
金屬被覆電纜不得裝設於下列情形或場所。但金屬被覆電纜之金屬被覆為適用
於第一款至第四款規定情形或場所，或有防護者，不在此限。
一、易遭受外力損傷之處。
二、埋入混凝土。
三、暴露於煤堆、氯化物、氯氣、強鹼或強酸場所。
四、潮濕場所。
五、直埋地下。

第四百零九條
金屬被覆電纜之安培容量應依表三六二～四規定選用。

第四百十條
金屬被覆電纜穿過或附掛於建築物構件時，不得使電纜被覆遭受損傷。

第四百十一條
金屬被覆電纜彎曲時，不得使電纜遭受損傷，其彎曲處內側半徑依下列規定辦
理：
一、平滑金屬被覆：
    (一 )電纜外徑十九毫米以下者，其彎曲處內側半徑應為電纜外徑十倍以
        上。
    (二 )電纜外徑超過十九毫米，且在三十八毫米以下者，其彎曲處內側半
        徑應為電纜外徑十二倍以上。
    (三 )電纜外徑超過三十八毫米者，其彎曲處內側半徑應為電纜外徑十五
        倍以上。
二、鎧裝型連鎖金屬帶或螺旋狀金屬被覆之電纜彎曲處內側半徑，應為電纜外
    徑七倍以上。
三、金屬線被覆或金屬編織被覆之單芯電纜彎曲處內側半徑，應為電纜外徑十
    二倍以上；多芯電纜彎曲處內側半徑，應為電纜外徑七倍以上。

第四百十二條
金屬被覆電纜裝設時應以電纜束帶、護管鐵、管夾、掛鉤或類似配件加以固定
及支撐，以免電纜遭受損傷，並依下列規定辦理：
一、除有其他措施外，電纜每隔一‧八米以內，應加以固定及支撐。
二、電纜為四芯以下、截面積為五‧五平方毫米以下者，於每一個線盒、配電
    箱、配件或電纜終端三百毫米以內，應加以固定。
三、電纜水平敷設於木質或金屬構造物之構件或類似支撐上，若支撐間隔為一
    ‧八米以下，視為有支撐。

第四百十三條
連接金屬被覆電纜至線盒、配電箱或其他設備之配件，應為適用於金屬被覆電
纜連接者。

      第十四節  金屬導線槽配線
第四百十四條
金屬導線槽指以金屬板製成，以供配裝及保護絕緣導線或電纜用之管槽；其蓋
板應為可拆卸式或絞鏈式者，俾於整個導線槽系統裝設完成後得以移開而放置
導線。

第四百十五條
金屬導線槽不得裝設於下列情形或場所：
一、隱蔽處所。但可供點檢者，不在此限。
二、易遭受重機械外力損傷之處。
三、發散腐蝕性物質場所。
四、第四百六十四條第一項規定之危險場所。但另有規定者，不在此限。
五、潮濕場所。但製造廠家說明書指示適用者，不在此限。
金屬導線槽內裝設載流導線部分，不得加裝隔板分割成不同導線槽。

第四百十六條
金屬導線槽裝設於建築物時依下列規定辦理：
一、若暴露裝設而延伸至建築物外者，應能防止水氣滲入。
二、若穿過牆壁，貫穿牆壁部分應連續不中斷，且牆壁兩側應裝設維修孔，以
    維修導線。

第四百十七條
裝設於金屬導線槽內之載流導線數不得超過三十條，且所有導線外徑截面積之
總和不得超過該導線槽內部截面積百分之二十。該導線槽內之導線安培容量應
依表二五～二至表二五～四中導線數「三以下」之數值計算。但有下列規定之
一者，導線槽內之導線數不受上列之限制：
一、升降機、升降階梯或電動走道等採用導線槽配線，於導線槽內所有導線外
    徑截面積總和不超過該導線槽截面積百分之五十。
二、導線若作為訊號線或電動機及其操作器間之控制線，僅於起動時有電流通
    過者概視為無載流導線，不計入導線數。
三、導線安培容量依表二五～二至表二五～四中導線數「三以下」之數值再乘
    以表二五～六規定之修正係數時，裝設於導線槽內之導線數得不限制於三
    十條以內惟所有導線外徑截面積之總和不超過該導線槽內部截面積百分之
    二十。

第四百十八條
絕緣導線裝設於金屬導線槽依下列規定辦理：
一、絕緣導線在金屬導線槽終端，或在導線管、配件、其他管槽或電纜內，進
    出金屬導線槽處需要轉折，或金屬導線槽轉折角度超過三十度者，導線彎
    曲空間應符合表三一三規定。
二、金屬導線槽若作為二十二平方毫米以上絕緣導線之拉線盒者，其與內含相
    同線徑之管槽或電纜銜接處之距離，以直線引拉者，不得小於導線槽標稱
    寬度八倍以轉彎引拉者，不得小於導線槽標稱寬度六倍。

第四百十九條
金屬導線槽內導線之接續組件、分接頭或配線端子台裝設依下列規定辦理：
一、接續組件及分接頭：
    (一 )導線得在金屬導線槽內可觸及處接續或分接，其連接方法限用壓接
        或採用壓力接頭夾接，並妥加絕緣。
    (二 )所有導線含接續組件及分接頭所占截面積總和，不得超過該處導線
        槽截面積百分之七十五。
二、配線端子台：
    (一 )除前款之配線空間規定外，配線端子台裝設於導線槽內者，導線槽
        之空間不得小於該端子台製造廠家說明書指示。
    (二)配線端子台於導線槽內不得暴露未絕緣之帶電部分。

第四百二十條
金屬導線槽之固定及支撐依下列規定辦理：
一、水平裝設：於每一終端及距離終端一‧五米以內，或個別導線槽長度超過
    一‧五米者，每一終端或接續處應加以固定及支撐。裝設牢固者，最大距
    離得放寬至三米。
二、垂直裝設：每隔四‧五米以內應加以固定及支撐，且兩支撐點間不得有超
    過一處之連接。金屬導線槽鄰接區段應牢固接合。

第四百二十一條
金屬導線槽之裝設依下列規定辦理：
一、金屬導線槽之裝設應保持整個導線槽系統之機械連續性及電氣連續性。
二、金屬導線槽應為完整之封閉箱體，以完全包封導線。導線槽之表面、內部
    及外部應有腐蝕防護。
三、導線穿過導線槽、通過隔板，繞過彎曲處，在導線槽與配電箱或線盒間，
    及其他需避免磨損之處，應採用平滑導圓角，以免導線損傷。
四、金屬導線槽之蓋板應固定於導線槽。
五、金屬導線槽之終端應加以封閉。

第四百二十二條
由金屬導線槽延伸而引出之配線，應裝設懸吊繩索，使導線不致承受張力，或
採用金屬導線管、金屬被覆電纜等配線。
若有附加一條設備接地導線連接於金屬導線槽者，應依第二章第五節規定接地
。

      第十五節  非金屬導線槽配線
第四百二十三條
非金屬導線槽指以耐燃性非金屬材質製成，以供配裝及保護絕緣導線或電纜用
之管槽；其蓋板應為可拆卸式者，俾於整個導線槽系統裝設完成後得以移開而
放置導線。

第四百二十四條
非金屬導線槽不得裝設於下列情形或場所：
一、隱蔽處所。但可供點檢者，不在此限。
二、易遭受外力損傷之處。
三、第四百六十四條第一項規定之危險場所。
四、暴露於陽光直接照射之場所。但製造廠家說明書指示適用者，不在此限。
五、周圍溫度超過製造廠家說明書指示使用溫度之場所。
六、絕緣導線或電纜之絕緣物最高容許溫度超過導線槽之額定耐受溫度者。但
    絕緣導線或電纜之安培容量以導線槽之額定耐受溫度計算，或符合第二十
    五條第八款規定者，不在此限。

第四百二十五條
非金屬導線槽裝設於建築物時，應依第四百十六條規定辦理。

第四百二十六條
裝設於非金屬導線槽內之所有導線外徑截面積總和，不得超過該導線槽截面積
百分之二十。該導線槽內載流導線安培容量應依表二五～五規定選用，或依上
列表中導線數「三以下」之數值再乘以表二五～六規定之修正係數計算。但有
下列規定之一者，導線槽內之導線數不受上列之限制：
一、升降機、升降階梯或電動走道等採用導線槽配線，於導線槽內所有導線外
    徑截面積總和不超過該導線槽截面積百分之五十。
二、導線若作為訊號線或電動機及其操作器間之控制線，僅於起動時有電流通
    過者，概視為無載流導線，不計入導線數。

第四百二十七條
絕緣導線裝設於非金屬導線槽，應依第四百十八條規定辦理。

第四百二十八條
非金屬導線槽之固定及支撐依下列規定辦理：
一、水平裝設：於每一終端或接續處九百毫米以內，且每隔三米以內應加以固
    定及支撐。
二、垂直裝設：每隔一‧二米以內應加以固定及支撐，且兩支撐點間不得有超
    過一處之連接。非金屬導線槽鄰接區段應牢固接合。

第四百二十九條
直線配置之非金屬導線槽依其膨脹特性預計六毫米以上者，應提供伸縮配件，
以補償遭受溫度變化之膨脹及收縮。

第四百三十條
非金屬導線槽內導線之接續或分接應依第四百十九條第一款規定辦理。
非金屬導線槽之終端應加以封閉。

第四百三十一條
由非金屬導線槽延伸而引出之配線，應裝設懸吊繩索，使導線不致承受張力，
或採用非金屬導線管、非金屬被覆電纜等配線。
非金屬導線槽應依不同配線方法，附加一條設備接地導線。

      第十六節  懸吊型導線槽配線
第四百三十二條
懸吊型導線槽係裝設於建築結構表面，或懸吊於建築結構，搭配相關配件，作
為絕緣導線或電纜裝設用之金屬導線槽。

第四百三十三條
懸吊型導線槽得裝設於下列情形或場所：
一、暴露裝設。
二、乾燥場所。
三、導線槽若有受保護者，得裝設於發散腐蝕性物質場所。
四、除嚴重之腐蝕性場所外，鐵磁性導線槽及其配件有琺瑯作為腐蝕防護，得
    裝設於建築物內。

第四百三十四條
懸吊型導線槽之選用依下列規定辦理：
一、導線槽及其配件應為鋼、不鏽鋼或鋁材質者。
二、鋼質導線槽及其配件應鍍鋅或有防止腐蝕之塗裝。
三、導線槽寬度應為五十毫米、七十五毫米或一百毫米，且高度不得超過寬度
    。

第四百三十五條
懸吊型導線槽內之容許導線數不得超過表四三五規定導線槽尺寸對應配線截面
積之百分比。
懸吊型導線槽內載流導線之安培容量應依表二五～二至表二五～四規定選用，
或依上列表中導線數「三以下」之數值再乘以表二五～六規定之修正係數計算
；如符合下列所有規定者，其安培容量得免依表二五～六規定修正：
一、導線槽配線截面積超過二千五百平方毫米者。
二、載流導線數量不超過三十條者。
三、導線槽內之所有導線外徑截面積總和不超過導線槽截面積百分之二十。

第四百三十六條
懸吊型導線槽之固定及支撐依下列規定辦理：
一、壁掛式：於每一個線盒、配電箱或導線槽終端九百毫米以內，且每隔三米
    以內應加以固定及支撐。
二、懸吊式：於導線槽每一終端九百毫米以內，且每隔三米以內應加以固定及
    支撐。

第四百三十七條
懸吊型導線槽蓋板為可打開且可觸及者，導線之接續組件及分接頭得裝設於懸
吊型導線槽內。
懸吊型導線槽內所有導線含接續組件及分接頭所占截面積總和，不得超過該處
導線槽截面積百分之七十五。

第四百三十八條
裝設懸吊型金屬導線槽及其彎管、連接接頭及配件時，應使其電氣及機械妥為
耦合，並使導線不致遭受磨損。

      第十七節  地板管槽配線
第四百三十九條
地板管槽係指專門供絕緣導線或電纜裝設於地板表面下，或與地板表面齊平之
管槽。

第四百四十條
地板管槽不得裝設於下列情形或場所：
一、發散腐蝕性物質場所。但金屬地板管槽有腐蝕防護者，不在此限。
二、第四百六十四條第一項規定之危險場所。

第四百四十一條
地板管槽上方之混凝土覆蓋依下列規定辦理：
一、半圓型與平頂型之管槽寬度一百毫米以下者，管槽上面混凝土或木質覆蓋
    厚度應為二十毫米以上。但平頂型管槽符合第三款規定者，不在此限。
二、平頂型管槽寬度超過一百毫米，且小於二百毫米，管槽間之間隔為二十五
    毫米以上者，管槽上面混凝土覆蓋厚度應為二十五毫米以上。管槽間之間
    隔小於二十五毫米者，混凝土覆蓋厚度應為三十八毫米以上。
三、槽溝型管槽上面附有可打開之蓋板，且蓋板有機械保護，並與線盒之蓋板
    硬度相同者，得與地板表面齊平。

第四百四十二條
地板管槽內所有導線外徑截面積總和，不得超過該管槽截面積百分之四十。
地板管槽內載流導線安培容量應依表二五～二至表二五～六規定選用。

第四百四十三條
導線之接續組件及分接頭應在地板管槽之線盒內施作。但導線裝設於平頂型管
槽，裝設後可打開蓋板，且可觸及接續或分接者，不在此限。
地板管槽內所有導線含接續組件及分接頭所占截面積總和，不得超過該處管槽
截面積百分之七十五。

第四百四十四條
每一直線地板管槽之終端或接近終端處，應有明顯之標識。

第四百四十五條
地板管槽之線盒應與地板齊平，且應加以密封。
金屬地板管槽之線盒應為相同金屬材質，且應與該管槽作電氣性連接。
地板管槽終端應加以封閉。

      第十八節  匯流排槽配線
第四百四十六條
匯流排槽指一組銅匯流排或鋁匯流排以金屬板製成之金屬槽，或以樹脂模注加
以包覆而成為一體之裝置，該匯流排相間，及與外包金屬體間，或與大氣間應
互為絕緣。
匯流排槽得裝設插入式分接器，以分接較小容量導線。

第四百四十七條
匯流排槽不得裝設於下列情形或場所：
一、易遭受重機械外力損傷之處。
二、發散腐蝕性物質場所。
三、電動起重機或升降機之升降路。
四、第四百六十四條第一項規定之危險場所。
五、室外或潮濕場所。但其構造適合室外且防水者，不在此限。

第四百四十八條
匯流排槽之固定及支撐依下列規定辦理：
一、水平裝設：每隔一‧五米以內應加以固定及支撐。裝設牢固者，其最大距
    離得放寬至三米。
二、垂直裝設：於各樓地板處應加以固定及支撐，其最大距離不得超過五米。

第四百四十九條
匯流排槽之裝設依下列規定辦理：
一、穿過乾燥牆壁，貫穿牆壁部分應連續不中斷。
二、樓地板：
    (一 )垂直穿過乾燥樓地板，該樓地板上方一‧八米以內高度應有防護，
        以免遭受外力損傷，且穿過處應採用全密閉型匯流排槽。
    (二 )除在工業廠區外，垂直上升匯流排槽貫穿二個以上乾燥樓地板者，
        依下列規定辦理：
        1.在樓地板所有貫穿之開口周圍應裝設高度一百毫米以上之止水墩（
          curb），以免液體流入開口。
        2.止水墩應裝設於地板開口展開三百毫米以內。
        3.附近用電設備應位於不會受止水墩保留液體傷害處。
匯流排槽之終端應加以封閉。

第四百五十條
匯流排槽之分路依下列規定辦理：
一、由匯流排引接之分路，得採用下列規定之一種配線方法裝設。若設備接地
    導線分開裝設，連接至匯流排槽之設備接地導線應依第二章第五節規定裝
    設。
    (一)匯流排槽。
    (二)MI  電纜。
    (三)金屬被覆電纜。
    (四)金屬導線管。
    (五)金屬可撓導線管。
    (六)PVC 管。
    (七)懸吊型導線槽。
二、以可撓軟線或可撓電纜作為匯流排槽引下線，引接供電給移動式設備或固
    定式設備，符合下列規定者，得作為分路：
    (一)可撓軟線或可撓電纜附掛於建築物。
    (二 )可撓軟線或可撓電纜由匯流排分接器至該電纜固定處之長度不超過
        一‧八米。
三、滑接式匯流排槽（Trolley-Type Busways）以可撓軟線或可撓電纜作為其
    引下線，引接供電給移動式設備者，得視為分路。

第四百五十一條
匯流排槽之過電流保護依下列規定辦理：
一、過電流保護裝置安培額定與作為幹線或次幹線之匯流排槽安培容量不能配
    合時，得選用較高一級者。
二、自匯流排槽引出之分接匯流排槽長度不超過十五米，其安培容量為其前端
    過電流保護裝置安培額定三分之一以上，且不與可燃性物質接觸者，得免
    在分接點裝設過電流保護裝置。
三、以匯流排槽為幹線而分路藉插入式分接器自匯流排槽引出者，應在該分接
    器內附裝過電流保護裝置，以保護該分路。

第四百五十二條
匯流排槽之金屬槽應連接至設備接地導線或搭接導線。

      第十九節  燈用軌道
第四百五十三條
燈用軌道係同時作為供電及支撐照明燈具之裝置；其長度可由增減軌道節數改
變。

第四百五十四條
燈用軌道應為固定裝置，妥善連接於分路，並應裝設專用照明燈具。

第四百五十五條
燈用軌道連接之負載不得大於燈用軌道額定容量；其電源分路保護額定容量不
得大於燈用軌道額定容量。

第四百五十六條
燈用軌道不得裝設於下列情形或場所：
一、易遭受外力損傷之處。
二、潮濕場所或濕氣場所。
三、發散腐蝕性物質場所。
四、存放電池場所。
五、第四百六十四條第一項規定之危險場所。
六、隱蔽處所。
七、穿過牆壁。
八、距離地面高度一‧五米以下。但有防護以免遭受外力損傷者，不在此限。

第四百五十七條
燈用軌道專用照明燈具應直接以相極及被接地電極分別妥為連接在燈用軌道上
。

第四百五十八條
燈用軌道分路負載應按每三百毫米軌道長度以九十伏安計算。

第四百五十九條
分路額定大於二十安培之燈用軌道，其照明燈具應有個別之過電流保護。

第四百六十條
燈用軌道應加以固定，使每一固定點皆能支撐其可能裝設之照明燈具最大重量
。
燈用軌道單節一‧二米以下者，應有二處支撐。燈用軌道之延長部分，每一單
節未超過一‧二米者，應增加一處支撐。

第四百六十一條
燈用軌道應有堅固之軌槽。軌槽內應可裝設導體及插接照明燈具，並應防止外
物填塞及意外碰觸帶電部分。
不同電壓之燈用軌道器材不得互用。
燈用軌道之銅導體應採用五‧五平方毫米以上，軌道末端應有絕緣及加蓋。

第四百六十二條
燈用軌道應依第九十三條及第九十四條規定接地，軌節應連接以保持電氣連續
性。

    第五章  特殊場所
      第一節  通則
第四百六十三條
有關特殊場所用電設備或器具之裝設，應依本章規定辦理。本章未規定者，應
依其他章節適用之規定辦理。
前項所稱特殊場所包括下列場所：
一、危險場所。
二、發散腐蝕性物質場所。
三、潮濕場所。
四、醫療照護場所。
五、聚集場所。
六、劇院、電影院、電影製片廠及電視攝影棚之觀眾區、表演區及類似場所。
七、電視攝影棚、電影製片廠及類似場所。
八、隧道、礦坑等場所。
九、臨時用電場所。

第四百六十四條
前條所稱危險場所為存在下列危險物質之場所：
一、存在易燃性氣體、易燃性或可燃性液體揮發氣（以下簡稱爆炸性氣體）之
    危險場所，包括第一類第一種場所、第二種場所，或 0  區、1 區、2 區
    之場所。
二、存在可燃性粉塵之危險場所，包括第二類第一種場所、第二種場所，或
    20  區、21  區、22  區之場所。
三、存在可燃性纖維或飛絮之危險場所，包括第三類第一種場所、第二種場所
    或 20 區、21  區、22  區之場所。
前項各款詳列之場所係依其存在危險物質及該物質濃度或含量等情形再劃分之
危險區域包括以「類」（ Class）及「種」（Division）方式表示，或以「區
」（Zone）方式表示。既有設施之維修，應依其所在場所既有之危險區域劃分
方式辦理，並適用相關規定；新興用電設備或器具之新建工程，其設計工法或
技術具有專利者，應依其專利之危險區域劃分方式辦理，並適用相關規定。

第四百六十五條
從事危險場所設計、裝設、監造、檢查、維修或操作用電設備或器具之相關人
員或機構應依據該場所所有人或使用人提供之危險區域劃分書圖或文件執行業
務。

第四百六十六條
本章有關危險場所之用詞定義規定如下：
一、易燃性液體：指閃火點低於攝氏三十七‧八度（華氏一百度），且在攝氏
    三十七‧八度時其雷氏揮發氣壓力（ Reid vapor pressure）為二百七十
    六千帕斯卡（四十磅力每平方英寸）絕對壓力以下之液體。
二、可燃性液體：指閃火點在攝氏三十七‧八度（華氏一百度）以上，且低於
    攝氏九十三‧三度（華氏二百度）之液體。
三、可燃性粉塵：指任何直徑小於四百二十微米之微細固體粉末，且當擴散於
    空氣中並被點火時，有火災或爆炸性危險者。
四、可燃氣體偵測系統（Combustible Gas Detection System）：指於工業廠
    區內裝設固定式氣體偵測器，並用來示警之保護系統。
五、非引火性電路（Nonincendive Circuit）：指在正常運轉下產生之電弧或
    熱效應，不會引燃指定測試條件之易燃性混合物質之電路，且非於現場配
    線。
六、非引火性元件（Nonincendive Component）：指具有接點供接通或切斷引
    火性電路，且該接點之機構能使該元件不會引燃特定易燃性氣體或揮發氣
    之元件；其外殼非用來阻隔可燃性混合氣或承受內部爆炸。
七、非引火性設備（Nonincendive Equipment）：指內含電氣或電子電路，在
    正常運轉下產生之電弧或熱效應，不會引燃特定易燃性氣體、揮發氣或粉
    塵之設備。
八、非引火性現場配線（Nonincendive Field Wiring） ：指於現場裝設進出
    設備封閉箱體線路，且在正常運轉、開路、短路或接地下產生之電弧或熱
    效應，不會引燃特定易燃性氣體、揮發氣或粉塵之配線。
九、非引火性現場配線器具（Nonincendive Field Wiring Apparatus） ：指
    可用於連接至非引火性現場配線之器具。
十、相關非引火性現場配線器具（Associated Nonncendive Field Wiring
    Apparatus） ：指器具本身之電路雖非為非引火性，但會影響非引火性電
    路能量，並能維持非引火性能量等級之器具；其得為下列規定之一：
    (一)具有其他型式之保護措施，可用於該措施適用之危險場所之器具。
    (二)不具有保護措施，以致不適用於危險場所之器具。
十一、控制圖說（ Control Drawing）：指製造廠家所提供本質安全與其相關
      器具間，或非引火性現場配線器具與相關非引火性現場配線器具之互相
      連接等圖說或文件。
十二、塵密（Dust tight）：指在特定測試條件下，粉塵無法進入之封閉箱體
      ，該箱體防護等級至少為 IP5X 或具同等效果者。
十三、防塵燃（Dust Ignitionproof）：指用電設備或器具封裝於塵密型封閉
      箱體內，且該箱體不會使其內部產生或釋放之電弧、火花或熱量引燃外
      部累積於箱體上或飄浮於其鄰近外部之特定粉塵。
十四、防爆（Explosionproof，簡稱 XP ）：指用電設備或器具封裝於封閉箱
      體內，在正常使用下該箱體表面溫度不會引燃周遭之特定易燃性氣體或
      揮發氣，且箱體強度能承受特定氣體或揮發氣在其內部發生爆炸時之壓
      力，箱體縫隙所逸出之火花，不會引燃外部周遭之易燃性氣體或揮發氣
      。如符合 UL1203 、UL886 標準者。
十五、完全密封（ Hermetically Sealed）：指用電設備或器具使用熔合方式
      密封，例如一般銲接、銅銲、熔接或將玻璃與金屬熔合等，以阻絕外氣
      進入。
十六、油浸（ Oil Immersion）：指將用電設備或器具浸入保護用之液體中，
      以防止引燃周遭可能存在之爆炸性混合氣。
十七、正壓（Pressurization）：指利用足夠壓力之連續或非連續流量之保護
      性氣體注入封閉箱體內，以防止外部易燃性氣體或揮發氣、可燃性粉塵
      或可燃性纖維進入封閉箱體。
十八、吹驅（ Purging）：指利用足夠流量且正壓之保護性氣體注入封閉箱體
      內，以降低其既存易燃性氣體或揮發氣之濃度至可接受範圍內之方法。
十九、液密（Liquid tight）：指封閉箱體在特定測試條件下，濕氣無法滲入
      之構造。
二十、非分類場所（Unclassified Locations）：指非本章所定之危險場所。
二十一、最大實驗安全間隙（Maximum Experimental Safe Gap,MESG）：指在
        特定試驗條件下，試驗設備內艙之特定爆炸性氣體與空氣之混合氣被
        點燃時，產生之火焰經過兩平行金屬面所形成之縫隙逸出，該縫隙小
        到使逸出熱氣無法點燃外面相同混合氣時，該縫隙之最大值。
二十二、最小引燃電流比（Minimun igniting current ratio,MIC ratio）：
        指某爆炸性氣體之最小引燃電流，與相同測試條件下之甲烷最小引燃
        電流之比值，稱為該氣體或液體之最小引燃電流比。
二十三、本質安全相關器具（Associated Apparatus）：指器具之電路本身雖
        非為本質安全，但會影響本質安全電路能量，並能維持本質安全之器
        具；其得為下列規定之一：
        (一)具有其他型式之保護措施，可用於該措施適用之危險場所之器具
            。
        (二)不具有保護措施，以致不適用於危險場所之器具。
二十四、本質安全電路（Intrinsically Safe Circuit）：指在規定測試條件
        下產生之火花或熱效應，不會引燃易燃性或可燃性物質與空氣混合物
        之電路。
二十五、本質安全器具（Intrinsically Safe Apparatus）：指內部所有電路
        皆為本質安全之器具。
二十六、本質安全系統（Intrinsically Safe System） ：指可能用於危險場
        所之本質安全電路與本質安全器具、相關器具及互連電纜組成之系統
        。
二十七、不同本質安全電路（Different Intrinsically Safe Circuits） ：
        指可能互聯而未經評估及確認為本質安全之本質安全電路。
二十八、簡易器具（Simple Apparatus）：指具有明確定義之電氣參數，且不
        會輸出超過一‧五伏特、一百毫安培及二十五毫瓦特之能量，或被動
        元件之散熱能量不會超過一‧三瓦特，且與其使用電路之本質安全相
        容之電氣元件或簡單構造元件之組合。
二十九、模鑄構造「 m」：指一種能將產生火花或熱量可能點燃周遭爆炸性氣
        體之電氣組件，以模鑄用複合物封裝使其不會點燃爆炸性氣體之保護
        型式。
三十、耐壓防爆「 d」（Flameproof“d”，簡稱 Ex d ） ：指一種封閉箱體
      可承受進入內部之易燃性混合物爆炸而不致於損壞，且經由接縫或開口
      處逸出之熱氣，亦不會引燃外部易燃性氣體或揮發氣之封閉箱體保護型
      式。如符合 CNS3376  之一或 IEC60079 之一標準者。
三十一、增加安全「 e」：指一種使用附加之措施提高安全性，防止產生高溫
        、電弧或火花之保護型式，適用於保護在正常使用或特定不正常情況
        下不會產生電弧或火花之用電設備或器具。
三十二、本質安全「 i」：指一種在規定測試條件下產生之火花或熱效應，不
        會引燃空氣中易燃性或可燃性混合物之保護型式。
三十三、油浸「 o」：指一種將用電設備或器具浸入保護用之液體中，以防止
        引燃周遭可能存在之爆炸性混合氣之保護型式。
三十四、粉末填充「 q」：指一種將可點燃爆炸性混合氣之電氣組件固定，且
        在其周圍填滿如玻璃或石英之粉末狀填充物，以防止引燃外部爆炸性
        氣體之保護型式。
三十五、正壓「 p」：指一種具有維持封閉箱體內保護性氣體之壓力超過外部
        氣壓，以防止可能存在其外部之爆炸性氣體進入封閉箱體內之保護型
        式。
三十六、保護型式「 n」：指一種在正常運轉下，無法引燃周遭爆炸性氣體及
        降低因故障導致引燃機率之保護型式。
三十七、模鑄構造「mD」：指一種將電氣組件封閉於模鑄體中，使其不會點燃
        可燃性粉塵或可燃性纖維、飛絮及空氣中混合氣之保護型式。
三十八、封閉箱體保護「tD」：指一種用於爆炸性粉塵環境，具有防止粉塵進
        入及限制表面溫度之封閉箱體保護型式。
三十九、本質安全保護「iD」：指一種在指定試驗條件下，產生之火花或熱量
        不會點燃可燃性粉塵或可燃性纖維、飛絮及空氣中混合氣之保護型式
        。
四十、正壓保護「pD」：指一種內部充滿保護氣體且壓力超過其外部環境，以
      防止可燃性粉塵或可燃性纖維、飛絮及空氣中混合氣進入封閉箱體之保
      護型式。

第四百六十七條
存在爆炸性氣體、可燃性粉塵、纖維或飛絮之危險場所，其危險區域劃分原則
如下：
一、危險區域係依現場存在爆炸性氣體、可燃性粉塵與纖維飛絮之特性，及其
    存在易燃性或可燃性混合氣之濃度或含量加以劃分。
二、僅使用或處理自燃性（pyrophoric）物質之場所，非本章規範之範圍，不
    作劃分。
三、劃分時每一個房間或區域可視為獨立之空間。
四、房間或區域裝設氨冷卻系統，若設有適當之機械通風設備者，可劃歸為非
    分類場所。

第四百六十八條
危險場所依存在爆炸性氣體、可燃性粉塵、纖維或飛絮之不同，分「類」如下
：
一、第一類場所：空氣中存在或可能存在爆炸性氣體，其濃度或含量足以產生
    爆炸性或可引燃性混合物之場所，並依其發生機率及持續存在時間，分「
    種」如下：
    (一)第一種場所如下列規定之一：
        1.於正常運轉下，爆炸性氣體可能存在達到可引燃濃度或含量之場所
          。
        2.於進行修護、保養或洩漏時，爆炸性氣體時常存在達到可引燃濃度
          或含量，或可燃性液體溫度超過閃火點之場所。
        3.當設備、製程故障或操作不當時，可能釋放出爆炸性氣體達到可引
          燃濃度或含量，同時可能導致用電設備或器具故障，使該設備或器
          具成為點火源之場所。
    (二)第二種場所如下列規定之一：
        1.製造、使用或處理爆炸性氣體之場所。於正常情況下，該氣體裝在
          密閉之容器或封閉式系統內，僅於該容器或系統發生意外破裂、損
          毀或設備不正常運轉時，始會外洩。
        2.藉由正壓通風機制防止爆炸性氣體達到可引燃濃度或含量，於其通
          風設備故障或操作不當時，可能造成危險之場所。
        3.鄰近第一種場所，且爆炸性氣體可能由第一類場所擴散而存在達到
          可引燃濃度或含量，或達閃火點以上之可燃性液體揮發氣之場所，
          不包括有裝設引進乾淨空氣之正壓通風系統防止上述擴散，並具備
          通風失效時有安全防護機制之場所。
二、第二類場所：存在可燃性粉塵，其濃度或含量足以產生爆炸性或引燃性混
    合物之場所，並依其發生機率及持續存在時間，分「種」如下：
    (一)第一種場所如下列規定之一：
        1.於正常運轉下，可燃性粉塵可能存在達到可引燃濃度或含量之場所
          。
        2.當設備、製程故障或操作不當時，可能產生爆炸性或引燃性混合物
          之場所，同時可能導致用電設備或器具故障，使該設備或器具成為
          點火源。
        3.可能存在可燃性金屬粉塵如鋁或鎂，其濃度或含量足以造成危險之
          場所。
    (二)第二種場所如下列規定之一：
        1.因操作不當，導致空氣中含有可燃性粉塵，其濃度或含量足以產生
          爆炸性或引燃性混合物之場所。
        2.有可燃性粉塵累積，其濃度或含量通常不足以干擾用電設備或器具
          之正常運轉，當加工或製程設備故障或操作不當時，可使該粉塵懸
          浮於空氣中之場所。
        3.可燃性粉塵在用電設備或器具之上方、內部或鄰近處，累積至足以
          妨礙該設備或器具之安全散熱，或可能因該設備或器具故障、操作
          不當而引燃之場所。
三、第三類場所：存在可燃性纖維或飛絮，其纖維或飛絮懸浮於空氣中之濃度
    或含量累積至足以產生引燃性混合物之機率極低之場所，分「種」如下：
    (一)第一種場所：製造、使用或處理可燃性纖維或飛絮之場所。
    (二)第二種場所：儲存或非製程處置可燃性纖維或飛絮之場所。

第四百六十九條
第一類場所及第二類場所之危險物質，在非濃氧情況下，分「群」如下：
一、第一類場所之危險物質：
    (一)A 群：乙炔（ acetylene）。
    (二)B 群：最大實驗安全間隙為○‧四五毫米以下，或最小引燃電流比為
        ○‧四以下。
    (三)C 群：最大實驗安全間隙超過○‧四五毫米，且在○‧七五毫米以下
        ；或最小引燃電流比超過○‧四，且在○‧八以下。
    (四)D 群：最大實驗安全間隙超過○‧七五毫米，或最小引燃電流比超過
        ○‧八。
二、第二類場所之危險物質：
    (一)E 群：空氣中含有可燃性金屬粉塵，包括鋁、鎂及其合金，或其他可
        燃性粉塵之顆粒大小、摩擦力或導電度，在用電設備或器具使用中有
        相似危險物質。
    (二)F 群：空氣中含有可燃性碳質粉塵，包括煤、碳煙、木炭、石油焦粉
        塵等，其所含之揮發性物質（total entraped volatiles）超過百分
        之八，或受到其他物質激化而呈現爆炸危險之粉塵。
    (三)G 群：空氣中含有 E  群、F 群以外之可燃性粉塵，包括麵粉、穀物
        、木頭、塑膠、化學物質等。
於存在 B  群危險物質之第一類場所，所有連接至防爆（XP）型設備之導線管
於距離設備封閉箱體四百五十毫米範圍內有裝設防爆（XP）型密封裝置者，若
為下列規定物質，得依其規定選用設備：
一、丁二烯：採用適用於 D  群之設備。
二、烯丙基環氧丙基醚（allyl glycidyl ether）、正丁基縮水乾油乙醚（
    nbutyl glycidyl ether） 、環氧乙烷（ethylene oxide）、環氧丙烷（
    propylene oxide） 或丙烯醛（acrolein）：採用適用於 C  群之設備。

第四百七十條
第一類場所、第二類場所或第三類場所之電氣及電子設備或器具，得採用之保
護技術依下列規定辦理：
一、防爆（XP）：得用於第一類場所。
二、防塵燃：得用於第二類場所。
三、塵密：得用於第二類第二種場所或第三類場所。
四、吹驅及正壓：得用於經設計者確認之危險場所。
五、本質安全：得用於第一類場所、第二類場所或第三類場所。
六、非引火性電路、設備及元件：得用於第一類第二種場所、第二類第二種場
    所或第三類場所。
七、油浸：得用於第一類第二種場所之電流啟斷接點，如第四百八十七條第二
    款第一目之2規定情形。
八、完全密封：得用於第一類第二種場所、第二類第二種場所或第三類場所。
九、可燃氣體偵測系統：得用於保護不對外開放且由合格人員維修及管理監督
    之工業廠區。選用此系統作為保護技術者，應將偵測設備之種類、登錄文
    件、裝設位置、警報與停機準則及校正頻率等，以文件建檔；其裝設之設
    備得依下列規定辦理：
    (一)通風不良場所：因通風不良而劃分為第一類第一種場所，並裝設適用
        於第一類第一種場所危險物質分群及指定氣體或揮發氣之可燃氣體偵
        測設備者，得採用適用於第一類第二種場所之設備或器具。
    (二)建築物內部：建築物內劃分為第一類第二種場所，或有開口連通第一
        類第二種場所，不會存在易燃性氣體或揮發氣，並裝設適用於第一類
        第一種場所或第二種場所危險物質分群及指定氣體或揮發氣之可燃氣
        體偵測設備者，得採用適用於非分類場所之設備或器具。
    (三)控制盤內部：控制盤內儀器有使用或測量易燃性液體、氣體或揮發氣
        ，並裝設適用於第一類第一種場所危險物質分群及指定氣體或揮發氣
        之可燃氣體偵測設備者，得採用適用於第一類第二種場所之設備或器
        具。

第四百七十一條
第一類場所、第二類場所或第三類場所之用電設備或器具選用依下列規定辦理
：
一、設備或器具選用應確認其適用之「類」與「種」，及現場可能會存在之特
    定危險物質所具之爆炸性、可燃性或引燃性，並符合下列規定：
    (一)第一類場所之設備或器具運轉後任何暴露表面溫度不得超過特定氣體
        或揮發氣之自燃溫度。
    (二)第二類場所之設備或器具外部溫度不得超過第三項第二款規定。
    (三)第三類場所之設備或器具表面最高溫度不得超過第五百十四條規定。
二、適用於各「類」第一種場所之設備或器具，得裝設於相同「類」、「群」
    及溫度等級之第二種場所，並視個別情形依下列規定辦理：
    (一)本質安全器具依控制圖說指示裝設適用於第一種場所之相關器具者，
        得裝設於第二種場所。其裝設之相關器具應為相同規格。
    (二)本章規定須防爆（XP）之設備或器具以第四百七十四條第二項規定配
        線方法裝設於第二種場所者，應依第四百七十五條或第四百七十八條
        規定加以密封。
三、本章第二節至第四節規定一般型設備或器具，或一般型封閉箱體內之設備
    或器具，在正常運轉下不會成為點火源者，該設備或器具得裝設於第二種
    場所。
四、依靠單一壓縮密封墊、隔膜密封閥或密封接管，防止易燃性或可燃性液體
    進入之設備或器具，如裝設於非分類場所，仍應確認其適用於第一類第二
    種場所；如裝設於第一類第一種場所應確認其適用於第一類第一種場所。
五、除本規則另有規定外，電動機正常運轉下應假定其額定滿載穩定狀態。
六、於多種易燃性及可燃性危險物質可能同時存在之場所，決定用電設備或器
    具之安全運轉溫度時，應考慮兩者同時存在。
前項規定之設備或器具應有其適用環境之商品標示；除第六款規定外，其商品
標示應包括下列資訊：
一、適用之「類」別。
二、適用之「種」別。設備或器具如適用於第一種場所者，得省略「種」別；
    如僅適用於第二種場所者，則不得省略。
三、第四百六十九條規定之危險物質「群」別，或特定氣體、揮發氣、粉塵或
    飛絮。
四、設備或器具之溫度等級（T 碼）如表四七一規定所示，或周圍溫度在攝氏
    四十度時之運轉溫度。設備或器具適用於周圍溫度超過攝氏四十度運轉者
    ，應有運轉溫度及其適用之周圍溫度。裝設於第一類場所及第二類場所之
    設備或器具，應有同時暴露於此二場所危險物質組合下所決定之最高安全
    運轉溫度。
五、設備或器具適用於周圍溫度低於攝氏負二十五度或超過四十度者，有其特
    殊周圍溫度範圍標識，以攝氏表示，並包含「Ta」或「Tamb」符號。適用
    於周圍溫度攝氏負二十五度至正四十度者，得免有周圍溫度標識。
六、符合下列規定之一者，得免有前五款規定之資訊：
    (一)適用於第一類場所之一般型固定式設備除照明燈具外，裝設於第一類
        第二種場所。
    (二)固定式塵密設備除照明燈具外，裝設於第二類第二種場所及第三類場
        所。
    (三)未被其他保護技術保護之本質安全相關器具及相關非引火性現場配線
        器具，裝設於非分類場所。惟該器具應有能與其連接之器具所屬「類
        」別、「種」別及「群」別。
    (四)符合本章第七節規定之簡易器具。
設備或器具裝設之溫度限制依下列規定：
一、裝設於第一類場所者，依前項規定之溫度不得超過設備或器具周圍之特定
    氣體或揮發氣之引燃溫度。
二、裝設於第二類場所者，依前項規定之溫度不得超過設備或器具周圍特定粉
    塵之引燃溫度。裝設於可能乾燥或碳化之有機粉塵環境者，依前項規定之
    溫度不得超過最低之引燃溫度或攝氏一百六十五度，二者之較低者。
設備或器具與導線管及其管配件螺紋銜接依下列規定辦理：
一、導線管或管配件應以標準牙模（cuting die）車絞。螺紋型式應為斜口螺
    紋（ NPT）或公制螺紋。
二、導線管及管配件應扭緊，以防止故障電流通過導線管系統時產生火花，確
    保該導線管系統防爆（XP）之完整性。
三、設備或器具配有銜接口供現場配線連接者，依下列規定辦理：
    (一)設備或器具配有斜口螺紋銜接口供斜口螺紋導線管或管配件連接者，
        應採用適用之導線管、管配件或電纜配件，且該導線管或管配件之螺
        紋應以斜口螺紋牙模車絞。斜口螺紋管配件連接防爆（XP）型設備，
        應有五個全牙以上之銜接；防爆（XP）型設備如為廠製斜口螺紋銜接
        口者，應有四又二分之一全牙以上之銜接。
    (二)設備或器具配有銜接口供公制螺紋導線管或管配件連接者，應採用適
        用之管配件或電纜配件，且其銜接口應為公制螺紋，或有適用之轉接
        頭可連接導線管或斜口螺紋管配件。公制螺紋管配件連接防爆（XP）
        型設備銜接口，應至少具備國際標準（ ISO）之 6g/6H  配合度。裝
        設於 C  群或 D  群環境者，應有五個全牙以上之銜接；裝設於 A
        群或 B  群環境者，應有八個全牙以上之銜接。
    (三)未使用之開口應以適用之金屬管塞封閉，且該管塞之螺紋及銜接應符
        合前二目規定。
複合型光纖電纜內含有可通電之導線者，其裝設應依本章第一節至第四節規定
辦理。

      第二節  存在爆炸性氣體之第一類場所
        第一款  第一類場所一般規定及配線
第四百七十二條
於可能存在爆炸性氣體而有火災或爆炸危險之第一類第一種場所及第二種場所
內，所有電壓等級之用電設備或器具配線及裝設，應依本節規定辦理。

第四百七十三條
適用於 0  區之用電設備或器具得裝設於相同氣體及溫度等級之第一類第一種
場所。
適用於 0  區、1 區或 2  區之用電設備或器具得裝設於相同氣體及溫度等級
之第一類第二種場所。

第四百七十四條
第一類第一種場所之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)有螺紋之厚金屬導線管。
    (二)符合下列規定之 PVC  管：
        1.埋設於地下，並以厚度五十毫米以上之混凝土包覆，且自管頂至地
          面之埋設深度為六百毫米以上。
        2.地下導線管自露出地面點，或與地面管槽相連接點回推長度六百毫
          米之管段，以有螺紋之厚金屬導線管連接。
        3.附加一條設備接地導線提供管槽系統之電氣連續性及非帶電金屬部
          分之接地。
    (三)MI  電纜，搭配適用於第一種場所之終端配件，其裝設及支撐能防止
        終端配件承受拉應力。
    (四)於不對外開放且由合格人員維修及管理監督之工業廠區，採用適用於
        第一種場所或 1  區之金屬被覆電纜，且該電纜有氣密性金屬被覆及
        適合之聚合物材料外皮，並內含一條符合第九十三條規定之設備接地
        導線，及搭配適用之終端配件。
二、需可撓連接者，得採用適用於第一種場所之可撓管配件，或符合第四百九
    十二條規定情形，採用適用於第一種場所之可撓軟線，終端搭配適用之軟
    線連接頭。
三、線盒及管配件應為適用於第一種場所者。
第一類第二種場所之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)符合前項規定之配線方法。
    (二)加襯墊密封之匯流排槽或導線槽。
    (三)金屬被覆電纜或有金屬遮蔽之高壓電纜配線，包括以電纜架裝置，並
        搭配適用之電纜終端配件。
    (四)於不對外開放且由合格人員維修及管理監督之工業廠區，裝設金屬導
        線管不具足夠抗腐蝕性能時，採用規格相當於號數 SCH80  之 PVC
        管、廠製彎管及其附屬管配件。
二、若有自第一種場所延伸至第二種場所之配線，依第四百七十五條第四款規
    定於邊界須加以密封者，其密封裝置應裝設於該邊界之第二種場所側，且
    第一種場所之配線方法應延伸至該密封裝置。
三、需可撓連接者，得採用下列規定方法之一：
    (一)適用之金屬可撓管配件。
    (二)金屬可撓導線管，搭配適用之管配件。
    (三)液密型金屬可撓導線管，搭配適用之管配件。
    (四)液密型非金屬可撓導線管，搭配適用之管配件。
    (五)適用於第二種場所之可撓軟線，內含一條設備接地導線，及搭配適用
        之終端配件。
四、非引火性現場配線：
    (一)得採用非分類場所之配線方法。
    (二)配線應依控制圖說指示裝設。
    (三)簡易器具未標明於控制圖說者，得裝設於非引火性現場配線電路，且
        不會使非引火性現場配線電路與其他電路連接。
    (四)個別之非引火性現場配線電路裝設應符合下列規定之一：
        1.裝設於個別之電纜內。
        2.裝設於每條電路導線皆以被接地金屬遮蔽之多芯電纜內。
        3.裝設於每條電路導線之絕緣厚度為○‧二五毫米以上之多芯電纜或
          管槽內。
五、除依第四百八十六條第二款第一目、第四百八十七條第二款第一目或第四
    百九十四條第二款第一目規定外，線盒及管配件內部在正常運轉下不會有
    點火源產生者，得採用一般型。

第四百七十五條
第一類第一種場所之導線管密封裝設位置依下列規定辦理：
一、防爆（XP）型封閉箱體：
    (一)導線管進入下列規定之防爆（XP）型封閉箱體者，應加以密封：
        1.箱體內裝有開關、斷路器、熔線、電驛、電阻器等設備或器具，於
          正常運轉下會產生電弧、火花，或運轉溫度超過內含氣體或揮發氣
          攝氏自燃溫度百分之八十。但該設備或器具依下列規定之一辦理者
          ，得免密封：
          (1) 封裝於氣體或揮發氣無法進入之完全密封腔室。
          (2) 電流啟斷接點浸於油中。電力接點浸入五十毫米以上；控制接
              點浸入二十五毫米以上。
          (3) 封裝於工廠密封完成之防爆（XP）型腔室，該腔室適用於第一
              類第一種場所，有工廠密封或相似文字之商品標示，且箱體之
              管接口小於標稱管徑五十三毫米。
          (4) 為非引火性電路之一部分。
        2.箱體內裝有配線端子台、接續組件或分接頭，且管接口為標稱管徑
          五十三毫米以上。
    (二)防爆（XP）型封閉箱體之導線管須密封者，不得將相鄰之工廠密封箱
        體視為其導線管密封。
    (三)導線管密封應裝設於距離防爆（XP）型封閉箱體四百五十毫米範圍內
        ；其密封裝置與該箱體之間，僅能裝設防爆（XP）型由令、管接頭、
        大小管接頭、肘型彎管、加蓋肘型彎管，或類似 L  型、T 型、十字
        型管配件，且尺寸規格不得超過導線管管徑。
二、進入正壓封閉箱體之導線管非為正壓保護系統之一部分者，每支導線管應
    於距離該箱體四百五十毫米範圍內加以密封。
三、二個以上防爆（XP）型封閉箱體間以導線管連接，其導線管依第一款規定
    須密封者，如以短管或長度不超過九百毫米之導線管互相連接，且該短管
    或導線管每支皆裝有單一密封裝置，並位於任一箱體四百五十毫米範圍以
    內視為符合規定之密封。
四、邊界：
    (一)導線管離開第一類第一種場所之邊界應加以密封；其密封裝置得裝設
        於第一類第一種場所邊界之任一側三米範圍內。
    (二)密封裝置之裝設應能使第一類第一種場所導線管內氣體或揮發氣洩漏
        至密封裝置外之數量極小化。
    (三)導線管密封裝置與離開第一類第一種場所邊界交界處之間，除裝在密
        封裝置上之防爆（XP）型大小管接頭外，不得裝設由令、管接頭、線
        盒或其他管配件。
    (四)金屬導線管無裝設由令、管接頭、線盒或其他管配件，完整不間斷穿
        過第一類第一種場所，且兩處邊界外三百毫米範圍內無裝設管配件，
        導線管兩終端皆位於非分類場所者，該導線管得免密封。
    (五)依第三百零三條規定埋設於地下之導線管，離開第一類第一種場所之
        邊界位於地下者，其密封裝置得裝設於導線管離開地面之管段，惟密
        封裝置與導線管露出地面點之間，除裝在密封裝置上之防爆（XP）型
        大小管接頭外，不得裝設由令、管接頭、線盒或其他管配件。

第四百七十六條
第一類第二種場所之導線管密封裝設位置依下列規定辦理：
一、防爆（XP）型封閉箱體：
    (一)導線管進入防爆（XP）型封閉箱體者，應依前條第一款第一目之 1
        及第三款規定加以密封。
    (二)導線管密封裝置與封閉箱體間之全部管段或短管，應符合第四百七十
        四條第一項規定。
二、邊界：
    (一)導線管離開第一類第二種場所進入非分類場所之邊界應加以密封；其
        密封裝置得裝設於第一類第二種場所邊界之任一側三米範圍內。
    (二)密封裝置之裝設應能使第一類第二種場所導線管內之氣體或揮發氣洩
        漏至密封裝置外之數量極小化。
    (三)導線管密封裝置與離開第一類第二種場所邊界交界處之間，除裝在密
        封裝置上之防爆（XP）型大小管接頭外，不得裝設由令、管接頭、線
        盒或其他管配件。
    (四)導線管密封裝置與離開第一類第二種場所邊界交界處之管段，應採用
        有螺紋之厚金屬導線管，且密封裝置應以螺紋與其連接。
    (五)密封裝置如經設計者確認適用於正常使用下，能使氣體洩漏之數量極
        小化，且裝設於可觸及處者，得免為防爆（XP）型。
第一類第二種場所之導線管裝設符合下列規定之一者，依其規定得免密封：
一、金屬導線管無裝設由令、管接頭、線盒或其他管配件，完整不間斷穿過第
    一類第二種場所，且兩處邊界外三百毫米範圍內無裝設管配件，導線管兩
    終端皆位於非分類場所者，該導線管得免密封。
二、導線管系統從第一類第二種場所進入非分類場所，終端位於非分類場所，
    其金屬導線管配線轉換為電纜架裝置 MI 電纜或其他電纜配線不穿入管槽
    或敷設於電纜架，符合下列規定者，得免密封：
    (一)該非分類場所位於建築物外，或位於建築物內且該導線管系統全部位
        於同一空間內。
    (二)導線管終端非位於正常運轉下會有點火源之封閉箱體內。
三、封閉箱體或隔間因採用正壓保護技術成為非分類場所時，導線管系統從該
    箱體或隔間進入第一類第二種場所者其邊界得免密封。
四、導線管系統由第一類第二種場所進入非分類場所符合下列規定者，其地面
    上管段得免密封：
    (一)導線管系統無任何部分管段穿過第一類第一種場所，且在第一類第一
        種場所邊界外三百毫米範圍內管段無裝設由令、管接頭、線盒或其他
        管配件。
    (二)導線管系統管段全部位於建築物外。
    (三)導線管系統管段不直接連接至密封幫浦，或用於流量、壓力、分析測
        量之製程或供電連接等；其依靠單一壓縮密封、隔膜或細管防止易燃
        性或可燃性流體進入導線管系統。
    (四)導線管系統管段僅有螺紋之金屬導線管、由令、管接頭、導管穿線匣
        及管配件位於非分類場所。
    (五)導線管系統管段進入每個位於第一類第二種場所之封閉箱體或配件，
        有終端、接續或分接者，皆有密封。

第四百七十七條
第一類場所之密封裝設依下列規定辦理。符合前條第一項第二款第五目或第五
百六十七條第二項規定密封裝置得免為防爆（XP）型者，得免適用本條規定。
一、封閉箱體內有連接點或用電設備者，應有完整密封裝置，或採用適用於該
    箱體裝設場所之密封管配件。密封管配件應搭配專屬密封膏，且裝設於可
    觸及處。
二、密封膏應能使氣體或揮發氣經由密封管配件洩漏之數量極小化，且不受周
    圍大氣或液體影響；其熔點應為攝氏九十三度以上。
三、除採用電纜適用之密封配件外，密封完成之密封膏厚度不得小於密封管件
    之標稱管徑，且該厚度至少為十六毫米。
四、接續及分接不得採用僅作為密封且填充密封膏之管配件。接續或分接之管
    配件不得填充密封膏。
五、如有整套組合係會產生電弧、火花或高溫之設備所在隔間，與內裝接續組
    件或分接頭之隔間分開，導線從其中之一隔間進入另一隔間有裝設完整之
    密封裝置者，該組合應確認適用於其所裝設之場所。上列組合裝設於第一
    類第一種場所時，導線管連接至內裝有配線端子台、接續組件或分接頭之
    隔間，且管接口為標稱管徑五十三毫米以上者，該導線管應加以密封。
六、密封管件內容許導線截面積，除該管件經設計者確認適用較高填充百分比
    外，不得超過相同標稱管徑之厚金屬導線管截面積百分之二十五。
七、以 MI 電纜配線者，其終端配件應採用密封膏加以密封，以防止濕氣滲入
    。

第四百七十八條
第一類第一種場所之電纜密封裝設位置依下列規定辦理：
一、終端：
    (一)電纜所有終端應依前條規定加以密封。
    (二)若採用有氣密性連續螺旋狀金屬被覆，及合適高分子材料製成全長外
        皮之金屬被覆電纜，應採用適用之配件加以密封，並於移除電纜外皮
        或其他被覆後，以密封膏將每條絕緣導線周圍填滿，使氣體或揮發氣
        洩漏之數量極小化。
    (三)遮蔽電纜及雙絞線電纜之終端如採用其他可行方法能使氣體或揮發氣
        進入之數量極小化，及防止火焰蔓延至纜心者，得免移除電纜遮蔽層
        或免分離雙絞線。
二、氣體或揮發氣可流通之電纜：
    (一)裝設於導線管內之電纜有氣密性連續被覆，能透過纜心流通氣體或揮
        發氣者，在第一類第一種場所內應加以密封，並於移除電纜外皮或其
        他被覆後，以密封膏將每條絕緣導線周圍填滿。
    (二)前目規定電纜如為多芯電纜，並將距離封閉箱體四百五十毫米範圍導
        線管內電纜加以密封，且電纜末端位於該箱體內，採用可行方法使氣
        體或揮發氣進入之數量極小化，及防止火焰蔓延至纜心者，該多芯電
        纜得視為單一導線。如為遮蔽電纜及雙絞線電纜者，得免移除電纜遮
        蔽層或免分離雙絞線。
三、氣體或揮發氣不可流通之電纜：
    (一)裝設於導線管內之多芯電纜如不能透過纜心流通氣體或揮發氣者，應
        視為單一導線。
    (二)前目規定電纜應依第四百七十五條規定加以密封。
第一類第二種場所之電纜密封裝設位置依下列規定辦理：
一、終端：
    (一)進入防爆（XP）型封閉箱體之電纜與封閉箱體之接口處，應加以密封
        ；其密封應依第四百七十六條第一項第一款規定辦理，或採用防爆（
        XP）型密封配件。
    (二)採用有氣密性連續被覆之多芯電纜，能透過纜心流通氣體或揮發氣者
        ，裝設於第一類第二種場所內應採用適用之配件加以密封，並於移除
        電纜外皮或其他被覆後，以密封膏將每條絕緣導線周圍填滿，使氣體
        或揮發氣洩漏之數量極小化。多芯電纜裝設於導線管內者，應依前項
        規定加以密封。
    (三)封閉箱體或隔間因採用Z型正壓保護技術成為非分類場所時，電纜
        從該箱體或隔間進入第一類第二種場所者，其邊界得免密封。
    (四)遮蔽電纜及雙絞線電纜之終端如採用其他可行方法能使氣體或揮發氣
        進入之數量極小化，及防止火焰蔓延至纜心者，得免移除電纜遮蔽層
        或免分離雙絞線。
二、氣體或揮發氣不可流通之電纜：
    (一)有氣密性連續被覆之電纜，透過纜心流通氣體或揮發氣不會超過密封
        裝置容許流通量，且該電纜裝設長度超過上列限制氣體或揮發氣流通
        所需之長度者，除符合前款規定外，得免密封。
    (二)前目規定所稱密封裝置容許流通量，係指在壓力為一千五百帕斯卡時
        ，其流通量小於二百立方厘米／小時。
三、氣體或揮發氣可流通之電纜：
    (一)有氣密性連續被覆之電纜，能透過纜心流通氣體或揮發氣者，除符合
        第一款規定外，得免密封。
    (二)前目規定之電纜如連接至製程設備或配電裝置，使電纜末端承受壓力
        超過一千五百帕斯卡者，應採用密封、屏障或其他方法防止易燃性物
        質進入非分類場所。
四、電纜無氣密性連續被覆者，在第一類第二種場所與非分類場所之邊界應加
    以密封，使氣體或揮發氣洩漏至非分類場所之數量極小化。

第四百七十九條
第一類場所之凝結液排放裝置裝設依下列規定辦理：
一、控制設備封閉箱體內或管槽系統任一處可能有液體或揮發氣凝結液聚積者
    應採用可行方法防止聚積或定期排放。
二、電動機或發電機內可能有液體或揮發氣凝結液聚積者，應裝設適用之接頭
    及導線管系統，使液體進入之數量極小化。有必要防止聚積或定期排放者
    應裝設附有排放裝置之電動機或發電機。

第四百八十條
密封幫浦、沉水式幫浦或流量、壓力、溫度或分析測量儀器等連接製程之設備
，在第一類場所內應裝設製程密封裝置，防止製程流體從圍阻體滲入外部電力
系統。
連接製程之用電設備如已裝有壓縮密封墊、隔膜密封閥或密封接管等單一製程
密封裝置，防止易燃性或可燃性流體進入可傳送流體之導線管或電纜系統者，
應裝設額外裝置來減輕該製程密封裝置失效時之影響。
前項規定之額外裝置，得為下列規定之一：
一、裝設適用之屏障，能在單一製程密封裝置失效時，承受該製程溫度及壓力
    ，且在單一製程密封裝置與該屏障之間，設置通氣孔或排水孔，並裝設該
    製程密封裝置故障示警裝置。
二、於導線管或電纜與單一製程密封裝置之間採用 MI 電纜配線，其額定不小
    於製程壓力百分之一百二十五及製程最高攝氏溫度百分之一百二十五。
三、於導線管或電纜密封裝置與單一製程密封裝置之間裝設通氣孔或排水孔，
    其尺寸能防止導線管或電纜密封裝置承受超過一千四百九十三帕斯卡之壓
    力，並裝設該製程密封裝置故障示警裝置。
四、附加輔助密封裝置，並有標明輔助密封裝置之標識，其額定適用於單一製
    程密封裝置失效時所應承受之壓力及溫度。
連接製程之用電設備未裝設單一製程密封裝置，或已標示為「單一密封」或「
雙重密封」者，得免裝設額外密封裝置。

第四百八十一條
在第一類場所內，如可能有揮發氣凝結液或液體聚積或浸入觸及導線絕緣層者
，該絕緣層應為適用於此環境者，或以適用之被覆或具同等效果之方法加以保
護。

第四百八十二條
第一類場所不得有運轉電壓超過三十伏特之未絕緣暴露導線、匯流排、端子或
組件。該場所如為潮濕場所者，未絕緣暴露部分之運轉電壓不得超過十五伏特
。
前項規定未絕緣暴露部分應採用適用於第一類場所之本質安全、非引火性電路
或非引火性設備之技術加以保護。

第四百八十三條
第一類場所之配線及設備應依第二章第五節及下列規定接地及搭接：
一、搭接：
    (一)搭接應採用有適當配件之搭接導線或具同等效果之搭接方式，不得僅
        以制止螺絲圈套管及雙制止螺絲圈式之接觸作搭接。
    (二)第一類場所與用戶受電裝置接地點間，或與獨立電源供電系統接地點
        間之管槽、管件、配件、線盒及封閉箱體等，應依前目規定搭接。
    (三)依第九十四條第一款規定，被接地導線與接地電極如於建築物隔離設
        備電源側相接，且分路過電流保護裝置位於該隔離設備負載側者，得
        僅於最接近其相接處作搭接。
二、設備接地：採用金屬可撓導線管或液密型金屬可撓導線管配線者，導線管
    內應附加一條符合第九十三條、第九十四條第七款、第九十六條規定之設
    備接地導線。但在第一類第二種場所之設備非屬動力負載，電路過電流保
    護裝置安培額定在十安培以下，採用液密型可撓金屬導線管長度在一‧八
    米以下，並搭配適用之接地用配件者該導線管內得免附加設備接地導線。

第四百八十四條
第一類場所之突波避雷器及突波保護器裝設依下列規定辦理：
一、第一種場所：避雷器、突波保護器及突波保護用電容器應裝設於適用第一
    種場所之封閉箱體內。突波保護用電容器應依特定責務而設計。
二、第二種場所：避雷器及突波保護器應為不發弧型，突波保護用電容器應依
    特定責務而設計。上列設備為不發弧型、密封型或固態型者，得裝設於一
    般型封閉箱體內。非屬上列類型之設備應裝設於適用第一類第一種場所之
    封閉箱體內。

        第二款  第一類場所之設備
第四百八十五條
第一類場所之變壓器及電容器裝設依下列規定辦理：
一、第一種場所：
    (一)內含可燃性液體之變壓器及電容器，應裝設於符合第八章第五節第二
        款規定及下列規定之變電室內：
        1.變電室與第一種場所之間無裝設門窗或其他開口。
        2.有良好充足之通風，以連續排除易燃性氣體或揮發氣。
        3.通氣孔或通風管道之出口位於建築物外之非分類場所。
        4.通氣孔或通風管道有足夠大小可釋放變電室內之爆炸壓力，且建築
          物內所有通風管道為鋼筋混凝土構造。
    (二)不含可燃性液體之變壓器及電容器應裝設於符合前目規定之變電室內
        ，或為適用於第一種場所之設備。
二、第二種場所：
    (一)變壓器應符合第三章第十節或第八章第五節之適用規定。
    (二)電容器應符合第三章第十一節或第八章第七節之適用規定。

第四百八十六條
第一類場所之計器、儀器及電驛裝設依下列規定辦理：
一、第一種場所：電度表、變比器、電阻器、整流器、熱離子管等計器、儀器
    及電驛，應裝設於適用第一種場所之防爆（XP）型封閉箱體內，或吹驅及
    正壓封閉箱體內。
二、第二種場所：
    (一)開關、斷路器及按鈕、電驛、警鈴、警笛等之開閉接點，應裝設於適
        用第一種場所之防爆（XP）型封閉箱體，或吹驅及正壓封閉箱體內。
        但啟斷電流之接點符合下列規定之一者，得裝設於一般型封閉箱體內
        ：
        1.浸於油中。
        2.裝設於完全密封並能防止氣體或揮發氣進入之腔室。
        3.裝設於非引火性電路中。
        4.適用於第二種場所。
    (二)用於計器、儀器及電驛，或與其相連之電阻器、電阻裝置、熱離子管
        、整流器及其他類似之設備，應裝設於適用第一種場所之防爆（XP）
        型封閉箱體，或吹驅及正壓封閉箱體內。但符合下列規定者，得裝設
        於一般型封閉箱體內：
        1.該設備內無開閉接點或滑動接點。
        2.任何暴露表面最高運轉溫度不超過周圍氣體或揮發氣攝氏自燃溫度
          百分之八十，或經測試不會引燃氣體或揮發氣。
        3.不含熱離子管之設備。
    (三)無開閉接點或滑動接點之變壓器繞組、阻抗線圈、電磁線圈或其他繞
        組，應裝設於封閉箱體內。該箱體得為一般型。
    (四)由符合前三目規定得裝設於一般型封閉箱體之元件組成之組合，得裝
        設於單個一般型封閉箱體內。該組合內有前三目規定之任一設備時，
        其任何元件之表面最高溫度應有耐久且明顯標識，標明於封閉箱體外
        面，或在設備上標明表四七一規定之適合溫度等級（T 碼）。
    (五)符合前四目規定得裝設一般型封閉箱體時，作為儀器電路過電流保護
        用之熔線在正常使用下不會過載，且每一熔線之電源側裝設符合第一
        目規定之開關者，該熔線得裝設於一般型封閉箱體內。
    (六)符合下列規定者，製程控制儀器得採用附接插頭可撓軟線連接：
        1.內含符合第一目規定之開關，不依靠所配裝之插頭啟斷電流。電路
          為非引火性電路配線者，得免裝設開關。
        2.標稱電壓為一百十伏特，電流為三安培以下。
        3.可撓軟線長度為九百毫米以下，為適用於第二種場所或受保護得適
          用於第二種場所者，且其電源由閉鎖接地型之附接插頭及插座供電
          。
        4.僅提供所需之插座。
        5.插座標明有載時不得拔除插頭之警告標識。

第四百八十七條
第一類場所之開關、斷路器、電動機控制器及熔線，包括按鈕、電驛及類似裝
置裝設依下列規定辦理：
一、在第一種場所應裝設於封閉箱體內，且該箱體及其內部設備或器具應為適
    用於第一種場所之完整組合。
二、第二種場所：
    (一)正常運轉下用於啟斷電流者，應裝設於適用第一種場所之防爆（XP）
        型封閉箱體，或吹驅及正壓封閉箱體內。但符合下列規定之一者，得
        裝設於一般型封閉箱體內：
        1.電流啟斷發生係在能防止氣體及揮發氣進入之完全密封腔室內。
        2.電流啟斷接點浸於油中，且電力接點浸入五十毫米以上，控制接點
          浸入二十五毫米以上。
        3.電流啟斷發生處位於工廠密封完成之防爆（XP）型腔室內。
        4.該設備或器具為無接點之固態開關控制裝置，且表面溫度不超過周
          圍氣體或揮發氣攝氏自燃溫度百分之八十。
    (二)變壓器或電容器之隔離開關在正常運轉下非用於啟斷電流者，得裝設
        於一般型封閉箱體內。
    (三)電動機、用電器具及照明燈具之保護，除第四目規定外，得依下列規
        定辦理：
        1.採用標準栓型或筒型熔線，且裝設於適用第二種場所之封閉箱體內。
        2.採用非指示型、填充式、限流型熔線，且其操作元件浸於油中或具
          同等效果之液體中，或裝設於能防止氣體及揮發氣進入之完全密封
          腔室內，並裝設於一般型封閉箱體內。
    (四)筒型熔線得作為照明燈具內之輔助保護。

第四百八十八條
第一類場所之變壓器、阻抗線圈及電阻器若作為電動機、發電機及用電器具之
控制設備或組合成控制設備者，其裝設依下列規定辦理：
一、第一種場所：變壓器、阻抗線圈及電阻器，及與其組合之開關，應裝設於
    適用第一種場所之防爆（XP）型封閉箱體，或吹驅及正壓封閉箱體內。
二、第二種場所：
    (一)連接於變壓器、阻抗線圈及電阻器之開關或過電流保護裝置裝設，應
        依前條第二款規定辦理。
    (二)裝設變壓器、電磁線圈、阻抗線圈及繞組之封閉箱體得為一般型者。
    (三)電阻器應裝設於適用第一類場所之封閉箱體內。其為定電阻，且最大
        運轉溫度不超過周圍氣體或揮發氣攝氏自燃溫度百分之八十，或經測
        試不會引燃氣體或揮發氣者，其箱體得為一般型者。

第四百八十九條
第一類場所之電動機、發電機或其他旋轉電機機器裝設依下列規定辦理：
一、第一種場所：
    (一)電動機、發電機或其他旋轉電機機器應為下列規定之一：
        1.適用於第一種場所之機器。
        2.全密閉型機器，有乾淨空氣來源提供正壓通風，及排放至非分類場
          所，並於機器外殼以十倍以上容積量之空氣吹驅完成後，始對該機
          器供電，且有於正壓空氣供應故障時自動斷電之裝置。
        3.全密閉惰性氣體填充型機器，有穩定可靠惰性氣體來源可對機器外
          殼加壓，並有確保外殼內正壓之裝置，及於正壓氣體供應故障時自
          動斷電之裝置。
        4.浸入液體中之機器，該液體僅於揮發與空氣混合時為易燃，或封在
          壓力超過大氣壓力之氣體或揮發氣內之機器，該氣體或揮發氣僅於
          與空氣混合時為易燃，並於該機器以液體或氣體吹驅，排除所有空
          氣後始對該機器供電，且有於液體、氣體或揮發氣供應故障，或壓
          力降至大氣壓力時，自動斷電之裝置。
    (二)符合前目之 2  及之 3  規定之全密閉型電動機，其表面運轉溫度不
        得超過周圍氣體或揮發氣攝氏自燃溫度百分之八十，並應附有偵測電
        動機溫度之裝置，在溫度超過設計限制值時，使電動機自動斷電或發
        出警報。裝設輔助設備者，其應為適用於第一種場所。
二、第二種場所之電動機、發電機及其他旋轉電機機器應為下列規定之一：
    (一)適用於第二種場所之機器。
    (二)適用於第一種場所，且起動或運轉時採用滑動接點、離心開關或電動
        機過電流、過載、過熱保護裝置等其他型式開關，或內含電阻裝置之
        機器。
    (三)用於防止機器停止運轉期間出現水氣凝結之空間加熱器，於額定電壓
        運轉時，其暴露表面溫度不超過周圍氣體或揮發氣攝氏自燃溫度百分
        之八十，且其電動機有耐久且明顯之標識，標明周圍溫度攝氏四十度
        或較高周圍溫度運轉時之表面最高溫度。
    (四)如鼠籠式感應電動機等內部無電刷、開關機構或類似電弧產生裝置之
        開放式或非防爆（XP）外殼電動機。

第四百九十條
第一類場所之照明燈具裝設依下列規定辦理：
一、第一種場所：
    (一)燈具應為適用於第一種場所之完整組合，且應標明其設計之最大瓦特
        數。作為可攜式使用者，燈具應為適用於該用途之完整組合。
    (二)燈具應有防護柵或位於安全位置，以免遭受外力損傷。
    (三)懸吊式照明燈具應以有螺紋之厚金屬導線管製成吊桿懸吊及配線；其
        螺紋接頭應以固定螺絲或其他有效方式固定，防止鬆脫。吊桿長度超
        過三百毫米者，應依下列規定之一辦理：
        1.於吊桿下端三百毫米內，裝設永久且有效之斜撐，防止橫向位移。
        2.於燈具固著點至其支撐線盒或配件三百毫米內，裝設適用於第一種
          場所之可撓管配件或可撓連接器。
    (四)支撐燈具之線盒、線盒組件或管配件，應為適用於第一類場所者。
二、第二種場所：
    (一)燈具於正常運轉下表面溫度超過周圍氣體或揮發氣攝氏自燃溫度百分
        之八十者，該燈具應為適用於第二種場所之完整組合，且應標明其設
        計之最大瓦特數，或經測試為其所標示運轉溫度或溫度等級（T 碼）
        之類型。
    (二)燈具應有防護柵或位於安全位置，以免遭受外力損傷。燈具落下之火
        花或熱金屬有引燃局部聚積之易燃性氣體或揮發氣危險者，應裝設適
        用之外殼或採用其他有效之保護措施。
    (三)懸吊式照明燈具應依前款第三目規定辦理。
    (四)可攜式照明設備應符合第一目規定。如該設備架設於移動式支架，並
        依第四百九十二條規定採用可撓軟線連接，且符合第二目規定者，得
        架設於任何位置。
    (五)整組燈具或個別燈座之開關應符合第四百八十七條第二款第一目規定
        。
    (六)放電管燈之啟動及控制設備應符合第四百八十八條第二款規定。但日
        光燈適用於第二種場所者，其過熱保護器封裝於有過熱保護之日光燈
        安定器內，不在此限。

第四百九十一條
第一類場所用電設備或器具之裝設依下列規定辦理：
一、裝設於第一種場所應為適用於第一種場所者。
二、第二種場所：
    (一)電力加熱之設備或器具應符合下列規定之一：
        1.在最高周圍溫度下連續通電，電熱器暴露於氣體或揮發氣之表面溫
          度不超過周圍氣體或揮發氣攝氏自燃溫度百分之八十。若無溫度控
          制器，加熱設備或器具於額定電壓一‧二倍時運轉，仍應符合上列
          規定。但屬符合下列規定者，從其規定：
          (1) 如為防水氣凝結之空間加熱設備或器具內建電動機者，應依第
              四百八十九條規定辦理。
          (2) 加熱設備或器具之電路得裝設限流裝置，限制電熱器內之電流
              值，使其表面溫度上升低於自燃溫度百分之八十。
        2.加熱之設備或器具為適用於第一種場所者。但為電阻式電熱保溫設
          備適用於第二種場所者，不在此限。
    (二)設備或器具以電動機驅動者，該電動機應符合第四百八十九條第二款
        規定。
    (三)開關、斷路器及熔線應符合第四百八十七條第二款規定。

第四百九十二條
第一類場所內有符合下列規定情形之一者，得採用可撓軟線配線：
一、連接可攜式照明設備或其他可攜式用電設備或器具，與其電源電路固定部
    分。
二、於合格人員維修及管理監督之工業廠區，依第四百七十四條第一項規定之
    固定配線無法提供固定式或可攜式用電設備或器具必要移動之電路部分，
    且可撓軟線可透過裝設位置或防護裝置避免損壞。
三、不需進入水池即可移出之電動沉水幫浦，於水池與其電源間之管槽範圍內
    延伸。
四、進出開放式混合桶或混合槽之電動攪拌器。
五、由插座、開關及其他配電裝置等不視為可攜式用電設備組成之臨時性可攜
    式組合，其個別為適用於第一類場所者。
如依前項規定採用可撓軟線配線者，該軟線裝設應符合下列規定：
一、為適用於第一類場所者。
二、內含一條符合第九十四條第七款規定之設備接地導線。
三、採用線夾或其他可確保終端連接不會承受拉力之方法支撐。
四、在第一種場所或第二種場所須裝設防爆（XP）型線盒、管配件或封閉箱體
    者，可撓軟線終端採用適用於第一種場所或第二種場所之軟線連接器或附
    接插頭，或裝有適用於第一種場所或第二種場所密封裝置之軟線連接器。
    在第二種場所不須採用防爆（XP）型設備者，可撓軟線終端採用適用之軟
    線連接器或附接插頭。
五、為連續線段。用於前項第五款規定之情形者，自電源至臨時性可攜式組合
    及從臨時性可攜式組合至用電設備或器具間之可撓軟線應為連續線段。

第四百九十三條
第一類場所之插座及附接插頭應能連接可撓軟線內含之設備接地導線，並為適
用於第一類場所者。但依第四百八十六條第二款第六目規定裝設者，不在此限
。

第四百九十四條
第一類場所之信號、警報、遙控及通訊系統裝設依下列規定辦理：
一、裝設於第一種場所應為適用於第一種場所者，其配線應符合第四百七十四
    條第一項、第四百七十五條及第四百七十七條規定。
二、第二種場所：
    (一)開關、斷路器及按鈕開關、電驛、警鈴、警笛等之開閉接點，應裝設
        於適用第一類第一種場所之防爆（XP）型封閉箱體或吹驅及正壓封閉
        箱體內。但啟斷電流之接點符合下列規定之一者，得裝設於一般型封
        閉箱體內：
        1.浸於油中。
        2.包封於完全密封防止氣體或揮發氣進入之腔室。
        3.裝設於非引火性電路中。
        4.為非引火性元件部分。
    (二)電阻器、電阻裝置、熱離子管、整流器及其他類似之設備，應符合第
        四百八十六條第二款第二目規定。
    (三)避雷保護裝置及熔線應裝設於封閉箱體內；該封閉箱體得為一般型。
    (四)配線與密封應符合第四百七十四條第二項、第四百七十六條及第四百
        七十七條規定。

      第三節  存在可燃性粉塵之第二類場所
        第一款  第二類場所一般規定及配線
第四百九十五條
於可能存在可燃性粉塵而有火災或爆炸危險之第二類第一種場所及第二種場所
內，所有電壓等級之用電設備或器具配線及裝設，應依本節規定辦理。

第四百九十六條
適用於第一類場所之防爆（XP）型設備及配線，不適用於第二類場所。但該設
備標示適用第二類場所者，不在此限。

第四百九十七條
適用於 20 區之用電設備或器具得裝設於相同粉塵環境及溫度等級之第二類第
一種場所。
適用於 20 區、21  區或 22 區之用電設備或器具得裝設於相同粉塵環境及溫
度等級之第二類第二種場所。

第四百九十八條
第二類第一種場所之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)有螺紋之厚金屬導線管。
    (二)MI  電纜，搭配適用於第一種場所之終端配件，其裝設及支撐能防止
        終端配件承受拉應力。
    (三)於不對外開放且由合格人員維修及管理監督之工業廠區，採用適用於
        第一種場所或21區之金屬被覆電纜，且該電纜有氣密性金屬被覆及適
        合之聚合物材料外皮，並內含一條符合第九十三條規定之設備接地導
        線，及搭配適用之終端配件。
二、需可撓連接者，得採用下列規定方法之一：
    (一)塵密型可撓連接頭。
    (二)液密型金屬可撓導線管，搭配適用之管配件。
    (三)液密型非金屬可撓導線管，搭配適用之管配件。
    (四)互鎖型金屬被覆電纜，有適合之聚合物材料外皮，及搭配適用於第一
        種場所之終端配件。
    (五)符合第五百十條規定情形，採用適用於第一種場所之可撓軟線，終端
        搭配適用之塵密型配件。
三、線盒及管配件應為塵密型，並具有螺紋銜接口供導線管或電纜終端連接；
    用於內部有導線接續、分接或終端連接，或裝設於存在 E  群危險物質之
    場所，應為適用於第二類場所者。
第二類第二種場所之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)符合前項規定之配線方法。
    (二)厚金屬導線管、薄金屬導線管、無螺紋金屬導線管或塵密型導線槽。
    (三)MI  電纜或金屬被覆電纜，搭配適用之終端配件。
    (四)MI  電纜、金屬被覆電纜或有金屬遮蔽之高壓電纜，搭配適用之終端
        配件，單一層敷設於梯型、通風底板型或通風槽型電纜架，且電纜之
        間隔為最大電纜直徑以上。
    (五)於不對外開放且由合格人員維修及管理監督之工業廠區，裝設金屬導
        線管不具足夠抗腐蝕性能時，採用規格相當於號數 SCH80  之 PVC
        管、廠製彎頭及其附屬管配件。
二、需可撓連接者，應依前項第二款規定辦理。
三、非引火性現場配線電路應依第四百七十四條第二項第四款規定辦理。
四、線盒及管配件應為塵密型。

第四百九十九條
第二類場所之防塵燃封閉箱體與非防塵燃封閉箱體間，若有管槽連通者，應採
取下列規定之一措施，防止粉塵經由管槽進入防塵燃封閉箱體：
一、永久且有效之密封裝置。
二、水平管槽長度三米以上。
三、垂直管槽自防塵燃封閉箱體向下延伸長度一‧五米以上。
四、自防塵燃封閉箱體水平或向下延伸，與第二款或第三款規定有具同等效果
    之管槽裝設方法。
第二類場所之防塵燃封閉箱體與非分類場所之封閉箱體間，若有管槽連通者，
得免密封。
密封裝置應為可觸及者。
密封裝置得免為防爆（XP）型。

第五百條
第二類場所不得有運轉電壓超過三十伏特之未絕緣暴露導線、匯流排、端子或
組件。該場所如為潮濕場所者，未絕緣暴露部分之運轉電壓不得超過十五伏特
。
前項規定未絕緣暴露部分應採用適用於第二類場所之本質安全、非引火性電路
或非引火性設備之技術加以保護。

第五百零一條
第二類場所之配線及設備應依第四百八十三條規定接地及搭接。

第五百零二條
第二類第一種場所之突波避雷器及突波保護器，應裝設於適用第二類第一種場
所之封閉箱體內。
突波保護用電容器應依其特定責務而設計。

        第二款  第二類場所之設備
第五百零三條
第二類場所之變壓器及電容器裝設依下列規定辦理：
一、第一種場所：
    (一)變壓器及電容器內含可燃性液體者，應僅能裝設於符合第八章第五節
        第二款規定及下列規定之變電室內：
        1.變電室與第一種場所之門窗或其他開口，於牆壁兩側裝設自閉式防
          火門，並有擋風條等密封裝置能使粉塵進入變電室之數量極小化。
        2.通風孔或通風管僅限與外部空氣連通。
        3.具備與外部空氣連通之釋壓孔。
    (二)變壓器及電容器不含可燃性液體者，應裝設於符合前目規定之變電室
        內，或為完整組合，包括端子接頭。
    (三)變壓器及電容器不得裝設於第二類第一種 E  群場所。
二、第二種場所：
    (一)變壓器及電容器內含可燃性液體者，應僅能裝設於符合第八章第五節
        第二款規定之變電室內。
    (二)變壓器不含可燃性液體，且容量超過二十五千伏安者，應符合下列規
        定：
        1.具有釋壓孔。
        2.具有吸收箱體內電弧所生氣體之功能，或將釋壓孔連接至可將該氣
          體輸送至建築物外之排氣管或煙道。
        3.變壓器外殼與鄰近可燃物質間保持一百五十毫米以上之間隔。
    (三)乾式變壓器應裝設於變電室，或將變壓器之繞組及端子接頭包封於無
        通風或開口之密閉金屬封閉箱體內，且正常情況下其運轉電壓為六百
        伏特以下。
    (四)電容器應符合第三章第十一節或第八章第七節規定。

第五百零四條
第二類場所之開關、斷路器、電動機控制器及熔線，包括按鈕、電驛及類似裝
置裝設依下列規定辦理：
一、在第一種場所應裝設於適用第一種場所之封閉箱體內。
二、在第二種場所，其封閉箱體應為塵密型或適用於第二種場所者。

第五百零五條
第二類場所之控制用變壓器及電阻器裝設依下列規定辦理：
一、第一種場所：控制用變壓器、電磁線圈、阻抗線圈、電阻器，及與其組合
    之過電流保護裝置或開關，應裝設於適用第一種場所之封閉箱體內。
二、第二種場所：
    (一)與控制用變壓器、電磁線圈、阻抗線圈及電阻器組合之開關或過電流
        保護裝置，應裝設於塵密型或適用於第二種場所之封閉箱體內。
    (二)控制用變壓器、電磁線圈、阻抗線圈及繞組若不與開關或過電流保護
        裝置裝設於同一封閉箱體者，應裝設於塵密型或適用於第二種場所之
        封閉箱體內。
    (三)電阻器及電阻裝置應裝設於防塵燃封閉箱體，或適用於第二種場所之
        封閉箱體內。

第五百零六條
第二類場所之電動機、發電機或其他旋轉電機機器裝設依下列規定辦理：
一、在第一種場所應為適用於第一種場所或全密閉管道通風型。
二、在第二種場所應為全密閉無通風型、全密閉管道通風型、全密閉水冷卻型
    、全密閉風扇冷卻型或防塵燃型，於流通空氣、無粉塵覆蓋之正常運轉下
    ，滿載時外部最高溫度應符合第四百七十一條第三項第二款規定，且不得
    有對外開口。
第二類第一種場所或第二種場所之粉塵如為非導電性、非研磨性，累積不嚴重
，且機器例行清潔及檢修工作易於進行者，得裝設下列規定之一機器：
一、標準開放型機器，且無滑動接點、離心開關或電動機過電流、過載、過熱
    保護裝置等其他型式開關，或內含電阻裝置。
二、標準開放型機器，且接點、開關或電阻裝置裝設於無通風或其他開口之塵
    密型外殼內。
三、紡織用鼠籠式自淨電動機。

第五百零七條
第二類場所之通風管用於連接電動機、發電機、其他旋轉電機機器、用電設備
或器具封閉箱體者，其裝設依下列規定辦理：
一、通風管應以厚度○‧五毫米以上金屬或相同強度之非可燃性材料製成，並
    應符合下列規定：
    (一)直接引進建築物外之乾淨空氣。
    (二)外端加裝防護網，以防止小動物或鳥類進入。
    (三)有避免遭受外力損傷或生鏽、腐蝕之保護。
二、第一種場所之通風管，包括連接電動機、其他機器、設備或器具防塵燃封
    閉箱體之管接口，應具備塵密功能。金屬導線管之管接口及接頭，應符合
    下列規定之一：
    (一)鉚接並銲接。
    (二)螺栓鎖緊並銲接。
    (三)熔銲。
    (四)其他能達到同樣塵密效果之方法。
三、第二種場所之通風管：
    (一)通風管及其連接處應緊密結合，以防止可察覺流通量之粉塵進入通風
        設備或封閉箱體，並避免火花、火苗或燃燒中物質逸出，引燃鄰近累
        積之粉塵或可燃性物質。
    (二)金屬通風管之連接得採用捲封、鉚接或銲接方式。
    (三)與電動機等需可撓連接者，得採用密接之滑動接頭。

第五百零八條
第二類場所之照明燈具裝設依下列規定辦理：
一、第一種場所：
    (一)燈具應為適用於第一種場所者，且應標明其設計之最大瓦特數。
    (二)燈具應有防護柵或位於安全位置，以免遭受外力損傷。
    (三)懸吊式照明燈具：
        1.燈具應以有螺紋之厚金屬導線管製成吊桿懸吊，或採用吊鏈並附有
          適用之配件，或具同等效果之方法懸吊。其螺紋接頭應以固定螺絲
          或其他有效方式固定，防止鬆脫。
        2.吊桿長度超過三百毫米者，於吊桿下端三百毫米內，應裝設永久且
          有效之斜撐，防止橫向位移，或於燈具固著點至其支撐線盒或配件
          三百毫米內，裝設適用於第一種場所之可撓管配件或可撓連接器。
        3.出線盒或配件至燈具間之配線未穿入導線管時，終端搭配適用之塵
          密型配件者，得採用適用於第一種場所之可撓軟線，惟該可撓軟線
          不作為燈具之支撐裝置。
    (四)支撐燈具之線盒、線盒組件或管配件，應為適用於第二類場所者。
二、第二種場所：
    (一)可攜式照明設備應為適用於第二種場所者，且應標明其設計之最大瓦
        特數。
    (二)固定式照明燈具應有塵密型外殼或為適用於第二種場所者。燈具應標
        明在正常使用下，其暴露表面溫度不超過第四百七十一條第三項第二
        款規定溫度之最大瓦特數。
    (三)固定式照明燈具應有防護柵或位於安全位置，以免遭受外力損傷。
    (四)懸吊式照明燈具應依前款第三目規定辦理。
    (五)放電管燈之啟動及控制設備應符合第五百零五條第二款規定。

第五百零九條
第二類場所用電設備或器具之裝設依下列規定辦理：
一、裝設於第一種場所應為適用於第一種場所者。
二、第二種場所：
    (一)電力加熱之設備或器具應為適用於第二種場所者。金屬外殼包封輻射
        型加熱器具備塵密功能，且依第四百七十一條第二項規定辦理者，得
        適用於第二種場所。
    (二)設備或器具以電動機驅動者，該電動機應符合第五百零六條第一項第
        二款規定。
    (三)開關、斷路器及熔線應符合第五百零四條第二款規定。
    (四)變壓器、電磁線圈、阻抗線圈及電阻器應符合第五百零五條第二款規
        定。

第五百十條
第二類場所內有符合下列規定情形之一者，得採用可撓軟線配線：
一、連接可攜式照明設備或其他可攜式用電設備或器具，與其電源電路固定部
    分。
二、於合格人員維修及管理監督之工業廠區，依第四百九十八條第一項第二款
    規定之配線方法提供固定式或可攜式用電設備或器具可撓連接，且可撓軟
    線可透過裝設位置或防護裝置避免損壞。
三、不需進入水池即可移出之電動沉水幫浦，於水池與其電源間之管槽範圍內
    延伸。
四、進出開放式混合桶或混合槽之電動攪拌器。
五、由插座、開關及其他配電裝置等不視為可攜式用電設備組成之臨時性可攜
    式組合，其個別為適用於第二類場所者。
如依前項規定採用可撓軟線配線者，該軟線裝設應符合下列規定：
一、為適用於第二類場所者。
二、內含一條符合第九十四條第七款規定之設備接地導線。
三、採用線夾或其他可確保終端連接不會承受拉力之方法支撐。
四、裝設於第一種場所，可撓軟線終端採用適用於第一種場所之軟線連接器，
    或裝有適用於第一種場所密封裝置之軟線連接器。裝設於第二種場所，可
    撓軟線終端採用塵密型軟線接頭。
五、為連續線段。用於前項第五款規定之情形者，自電源至臨時性可攜式組合
    ，及從臨時性可攜式組合至用電設備或器具間之可撓軟線應為連續線段。

第五百十一條
第二類場所之插座及附接插頭裝設依下列規定辦理：
一、第一種場所：插座及附接插頭應能連接可撓軟線內含之設備接地導線，並
    為適用於第一種場所者。
二、第二種場所：插座及附接插頭應能連接可撓軟線內含之設備接地導線，並
    應確保插入或拔出時無帶電部分暴露。

第五百十二條
第二類場所之信號、警報、遙控與通訊系統及計器、儀器與電驛裝設依下列規
定辦理：
一、第一種場所：
    (一)開關、斷路器、電驛、接觸器、熔線及電鈴、警笛、警報器及其他裝
        置之接點等會產生火花或電弧之裝置，應裝設於適用第一種場所之封
        閉箱體內。但接點浸於油中或置於能防止粉塵進入之密封腔室內者，
        得裝設於一般型封閉箱體內。
    (二)電阻器、變壓器、抗流線圈、整流器、熱離子管及其他可產生熱能之
        設備，應裝設於適用第一種場所之封閉箱體內。但電阻器或類似設備
        浸於油中或置於能防止粉塵進入之密封腔室內者，得裝設於一般型封
        閉箱體內。
    (三)電動機、發電機或其他旋轉電機機器應符合第五百零六條第一項第一
        款規定。
二、第二種場所：
    (一)接點應符合前款第一目規定或裝設於塵密型或適用於第二種場所之封
        閉箱體內。但為非引火性電路之接點，得裝設於一般型封閉箱體內。
    (二)變壓器、抗流線圈及類似設備之繞組及端子接點，應符合第五百零五
        條第二款第二目規定。
    (三)電阻器、電阻裝置、熱離子管、整流器及其他類似之設備，應符合第
        五百零五條第二款第三目規定。
    (四)電動機、發電機或其他旋轉電機機器應符合第五百零六條第一項第二
        款規定。

      第四節  存在可燃性纖維或飛絮之第三類場所
        第一款  第三類場所一般規定及配線
第五百十三條
於可能存在可燃性纖維或飛絮而有火災或爆炸危險之第三類第一種場所及第二
種場所內，所有電壓等級之用電設備或器具配線及裝設，應依本節規定辦理。

第五百十四條
裝設於第三類場所之用電設備或器具，當連續滿載運轉時，其表面溫度不得過
高，以防止堆積其上之纖維或飛絮過度乾燥或逐漸碳化而自燃。
不會過載之用電設備或器具，其表面最高溫度應為攝氏一百六十五度以下；電
動機或電力變壓器等會過載之設備或器具，其表面最高溫度應為攝氏一百二十
度以下。

第五百十五條
符合第五百五十五條第二款第二目規定，且適用於 20 區之用電設備或器具，
若為會過載之設備或器具，且運轉溫度在攝氏一百二十度以下者，或為不會過
載之設備或器具，且運轉溫度在攝氏一百六十五度以下者，得裝設於第三類第
一種場所。
符合第五百五十五條第二款第二目規定，且適用於 20 區、21  區或 22 區之
用電設備或器具，若為會過載之設備或器具，且運轉溫度在攝氏一百二十度以
下者，或為不會過載之設備或器具，且運轉溫度在攝氏一百六十五度以下者，
得裝設於第三類第二種場所。

第五百十六條
第三類第一種場所及第二種場所之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)厚金屬導線管、薄金屬導線管、無螺紋金屬導線管、PVC 管、塵密型
        導線槽。
    (二)MI  電纜或金屬被覆電纜，搭配適用之終端配件。
    (三)MI  電纜、金屬被覆電纜或有金屬遮蔽之高壓電纜，搭配適用之終端
        配件，單一層敷設於梯型、通風底板型或通風槽型電纜架，且電纜之
        間隔為最大電纜直徑以上。
二、需可撓連接者，得採用下列規定方法之一：
    (一)塵密型可撓連接頭。
    (二)液密型金屬可撓導線管，搭配適用之管配件。
    (三)液密型非金屬可撓導線管，搭配適用之管配件。
    (四)互鎖型金屬被覆電纜，有適合之聚合物材料外皮，及搭配適用之塵密
        型終端配件。
    (五)符合第五百二十六條規定情形，採用適用於第三類場所之可撓軟線。
三、非引火性現場配線電路應依第四百七十四條第二項第四款規定辦理。
四、線盒及管配件應為塵密型。

第五百十七條
第三類場所不得有運轉電壓超過三十伏特之未絕緣暴露導線、匯流排、端子或
組件。該場所如為潮濕場所者，未絕緣暴露部分之運轉電壓不得超過十五伏特
。
前項規定未絕緣暴露部分應採用適用於第三類場所之本質安全、非引火性電路
或非引火性設備之技術加以保護。但符合第五百二十九條規定者，不在此限。

第五百十八條
第三類場所之配線及設備應依第四百八十三條規定接地及搭接。

        第二款  第三類場所之設備
第五百十九條
第三類場所之變壓器及電容器裝設應符合第五百零三條第二款規定。

第五百二十條
第三類場所之開關、斷路器、電動機控制器及熔線，包括按鈕、電驛及類似裝
置，應裝設於塵密型封閉箱體內。

第五百二十一條
第三類場所之變壓器、阻抗線圈及電阻器若作為電動機、發電機及用電器具之
控制設備或組合成為控制設備者，應裝設於塵密型封閉箱體內，並應符合第五
百十四條規定之溫度限制。

第五百二十二條
第三類第一種場所或第二種場所之電動機、發電機及其他旋轉電機機器，應為
全密閉無通風型、全密閉管道通風型或全密閉風扇冷卻型。
第三類第一種場所或第二種場所之纖維或飛絮如累積於機器上面、內部或其鄰
近區域不嚴重，且機器例行清潔及檢修工作易於進行者得裝設下列規定之一機
器：
一、標準開放型機器，且無滑動接點、離心開關或電動機過電流、過載、過熱
    保護裝置等其他型式開關，或內含電阻裝置。
二、標準開放型機器，且接點、開關或電阻裝置裝設於無通風或其他開口之密
    閉型外殼內。
三、紡織用鼠籠式自淨電動機。

第五百二十三條
第三類場所之通風管用於連接電動機、發電機、其他旋轉電機機器或用電器具
封閉箱體者，其裝設依下列規定辦理：
一、通風管應符合第五百零七條第一款規定。
二、通風管及其連接處應緊密結合，以防止可察覺流通量之纖維或飛絮進入通
    風設備或封閉箱體，並避免火花、火苗或燃燒中物質逸出，引燃鄰近累積
    之纖維、飛絮或可燃性物質。
三、金屬通風管之連接得採用捲封、鉚接或銲接方式。
四、與電動機等需可撓連接者，得採用密接之滑動接頭。

第五百二十四條
第三類場所之照明燈具裝設依下列規定辦理：
一、固定式照明燈具：
    (一)燈具之燈泡及燈座應有外殼，且該外殼應使纖維或飛絮進入之數量極
        小化，並能防止火花、燃燒物質或熱金屬逸出。
    (二)燈具應標明在正常使用下，其暴露表面溫度不超過攝氏一百六十五度
        之最大瓦特數。
二、燈具可能遭受外力損傷者，應以防護柵保護。
三、懸吊式照明燈具應以有螺紋之厚金屬導線管製成吊桿懸吊，或採用吊鏈並
    附有適用之配件懸吊。吊桿長度超過三百毫米者，應依下列規定之一辦理
    ：
    (一)於吊桿下端三百毫米內，裝設永久且有效之斜撐，防止橫向位移。
    (二)於燈具固著點至其支撐線盒或配件三百毫米內，裝設適用於之可撓管
        配件或可撓連接器。
四、可攜式照明設備應符合第一款及下列規定：
    (一)有手把及實體之燈泡防護柵。
    (二)燈座不裝設開關或插座。
    (三)不會暴露帶電金屬部分。
    (四)暴露之非帶電金屬部分加以接地。

第五百二十五條
第三類場所用電設備或器具之裝設依下列規定辦理：
一、電力加熱之設備或器具應為適用於第三類場所者。
二、設備或器具以電動機驅動者，該電動機應符合第五百二十二條規定。
三、開關、斷路器、電動機控制器及熔線應符合第五百二十條規定。

第五百二十六條
第三類場所採用可撓軟線配線者，該軟線裝設應符合下列規定：
一、為適用於第三類場所者。
二、內含一條符合第九十三條及第九十四條規定之設備接地導線。
三、採用線夾或其他可確保終端連接不會承受拉力之方法支撐。
四、終端採用塵密型軟線接頭。

第五百二十七條
第三類場所之插座及附接插頭應為接地型，且應使纖維或飛絮累積或進入之數
量極小化，並應能防止火花、火苗或燃燒中微粒逸出。
經設計者確認僅有少量之纖維或飛絮會累積於插座附近，且該插座可輕易觸及
以進行例行清潔，使纖維或飛絮進入數量極小化者，得裝設一般接地型插座。

第五百二十八條
第三類場所之信號、警報、遙控及現場擴音對講系統，應符合本節有關於配線
方法、開關、變壓器、電阻、電動機、照明燈具及相關組件之規定。

第五百二十九條
於第三類場所可燃性纖維或累積之飛絮上方，裝設供材料搬運之移動式電動起
重機與吊車、紡織用移動式吸塵器及類似設備，依下列規定辦理：
一、滑接導線之電源應為非接地，與其他系統完全隔離，並裝設接地檢示器。
    該檢示器於滑接導線發生接地故障時應發出警報並自動斷電，或在接地故
    障下繼續供電給滑接導線時，應有視覺及聽覺警報。
二、滑接導線之位置或防護應能使非合格人員不可觸及，並應有防止外物意外
    碰觸之保護。
三、集電器之配置及防護應能限制正常火花發生，及防止火花或高溫微粒逸出
    若要減少火花，每條滑接導線應有二個以上個別之接觸面可供接觸。對滑
    接導線及集電器應採取可靠方法使纖維或飛絮不會累積。
四、控制設備應符合第五百二十條及第五百二十一條規定。

第五百三十條
第三類場所之蓄電池充電設備應裝設於以不可燃性材料建造或襯裡之個別房間
，且該房間應能防止達引燃量之纖維或飛絮進入，並有良好之通風。

      第五節  存在爆炸性氣體之0區、1區及2區
第五百三十一條
於可能存在爆炸性氣體而有火災或爆炸危險之 0  區、1 區及 2  區內，所有
電壓等級之用電設備或器具配線及裝設，應依本節規定辦理。

第五百三十二條
空氣中存在或可能存在爆炸性氣體，其濃度或含量足以產生爆炸性或可引燃性
混合物之場所，並依爆炸性氣體發生機率及持續存在時間，分「區」如下：
一、0 區：爆炸性氣體存在或長時間存在，達到可引燃濃度或含量之場所。
二、1 區如下列規定之一：
    (一)於正常運轉下，爆炸性氣體可能存在達到可引燃濃度或含量之場所。
    (二)於進行修護、保養或洩漏時，爆炸性氣體時常存在達到可引燃濃度或
        含量之場所。
    (三)當設備、製程故障或操作不當時，可能釋放出之爆炸性氣體達到可引
        燃濃度或含量，同時可能導致用電設備或器具故障，使該設備或器具
        成為點火源之場所。
    (四)鄰近 0  區，且爆炸性氣體可能由 0  區擴散而存在達到可引燃濃度
        或含量之場所，不包括有裝設引進乾淨空氣之正壓通風系統防止上述
        擴散，且於通風系統失效時有安全防護機制之場所。
三、2 區如下列規定之一：
    (一)於正常運轉下，爆炸性氣體存在達到可引燃濃度或含量之機率極低，
        且可引燃濃度或含量發生時間極短之場所。
    (二)製造、使用或處理爆炸性氣體之場所，於正常運轉下，該氣體裝在密
        閉之容器或封閉式系統內，僅於該容器或系統發生意外破裂、損毀或
        設備不正常運轉時，始會外洩。
    (三)藉由正壓通風機制防止爆炸性氣體達到可引燃濃度或含量，當其通風
        設備故障或操作不當時，可能造成危險之場所。
    (四)鄰近 1  區，且爆炸性氣體可能由 1  區擴散而存在達到可引燃濃度
        或含量之場所，不包括有裝設引進乾淨空氣之正壓通風系統防止上述
        擴散，且於通風系統失效時有安全防護機制之場所。

第五百三十三條
0 區、1 區及 2  區之危險物質，在非濃氧情況下，依氣體或揮發氣之性質，
分「群」如下：
一、ⅡC 群：大氣中包含乙炔、氫氣或易燃性氣體、易燃性或可燃性液體揮發
    氣，與空氣混合成可爆炸或燃燒之氣體混合物，其最大實驗安全間隙為○
    ‧五毫米以下或最小引燃電流比為○‧四五以下。
二、ⅡB 群：大氣中包含乙醛、乙烯或易燃性氣體、易燃性或可燃性液體揮發
    氣，與空氣混合成可爆炸或燃燒之氣體混合物，其最大實驗安全間隙超過
    ○‧五毫米，且在○‧九毫米以下，或最小引燃電流比超過○‧四五，且
    在○‧八以下。
三、ⅡA 群：大氣中包含丙酮、氨、乙醇、汽油、甲烷、丙烷、易燃性氣體、
    易燃性或可燃性液體揮發氣，與空氣混合成可爆炸或燃燒之氣體混合物，
    其最大實驗安全間隙超過○‧九毫米或最小引燃電流比超過○‧八。

第五百三十四條
為確保 0  區、1 區及 2  區之用電設備或器具在正常使用及維修下能安全運
轉，依下列規定辦理：
一、於危險場所執行業務之人員應依第四百六十五條規定辦理。
二、固體障礙物：裝設以法蘭接合之耐壓防爆「 d」型設備，不得使其法蘭開
    口與任何非屬該設備一部分之固體障礙物，如鋼鐵製品、牆壁、風雨護罩
    固定架、管路或其他用電設備或器具之距離少於表五三四規定。但該設備
    或器具適用於較小距離者，不在此限。
三、同時存在易燃性氣體及可燃性粉塵、纖維或飛絮之處，選擇及裝設用電設
    備、器具或配線方法時，應考慮此種同時存在條件，包括訂定該設備或器
    具之安全運轉溫度。

第五百三十五條
0 區、1 區或 2  區之電氣與電子設備或器具，得採用之保護技術依下列規定
辦理：
一、耐壓防爆「 d」：得用於 1  區或 2  區。
二、正壓「 p」：得用於 1  區或 2  區。
三、本質安全「 i」：得用於 0  區、1 區或 2  區。「 i」分為「ia」、「
    ib」及「ic」型，ia  得用於 0  區，ib  得用於 1  區，ic  得用於 2
     區。
四、保護型式「 n」：得用於 2  區。
五、油浸「 o」：得用於 1  區或 2  區。
六、增加安全「 e」：得用於 1  區或 2  區。
七、模鑄構造「 m」：得用於 0  區、1 區或 2  區。
八、粉末填充「 q」：得用於 1  區或 2  區。
九、可燃氣體偵測系統：得用於保護不對外開放且由合格人員維修及管理監督
    之工業廠區。選用此偵測器作為保護技術者，應將偵測設備之種類、登錄
    文件、裝設位置、警報與停機準則及校正頻率等，以文件建檔；其裝設之
    設備得依下列規定辦理：
    (一)因通風不良而劃分為 1  區，並裝設適用於 1  區危險物質分群及指
        定氣體或揮發氣之可燃氣體偵測設備者，得採用適用於 2  區之設備
        或器具。
    (二)建築物內部劃分為 2  區，或有開口連通 2  區，不會存在易燃性氣
        體或揮發氣，並裝設適用於 1  區或 2  區危險物質分群及指定氣體
        或揮發氣之可燃氣體偵測設備者，得採用適用於非分類場所之設備或
        器具。
    (三)控制盤內部裝有使用或測量易燃性液體、氣體或揮發氣之儀器，並裝
        設適用於 1  區危險物質分群及指定氣體或揮發氣之可燃氣體偵測設
        備者，得採用適用於 2  區之設備或器具。

第五百三十六條
0 區、1 區及 2  區之用電設備或器具選用依下列規定辦理：
一、設備適用性：
    (一)適用於 0  區之設備或器具得裝設於相同氣體或揮發氣之 1  區或 2
        區；適用於 1  區之設備或器具得裝設於相同氣體或揮發氣之 2  區
        。其裝設應符合該設備或器具之保護型式要求。
    (二)設備或器具得依其商品標示裝設於適用之特定氣體或揮發氣、數種氣
        體或揮發氣之特定混合物，或數種氣體或揮發氣之任何特定組合環境
        。
二、設備或器具之商品標示：
    (一)適用於第一類場所之設備或器具如適用於以「區」劃分之危險場所者
        ，其商品標示應包括第四百七十一條第二項規定及下列規定之資訊：
        1.適用於 1  區或 2  區。
        2.第五百三十三條規定之危險物質「群」別。
        3.第三款規定之溫度。
    (二)設備或器具符合前條規定保護技術之一者，其商品標示應包括下列資
        訊：
        1.適用之「區」別。
        2.「Ex」符號。
        3.保護型式符號。
        4.第五百三十三條規定之危險物質「群」別，或特定氣體或揮發氣。
        5.第三款規定之溫度。
        6.設備保護等級（ EPL）。
三、下列規定之溫度不得超過設備或器具周圍之特定氣體或揮發氣之引燃溫度
    ：
    (一)溫度分級：
        1.設備或器具在周圍溫度攝氏四十度時，或其額定適用於周圍溫度超
          過攝氏四十度時之運轉溫度或溫度等級。其溫度等級如表五三六規
          定所示。
        2.設備或器具適用於周圍溫度攝氏負二十度至正四十度者，得免有周
          圍溫度標識。適用於周圍溫度低於攝氏負二十度或超過攝氏四十度
          者，應有其特殊周圍溫度範圍標識，以攝氏表示，並包含「Ta」或
          「Tamb」符號。
    (二)導線管配件等屬非發熱型之設備或器具，或最高運轉溫度為攝氏一百
        度以下之發熱型設備或器具，得免有運轉溫度或溫度等級標識。
    (三)適用於第一類場所之設備或器具，符合第五百四十六條規定者，其商
        品標示得依第四百七十一條第二項及表四七一規定。
四、設備或器具與導線管及其管配件螺紋銜接依下列規定辦理：
    (一)導線管或管配件之螺紋應以標準牙模車絞。螺紋型式應為斜口螺紋（
        NPT） 或公制螺紋。
    (二)導線管及管配件應扭緊，以防止故障電流通過導線管系統時產生火花
        ，確保該導線管系統耐壓防爆（Ex d）或防爆（XP）之完整性。
    (三)設備或器具配有銜接口供現場配線連接者，依下列規定辦理：
        1.設備或器具配有斜口螺紋銜接口供斜口螺紋導線管或管配件連接者
          ，應採用適用之導線管、管配件或電纜配件，且該導線管或管配件
          之螺紋應以斜口螺紋牙模車絞。斜口螺紋管配件連接耐壓防爆「 d
          」型或防爆（XP）型設備或器具，應有五個全牙以上之銜接；耐壓
          防爆「 d」型或防爆（XP）型設備或器具如為廠製斜口螺紋銜接口
          者，應有四又二分之一全牙以上之銜接。
        2.設備或器具配有銜接口供公制螺紋導線管或管配件連接者，應採用
          適用之管配件或電纜配件，且其銜接口應為公制螺紋，或有適用之
          轉接頭可連接導線管或斜口螺紋管配件。公制螺紋管配件連接耐壓
          防爆「 d」型或防爆（XP）型設備或器具銜接口，應至少具備國際
          標準（ ISO）之 6g/6H  配合度。裝設於 C  群、D 群、ⅡB 群或
          ⅡA 群環境者，應有五個全牙以上之銜接；裝設於 A  群、B 群、
          ⅡC 群或含有氫氣之ⅡB群環境者應有八個全牙以上之銜接。
        3.未使用之開口應以適用之管塞封閉，並保持其保護型式，且該管塞
          之螺紋及銜接應符合本目之 1  或之 2  規定。
五、複合型光纖電纜內含有可通電之導線者，其裝設應依第五百三十七條至第
    五百四十二條規定辦理。

第五百三十七條
0 區、1 區及 2  區之配線方法應維持其設備或器具保護技術之完整性。
0 區應採用符合本章第七節規定之本質安全配線方法。
1 區之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)符合前項規定之配線方法。
    (二)於不對外開放且由合格人員維修及管理監督之工業廠區，裝設之電纜
        不易遭受外力損傷者，採用適用於 1  區或第一類第一種場所之金屬
        被覆電纜，且該電纜有氣密性金屬被覆及適合之聚合物材料外皮，並
        內含一條符合第九十三條規定之設備接地導線，及搭配適用之電纜封
        函蓋或終端配件。
    (三)MI  電纜，搭配適用於 1  區或第一類第一種場所之終端配件，其裝
        設及支撐能防止終端配件承受拉應力。
    (四)有螺紋之厚金屬導線管。
    (五)符合下列規定者，得採用 PVC  管：
        1.埋設於地下，並以厚度五十毫米以上之混凝土包覆，且自管頂至地
          面之埋設深度為六百毫米以上。
        2.地下導線管自露出地面點，或與地面管槽相連接點回推長度六百毫
          米之管段，以用有螺紋之厚金屬導線管連接。
        3.附加一條設備接地導線提供導線管系統之電氣連續性及非帶電金屬
          部分之接地。
二、需可撓連接者，得採用下列規定方法之一：
    (一)適用於 1  區或第一類第一種場所之可撓管配件。
    (二)符合第五百四十三條規定情形，採用適用於 1  區或第一類第一種場
        所之可撓軟線，終端搭配可維持接線隔間保護型式之軟線連接頭。
三、線盒及管配件應為適用於 1  區或第一類第一種場所者。
2 區之配線依下列規定辦理：
一、得採用下列規定方法之一：
    (一)符合前項規定之配線方法。
    (二)金屬被覆電纜或有金屬遮蔽之高壓電纜配線，包括以電纜架裝置，並
        搭配適用之電纜封函蓋或終端配件。
    (三)加襯墊密封之匯流排槽或導線槽。
    (四)於不對外開放且由合格人員維修及管理監督之工業廠區，裝設金屬導
        線管不具足夠抗腐蝕性能時，採用規格相當於號數 SCH80  之 PVC
        管、廠製彎頭及其附屬管配件。如依第五百四十條第一項第三款規定
        邊界須加以密封者，1 區之配線方法應延伸至 2  區加以密封，其密
        封裝置應裝設於該邊界之 2  區側。
    (五)本質安全「ic」型設備或器具之配線：
        1.得採用非分類場所之配線方法。
        2.配線應依控制圖說指示裝設。
        3.簡易器具未標明於控制圖說者得裝設於本質安全「ic」型保護電路
          ，且不會使本質安全「ic」型保護電路與其他電路連接。
        4.個別之本質安全「ic」型保護電路裝設應符合下列規定之一：
          (1) 裝設於個別之電纜內。
          (2) 裝設於每條電路導線皆以被接地金屬遮蔽之多芯電纜內。
          (3）裝設於每條電路導線之絕緣厚度為○‧二五毫米以上之多芯電
              纜內。
二、需可撓連接者，得採用下列規定方法之一：
    (一)金屬可撓管配件。
    (二)金屬可撓導線管，搭配適用之管配件。
    (三)液密型金屬可撓導線管，搭配適用之管配件。
    (四)液密型非金屬可撓導線管，搭配適用之管配件。
    (五)符合第五百四十三條規定情形，採用適用於 2  區之可撓軟線，終端
        搭配可維持接線隔間保護型式之軟線連接頭。
三、線盒及管配件內部在正常運轉下不會有點火源產生者，得採用一般型，並
    裝設符合 2  區設備或器具保護技術規定。

第五百三十八條
0 區之密封裝設位置依下列規定辦理：
一、導線管密封：
    (一)導線管離開 0  區邊界之三米範圍內應加以密封。
    (二)導線管密封裝置與離開 0  區邊界交界處之間，除裝在密封裝置上之
        防爆（Ex d  或 XP ）型大小管接頭外，不得裝設由令、管接頭、線
        盒或其他管配件。
    (三)金屬導線管無裝設由令、管接頭、線盒或其他管配件，完整不間斷穿
        過 0  區，且兩處邊界外三百毫米範圍內無裝設管配件，導線管兩端
        皆位於非分類場所者，該導線管得免密封。
二、電纜進入 0  區後之第一個接續或終端處應加以密封。
三、密封裝置得免為耐壓防爆「 d」型或防爆（XP）型。

第五百三十九條
1 區之導線管密封裝設位置依下列規定辦理：
一、導線管進入耐壓防爆「 d」型封閉箱體或增加安全「 e」型封閉箱體者，
    應在距離管接口五十毫米範圍內加以密封。但符合下列規定之一者，不在
    此限：
    (一)耐壓防爆「 d」型封閉箱體之商品標示不必另加密封者，得免密封。
    (二)增加安全「 e」型封閉箱體與其密封裝置之間，得裝設斜口螺紋（
        NPT ）導線管及管件，或採用增加安全「 e」型管配件，其密封裝置
        裝設位置得靠近該箱體，不受五十毫米限制。
    (三)於增加安全「 e」型封閉箱體之間以斜口螺紋導線管，或增加安全「
        e 」型管配件連接者，得免密封。
二、防爆（XP）型封閉箱體：
    (一)導線管進入下列規定之防爆（XP）型封閉箱體者，應加以密封：
        1.箱體內裝有開關、斷路器、熔線、電驛或電阻器等設備或器具，於
          正常運轉下會產生電弧、火花，或超過周圍氣體或揮發氣攝氏自燃
          溫度百分之八十。但該設備或器具依下列規定之一辦理者，得免密
          封：
          (1) 封裝於氣體或揮發氣無法進入之完全密封腔室。
          (2) 浸於油中。
          (3) 封裝於工廠密封完成之防爆（XP）型腔室，該腔室適用於 0
              區、1 區或第一類第一種場所，有工廠密封或相似文字之商品
              標示，且箱體之管接口小於標稱管徑五十三毫米。工廠密封完
              成之箱體不作為其鄰近另一需要密封防爆（XP）型封閉箱體之
              密封裝置。
        2.箱體內裝有配線端子台、接續組件或分接頭，且管接口為標稱管徑
          五十三毫米以上。
    (二)導線管密封應裝設於距離防爆（XP）型封閉箱體四百五十毫米範圍內
        ；其密封裝置與該箱體之間，僅能裝設防爆（XP）型由令、管接頭、
        大小管接頭、肘型彎管、加蓋肘型彎管，或類似 L  型、T 型、十字
        型管配件，且尺寸規格不得超過導線管管徑。
    (三)二個以上防爆（XP）型封閉箱體之導線管依第一目規定須密封，如以
        短管或長度不超過九百毫米之導線管連接，且該短管或導線管每支皆
        裝有單一密封裝置，並位於任一箱體四百五十毫米範圍以內者，視為
        符合規定之密封。
三、進入正壓封閉箱體之導線管非為正壓保護系統之一部分者，每支導線管應
    於距離該箱體四百五十毫米範圍內加以密封。
四、邊界：
    (一)導線管離開 1  區之邊界應加以密封；其密封裝置得裝設於 1  區邊
        界之任一側三米範圍內。
    (二)密封裝置之裝設應能使 1  區導線管內之氣體或揮發氣洩漏至密封裝
        置外之數量極小化。
    (三)導線管密封裝置與導線管離開 1  區邊界交界處之間，除裝在密封裝
        置上防爆（Ex d  或 XP ）型大小管接頭外，不得裝設由令、管接頭
        、線盒或其他管配件。
    (四)金屬導線管無裝設由令、管接頭、線盒或其他管配件，完整不間斷穿
        過 1  區，且兩處邊界外三百毫米範圍內無裝設管配件，導線管兩終
        端皆位於非分類場所者，該導線管得免密封。
1 區之電纜密封裝設位置依下列規定辦理：
一、氣體或揮發氣可流通之電纜：
    (一)裝設於導線管內之電纜有氣密性連續被覆，能透過纜心流通氣體或揮
        發氣者，在 1  區內應加以密封，並於移除電纜外皮或其他被覆後，
        以密封膏將每條絕緣導線周圍填滿。
    (二)前目規定電纜如為多芯電纜，並將距離封閉箱體四百五十毫米範圍導
        線管內電纜加以密封，且電纜末端位於該箱體內，採用可行方法使氣
        體或揮發氣進入之數量極小化，及防止火焰蔓延至纜心者，該多芯電
        纜得視為單一導線。如為遮蔽電纜及雙絞線電纜者，得免移除電纜遮
        蔽層或免分離雙絞線。
二、氣體或揮發氣不可流通之電纜：
    (一)裝設於導線管內之多芯電纜如不能透過纜心流通氣體或揮發氣者，應
        視為單一導線。
    (二)前目規定電纜應依第五百四十一條規定加以密封。
三、電纜進入耐壓防爆「 d」型或防爆（XP）型封閉箱體，應加以密封；其密
    封裝設應符合第五百四十一條規定。
四、電纜離開 1  區之邊界應加以密封。但於電纜終端處有密封者，不在此限
    。

第五百四十條
2 區之導線管密封裝設位置依下列規定辦理：
一、導線管進入耐壓防爆「 d」型或防爆（XP）型封閉箱體者，應依前條第一
    項第一款及第二款規定加以密封。導線管密封裝置與封閉箱體間之全部管
    段或短管應符合前條規定。
二、導線管進入增加安全「 e」型或保護型式「 n」型封閉箱體時，依第五百
    三十七條規定維持該箱體保護技術之完整性者，得免密封。
三、邊界：
    (一)導線管離開 2  區進入非分類場所之邊界應加以密封；其密封裝置得
        裝設於 2  區邊界之任一側三米範圍內。
    (二)密封裝置之裝設應能使 2  區導線管內之氣體或揮發氣洩漏至密封裝
        置外之數量極小化。
    (三)導線管密封裝置與離開 2  區邊界交界處之管段，應採用有螺紋之厚
        金屬導線管，且密封裝置應以螺紋與其連接。
    (四)導線管密封裝置與離開 2  區邊界交界處之間，除裝在密封裝置上之
        防爆（Ex d  或 XP ）型大小管接頭外，不得裝設由令、管接頭、線
        盒或其他管配件。
    (五)密封裝置如經設計者確認適用於正常使用下，能使氣體洩漏之數量極
        小化，且裝設於可觸及處者，得免為耐壓防爆「 d」型或防爆（XP）
        型。
    (六)符合下列規定者，得免密封：
        1.金屬導線管無裝設由令、管接頭、線盒或其他管配件，完整不間斷
          穿過 2  區，且兩處邊界外三百毫米範圍內無裝設管配件，導線管
          兩終端皆位於非分類場所者，該導線管得免密封。
        2.導線管系統從 2  區進入非分類場所，終端位於非分類場所，其金
          屬導線管配線轉換成電纜架裝置、MI  電纜或其他電纜配線不穿入
          管槽或敷設於電纜架，符合下列規定者，得免密封：
          (1) 該非分類場所位於建築物外，或位於建築物內且該導線管系統
              全部位於同一空間內。
          (2) 導線管終端非位於正常運轉下會有點火源之封閉箱體內。
        3.封閉箱體或隔間因採用正壓保護技術成為非分類場所時，導線管系
          統從該箱體或隔間進入 2  區者，其邊界得免密封。
        4.導線管系統由 2  區進入非分類場所符合下列規定者，其地面上管
          段得免密封：
          (1) 導線管系統無任何部分管段穿過 0  區或 1  區者，且在 0
              區或 1  區邊界外三百毫米範圍內管段無裝設由令、管接頭、
              線盒或其他管配件。
          (2) 導線管系統管段全部位於建築物外。
          (3) 導線管系統管段不直接連接至密封幫浦，或用於流量、壓力、
              分析測量之製程或供電連接等；其依靠單一壓縮密封、隔膜或
              細管防止易燃性或可燃性流體進入導線管系統。
          (4) 導線管系統管段僅有螺紋之金屬導線管、由令、管接頭、導管
              穿線匣及管配件位於非分類場所。
          (5) 導線管系統管段進入每個位於 2  區之封閉箱體或配件，有終
              端、接續或分接者，皆有密封。
2 區之電纜密封裝設位置依下列規定辦理：
一、終端：
    (一)進入耐壓防爆「 d」型或防爆（XP）型封閉箱體之電纜與封閉箱體之
        接口處，應加以密封；其密封裝置應符合第五百四十一條規定。
    (二)採用有氣密性連續被覆之多芯電纜，能透過纜心流通氣體或揮發氣者
        ，裝設於 2  區應採用電纜封函蓋或適用之配件加以密封，並於移除
        電纜外皮或其他被覆後，以密封膏將每條絕緣導線周圍填滿，使氣體
        或揮發氣洩漏之數量極小化。多芯電纜裝設於導線管者，應依前條第
        一項第四款規定加以密封。
    (三)封閉箱體或隔間因採用 Z  型正壓保護技術成為非分類場所時，電纜
        從該箱體或隔間進入 2  區者，其邊界得免密封。
    (四)遮蔽電纜及雙絞線電纜之終端如採用其他可行方法能使氣體或揮發氣
        進入之數量極小化，及防止火焰蔓延至纜心者，得免移除電纜遮蔽層
        或免分離雙絞線。
二、氣體或揮發氣不可流通之電纜：
    (一)有氣密性連續被覆之電纜，透過纜心流通氣體或揮發氣不會超過密封
        裝置容許流通量，且該電纜裝設長度超過上列限制氣體或揮發氣流通
        所需之長度者，除符合前款規定外，得免密封。
    (二)前目規定所稱密封裝置容許流通量，係指在壓力為一千五百帕斯卡時
        ，其流通量小於二百立方厘米／小時。
三、氣體或揮發氣可流通之電纜：
    (一)有氣密性連續被覆之電纜，能透過纜心流通氣體或揮發氣者，除符合
        第一款規定外，得免密封。
    (二)前目規定之電纜如連接至製程設備或配電裝置，使電纜末端承受壓力
        超過一千五百帕斯卡者，應採用密封、屏障或其他方法防止易燃物進
        入非分類場所。
    (三)有氣密性連續被覆之電纜如保持完整未被移除外皮或其他被覆者，通
        過 2  區時，得免密封。
四、電纜無氣密性被覆者，在 2  區與非分類場所之邊界應加以密封，使氣體
    或揮發氣洩漏至非分類場所之數量極小化。

第五百四十一條
0 區、1 區及 2  區之密封裝設依下列規定辦理：
一、封閉箱體內有連接點或用電設備者，應有完整密封裝置，或採用適用於該
    箱體裝設場所之密封管配件。密封管配件應搭配專屬密封膏，且裝設於可
    觸及處。
二、密封膏應能使氣體或揮發氣經由密封管配件洩漏之數量極小化，且不受周
    圍大氣或液體之影響；其熔點應為攝氏九十三度以上。
三、除採用電纜封函蓋或電纜適用之密封配件外，密封完成之密封膏厚度不得
    小於密封管件之標稱管徑，且該厚度至少為十六毫米。
四、接續及分接不得採用僅作為密封且填充密封膏之管配件。接續或分接之管
    配件不得填充密封膏。
五、密封管件內容許導線截面積，除該管件經設計者確認適用較高填充百分比
    外，不得超過相同標稱管徑之厚金屬導線管截面積百分之二十五。
六、以 MI 電纜配線者，其終端配件應採用密封膏加以密封，以防止濕氣滲入
    。

第五百四十二條
0 區、1 區及 2  區之凝結液排放裝置裝設依下列規定辦理：
一、控制設備之封閉箱體內或管槽系統任一處可能有液體或揮發氣凝結液聚積
    者，應採用可行方法防止聚積或定期排放。
二、電動機或發電機內可能有液體或揮發氣凝結液聚積者，應裝設適用之接頭
    及導線管系統，使液體進入之數量極小化。有必要防止聚積或定期排放者
    應裝設附有排放裝置之電動機或發電機。

第五百四十三條
1 區及 2  區有符合下列規定情形之一者，得採用可撓軟線配線：
一、連接可攜式照明設備或其他可攜式用電設備或器具，與其電源電路固定部
  分。
二、於合格人員維修及管理監督之工業廠區，依第五百三十七條第二款及第三
    款規定之固定配線無法提供固定式或可攜式用電設備或器具必要移動之電
    路部分，且可撓軟線可透過裝設位置或防護裝置避免損壞。
三、不需進入水池即可移出之電動沉水幫浦，於水池與其電源間之管槽範圍內
    延伸。
四、進出開放式混合桶或混合槽之電動攪拌器。
如依前項規定採用可撓軟線配線者，該軟線裝設應符合下列規定：
一、為適用於 1  區及 2  區者。
二、內含一條符合第九十三條及第九十四條規定之設備接地導線。
三、以適用之方法連接至終端或電源導線。
四、採用線夾或其他可確保終端連接不會承受拉力之方法支撐。
五、為連續線段。
六、進入耐壓防爆「 d」型或防爆（XP）型線盒、管配件或封閉箱體，可撓軟
    線終端採用可維持其保護技術型式之軟線連接器。
七、進入增加安全「 e」型封閉箱體，可撓軟線終端採用增加安全「 e」型軟
    線連接器。

第五百四十四條
在 0  區、1 區或 2  區內，導線進入增加安全「 e」型設備者，包括其備用
線，終端應連接至增加安全「 e」型端子。
在 0  區、1 區或 2  區內，如可能有揮發氣凝結液或液體聚積或浸入觸及導
線絕緣層者，該絕緣層應為適用於此環境者，或以適用之被覆或具同等效果之
方法加以保護。

第五百四十五條
0 區、1 區及 2  區不得有運轉電壓超過三十伏特之未絕緣暴露導線、匯流排
、端子或組件該區如為潮濕場所者，未絕緣暴露部分之運轉電壓不得超過十五
伏特。
前項規定未絕緣暴露部分應採用適用於 0  區、1 區或 2  區之本質安全「ia
」、「ib」或「ic」型之技術加以保護。

第五百四十六條
0 區、1 區及 2  區之用電設備或器具裝設依下列規定辦理：
一、0 區：
    (一)裝設於 0  區應為適用於 0  區者。
    (二)本質安全器具為適用於與 0  區相同氣體之第一類第一種場所，或適
        用於 0  區特定之氣體或揮發氣、數種氣體或揮發氣之特定混合物，
        或數種氣體或揮發氣之任何特定組合，並有適用於 0  區之溫度等級
        者，得裝設於 0  區。
二、1 區：
    (一)裝設於 1  區應為適用於 1  區者。
    (二)設備或器具為適用於與 1  區相同氣體之第一類第一種場所或 0  區
        ，或適用於 1  區特定之氣體或揮發氣、數種氣體或揮發氣之特定混
        合物，或數種氣體或揮發氣之任何特定組合，並有適用於 1  區之溫
        度等級者，得裝設於 1  區。
    (三)設備或器具有適用於 1  區或 2  區之正壓「 p」型保護技術者，得
        裝設於 1  區。
三、2 區：
    (一)裝設於 2  區應為適用於 2  區者。
    (二)設備或器具為適用於與 2  區相同氣體之第一類第一種場所或第二種
        場所、0 區或 1  區，或適用於 2  區特定之氣體或揮發氣、數種氣
        體或揮發氣之特定混合物，或數種氣體或揮發氣之任何特定組合，並
        有適用於 2  區之溫度等級者，得裝設於 2  區。
    (三)設備或器具有適用於 1  區或 2  區之正壓「 p」型保護技術者，得
        裝設於 2  區。
    (四)如鼠籠式感應電動機等內部無電刷、開關機構或類似電弧產生裝置之
        開放式或非耐壓防爆「 d」、非防爆（XP）外殼電動機，得裝設於 2
        區。
四、設備或器具為適用於ⅡC群環境者，得裝設於ⅡA群或ⅡB 群環境；適用於
    ⅡB 群環境者，得裝設於ⅡA群環境。
用電設備或器具之安裝應依製造廠家說明書指示辦理。

第五百四十七條
在 1  區裝設增加安全「 e」型電動機或發電機，應採用適用於 1  區者，並
依下列規定辦理
一、電動機之商品標示應有起動電流比（ IA/IN）及安全堵轉時間（tE）。
二、電動機應有控制器，其控制器之商品標示應有其所保護之電動機型號、編
    號、輸出額定功率（以馬力或千瓦特為單位）、滿載電流－起動電流比、
    安全堵轉時間，及電動機或發電機之特定過載保護型式。
三、連接應採用適用於該電動機或發電機之特定端子。
四、端子箱得為堅固、不可燃之非金屬材質，且箱體內裝有電動機框架與設備
    接地連接間之內部接地裝置。
五、各種電壓等級之電動機應符合第三章第八節或第八章第六節規定。
六、電動機應有個別過載保護裝置，其跳脫設定或額定值應符合電動機之額定
    及其過載保護要求。
七、電動機不適用第二百二十五條第三款及第二百三十三條規定。
八、電動機起動期間，其過載保護不得旁接或打開。

第五百四十八條
0 區、1 區或 2  區之配線及設備應依第二章第五節及下列規定接地及搭接：
一、搭接：
    (一)搭接應採用有適當配件之搭接導線或具同等效果之搭接方式，不得僅
        以制止螺絲圈套管及雙制止螺絲圈式之接觸作搭接。
    (二)0 區、1 區或 2  區與用戶受電裝置接地點間，或與獨立電源供電系
        統接地點間之管槽、管件、配件、線盒及封閉箱體等，應依前目規定
        搭接。
    (三)依第九十四條第一款規定，被接地導線與接地電極如於建築物隔離設
        備電源側相接，且分路過電流保護裝置位於該隔離設備負載側者，得
        僅於最接近其相接處作搭接。
