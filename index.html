<script id="rawData" type="text/template">
第一章  總則
      第一節  通則
第一條
本規則依電業法第三十二條第五項規定訂定之。

第二條
用戶自電業責任分界點起至其用電器具間之用電設備，除下列各款情形外，應
依本規則規定裝設：
一、車輛、船舶、航空器內等非屬電業供電之用電設備。
二、軌道運輸系統特高壓變壓器二次側之高壓電纜，及供車輛牽引動力之電力
    產生、轉換、輸送或分配之用電設備，或專屬供車輛運轉用或號誌與通訊
    用之用電設備。
三、其他法規另有規定者。

第三條
本規則規定之電壓，除另有指明外，概指電路之線間電壓。

第四條
本規則規定未指明電壓時，概適用於六百伏特以下之低壓工程。

第五條
依本規則規定裝用之用電設備或器具應符合國家標準（簡稱 CNS）、國際電工
技術委員會（簡稱 IEC）標準、國際通用標準或其他經各該目的事業主管機關
認可之標準。
依本規則規定辦理之設計者應確認用電設備或器具適用於其所裝設之用途或場
所，並經前項規定標準檢驗通過。

第六條
本規則除另有規定外，用詞定義規定如下：
一、接戶線：指由電業供電線路引至接戶點或進屋點之導線。
二、進屋線：指由進屋點引至用戶總開關箱之導線。
三、用戶用電線路：指進屋點起至用戶用電器具間之進屋線、幹線、分路、回
    路及配線，簡稱線路。
四、用戶總開關：指用戶總開關箱內具啟斷故障電流能力，且能同時啟斷進屋
    線各非接地導線之開關。
五、用戶配線（系統）：指包括電力、照明、控制及信號電路之用戶用電線路
    配置，包含永久性及臨時性之設備、配件等裝置。
六、電壓：
    (一)標稱電壓：指電路或系統電壓等級之通稱數值，例如一百十伏特、二
        百二十伏特或三百八十伏特。惟電路之實際運轉電壓於標稱值容許範
        圍上下變化，仍可維持設備正常運轉。
    (二)線間電壓：指電路中任兩非接地導線間最大均方根值（ rms）（有效
        值）之電位差。
    (三)對地電壓：指接地系統之非接地導線與電路接地點，或非接地導線與
        被接地導線間之電壓。
七、導線：指用以傳導電流之金屬線纜，包括裸導線、絕緣導線及電纜。
八、單線：指由單股裸銅線所構成之導線，又名實心線。
九、絞線：指由多股裸銅線扭絞而成之導線。
十、可撓軟線：指由細小銅線組成，外層並以橡膠或塑膠為絕緣及被覆之可撓
    性導線。
十一、安培容量：指在使用條件下不超過導線之額定溫度，導線可連續承載之
      最大電流，以安培為單位。
十二、分路：指最後一個過電流保護裝置與導線出線口間之線路。按其特殊用
      途，相關用詞之定義如下：
      (一)專用分路：指專門供電給同一用途或場所用電器具使用之分路。
      (二)多線式分路：指由二條以上有電位差之非接地導線，及一條與其他
          任一條非接地導線間有相同電位差之被接地導線組成之分路，且該
          被接地導線被接至中性點或系統之中性線端子板。
十三、幹線：指分路開關上游之線路。
十四、需量因數：指在特定時段內，一個系統或部分系統之最大需量與該系統
      或部分系統總連接負載之比值。
十五、連續負載：指可持續達三小時以上之最大電流負載。
十六、責務：
      (一)連續責務：指負載定額運轉於一段無限定長之時間。
      (二)間歇性責務：指負載交替運轉於負載與無載，或負載與停機，或負
          載、無載與停機之間。
      (三)週期性責務：指負載具週期規律性之間歇運轉。
      (四)變動責務：指運轉之負載及時間均可能大幅變動。
十七、用電設備：指用戶為接收電能所裝置之導線、變壓器、開關等設備。
十八、用電器具：指以標準尺寸或型式製造，且安裝或組合成一個具備單一或
      多種功能等消耗電能之器具，例如電子儀表、化學器材、加熱裝置、照
      明燈具、電動機、洗衣機、冷氣機等。
十九、配電裝置：指承載或控制電能，作為其基本功能之電氣系統單元，例如
      開關、斷路器、隔離設備、控制器、插座等，而不包括導線。
二十、配件：指用戶配線系統中主要用於達成機械功能而非電氣功能之零件，
      例如鎖緊螺母、套管或其他組件等。
二十一、壓力接頭：指藉由機械壓力連接而不採用銲接方式連結二條以上之導
        線，或連結一條以上導線至一端子之器材，例如壓力接線端子、壓接
        端子或壓接套管等。
二十二、帶電部分：指帶電之導電性元件。
二十三、暴露：
        (一)暴露（用於帶電部分時）：指帶電部分無適當防護、隔離或絕緣
            ，可能造成人員不經意碰觸、接近或逾越安全距離。
        (二)暴露（用於配線方法時）：指置於或附掛在配電盤表面或背面之
            配線方法，設計上為可觸及。
二十四、封閉：指被外殼、箱體、圍籬或牆壁包圍，以避免人員意外碰觸帶電
        部分。
二十五、敷設面：指用以裝設電路之建築物面。
二十六、明管：指顯露於建築物表面之導線管。
二十七、隱蔽：指利用建築物結構或其外部裝飾使成為不可觸及。在隱蔽式管
        槽內之導線，即使抽出後成為可觸及，亦視為隱蔽。
二十八、可觸及：指接觸設備或配線時，需透過攀爬或移除障礙始可進行操作
        。依其使用狀況不同分別定義如下：
        (一)可觸及（用於設備）：指設備未上鎖、置於高處或以其他有效方
            式防護，仍可靠近或接觸。
        (二)可觸及（用於配線方法）：指配線在不損壞建築結構或其外部裝
            潢下，即可被移除或暴露。
二十九、可輕易觸及：指接觸設備或配線時，不需攀爬或移除障礙，亦不需可
        攜式梯子等，即可進行操作、更新或檢查工作。
三十、可視及：指一設備可以從另一設備處看見，或在其視線範圍內，該被指
      定之設備應為可見，且兩者間之距離不超過十五米，又稱視線可及。
三十一、防護：指藉由蓋板、外殼、隔板、欄杆、防護網、襯墊或平台等，以
        覆蓋、遮蔽、圍籬、封閉或其他適用之保護方式，阻隔人員或外物可
        能接近或碰觸危險處。
三十二、乾燥場所：指正常情況不會潮濕或有濕氣之場所，惟仍然可能有暫時
        性潮濕或濕氣情形。
三十三、濕氣場所：指受保護而不易受天候影響且不致造成水或其他液體產生
        凝結，惟仍然有輕微水氣之場所，例如在雨遮下、遮篷下、陽台、冷
        藏庫等場所。
三十四、潮濕場所：指可能受水或其他液體浸潤或其他發散蒸汽之場所，例如
        公共浴室、商業用廚房、冷凍廠、製冰廠、洗車場等。
三十五、附接插頭：指藉由插入插座，使附著其上之可撓軟線與永久固定連接
        至插座之導線，建立連結之裝置。
三十六、插座：指裝在出線口之插接裝置，供附接插頭插入連接。按插接數量
        分類如下：
        (一)單連插座：指單一插接裝置。
        (二)多連插座：指在同一軛框上有二個以上插接裝置，包括雙連插座
            、四連插座等。
三十七、照明燈具：指由一個以上之光源，與固定該光源及將其連接至電源之
        一個完整照明單元。
三十八、放電管燈：指日光燈、水銀燈及霓虹燈等利用電能在管中放電，作為
        照明等使用。
三十九、過載：指設備運轉於超過滿載額定或導線安培容量，當其持續一段夠
        長時間後會造成損害或過熱之危險。
四十、過電流：指任何通過並超過該設備額定或導線安培容量之電流，可能係
      由過載、短路或接地故障所引起。
四十一、過電流保護：指導線及設備在電流增加到某一數值而使溫度上升致危
        及導線及設備之絕緣時，能切斷該電路。
四十二、過電流保護裝置：指能保護超過進屋線、幹線、分路及設備等額定電
        流，且能啟斷過電流之配電裝置。
四十三、開關：指用以「啟斷」（OFF） 、「閉合」（ON）電路之配電裝置，
        不必具有啟斷故障電流能力，適用在額定電流下操作。按其用途區分
        ，常用類型定義如下：
        (一)一般開關：指用於一般配電及分路，以安培值為額定，在額定電
            壓下能啟斷其額定電流之開關。
        (二)手捺開關：指裝在盒內或盒蓋上或連接用戶配線系統之一般開關
            。
        (三)分路開關：指用以啟閉分路之開關。
        (四)切換開關：指用於切換由一電源至其他電源之自動或非自動配電
            裝置。
        (五)隔離開關：指用於隔離電源與電路，無啟斷負載電流能力，須以
            其他設備啟斷電路後，方可操作之開關，或稱分段開關（DS）。
            以連接器等隔離裝置隔離電路者，可視為隔離開關。
        (六)電動機電路開關：指在開關額定內，可啟斷額定馬力電動機之最
            大運轉過載電流之開關。
四十四、隔離設備：指具有啟斷負載電流能力，藉其開啟可使電路與電源隔離
        之配電裝置，例如斷路器、負載啟斷開關（ LBS）。
四十五、熔線：指藉由流過之過電流加熱熔斷其可熔組件以啟斷電路之過電流
        保護裝置。
四十六、斷路器：指於額定能力內，當電路發生過電流時，能自動跳脫啟斷該
        電路，且不致使其本體失能之過電流保護裝置。按其功能區分常用類
        型定義如下：
        (一)可調式斷路器：指斷路器可在預定範圍內依設定之各種電流值或
            時間條件下跳脫。
        (二)不可調式斷路器：指斷路器不能做任何調整以改變跳脫電流值或
            時間。
        (三)瞬時跳脫斷路器：指在斷路器跳脫時沒有刻意加入時間延遲。
        (四)反時限斷路器：指在斷路器跳脫時刻意加入時間延遲，且當電流
            愈大時，延遲時間愈短。
四十七、漏電斷路器：指當接地電流超過額定靈敏度電流之不動作值時，於預
        定時間內啟斷電路，以保護人員及設備之配電裝置。漏電斷路器包括
        不具過電流保護功能之漏電斷路器（RCCB），與具過電流保護功能之
        漏電斷路器（RCBO  或稱 ELCB ）。
四十八、漏電啟斷裝置（GFCI  或 RCD）：指當接地電流超過額定靈敏度電流
        一定比例時，於預定時間內啟斷電路，以保護人員之配電裝置。漏電
        啟斷裝置應具有啟斷負載電流之能力。
四十九、短路啟斷容量（IC）：指斷路器能安全啟斷最大短路故障電流（含非
        對稱電流成分）之容量。低壓斷路器之額定短路啟斷容量包括額定極
        限短路啟斷容量及額定使用短路啟斷容量，單位為 kA ，分別定義如
        下：
        (一)額定極限短路啟斷容量（ Icu）：指按規定試驗程序及規定條件
            下所作試驗之啟斷容量，該試驗程序不包括連續額定電流載流性
            之試驗。
        (二)額定使用短路啟斷容量（ Ics）：指依規定試驗程序及規定條件
            下所作試驗之啟斷容量，該試驗程序包括連續額定電流載流性之
            試驗。
五十、外部操作：指操作人員不會有接觸帶電部分之風險，即可進行操作之情
      況。
五十一、中性點：指多相式系統 Y  接、單相三線式系統、三相△系統之一相
        或三線式直流系統等之中間點。
五十二、接地：指線路或設備與大地有導電性之連接。
五十三、被接地：指被接於大地之導電性連接。
五十四、接地電極：指與大地建立直接連接之導電體。
五十五、被接地導線：指電力系統或電路被刻意接地之導線。導線連接至電力
        系統中性點者，又稱為中性線。
五十六、設備接地導線：指連接設備所有正常非帶電金屬部分至接地銅排或端
        子之導線。
五十七、接地電極導線：指系統中性點或設備接地銅排或端子連接至接地電極
        或接地電極系統之導線。
五十八、搭接：指導電性組件之電氣互連，維持其同一電位，以建立電氣連續
        性及導電性。
五十九、搭接導線：指用於連接金屬部分並確保導電性之導線，或稱為跳接線
        。
六十、接地故障：指非刻意使電路之非接地導線與被接地導線、設備接地導線
      、金屬封閉箱體、金屬管槽、金屬設備或大地間有導電性連接。
六十一、雨線：指自屋簷外端線，向建築物之鉛垂面作形成四十五度夾角之斜
        面；此斜面與屋簷及建築物外牆三者相圍部分屬雨線內，其他部分為
        雨線外。
六十二、耐候：指暴露在天候下不影響其正常運轉之製造或保護方式。
六十三、通風：指提供空氣循環流通之方法，使其能充分帶走過剩之熱、煙或
        揮發氣。
六十四、封閉箱體：指可防護帶電部分被人員意外碰觸或遭受外力損傷之外殼
        、箱體或設施。
六十五、配電箱：指具有中隔板及門板，且裝有匯流排、過電流保護或其他配
        電裝置之單一封閉箱體，或稱為分電箱；該箱體嵌入或附掛於牆上或
        有其他支撐物，並僅由正面可觸及。
六十六、配電盤：指具有框架、中隔板及門板，且裝有匯流排、過電流保護裝
        置等之封閉盤體，可於其盤面或背後裝上儀表、指示燈或操作開關等
        裝置，該盤體自立裝設於地板上。
六十七、電動機控制中心（ MCC）：指由一個以上封閉式電動機控制單元組成
        ，且內含共用電源匯流排之組合體。
六十八、出線口：指用戶配線系統上之一點，於該點引出電流至用電器具。
六十九、線盒：指裝設導線，附有蓋板，提供導線支撐或保護之容器。依其用
        途不同定義如下：
        (一)出線盒：指裝設於導線之末端用於引出管槽內導線之盒。
        (二)拉線盒：指裝設導線，並位於導線管系統中可觸及位置，以便拉
            入導線之盒。
        (三)接線盒：指裝設導線、金屬導線管及非金屬導線管等用於連接或
            分接導線之盒。
七十、導管穿線匣：指在二段以上導線管或管路系統之連接處或終端處，透過
        可移動之外蓋板，使其系統內部成為可觸及之小型箱體，又稱管匣。
七十一、管子接頭：指用於連接導線管之配件。
七十二、管槽：指專門作為容納絕緣導線、電纜或匯流排之封閉管道，包括金
        屬導線管、非金屬導線管、金屬可撓導線管、非金屬可撓導線管、金
        屬導線槽及非金屬導線槽、匯流排槽等。
七十三、人孔：指位於地下之封閉設施，供人員進出，以便裝設、操作或維護
        地下設備或電纜。
七十四、手孔：指用於地下之封閉設施，具有開放或封閉之底部，人員無須進
        入其內部即可裝設、操作或維護地下設備或電纜。
七十五、設計者：指依電業法規定得設計用戶用電設備工程者。
七十六、合格人員：指依電業法規定得為設計、承裝、施作、監造、檢驗或維
        護用戶用電設備之人員，或依其他法規規定得從事相關業務之人員。

第七條
供應電燈、電力、電熱或該等混合負載之低壓幹線及其分路，其電壓降均不得
超過標稱電壓百分之三，兩者合計不得超過百分之五。

第八條
帶電部分之防護依下列規定辦理：
一、除本規則另有規定外，運轉電壓五十伏特以上用電設備之帶電部分，應採
    用下列規定之一加以防護：
    (一)裝設於僅合格人員可觸及之房間、配電室或類似之封閉箱體內。
    (二)裝設耐久、穩固之隔間板或防護網，且僅合格人員可觸及帶電部分之
        空間。此隔間板或防護網上任何開口之大小與位置應使人員或所攜帶
        之導電性物體不致於與帶電部分意外碰觸。
    (三)高置於陽台、迴廊或平台，以排除非合格人員接近。
    (四)裝設於距離地面或其他工作面高度二‧五米以上之場所。
二、用電設備暴露於可能遭受外力損傷之處者，其封閉箱體或防護體之位置及
    強度應能避免外力損傷。
三、有帶電部分暴露之房間或其他防護場所，其入口應有標明禁止非合格人員
    進入之明顯警告標識。
四、未使用之比流器，其二次側應加以短路。
除本規則另有規定者外，低壓用電設備最小工作空間不得小於表八規定。

      第二節  電路之檢驗
第九條
除下列各處所外，電路應與大地絕緣：
一、低壓電源系統或內線系統之接地。
二、避雷器之接地。
三、特高壓支撐物上附架低壓設備之供電變壓器負載側之一端或中性點。
四、低壓電路與一百五十伏特以下控制電路之耦合變壓器二次側電路接地。
五、建築物內裝設接觸導線作為滑接軌道之接觸導線。
六、電弧熔接裝置之被熔接器材及其與電氣連接固定之金屬部分。
七、變比器（PT  及 CT ）之二次側接地。
八、低壓架空線路共架於特高壓支撐物之接地。
九、X 光設備及醫療裝置。
十、陰極防蝕之陽極。
十一、電氣爐、電解槽等，技術上無法與大地絕緣者。

第十條
低壓電路之絕緣電阻依下列規定辦理：
一、除下列各目規定外，低壓電路之導線間、電纜芯線間、導線或電纜芯線與
    大地間之絕緣電阻於進屋線、幹線或分路之開關及設備切開，測定電路絕
    緣電阻應有表一○規定電阻值以上，以洩漏電流測定者，應在表一○規定
    電流值以下。多雨及鹽害嚴重地區，裝設二年以上照明線路絕緣電阻不得
    小於○‧○五百萬歐姆（MΩ） 。
    (一)符合前條規定之接地部分。
    (二)符合第七款規定之升降機、電動起重機或類似可移動式機器，及第八
        款規定之遊樂用電車。
    (三)旋轉機及整流器之電路。
    (四)符合第十二條規定之變壓器。
    (五)開關、過電流保護裝置、電容器、感應型電壓調整器、變比器或其他
        器具之接線或匯流排之電路。
二、低壓導線間之絕緣電阻應隔離用電器具內之電路，僅測定導線間之絕緣電
    阻。
三、低壓導線與大地間之絕緣電阻應為用電器具在使用狀態所測定之電路與大
    地之絕緣電阻。
四、新設線路之絕緣電阻應在一百萬歐姆（MΩ）以上 。
五、既設線路之定期或非定期絕緣測定，以在用戶總開關箱量測為原則。自接
    戶點至用戶總開關間測定有困難者，得僅測定洩漏電流。
六、低壓電路之絕緣電阻測定應使用額定電壓五百伏特或二百五十伏特（二百
    二十伏特以下電路用）之絕緣電阻計或洩漏電流計。
七、升降機、電動起重機或類似可移動式機器裝設滑接導線供電者，除採用三
    百伏特以下絕緣導線或由一次側電壓三百伏特以下絕緣變壓器供電，或其
    接地電阻十歐姆（Ω）以下者外，導線與大地之絕緣電阻應保持表一○規
    定電阻值以上。新設時之絕緣電阻應在一百萬歐姆（MΩ）以上。
八、遊樂用電車之電源、接觸導線或電車內部電路與大地之絕緣電阻，以洩漏
    電流測定者，依下列規定辦理：
    (一)接觸導線每一千米之洩漏電流於使用電壓情形下，不得大於○‧一安
        培（一百毫安培）。
    (二)電車內部電路之洩漏電流在使用電壓情形下，不得大於其額定電流五
        千分之一。
九、建築物外配線之導線間、電纜芯線間、導線或電纜芯線與大地間之絕緣電
    阻，在額定電壓情形下，各導線之洩漏電流不得大於額定電流二千分之一
    。單相二線式電路之非接地導線與大地之絕緣電阻，於額定電壓情形下，
    洩漏電流不得大於額定電流二千分之一。

第十一條
高壓旋轉機及整流器之絕緣耐壓依下列規定之一辦理：
一、發電機、電動機、調相機等旋轉機，不包括旋轉變流機，以最大使用電壓
    之一‧五倍交流試驗電壓加於繞組與大地，應能耐壓十分鐘。
二、旋轉變流機以其直流側最大使用電壓之交流試驗電壓加於繞組與大地，應
    能耐壓十分鐘。
三、整流器以其直流側之最大使用電壓之交流試驗電壓加於帶電部分與其箱體
    ，應能耐壓十分鐘。

第十二條
除管燈用變壓器、X 光管用變壓器、試驗用變壓器等特殊用途變壓器外，以最
大使用電壓之一‧五倍交流試驗電壓加於變壓器各繞組之間、與鐵心及外殼之
間，應能耐壓十分鐘。

第十三條
高壓電路之高壓開關、斷路器、電容器、感應型電壓調整器、變比器、匯流排
或其他器具，以最大使用電壓之一‧五倍交流試驗電壓加壓於帶電部分與大地
之間，應耐壓十分鐘。

第十四條
除管燈用變壓器、X 光管用變壓器、試驗用變壓器等之二次側配線外，高壓配
線部分以最大使用電壓之一‧五倍交流試驗電壓加於導線與大地之間，應能耐
壓十分鐘。額定電壓二十五千伏特以下之交流電力電纜者，得採用系統對地最
大電壓之四倍（ 4U0）直流試驗電壓加壓，並耐壓十五分鐘之試驗方式。

第十五條
用戶用電設備裝設完竣，除依本規則規定外，應依用戶用電設備檢驗辦法有關
規定辦理竣工試驗及定期檢驗。
現場竣工試驗及定期檢驗之耐壓試驗得採用直流或交流（商用頻率、極低頻、
變頻或阻尼交流電壓）測試。
高壓用電設備在送電前，由負責工程施作之電器承裝業會同下列單位之一辦理
竣工試驗：
一、中央主管機關或其認可之檢驗機構。
二、登記合格之用電設備檢驗維護業。
三、監造電機技師之執業機構或所屬機關。

    第二章  配線及保護
      第一節  導線
第十六條
用戶用電線路之導線依下列規定辦理：
一、除匯流排及另有規定外，用於承載電流導體之材質應為銅質。導體材質採
    非銅質者，其尺寸應配合安培容量調整。
二、除本規則另有規定外，低壓配線應具有適用於六百伏特之絕緣等級。
三、絕緣軟銅線適用於建築物內配線，絕緣硬銅線適用於建築物外配線。
四、可撓軟線之裝設依第四章第九節規定辦理。

第十七條
整套型設備之部分組件包括電動機、電動機控制器或類似設備之導線，或本規
則指定供其他場所使用之導線，不適用本節規定。

第十八條
除本規則另有規定外，低壓線路應用絕緣導線。但有下列情形之一者，得用裸
銅線：
一、電氣爐所用之導線。
二、乾燥室所用之導線。
三、電動起重機所用之滑接導線或類似性質。

第十九條
低壓配線之導線最小線徑依下列規定辦理：
一、照明燈具、插座及電熱工程選擇分路之導線線徑，應以該導線安培容量足
    以承載負載電流，且不超過電壓降限制為準；其最小線徑除本規則另有規
    定外，單線直徑不得小於二‧○毫米，絞線截面積不得小於三‧五平方毫
    米。
二、電力工程選擇分路之導線線徑，應能承受電動機額定電流一‧二五倍，且
    單線直徑不得小於二‧○毫米，絞線截面積不得小於三‧五平方毫米。

第二十條
除符合第二項規定或本規則另有規定外，導線不得裝設於下列場所：
一、濕氣場所或潮濕場所。
二、暴露於對導線有劣化影響之氣體、煙塵、蒸汽、液體等場所。
三、暴露於超過導線所能承受溫度之場所。
導線符合下列情形者，依其規定辦理：
一、電纜具有防濕氣滲透之被覆層，或絕緣導線經設計者確認有防濕氣滲透之
    非金屬導線管或 PF 管保護者，得裝設於濕氣場所或潮濕場所。
二、導線具耐日照材質，或有耐日照之膠帶、套管等絕緣材質包覆者，得暴露
    於陽光直接照射之場所。

第二十一條
導線之絕緣與遮蔽及接地依下列規定辦理：
一、由合格人員維修及管理監督之工業廠區，得裝設無金屬遮蔽、最大相間電
    壓為五千伏特之金屬被覆電纜。若其絕緣體為橡膠者，應能耐臭氧。
二、除前款規定外，導線運轉電壓超過二千伏特者，應有遮蔽層及絕緣體。若
    其絕緣體為橡膠者，應能耐臭氧。
三、所有金屬遮蔽層應連接至接地電極導線、接地端子板或匯流排或設備接地
    導線。

第二十二條
導線以並聯方式裝設依下列規定辦理：
一、並聯之導線每條線徑應為五十平方毫米以上，且所有並聯之導線長度、導
    體材質、截面積及絕緣材質等皆需相同，並採用相同之裝設方法。
二、並聯導線裝設於同一金屬管槽或電纜架時該管槽或電纜架接地之導線線徑
    應符合第九十三條規定。
三、並聯之導線裝設於分開之電纜、管槽或電纜架者，該電纜、管槽或電纜架
    應具有相同之導線條數，且有相同之電氣特性。每一電纜、管槽或電纜架
    接地之導線應採用依第九十三條規定選定之線徑，不得因並聯而縮小接地
    之導線線徑。
四、導線管槽或電纜架中並聯之導線安培容量應符合第二十五條或第三百六十
    二條規定。

第二十三條
電氣連接依下列規定辦理：
一、採用壓力接頭或熔銲接頭等電氣連接裝置若採用不同金屬材質者，應確認
    適用於與其連接之導線材質，並依製造廠家說明書指示裝設。
二、銅及鋁之異質導體不得在同一端子或連接接頭互相混接。但該連接裝置採
    用經檢驗通過之專用銅鋁合金接頭及配件者，不在此限。
三、連接超過一條導線之接頭，及連接鋁導體之接頭，應做識別。
四、與導線安培容量有關聯之溫度額定，應以其配電裝置及用電器具之接線端
    子、導線、導線管或用電器具之運轉溫度額定中最低者為準。

第二十四條
導線之連接及處理依下列規定辦理：
一、導線應儘量避免連接。
二、連接導體時，應將導體表面處理乾淨後始可連接，且連接處之溫升應低於
    導體容許之最高溫度。
三、導線之連接：
    (一)接續連接：導線互為連接時，應以銅套管壓接（如圖二四～一），或
        採用銅銲、壓力接頭連接，或具同等效果之接續裝置或方法。
    (二)終端連接：連接導體至端子組件時，應採用壓力接線端子（包括固定
        螺栓型）、熔銲接頭或可撓線頭，並確保其連接牢固，且不會對導體
        造成損害。
四、導線之連接若不採用前款規定者，應按下列規定方法連接，且該連接部分
    應加銲錫：
    (一)直線連接：
        1.連接直徑二‧六毫米以下之單線時，依圖二四～二所示處理。
        2.絞線連接，以不加紮線之延長連接時，依圖二四～三處理；七股絞
          線先剪去中心之一股，十九股絞線先剪去中心七股，三十七股絞線
          先剪去中心十九股後再連接。以加紮線之延長連接時，依圖二四～
          四所示處理，中心股線剪去法同前述規定。
    (二)分歧連接：
        1.連接直徑二‧六毫米以下之單線時，依圖二四～五所示處理。
        2.絞線連接，以不加紮線之分歧連接時，依圖二四～六所示處理。以
          加紮線之分歧連接時，依圖二四～七或圖二四～八所示處理。
    (三)終端連接：
        1.連接直徑二‧六毫米以下之單線時，依圖二四～九所示處理。
        2.連接線徑不同之單線時，依圖二四～一○所示處理。
        3.連接絞線，以銅接頭銲接或壓接，依圖二四～一一處理。
五、連接兩種不同線徑之導線時，應依線徑較大者之連接法處理。
六、可撓軟線與他種導線連接時，若為單線，依單線之連接法；若為絞線，依
    絞線之連接法處理。
七、連接處之絕緣：
    (一)所有連接處應以絕緣體或絕緣裝置包覆；其絕緣等級不得小於導線絕
        緣強度。
    (二)聚氯乙烯（ PVC）絕緣導線應採用 PVC  絕緣膠帶纏繞連接處之裸露
        部分，使其與原導線之絕緣相同。纏繞時，應就 PVC  絕緣膠帶寬度
        二分之一重疊交互纏繞，並掩護原導線之絕緣外皮十五毫米以上。
八、裝設八平方毫米以上之絞線於開關時，應將線頭銲接於銅接頭中或用銅接
    頭壓接。但開關附有銅接頭者，不在此限。
九、導線在導線管或密閉式導線槽內不得連接。

第二十五條
低壓導線之安培容量依下列規定決定：
一、導線絕緣物最高容許溫度應符合表二五～一規定。
二、金屬導線管配線之導線安培容量應符合表二五～二至表二五～四規定。
三、PVC 管配線之導線安培容量應符合表二五～五規定。
四、導線安培容量於前二款未規定者，得依下列公式計算之：
    I = [（Tc–Ta）/Rdc（1+Yc）Rca]1/2×103 安培
    Tc= 導線絕緣物最高容許溫度（℃）
    Ta= 周圍溫度（℃）
    Rdc = 在導線絕緣物最高容許溫度下，導線長度三百零五毫米之直流電阻
          μΩ（得參考纜線製造廠家之參數）
    Yc= 集膚效應與近接效應引起之交流電阻成分（依導線排列形狀決定）
    Rca = 導線與周圍溫度間之熱阻（依導線及導線管材質、構造等決定，得
          參考製造廠家之參數）
五、同一導線管或多芯電纜內有十條以上載流導線，其導線安培容量應以「三
    以下」之數值再乘以表二五～六規定之修正係數。
六、計算導線數時，載流導線不包括被接地導線、設備接地導線、控制線及信
    號線。但單相三線式或三相四線式電路被接地導線有諧波電流存在者，應
    視為載流導線，並予以計入。
七、裝設於周圍溫度非為攝氏三十五度之處，導線安培容量應再乘以表二五～
    七規定之修正係數。
八、同一回路導線裝設於適用不同安培容量規定情形，應選用最低安培容量者
    。但同一回路導線適用較低安培容量之配線合計長度不超過三米，且不超
    過全部回路長度之百分之十，得適用較高之安培容量。

第二十六條
標稱電壓六百伏特以下之電路，被接地導線絕緣等級應等同電路中任一非接地
導線之絕緣等級。
被接地導線之電氣連續性不得依靠金屬封閉箱體、管槽、電纜架或電纜之鎧裝
。

第二十七條
被接地導線依下列規定加以識別，其識別應以明顯之白色或淺灰色標示之：
一、用戶用電線路自接戶點至用戶總開關之電源側屬於進屋線部分，其中被接
    地導線應整條加以識別。
二、多線式幹線電路或分路之中性線應加以識別。
三、單相二線之幹線或分路若對地電壓超過一百五十伏特時，其被接地導線應
    整條加以識別。
四、礦物絕緣（MI）金屬被覆電纜之被接地導線於裝設時，於其終端應加以識
    別。
五、耐日照屋外型單芯電纜用於太陽光電發電系統之被接地導線者，裝設時於
    所有終端應加以識別。
六、十四平方毫米以下之絕緣導線作為電路中之被接地導線者，其外皮應加以
    識別。
七、超過十四平方毫米之絕緣導線作為電路中之被接地導線者，其外皮應加以
    識別，或在裝設過程中於終端加以識別。
八、可撓軟線作為被接地導線用之絕緣導線，其外皮應加以識別。

第二十八條
內線系統之被接地導線不得與未施接地之電業電源系統連接。電業電源系統供
電方式已提供被接地導線者，應與其相對應之被接地導線連接。
用戶其他電源系統之被接地導線不得與電業之被接地導線連接。

第二十九條
除本規則另有規定外，二個以上同相分路或二組以上多線式分路不得共用中性
線。

第三十條
分路由自耦變壓器供電時，其內線系統之被接地導線應與自耦變壓器電源系統
之被接地導線直接連接。

第三十一條
接地型插座之接地極應連接至設備接地導線，中性極應連接至被接地導線。
被接地之導線應與燈頭之螺紋殼連接。

第三十二條
白色或淺灰色之導線不得作為非接地導線使用。但符合下列規定之一者，不在
此限：
一、白色或淺灰色之導線於每一可視及且可接近之出線口處，以有效方法使其
    永久變成非白色或淺灰色之導線者，得作為非接地導線使用。
二、移動式用電器具引接之多芯可撓軟線含有白色或淺灰色導線者，其所插接
    之插座係由二非接地之導線供電者，得作為非接地導線使用。

第三十三條
一相繞組中點接地之四線式△或 V  接線系統，其對地電壓較高之導線或匯流
排，應以橘色或其他有效耐久方法加以識別。

      第二節  分路及幹線
第三十四條
分路及幹線之裝設除本規則另有規定外，應依本節規定辦理。

第三十五條
分路之標稱電壓限制依下列規定。工業用紅外線燈電熱設備之燈座電路電壓依
第七百八十五條規定裝設者，不適用第二款至第四款規定。
一、在旅館客房、其他供住宿用途之客房或住宅場所（不含公共使用空間）內
    ，除符合第三款規定者外，供電給下列負載之電路對地電壓應為一百五十
    伏特以下：
    (一)照明燈具、用電器具及插座。
    (二)容量為一千三百二十伏安以下，或四分之一馬力以下附插頭可撓軟線
        連接之負載。
二、供電給下列負載之電路對地電壓得為一百五十伏特以下：
    (一)額定電壓為一百五十伏特以下之燈座。
    (二)放電管燈之輔助設備。
    (三)附插頭可撓軟線連接之用電器具或固定式用電器具。
三、照明燈具、用電器具或插座符合下列規定之一者，其電路對地電壓得超過
    一百五十伏特，且為三百伏特以下：
    (一)燈具上未裝操作開關，且距離地面高度二‧五米以上。但非螺旋燈座
        或維修時不會暴露帶電部分者，不在此限。
    (二)用電器具分路或插座分路加裝漏電斷路器，或插座加裝漏電啟斷裝置
        。
四、供電給下列負載之電路對地電壓得超過三百伏特，且為六百伏特以下：
    (一)位於高速公路、道路、橋梁、運動場，或停車場等室外區域之放電管
        燈輔助設備，且裝設於固定式照明燈具內，距離地面高度六‧七米以
        上；若位於隧道者，距離地面高度為五‧五米以上。
    (二)直流電源系統供電之照明燈具，其直流安定器能隔離直流電源與燈泡
        或燈管電路，於更換燈泡或燈管時能防止感電。

第三十六條
各類場所內須有連續最低照明負載者，應至少以表三六所列場所之單位負載計
算。但目的事業主管機關規定建築物應依其所訂定之新建建築物節約能源設計
標準辦理者，其指定場所之照明負載得依該標準所採用之單位負載計算。
前項規定每一樓層之樓地板面積應自建築物、住宅場所或其他所含區域之內緣
起算。所計算之住宅樓地板面積不包括陽台、車庫，或未使用、未裝修且未預
計改裝作為日後使用之空間。
供住宿用途之客房或住宅場所所有二十安培以下之插座出線口，不得視作一般
照明出線口。
其他照明之負載計算應依下列規定辦理：
一、供重責務型燈座用之出線口以每一出線口至少六百伏安計算。
二、供招牌廣告燈及造型照明用之出線口以至少六百伏安計算。
三、供展示窗照明用出線口以每三百毫米水平距離至少二百伏安計算。

第三十七條
除前條規定外，插座及其他出線口之負載計算依下列規定辦理：
一、插座出線口：
    (一)每一框架上之單連插座或雙連插座出線口，應以至少一百八十伏安計
        算。
    (二)同一框架上之四連插座出線口，應以每一插座至少九十伏安計算。
二、供住宿用途之客房內或住宅場所內乾衣機用之出線口，應依第五十五條規
    定計算；供電爐或其他家庭用烹飪用電器具用之出線口，應依第五十六條
    規定計算。
三、供電動機用之出線口應依第二百十四條及第二百十六條規定計算。
四、除前三款規定外，供特殊用電器具或其他負載用之出線口，應依該用電器
    具或所接負載之額定電流計算。其他特殊負載應依大型用電器具容量及數
    量決定。

第三十八條
由分路供電之負載不得大於分路額定及下列規定之最大負載：
一、分路同時供電給八分之一馬力以上之固定電動機驅動設備及其他負載，其
    負載應以一‧二五倍最大電動機負載加上其他負載之總和計算。
二、分路供電給有安定器、變壓器或自耦變壓器之電感性照明負載，其負載應
    以各負載額定電流之總和計算，而不以照明燈具之總瓦數計算。
三、電爐負載得依表五六規定選用幹線需量因數計算。
四、分路供電給連續負載，不得大於分路額定百分之八十。

第三十九條
分路導線安培容量不得小於所供電之最大負載，並符合下列規定：
一、分路供電給連續負載，或包含連續及非連續之綜合負載，其導線最小線徑
    所容許之安培容量不得小於連續負載一‧二五倍加上非連續負載之總和。
二、分路供電給二個以上附插頭可撓軟線連接之可攜式負載用插座，其導線安
    培容量不得小於該分路額定。

第四十條
分路之設置依下列規定辦理：
一、分路額定應依過電流保護裝置所容許之最大安培額定決定。採用具較高安
    培容量之導線者，其分路額定仍應由過電流保護裝置之安培額定決定。
二、供移動性負載用之插座分路，其導線安培容量不得小於分路額定。
三、分路額定五十安培以下採用金屬導線管配線時，應依表四○設置；採非金
    屬導線管配線或分路額定大於五十安培者，其導線最小線徑應依第二十五
    條規定選用。

第四十一條
多線式分路之裝設依下列規定辦理：
一、多線式分路之所有導線應源自同一配電箱。
二、每一多線式分路於分路起點應提供能同時開啟該分路所有非接地導線之隔
    離設備。
三、多線式分路僅能供電給相線對中性線之負載。但符合下列規定之一者，不
    在此限：
    (一)僅供電給單一用電器具之多線式分路。
    (二)多線式分路之所有非接地導線能被分路過電流保護裝置同時啟斷。

第四十二條
一百五十伏特以下、二十安培以下之插座分路，供電給住宅場所之客廳、餐廳
、臥房等居室或區域者，得加裝電弧故障啟斷裝置予以保護。該居室或區域之
插座分路配線更新或延伸時，得加裝於分路源頭或既設分路第一個插座出線口
。

第四十三條
分路之非接地導線識別依下列規定辦理：
一、用戶配線系統中，具有一個以上標稱電壓系統供電之分路者，每一非接地
    導線應於分路配電箱標示其相、線及標稱電壓。
二、識別得採用不同色碼、標示帶、標籤或具同等效果之方法。
三、引接自每一分路配電箱之導線識別，應有耐久標識設置於每一分路之配電
    箱內。

第四十四條
分路容許裝接負載依下列規定辦理：
一、十五安培或二十安培之分路符合下列規定之一者，得供電給照明燈具、其
    他用電器具或兩者之組合：
    (一)附插頭可撓軟線連接之非固定式用電器具額定電流不大於分路額定百
        分之八十。
    (二)分路供電給固定式用電器具，同時又供電給照明燈具、附插頭可撓軟
        線連接之非固定式用電器具或兩者之組合，該固定式用電器具不含照
        明燈具之總額定容量不大於該分路額定百分之五十。
二、三十安培之分路得供電給住宅場所以外重責務型固定式照明燈具，或任何
    處所之用電器具。僅供電給附插頭可撓軟線連接之任一用電器具者，其額
    定電流不得大於該分路額定百分之八十。
三、四十安培或五十安培之分路得供電給任何處所之固定式烹飪用電器具、住
    宅場所以外重責務型固定式照明燈具、紅外線燈電熱設備、電動車充電設
    備或其他用電器具。但一般照明燈具不得併用。
四、大於五十安培之分路應僅供電給非照明出線口負載。

第四十五條
分路供電給照明燈具及用電器具，包括以電動機驅動之用電器具者，應足以供
電給依第三十六條及第三十七條規定計算之負載。
分路設置之最少數量應由負載計算總和，及所設分路額定決定；所設分路應足
以供電給裝接之所有負載。任一個分路裝接之負載不得大於第三十八條規定之
最大值。
住宅場所之分路設置應符合前二項規定，並依下列規定辦理：
一、廚房、餐廳或類似區域應分別設有一個以上二十安培小型用電器具插座專
    用分路供電。
二、洗衣機或乾衣機用出線口應設有一個以上二十安培專用分路供電。但該分
    路供電給位於陽台之負載，且符合前條第一款第一目規定者，得供電給陽
    台插座出線口。
三、浴室插座出線口應設有一個以上十五安培以上專用分路供電。但該分路供
    電給單一浴室，且符合前條第一款規定者，得供電給浴室內其他用電器具
    。
四、住宅場所室內總面積在七十平方米以下者洗衣機或乾衣機與浴室之插座出
    線口，得共用同一專用分路；廚房、餐廳或類似區域與客廳之插座出線口
    亦得共用同一專用分路。

第四十六條
分路出線口之數量設置及位置裝設依下列規定辦理：
一、住宅場所之臥房、書房、客廳、餐廳、廚房、娛樂室、工作間等居室、浴
    室、走廊、樓梯，或供住宿用途之客房及浴室，應至少裝設一個由壁式開
    關控制之照明出線口。
二、住宅場所之臥房、書房、客廳、餐廳、廚房、娛樂室、工作間等居室或其
    他類似房間裝設插座出線口依下列規定辦理：
    (一)入口門任一側沿牆壁水平量測一‧八米以內應裝設一個插座出線口，
        其餘牆壁距離（含轉角）應再裝設插座出線口之數量以三‧六米計算
        ，四捨五入計算所得數量之各出線口位置由設計者決定。
    (二)地板插座出線口不得計入所規定插座出線口數量。但該插座出線口距
        離牆面四百五十毫米以內者，不在此限。
三、設有中島式檯面或冷凍設備之廚房，得裝設專用插座出線口。
四、浴室中距離任一洗手台外緣九百毫米以內應裝設一個插座出線口。
五、住宅場所應裝設一個以上洗衣機或乾衣機用插座出線口。
六、陽台及室外走廊，應裝設一個以上插座出線口，且高度不得超過二米。
七、除供電給特殊用電器具之插座出線口外，地下室及車庫應裝設一個以上插
    座出線口。但屬建築物公共停車空間者，不在此限。
八、幼兒園、托兒所或兒童醫院等幼童活動區域之插座應為防觸電者，或具有
    鎖或扣蓋板。
九、農村或分租用套房得視實際需要裝設照明出線口或插座出線口。

第四十七條
供住宿用途之客房插座裝設依下列規定辦理：
一、客房應依前條第二款及第四款規定裝設插座出線口。
二、裝有固定式烹飪用電器具者，應裝設插座出線口。
三、插座出線口設置總數不得少於前條第二款至第七款規定。
四、客房應裝設二個以上可輕易觸及之插座出線口。

第四十八條
設置展示窗者，距離展示窗上方四百五十毫米以內，沿水平最大寬度每隔直線
距離三‧六米處，或於展示區之主要部分上方，應至少裝設一個插座出線口。

第四十九條
出線口配電裝置之安培額定不得小於其所供電之負載容量，並符合下列規定：
一、燈座：
    (一)額定三十安培以上之燈座，該燈座應採用重責務型。
    (二)重責務型燈座若為中型者，其額定不得小於六百六十瓦特；若為其他
        型式者，其額定不得小於七百五十瓦特。
二、插座：
    (一)專用分路僅裝設一個單連插座時，該插座額定不得小於該分路額定。
        但該插座符合下列規定之一者，不在此限：
        1.為三分之一馬力以下附插頭可攜式電動機之單連插座。
        2.為附插頭可撓軟線連接之電弧電銲機專用插座，其額定不小於電弧
          電銲機分路導線最小安培容量。
    (二)一般分路之插座供電給附插頭可撓軟線連接之最大負載，不得大於插
        座額定百分之八十。
    (三)除下列規定之一者外，五十安培以下一般分路之插座額定應符合表四
        ○規定；分路額定大於五十安培者，其插座額定不得小於分路額定。
        1.供電給一個以上附插頭可撓軟線連接電弧電銲機者，其插座額定得
          為第七百四十二條規定之導線最小安培容量以上。
        2.放電管燈所裝設之插座額定得依第一百五十二條第三款規定小於分
          路額定，惟不小於燈具負載電流一‧二五倍。
    (四)電爐用插座額定得以表五六規定之單一電爐需量負載為依據。

第五十條
幹線額定及其被接地導線線徑決定依下列規定辦理：
一、幹線之導線安培容量不得小於依本節計算所得之負載。
二、幹線應裝設過電流保護裝置；其保護裝置之額定及導線安培容量不得小於
    連續負載一‧二五倍加上非連續負載之總和。
三、幹線之被接地導線線徑不得小於表九三～二規定。

第五十一條
由幹線供電之負載應依第三十六條及第三十七條規定計算各分路之負載總和，
再乘以需量因數。

第五十二條
一般照明總負載計算得適用表五二規定之幹線需量因數。
前項規定不得用於決定一般照明之分路數。

第五十三條
非住宅場所之插座負載依第三十七條第一款規定計算者，得適用表五三規定之
幹線需量因數。該負載得併入照明負載計算，並得適用表五二規定之幹線需量
因數。

第五十四條
幹線供電給固定式電暖器之負載計算，應為所有分路裝接之負載總和。但符合
下列規定之一者，不在此限：
一、負載為非連續性或不同時使用，且幹線容量足以供應負載所需者，該幹線
    容量得小於所裝接之總負載。
二、電暖器與冷氣負載不同時使用者，較小負載得省略不計。該電暖器包括浴
    室內多功能電暖、換氣用途之設施。
三、幹線之負載依第六十條及第六十一條規定計算。

第五十五條
住宅場所內小型用電器具、洗衣機或乾衣機之負載計算依下列規定辦理：
一、小型用電器具：
    (一)廚房、餐廳或類似區域由一百五十伏特以下、二十安培分路供電者，
        其分路之負載應以一千五百伏安計算。
    (二)由二個以上之分路供電者，其幹線之負載應以每一個分路不小於一千
        五百伏安計算。
    (三)前二目負載得併入一般照明負載計算，並得適用表五二規定之幹線需
        量因數。
二、每一個洗衣機用分路之負載，應以一千五百伏安計算。該負載得併入一般
    照明負載計算，並得適用表五二規定之幹線需量因數。
三、每具乾衣機應以二千瓦特計算負載；其銘牌標示之額定大於二千瓦特者，
    應依銘牌標示計算。其負載計算得適用表五五規定之幹線需量因數。

第五十六條
住宅場所用電爐、嵌入式蒸烤箱及其他烹飪用電器具之個別額定超過一‧七五
千瓦特者，其幹線之負載計算得適用表五六規定之幹線需量因數。
二具以上單相電爐由三相四線式幹線供電者，其總負載之計算應以任何二相線
間所裝接最大電爐數二倍之需量值為準。

第五十七條
除電爐、空調設備或電暖器外，由同一幹線供電給四個以上住宅場所用固定式
用電器具者，其幹線之負載得以各用電器具銘牌標示之額定總和百分之七十五
計算。

第五十八條
非住宅場所廚房用電器具如商業用烹飪用電器具、洗碗機、熱水器等，其幹線
之負載計算得適用表五八規定之幹線需量因數。

第五十九條
中性線最大負載應為中性線與任一非接地導線間之最大裝接負載。
供電給住宅場所用電爐、嵌入式蒸烤箱及烹飪用電器具之幹線，其中性線最大
不平衡負載計算，以其非接地導線裝接之負載適用表五六規定之幹線需量因數
後，得再乘以百分之七十。
交流單相三線及三相四線不平衡負載大於二百安培部分，除所裝接負載為含有
第三諧波之放電管燈外，其計算得再乘以百分之七十。

第六十條
以一百十伏特及二百二十伏特單相三線供電之單一住宅，其進屋線或幹線之導
線安培容量達一百安培以上者，進屋線或幹線之負載計算得適用表六○規定之
需量因數，且中性線負載計算得適用前條規定。
表六○規定之其他負載計算應包括下列規定：
一、每一個二十安培之小型用電器具分路以一千五百伏安計算。
二、一般照明及插座以每平方米三十三伏安計算。
三、固定式用電器具、電爐、嵌入式蒸烤箱及烹飪用電器具以銘牌標示之額定
    計算。
四、電動機及低功率因數器具以千伏安計算。
五、適用第五十四條但書規定負載不同時使用者，以選用下列最大負載計算：
    (一)空調設備負載。
    (二)中央電暖器負載之百分之六十五。
    (三)少於四具之個別操作電暖器負載之百分之六十五。
    (四)四具以上之個別操作電暖器負載。

第六十一條
集合住宅場所進屋線或幹線之負載計算得適用表六一規定之需量因數。

      第三節  進屋線
第六十二條
進屋點應儘量選擇距離電度表或用戶總開關最近處。

第六十三條
除進屋線外，其他導線不得裝設於同一進屋之管槽或電纜內。但符合下列規定
之一者，不在此限：
一、接地或搭接之導線。
二、具有過電流保護之負載管理控制導線。

第六十四條
進屋線之管槽自地下用戶配線系統引入建築物，應依第三百零三條第七款規定
加以密封。

第六十五條
進屋線伸出壁外長度依下列規定辦理：
一、進屋線為電纜者，其伸出壁外長度應為四百毫米以上。
二、進屋線採用導線管配線者，其伸出壁外長度應為一百毫米以上，且應於建
    築物外一端加裝防水分線頭，其導線應伸出分線頭外三百毫米以上。
三、用戶建築物壁外尚有屏蔽者，其進屋線應裝設至建築物之外側。
四、進屋點距離地面高度不及二‧五米者，進屋線應延長至距離地面高度二‧
    五米以上其在二‧五米以下露出之導線須有完整之絕緣，且應加裝導線管
    保護。

第六十六條
進屋線路與其他管路之間隔依下列規定辦理：
一、進屋線路與電信線路、水管及其他金屬物間，應保持一百五十毫米以上之
    間隔。但有絕緣管保護者，不在此限。
二、進屋線路與燃氣供給管路間應保持一米以上之間隔。

第六十七條
並排磚構造或混凝土構造樓房，若分為數戶供電者，起造人應埋設共同接戶導
線管。該管應考慮將來可能之最大負載，選用適當之管徑。
供電戶數為四戶以下，共同接戶導線管埋設於建築物橫梁者，最小管徑不得小
於五十二毫米；埋設於地下者，最小管徑不得小於八十毫米。但經設計者確認
負載較輕之供電戶，戶數得酌予增加。

第六十八條
進屋線之導線線徑應依用戶裝接之負載計算。
進屋線應採用金屬導線管、PVC 管、金屬導線槽或匯流排槽配線，其最小線徑
不得小於五‧五平方毫米。裝設鋁匯流排槽者，其銅鋁異質導體之連接應採用
經檢驗通過之專用銅鋁合金接頭及配件。
電度表電源側至進屋點之進屋線配線應依第一千零九條第一款規定辦理。
電度表負載側至用戶總開關箱之進屋線位於管道間，有標明用戶回路別之耐久
且明顯標識者，得採用電纜架配線。

第六十九條
進屋線應穿入金屬導線管、PVC 管或金屬導線槽內加以防護，以免遭受外力損
傷。但既設用戶辦理分戶採用交連聚乙烯（XLPE）電纜裝設於距離地面高度二
‧一米以上者，不在此限。
進屋線埋設於地下者，應依第三百零三條規定辦理。

第七十條
架空進屋線進屋處之裝設依下列規定辦理：
一、鵝頸接頭：
    (一)進屋之管槽應有鵝頸接頭供連接進屋線。
    (二)鵝頸接頭應為適用於潮濕場所者。
二、滴水環：
    (一)個別導線應做成滴水環。
    (二)進屋線與架空接戶線之連接位置，應為鵝頸接頭下方或進屋之電纜護
        套終端下方。
三、進屋線應有使水無法進入管槽或設備之防水配置。
四、進屋線於貫穿建築物處，應採用導線管保護，且導線管外端應稍向下傾斜
    ，以免雨水滲入，且該導線管兩端應採用膠帶纏裹，以免滑動。

      第四節  過電流及漏電保護
第七十一條
斷路器及栓型熔線裝設於住宅場所之二十安培以下分路者，應為反時限保護。

第七十二條
栓型熔線及熔線座依下列規定選用：
一、額定電壓不得超過一百五十伏特，額定電流分為一安培至十五安培、十六
    安培至二十安培及二十一安培至三十安培共三級。
二、每一級之熔線應有不同之尺寸，使容量較大者，不能誤裝於容量較小之熔
    線座上。

第七十三條
筒型熔線及熔線座依下列規定選用：
一、一千安培以下筒型熔線及其熔線座應依其電流分級為三十安培、六十安培
    、一百安培、二百安培、四百安培、六百安培、一千安培。
二、筒型熔線及其熔線座應按其分級做不同尺寸之設計，以免誤裝於較高電壓
    或電流之熔線座。

第七十四條
斷路器之標準安培額定依各製造廠商經試驗標準型式試驗通過者為準。
斷路器應能指示啟斷或閉合電路之位置。
熔線及斷路器裝設之位置或防護，應避免人員於操作時被灼傷或受其他傷害。
斷路器之把手或操作桿，可能因瞬間動作致使人員受傷者，應加以防護或隔離
。

第七十五條
積熱型熔斷器與積熱電驛，及其他非設計為保護短路或接地故障之保護裝置，
不得作為導線之短路或接地故障保護。

第七十六條
進屋線之過電流保護依下列規定辦理：
一、每一非接地之進屋線應有過電流保護裝置其安培額定不得大於該進屋線之
    導線安培容量。但熔線或斷路器之安培額定在八百安培以下，且其標準安
    培額定與進屋線之導線安培容量不能配合時，得選用較高一級者，且所選
    用之高一級不大於八百安培。
二、被接地之導線除其所裝設之斷路器能將該導線與非接地之導線同時啟斷者
    外，不得串接過電流保護裝置。
三、進屋線設置三具以下之過電流保護裝置時得免設主過電流保護裝置。

第七十七條
照明燈具、用電器具及其他用電設備，或用電器具內部電路及元件之附加過電
流保護，不得取代分路所需之過電流保護裝置，或代替所需之分路保護。
前項規定附加過電流保護裝置不須為可輕易觸及。

第七十八條
對地電壓超過一百五十伏特、相對相電壓不超過六百伏特之 Y  接中性點直接
接地系統，其每具額定電流一千安培以上之過電流保護裝置作為建築物之主要
隔離設備時，應提供設備接地故障保護。但符合下列規定之一者，不在此限：
一、未依序斷電將導致額外或增加危害之連續性工業製程。
二、進屋線或幹線因其他規定已裝設接地故障保護裝置。
三、電動機驅動之消防幫浦。

第七十九條
除可撓軟線或可撓電纜外，導線應依第二十五條規定之安培容量裝設過電流保
護裝置，其安培額定不得大於該導線之安培容量。但本規則另有規定或符合下
列情形之一者，從其規定：
一、物料吊運磁鐵或電動機驅動之消防幫浦之電路若斷電會導致危險者，其導
    線應有短路保護，不得有過載保護。
二、安培額定八百安培以下之過電流保護裝置符合下列規定者，得選用較高一
    級者，且所選用之高一級不大於八百安培：
    (一)被保護之導線非屬供電給二個以上插座作為附插頭可撓軟線連接可攜
        式負載使用。
    (二)熔線或斷路器之標準安培額定與導線之安培容量不能配合；或由合格
        人員操作之可調式斷路器設定值與導線之安培容量不能配合，且該斷
        路器之過載跳脫調整設定值未高於導線之安培容量。
三、電動機因起動電流較大，其過電流保護裝置之安培額定得大於導線之安培
    容量。
下列導線線徑之過電流保護裝置安培額定不得大於其規定值：
一、二‧○毫米導線：十五安培。
二、三‧五平方毫米導線：二十安培。
三、五‧五平方毫米導線：三十安培。

第八十條
可撓軟線或可撓電纜應有符合表三六八規定安培容量之過電流保護裝置。
自分路分接之可撓軟線或可撓電纜符合下列情形之一者，得視為由分路之過電
流保護裝置保護：
一、十五安培及二十安培分路：截面積一‧○平方毫米以上。
二、三十安培分路：截面積二‧○平方毫米以上。
三、四十安培及五十安培分路：截面積三‧五平方毫米以上。

第八十一條
非接地導線之保護依下列規定辦理：
一、電路中每一非接地導線應有過電流保護裝置。
二、斷路器應能同時啟斷電路中之各非接地導線。但單相二線電路或單相三線
    電路，三相四線電路不接三相負載者，得使用單極斷路器，以保護此等電
    路中之各非接地導線。

第八十二條
被接地導線之保護依下列規定辦理：
一、多線式回路被接地之中性線不得有過電流保護裝置。但該過電流保護裝置
    能使電路之各導線同時啟斷者，不在此限。
二、單相二線式或三相三線式之被接地導線若裝過電流保護裝置者，該過電流
    保護裝置應能使電路之各導線同時啟斷。

第八十三條
除符合下列情形之一者外，導線之過電流保護裝置應裝設於電源受電之分接點
：
一、自分路分接至個別出線口之分接導線長度不超過三米，且符合第三十九條
    規定者，得視為由分路之過電流保護裝置保護。
二、幹線之分接導線長度不超過三米，安培容量不小於其供電之各分路額定總
    和或其供電之負載總和，並裝設於配電箱或導線管內者，在分接點得免裝
    過電流保護裝置。
三、幹線之分接導線長度不超過八米，安培容量不小於幹線過電流保護裝置安
    培額定三分之一，且終端所裝之一具斷路器或一組熔線之安培額定不大於
    該分接導線之安培容量，並有防護使其不易遭受外力損傷者在分接點得免
    裝過電流保護裝置。
前項規定之過電流保護裝置裝設於建築物內者除有特殊情形者外，應位於可輕
易觸及處，不得位於浴室、接近易燃物處，或暴露於可能遭受外力損傷之處。

第八十四條
過電流保護裝置除其構造已有足夠之保護外，應裝設於封閉箱體內，且箱門打
開後不得露出帶電部分。
過電流保護裝置若裝設於潮濕場所，其封閉箱體應為防水型者。

第八十五條
裝設於非合格人員可觸及電路之筒型熔線，或對地電壓超過一百五十伏特之所
有型式熔線，應於電源側裝設隔離設備，使每一內含熔線之電路皆可與電源單
獨隔離。

第八十六條
過電流保護裝置之安培額定與協調依下列規定辦理：
一、過電流保護裝置得採用斷路器或熔線；其保護應能互相協調。
二、過電流保護裝置之額定電壓不得小於電路電壓。
三、過電流保護裝置之短路啟斷容量（IC）應能安全啟斷裝置點可能發生之最
    大短路電流（含非對稱電流成分）。
四、採用斷路器者，依下列規定之一選用額定極限短路啟斷容量（ Icu）。額
    定使用短路啟斷容量（ Ics）應由設計者選定，並於設計圖標明 Icu  值
    及 Ics  值，但額定電流二百二十五安培以下具過電流保護功能之漏電斷
    路器（RCBO）得僅標明 Icu  值。
    (一)Icu 不得小於裝置點之最大短路電流計算值。但短路電流之功率因數
        大於表八六～一規定值，或感抗與阻抗比值（ X/R）小於其相對應值
        者，得逕依對稱短路電流計算值選用。
    (二)裝置點短路電流之功率因數小於表八六～一規定值，或 X/R  大於其
        相對應值者，Icu 應以裝置點之對稱短路電流計算值乘以非對稱係數
        （ k）或轉換係數（MF）選用。選用非對稱係數或轉換係數時，得參
        考表八六～二規定辦理。
    (三)低壓用戶按表八六～三規定選用斷路器者，得免計算其短路電流。

第八十七條
漏電斷路器以裝設於分路為原則。裝設不具過電流保護功能之漏電斷路器（
RCCB）者，應加裝具有足夠啟斷短路容量之無熔線斷路器或熔線作為後衛保護
。
符合下列規定之用電設備、器具或線路，應在其電路上或設備、器具外之適當
位置裝設漏電斷路器。插座已裝設漏電啟斷裝置者，其分路得免裝設漏電斷路
器。
一、建築或工程興建之臨時用電設備。
二、游泳池、噴水池等場所之水中及周邊用電器具。
三、公共浴室等場所之過濾或給水電動機分路。
四、灌溉、養魚池及池塘等之用電設備。
五、辦公處所、學校及公共場所之飲水機分路但飲水機內部已裝設漏電斷路器
    者，不在此限。
六、住宅場所、旅館及公共浴室之電熱水器分路及浴室插座分路。但電熱水器
    內部已裝設漏電斷路器者，不在此限。
七、住宅場所陽台之插座分路及距離廚房水槽外緣一‧八米範圍內之插座分路
    。
八、住宅場所、辦公處所、商場之沉水式用電器具。
九、裝設在金屬桿或金屬構架，或對地電壓超過一百五十伏特之路燈、號誌燈
    、招牌廣告燈。
十、人行地下道、陸橋之用電設備。
十一、慶典牌樓、裝飾彩燈。
十二、由室內引至室外裝設之插座分路及雨線外之用電器具。
十三、遊樂場所之電動遊樂設備分路。
十四、非消防用之電動門及電動鐵捲門之分路。
十五、公共廁所之插座分路。

第八十八條
漏電斷路器之選用依下列規定辦理：
一、裝設於低壓電路之漏電斷路器應採用電流動作型，且符合下列規定：
    (一)漏電斷路器應屬表八八～一所示之任一種。
    (二)漏電斷路器額定電流不得小於該電路之負載電流。
    (三)漏電警報器之聲音警報裝置，以電鈴或蜂鳴式為原則。
二、漏電斷路器額定靈敏度電流及動作時間之選擇，依下列規定辦理：
    (一)以防範感電事故目的裝設之漏電斷路器，應採用高靈敏度高速型。但
        用電器具外殼另施行接地，其接地電阻值未超過表八八～二之接地電
        阻值，且動作時間在○‧一秒以內者（高速型），得採用中靈敏度型
        漏電斷路器。
    (二)以防範火災或電弧損害設備等其他非防範感電事故目的裝設之漏電斷
        路器得依其保護目的選用適當之漏電斷路器。

第八十九條
下列規定額定值之插座裝設於其規定處所者，應裝設額定靈敏度電流六毫安培
以下，且動作時間○‧一秒以下之漏電啟斷裝置。但該插座之分路已裝有漏電
斷路器者，得免裝設之。
一、單相一百五十伏特以下、十五安培或二十安培之插座，裝設於住宅場所內
    之下列規定處所：
    (一)浴室。
    (二)供廚房流理台上用電器具使用。
    (三)水槽外緣一‧八米範圍內。
    (四)陽台。
    (五)室外。
二、單相一百五十伏特以下、五十安培以下之插座，裝設於非住宅場所之下列
    規定處所：
    (一)公共浴室。
    (二)商業用廚房。
    (三)水槽外緣一‧八米範圍內。但符合下列規定之一者，其插座得免裝設
        漏電啟斷裝置：
        1.裝設於工業實驗室內，自插座受電之設備會因斷電而導致更大危險
          。
        2.裝設於醫療照護場所之一般診療區或緊要診療區之病床位置，且非
          浴室內之水槽。
    (四)有淋浴設備之更衣室。
    (五)室內潮濕場所。
    (六)陽台或室外。

      第五節  接地及搭接
第九十條
接地系統之接地及搭接方式依下列規定辦理：
一、系統接地：依適用處所採行下列接地方式，以抑制由雷擊、線路突波，或
    意外接觸較高電壓線路所引起之異常電壓，及穩定正常運轉時之對地電壓
    ：
    (一)內線系統接地：用戶用電線路屬於被接地導線之再行接地。
    (二)低壓電源系統接地：配電變壓器之二次側低壓線或中性線之接地。
    (三)設備與系統共同接地：內線系統接地與設備接地共用一條接地電極導
        線或同一接地電極。
二、設備接地：將用電設備或器具之非帶電金屬部分加以接地。
三、設備搭接：將用電設備或器具之非帶電金屬部分，或其他可能帶電之非帶
    電導電體或設備，連接至系統接地，建立有效接地故障電流路徑。
四、有效接地故障電流路徑：
    (一)對可能帶電之用電設備或器具、配線及其他導電體，建立低阻抗電路
        ，使過電流保護裝置或高阻抗接地系統之接地故障偵測器動作。
    (二)若用戶配線系統內任一點發生接地故障時，該有效接地故障電流路徑
        需能承載回流至電源之最大接地故障電流。
    (三)大地不視為有效接地故障電流路徑。

第九十一條
設備接地及搭接之連接依下列規定辦理：
一、設備接地導線、接地電極導線及搭接導線應以下列規定之一連接：
    (一)壓力接頭。
    (二)接地端子板或匯流排。
    (三)熱熔接方法。
    (四)其他具同等效果之方法。
二、不得僅以錫銲作為連接之方法。

第九十二條
接地之種類及其接地電阻值應符合表九二規定。

第九十三條
接地及搭接之導線線徑依下列規定辦理：
一、特種接地：變壓器接地電極導線應符合表九三～一規定。
二、第一種接地應採用五‧五平方毫米以上絕緣導線。
三、第二種接地：
    (一)變壓器容量超過二十千伏安之接地電極導線應採用二十二平方毫米以
        上絕緣導線。
    (二)變壓器容量二十千伏安以下之接地電極導線應採用八平方毫米以上絕
        緣導線。
四、第三種接地：
    (一)變比器二次側接地應選用三‧五平方毫米以上絕緣導線。
    (二)內線系統單獨接地之接地電極導線，或內線系統與設備共同接地之搭
        接導線，應符合表九三～一規定。
    (三)用電設備單獨接地或用電設備與內線系統共同接地之設備接地導線應
        符合表九三～二規定。

第九十四條
接地系統依下列規定施工：
一、內線系統接地之位置，應在受電箱、集中表箱或用戶總開關箱之電源側。
二、以多線式供電之用戶，其中性線應施行內線系統接地。
三、用戶自備電源變壓器二次側對地電壓超過一百五十伏特者，應採用設備與
    系統共同接地。
四、接地電極導線之一端應妥接於接地電極，另一端引至受電箱、集中表箱或
    用戶總開關箱任擇一處內之接地端子板或匯流排，再由該處引出搭接導線
    ，施行內線系統與設備共同接地。
五、電業三相四線多重接地系統供電地區，高壓供電用戶之低壓用電設備與內
    線系統共同接地時，其自備變壓器之低壓電源系統接地，不得與一次電源
    之中性線共同接地。
六、電業三相三線式非接地系統供電地區，用戶高壓用電設備非帶電金屬部分
    應加以接地。用戶變壓器之低壓電源系統接地應依第九款規定辦理。
七、接地電極導線、設備接地導線、搭接導線應採用銅導體，包括裸銅線、絕
    緣導線、電纜芯線或匯流排。個別絕緣或被覆之設備接地導線外觀，應為
    綠色或綠色加一條以上黃色條紋。
八、十四平方毫米以上絕緣導線或於由合格人員維修及管理監督場所裝設之多
    芯電纜芯線，在施工時於每一出線頭或可接近處以下列方法之一做永久識
    別者，得作為設備接地導線，且不再作為其他配線使用。
    (一)在露出部分之絕緣或被覆加上綠色條紋標識。
    (二)在露出部分之絕緣或被覆著上綠色。
    (三)在露出部分之絕緣或被覆以綠色之膠帶或自黏性標籤作記號。
九、低壓電源系統依下列原則接地：
    (一)電源系統若經接地後，其對地電壓不超過一百五十伏特者，除第九十
        五條另有規定外，應加以接地。
    (二)電源系統若經接地後，其對地電壓不超過三百伏特者，除本規則另有
        規定外應加以接地。
    (三)電源系統若經接地後，其對地電壓超過三百伏特者，不得接地。
    (四)電源系統供電給電力用電，電壓在一百五十伏特以上，且在六百伏特
        以下而不加接地者，應加裝接地檢示器。
十、下列規定之低壓用電器具或配線應加以接地：
    (一)低壓電動機之外殼。
    (二)金屬導線管及其連接之金屬封閉箱體。
    (三)非金屬導線管連接之金屬配件，用於對地電壓超過一百五十伏特之配
        線，或配置於金屬建築物上或人員可觸及之潮濕場所者。
    (四)電纜之金屬被覆。
    (五)X 光設備及其鄰近金屬部分。
    (六)對地電壓超過一百五十伏特之固定式用電器具。
    (七)對地電壓一百五十伏特以下之插座或位於潮濕場所之固定式用電器具
        。
    (八)對地電壓超過一百五十伏特之移動式用電器具。但其外殼具有絕緣保
        護，使人員不可觸及帶電部分者，不在此限。
    (九)金屬地板或金屬封閉箱體內之非帶電露出金屬部分，或對地電壓一百
        五十伏特以下之移動式用電器具，用於潮濕場所者。

第九十五條
五十伏特以上，低於六百伏特之交流電源系統，符合下列情形之一者，得免接
地：
一、專用於供電給熔解、提煉、回火或類似用途之工業電爐。
二、獨立電源供電系統僅供電給可調速工業驅動裝置之整流器。
三、由變壓器所供電之獨立電源供電系統，其一次側額定電壓低於六百伏特，
    且符合下列規定者：
    (一)該系統專用於控制電路。
    (二)由合格人員維修及管理監督。
    (三)連續性之控制電源。
四、存在可燃性粉塵之危險場所運轉之電動起重機。
非接地系統電源處，或系統第一個隔離設備處應有標明非接地系統之耐久且明
顯標識。

第九十六條
固定式用電設備或器具之非帶電金屬部分施行設備接地，應符合下列規定之一
：
一、在導線管內或電纜內附加或內含一條設備接地導線與電路導線共同配裝，
    以供接地。該設備接地導線之絕緣或被覆，應為綠色或綠色加一條以上黃
    色條紋。
二、個別裝設設備接地導線。
三、固定式用電器具牢固裝設於接地之建築物金屬構架上，且金屬構架之接地
    電阻符合本規則相關規定，並保持良好之接觸。
移動式用電器具施行設備接地應符合下列規定之一：
一、採用接地型插座，且該插座之固定接地極有接地。
二、用電器具之引接線內含一條設備接地導線其一端接於接地插頭之接地極，
    另一端接於用電器具之非帶電金屬部分。

第九十七條
下列規定之金屬部分應連接至設備接地導線：
一、電動起重機及吊車之框架及軌道。
二、有附掛電力及控制導線之非電動升降機車廂框架。
三、電動升降機之手動操作金屬移動纜繩或纜線。

第九十八條
建築物應有下列規定之一種以上接地電極。地下金屬瓦斯管線系統及鋁材料不
得作為接地電極。
一、建築物之金屬構架以下列方法之一連接至大地：
    (一)一個以上之金屬構架有三米以上直接接觸大地，或包覆在直接接觸大
        地之混凝土中。
    (二)以基礎螺栓牢固之結構鋼筋，該鋼筋連接至基樁或基礎之混凝土包覆
        電極且以熔接、熱熔接、一般鋼製紮線或具同等效果之方法連接至混
        凝土包覆電極。
二、符合下列規定之混凝土包覆電極。建築物有多根混凝土包覆電極者，得僅
    搭接一根至接地電極系統。
    (一)長度六米以上之二十二平方毫米以上裸銅線，或直徑十三毫米以上鍍
        鋅或其他導電材料塗布之裸露鋼筋，或多段鋼筋以一般鋼製紮線、熱
        熔接、熔接或其他有效方法連接。
    (二)前目規定金屬部分以厚度五十毫米以上混凝土包覆，水平或垂直放置
        於直接接觸大地之混凝土基礎或基樁中。
三、直接接觸大地，環繞建築物之接地環，由長度六米以上、線徑大於三十八
    平方毫米之裸銅線組成。
四、棒狀或管狀接地電極由下列規定之一組成且長度二‧四米以上：
    (一)導管或管狀接地電極之外徑為十九毫米以上。
    (二)鋼心包銅之棒狀接地電極直徑為十五毫米以上。
五、板狀接地電極由下列規定之一組成，且任一面與土壤接觸面積達○‧一八
    六平方米以上：
    (一)裸鐵板、裸鋼板或導電塗布之鐵板或鋼板厚度六‧四毫米以上。
    (二)銅板厚度一‧五毫米以上。

第九十九條
每棟建築物有前條規定之接地電極者，應將所有接地電極搭接形成接地電極系
統。但既有建築物之混凝土包覆電極，非經破壞其混凝土無法連接至其鋼筋或
鋼筋棒者，得免成為接地電極系統之一部分。
既有建築物無前條規定之接地電極者，應加裝一個以上前條第四款或第五款規
定之接地電極。

第一百條
交流供電系統連接至建築物內之接地電極時，該接地電極應作為建築物內封閉
箱體及設備之接地電極。
供電給建築物之多條個別進屋線、幹線或分路須連接至接地電極者，應採用共
同之接地電極。
被有效搭接之二個以上接地電極，視為一個單一接地電極系統。

第一百零一條
接地電極系統之裝設依下列規定辦理：
一、棒狀、管狀或板狀接地電極：
    (一)接地電極以埋在恆濕層以下為原則不得有油漆或琺瑯質塗料等不導電
        之塗布。
    (二)接地電極之接地電阻超過表九二規定者，應增加接地電極。
    (三)設置多個接地電極者，電極間應距離一‧八米以上。
二、不同接地電極系統之距離：
    (一)採用一個以上棒狀、管狀或板狀接地電極形成接地電極系統者，其每
        個接地電極包括作為雷擊終端裝置之接地電極，與另一接地電極系統
        任一接地電極之距離不得小於一‧八米。
    (二)二個以上接地電極搭接視為單一接地電極系統。
三、連接接地電極以形成接地電極系統之搭接導線，其線徑應符合表九三～一
    規定，並依第一百零二條規定裝設，及依第一百零三條規定方法連接。
四、接地環及板狀接地電極埋設於施工地面下深度應超過七百五十毫米。
五、埋設棒狀或管狀接地電極者，與土壤接觸長度應為二‧四米以上，並垂直
    釘沒於施工地面下一米以上。底部碰到岩石者，接地電極下鑽斜角不得超
    過垂直四十五度；斜角超過四十五度者，接地電極埋設於施工地面下深度
    應為一‧五米以上。
六、特種接地及第二種接地裝設於人員可輕易觸及之場所者，自地面下○‧六
    米起至地面上一‧八米範圍，應以絕緣管或板掩蔽。
七、特種接地及第二種接地沿鐵塔或鐵柱等金屬物體裝設者，應依前款規定加
    以掩蔽，其接地電極導線應與金屬物體絕緣，且接地電極埋設位置應距離
    金屬物體一米以上。
八、第一種接地及第三種接地之埋設應避免遭受外力損傷。

第一百零二條
建築物或獨立電源供電系統之接地電極導線裝設依下列規定辦理：
一、固定及保護：
    (一)暴露裝設者，接地電極導線或其封閉箱體應牢固裝設於其敷設面或裝
        設面。
    (二)二十二平方毫米以上接地電極導線暴露於可能遭受外力損傷之處者，
        應加以防護。
    (三)十四平方毫米以下之接地電極導線應採用金屬導線管、非金屬導線管
        或金屬被覆電纜配線。
二、接地電極導線不得裝設開關及保護設備；其應為無接續或無分接之連續導
    線。但符合下列規定之一者，得予接續或分接：
    (一)採用得作為接地及搭接之壓力接頭，或採用熱熔接方式處理之接續或
        分接。
    (二)分段匯流排得連接成為一個接地電極導體。
    (三)建築物之金屬構架以螺栓、鉚釘或銲接連接。
三、接地電極導線及其分接導線之線徑應符合表九三～一規定，裝設應依下列
    規定辦理：
    (一)有其他電極以搭接導線連接者，接地電極導線得接至接地電極系統中
        方便連接之接地電極。
    (二)接地電極導線得分別連接至一個以上之接地電極。
    (三)分接導線應以下列規定之一連接至接地電極導線：
        1.壓力接頭。
        2.熱熔接方法。
        3.連接至五毫米乘六十毫米以上之銅匯流排，且匯流排固定於可觸及
          處。

第一百零三條
接地電極導線或搭接導線與接地電極之連接依下列規定辦理：
一、連接應採用熱熔接、壓力接頭、線夾或具同等效果之方法，不得採用錫銲
    連接。
二、接地線夾應為適用於接地電極與接地電極導線之連接者。
三、連接至管狀、棒狀或其他埋設之接地電極時，應為可直接埋入土壤或以混
    凝土包覆者。
四、二條以上導線不得以單一線夾或配件連接多條導線至接地電極。
五、採用配件連接者，應以下列規定之一連接：
    (一)管配件、管插頭或具同等效果之配件。
    (二)青銅、黃銅、純鐵或鍛造鐵之螺栓線夾。

第一百零四條
搭接其他封閉箱體依下列規定辦理：
一、電氣連續性：金屬管槽、電纜之鎧裝或被覆、封閉箱體、框架、配件或其
    他非帶電金屬部分，不論有無附加設備接地導線，皆應加以搭接，以保持
    電氣連續性。螺牙、接觸點及接觸面之不導電塗料、琺瑯或類似塗裝，應
    加以清除。
二、隔離接地電路：為減少接地電路電磁雜訊干擾，由分路供電之設備封閉箱
    體得與該分路之管槽隔離，且其隔離方式採用非金屬管槽配件，附裝於管
    槽及設備封閉箱體之連接處，金屬管槽內附加一條設備接地導線，供設備
    封閉箱體接地。

      第六節  低壓突波保護裝置
第一百零五條
六百伏特以下用戶配線系統若有裝設突波保護裝置（ SPD）者，應依本節規定
辦理。

第一百零六條
突波保護裝置不得裝設於下列規定之情況：
一、超過六百伏特之電路。
二、非接地系統或阻抗接地系統。但經設計者確認適用於該等系統者，不在此
    限。
三、突波保護裝置額定電壓低於其裝設位置之最大相對地電壓。

第一百零七條
突波保護裝置裝設於電路者，應連接至每條非接地導線。
突波保護裝置得連接於非接地導線與任一條被接地導線、設備接地導線或接地
電極導線間。
突波保護裝置應有標明其額定短路電流之標識，且不得裝設於系統故障電流大
於其額定短路電流之處。

第一百零八條
突波保護裝置裝設於電源系統端者，應連接至用戶總開關或隔離設備之電源側
，其接地端連接位置應為下列規定之一：
一、被接地進屋線。
二、接地電極導線。
三、接地電極。
四、進屋線端用電設備之設備接地端子。

第一百零九條
突波保護裝置裝設於幹線端者，依下列規定辦理：
一、由進屋線所供電之建築物，應連接於用戶總開關或隔離設備過電流保護裝
    置之負載側。
二、由幹線所供電之建築物，應連接於建築物第一個過電流保護裝置之負載側
    。
三、獨立電源供電系統應連接至系統第一個過電流保護裝置之負載側。

第一百十條
突波保護裝置得裝設於保護設備之分路過電流保護裝置負載側。

    第三章  一般器具及設備
      第一節  低壓開關
第一百十一條
運轉電壓六百伏特以下開關、開關裝置及作為開關用斷路器之裝設，除本規則
另有規定者外，應依本節規定辦理。

第一百十二條
用戶總開關之裝設依下列規定辦理：
一、每一戶應設置用戶總開關，能同時啟斷進屋之各非接地導線，但用戶過電
    流保護裝置在三具以下者，得免設置用戶總開關。同一用戶在其用電範圍
    內有數棟房屋者，各棟應裝有隔離設備，以切斷該棟各非接地導線。
二、用戶總開關應採用不露出帶電部分之斷路器。
三、用戶總開關應裝設於最接近進屋點之可輕易到達處，其距離地面高度以一
    ‧五米至二米間為宜，且應在電度表之負載側。
四、用戶總開關應有標明啟斷位置或閉合位置之耐久且明顯標識。
五、多線式電路之用戶總開關無法同時啟斷被接地導線者，被接地導線應以壓
    接端子固定於中性線端子板或匯流排作為隔離之用。
一組接戶線供電給數戶用電時，總隔離開關及各戶之表後開關得裝設於同一開
關箱，或共裝於一處之個別開關箱。

第一百十三條
用戶總開關安培額定不得小於依第二章第二節規定計算所得之負載及下列規定
之額定值：
一、僅供電給一個分路者，其用戶總開關安培額定不得小於二十安培。
二、僅供電給單相二線式分路二路者，其用戶總開關安培額定不得小於三十安
    培。
三、進屋線為單相三線式，計算所得之負載大於十千瓦特，或分路在六路以上
    者，其用戶總開關安培額定不得小於五十安培。
四、前三款規定以外情形，用戶總開關安培額定不得小於三十安培。

第一百十四條
用戶總開關之接線端子應採用壓力接頭或線夾，或具同等效果之方法裝接，不
得以錫銲銲接。

第一百十五條
分路中被接地導線裝有開關或斷路器者，應與非接地導線同時啟斷。未裝開關
或斷路器者，該被接地導線應以壓接端子固定於中性線端子板或匯流排作為隔
離之用。

第一百十六條
開關或斷路器之連接依下列規定辦理：
一、三路及四路開關之配線應僅作為啟斷電路之非接地導線。以金屬管槽裝設
    者，開關與出線盒間之配線應符合第三百零一條第一款規定。
二、開關或斷路器不得啟斷電路之被接地導線。但開關或斷路器可同時啟斷全
    部導線者，不在此限。

第一百十七條
在隱蔽處所不得裝設開關、熔線及其他用電器具。
開關或斷路器應裝設於可外部操作封閉箱體內；其封閉箱體內應留存配線彎曲
空間。
開關或斷路器之封閉箱體應避免作為導線穿過或分接至其他開關或過電流保護
裝置之線盒或管槽。但該封閉箱體符合第一百三十九條規定者，不在此限。

第一百十八條
開關或斷路器裝設於濕氣場所或潮濕場所者，依下列規定辦理：
一、露出裝設之開關或斷路器應包封於耐候型封閉箱體或配電箱內。
二、嵌入裝設之開關或斷路器應裝設耐候型外蓋。
三、開關不得裝設於浴缸或淋浴空間內。但開關係組裝成浴缸或淋浴設備組件
    之一部分者，不在此限。

第一百十九條
開關之裝設及連接依下列規定辦理：
一、單投刀型開關之裝設方式不得使開啟之刀片因其本身之重量而自行閉合電
    路。
二、雙投刀型開關之裝設方式得使刀片之投切操作為垂直或水平方向。開關若
    為垂直方向操作者，當開關設定為啟斷狀態時，其整體機械結構應可使其
    刀片固定不動，保持在啟斷位置。
三、開關連接至具有逆送電力之電路或用電設備者，於開關封閉箱體上或於緊
    鄰開放式開關處應有標明負載側端子可能有逆送電源加壓中之耐久警告標
    識。

第一百二十條
開關及作為開關用斷路器之裝設依下列規定辦理：
一、附有突出柄或把手以供操作之斷路器，若其極數適合要求者，得作為開關
    使用。
二、所有開關應裝設於可輕易觸及且方便操作之處。操作開關如手捺開關，應
    儘量將數個集中一處。
三、開關裝設高度應使其操作最高位置距離地面或工作平台不超過二米。但符
    合下列規定之一者，不在此限：
    (一)附熔線開關及斷路器裝設於匯流排槽，且有可從地面操作開關之把手
        等裝置者，得與匯流排槽相同之高度。
    (二)可用操作桿操作之隔離開關得裝設在較高之高度。
四、一般型多極手捺開關不得由二個以上分路供電。

第一百二十一條
手捺開關之裝設依下列規定辦理：
一、手捺開關全部露出於敷設面者，應裝於厚度至少十三毫米之絕緣物上。
二、嵌入式手捺開關裝設在牆壁線盒時，線盒前緣與牆壁表面齊平。
三、嵌入式手捺開關若裝於不加接地之金屬開關盒內，且該處之敷設面能導電
    者，該開關之蓋板應採用不導電及耐熱者。

第一百二十二條
開關及斷路器應明確指示其啟斷位置或閉合位置。垂直裝設於配電盤或配電箱
內，其操作鍵向上時，應表示閉合位置。但有下列情形之一者，不在此限：
一、垂直之雙投開關操作把手得向上或向下者，皆表示閉合位置。
二、匯流排槽裝設分接開關者，其操作把手得向上或向下，表示啟斷位置或閉
    合位置。開關啟斷位置或閉合位置應有明顯標識，並於地面或操作點處可
    視及。
單切手捺開關之裝設應使電路啟斷或閉合時有明顯之標識。

第一百二十三條
裝設開關或斷路器之金屬封閉箱體，應依第二章第五節規定連接至設備接地導
線。
供裝設開關或斷路器之金屬封閉箱體作為進屋線端用電設備使用時，應依第二
章第五節規定搭接。
金屬管槽或金屬被覆電纜與非金屬封閉箱體配裝時，應保持其電氣連續性。

第一百二十四條
刀型開關之額定電壓及額定電流在二百五十伏特以下及一百五十安培以上，或
六百伏特以下及七十五安培以上者，應僅能作為隔離開關使用，不得在有負載
之下啟斷電路。

第一百二十五條
一般型手捺開關之裝設依下列規定辦理：
一、電阻性負載不得大於開關電壓範圍內之安培額定。
二、電動機及電感性負載，包括放電管燈，不得大於手捺開關安培額定百分之
    八十。
三、以手捺開關控制附插頭可撓軟線連接之用電器具者，每一手捺開關控制插
    座出線口或可撓軟線連接器之額定，不得小於分路過電流保護裝置最大容
    許安培額定。

      第二節  配電盤及配電箱
第一百二十六條
配電盤或配電箱之額定容量不得小於第二章第二節規定計算所得之最小幹線容
量，且應標明額定電壓、額定電流、相數、單線圖、製造及承裝廠商名稱。

第一百二十七條
配電盤或配電箱內匯流排及導線之裝設依下列規定辦理：
一、匯流排及導線應牢固裝設於配電盤或配電箱內之適當位置。
二、配電盤或配電箱內應配置中隔板，使未絕緣、未接地之匯流排或端子不致
    暴露，以免人員不經意碰觸。
三、匯流排及導線之配置應避免因感應作用造成過熱。
四、進屋線端之配電盤或配電箱，在盤上或箱內應裝設與表九三～一規定相同
    容量之接地端子板或匯流排，以供進屋線電源側被接地導線與配電盤或配
    電箱之構架搭接。所有配電盤或配電箱之結構應以符合表九三～二規定之
    設備接地導線搭接一起。
五、配電盤或配電箱內負載端子，包括被接地導線端子，及設備接地導線連接
    至接地端子板或匯流排之配置，其接線不得跨越或穿過無絕緣之非接地導
    線匯流排。
六、三相匯流排Ａ、Ｂ、Ｃ相之安排，面向配電盤或配電箱應由前到後，由頂
    到底，或由左到右排列。在三相四線△接線系統，Ｂ相應為對地電壓較高
    之一相。但供輸配電業裝設電度表之接線箱，其導線之接線相序不受限制
    。
七、配電盤或配電箱內裝設符合第九十五條規定之非接地系統者，現場應有標
    明非接地系統電路電壓為多少伏特之耐久且明顯標識。

第一百二十八條
配電盤或配電箱之現場標識依下列規定辦理：
一、電路標識：
    (一)每一電路應有標明其確實用途之耐久且明顯標識。
    (二)備用之過電流保護裝置或開關應有標明備用之標識。
    (三)配電盤或配電箱內應配置單線圖或結線圖，並在每一開關或斷路器處
        標明負載名稱及分路編號。
二、配電盤或配電箱應有標明電源回路名稱之明顯標識。

第一百二十九條
配電盤或配電箱之位置裝設依下列規定辦理：
一、有任何帶電部分露出之配電盤或配電箱，應裝設於永久乾燥場所，並應受
    到充分之監控，且僅合格人員可觸及。
二、配電盤或配電箱若裝設於潮濕場所或室外，應屬防水型者。
三、配電盤或配電箱之裝設位置不得接近易燃物。
四、配電盤或配電箱因操作及維護需接近之部分，應依表八規定留有工作空間
    。
五、管槽從底部進入配電盤或類似封閉箱體，使導線於匯流排、其支撐或其他
    阻礙物下方進出箱體時，其配線空間不得小於表一二九規定。管槽包含其
    終端配件，不得超出箱體底部七十五毫米。

第一百三十條
配電盤頂部有開孔未完全封閉者，與可燃材質天花板間應保持○‧九米以上之
間隔，或在配電盤與天花板之間另設置不可燃之遮蔽物。

第一百三十一條
配電盤或配電箱未裝設開關或斷路器之開口應以盲蓋封閉。

第一百三十二條
配電盤或配電箱之接地依下列規定辦理：
一、配電盤框架及支撐固定開關設備之構架應加以接地。
二、配置於配電盤上之計器、儀表、電驛及變比器依下列規定接地：
    (一)變比器一次側接自對地電壓超過三百伏特以上線路時，其二次側回路
        應加以接地。
    (二)變比器之二次側依前目規定接地時，其電路與計器、儀表、電驛及變
        比器外殼之設備接地導線線徑應為三‧五平方毫米以上。
    (三)非合格人員可接近之變比器外殼或框架應加以接地。
    (四)運轉電壓小於一千伏特之計器、儀表及電驛：
        1.未裝設於配電盤上，對地電壓三百伏特以上之繞組或工作組件，且
          非合格人員可觸及者，其外殼及其他暴露之金屬部分應連接至設備
          接地導線。
        2.裝設於配電盤面板上，不論接於變比器或直接接於供電回路，其非
          帶電金屬外殼應加以接地。
    (五)計器、儀表及電驛之電流引接端子對地電壓超過一千伏特，以增加高
        度隔離或以適用之柵網、被接地之金屬或絕緣蓋板保護者，其外殼得
        免接地。
    (六)計器、儀表、電驛及變比器之外殼直接裝設於被接地封閉箱體之金屬
        表面或被接地金屬開關盤面板者，視為已被接地。
三、配電盤或配電箱之框架或箱體以金屬製成者，應連結牢固，並加以接地。
    配電盤或配電箱配裝非金屬管路或電纜時，供作設備接地導線連接之接地
    端子板或匯流排，應牢固裝設於箱體內。接地端子板或匯流排應與金屬箱
    體及框架連接，或與該配電盤或配電箱電源之設備接地導線連接。
四、每一條被接地導線應分別接至配電盤或配電箱內被接地導線端子板或匯流
    排之個別端子，不得多條被接地導線併接一個端子。

第一百三十三條
配電箱之過電流保護依下列規定辦理：
一、配電箱應有過電流保護裝置加以保護，且其保護裝置安培額定不得大於配
    電箱之額定容量。但符合下列規定之一者，不在此限：
    (一)進屋線端之配電箱裝設三個以下隔離設備者，得免裝設主過電流保護
        裝置。
    (二)配電箱之電源幹線過電流保護裝置安培額定，不大於該配電箱之額定
        容量者，該配電箱得免裝設主過電流保護裝置。惟未裝設主過電流保
        護裝置之配電箱，其分路過電流保護裝置不得超過四十二極。
二、配電箱之分路過電流保護裝置採用三十安培以下之附熔線手捺開關者，應
    裝設二百安培以下之主過電流保護裝置。
三、配電箱內任一過電流保護裝置裝接之負載在正常狀態下將連續滿載三小時
    以上者，該負載電流不得大於其過電流保護裝置安培額定百分之八十。

第一百三十四條
配電盤或配電箱內任何型式之熔線，應裝設於開關之負載側。

第一百三十五條
配電盤或配電箱之裝設依下列規定辦理：
一、配電盤或配電箱應由不燃性材質所製成。
二、箱體若採用鋼板者，其厚度應在一‧六毫米以上；若採用不燃性之非金屬
    板者，應具有相當於前段規定之鋼板強度。
三、匯流排若能牢固架設者，得用裸導體製成。
四、儀表、指示燈、比壓器或其他附有電壓線圈之用電設備，應由另一安培額
    定為十五安培以下過電流保護裝置之電路供電。但此等用電設備因該過電
    流保護裝置動作而可能產生危險者，該電路之過電流保護裝置安培額定得
    大於十五安培。
五、裸露之金屬部分及匯流排等，其異極間之間隔應符合表一三五規定。但斷
    路器、開關及其他類似組件異極間之間隔，不在此限。

第一百三十六條
配電盤或配電箱之封閉箱體應留設上部及底部之配線彎曲空間，作為最大導線
穿入或引出封閉箱體之用。側邊亦應留設配線彎曲空間作為最大導線終端接入
封閉箱體之用。

第一百三十七條
配電箱露出裝設於濕氣場所或潮濕場所者，應防止濕氣或水份滲入或聚積於箱
體內，且箱體與牆面或其他固定表面間，應保持六毫米以上之間隔。但非金屬
箱體裝設於混凝土、石造結構、瓷磚或類似表面者，得免留間隔。
配電箱裝設於潮濕場所者，應為耐候型。管槽或電纜進入其內部之帶電部分上
方時，應採用適用於潮濕場所之配件。

第一百三十八條
導線進入配電箱或電度表插座箱應加以保護，以免遭受磨損，其裝設依下列規
定辦理：
一、導線進入箱體之開口空隙應加以封閉。
二、採用吊線支撐配線方法者，導線進入配電箱應以絕緣護套保護。
三、採電纜配線者，電纜進入配電箱之開口處應以絕緣護套保護及固定。
四、符合下列規定者，電纜得穿入管槽進入露出型箱體頂部：
    (一)每條電纜於管槽終端三百毫米範圍內有固定。
    (二)管槽每一終端裝有配件保護電纜不致遭受磨損，且該配件於裝設後位
        於可觸及處。
    (三)管槽終端有密封或填塞，以防外物經管槽進入箱體。
    (四)管槽終端有固定。
    (五)電纜穿入管槽之截面積總和不超過表三二八～八導線管截面積之容許
        百分比。

第一百三十九條
內含開關或過電流保護裝置之封閉箱體內，供導線穿過、接續或分接至其他箱
體之配線空間應符合下列規定：
一、封閉箱體內所有導線在配線空間所占截面積總和，不超過配線空間截面積
    百分之四十。
二、封閉箱體內所有導線含接續組件及分接頭在配線空間所占截面積總和，不
    超過配線空間截面積百分之七十五。
三、封閉箱體上有標識，以識別穿過該封閉箱體導線上游最接近箱體之隔離設
    備。

第一百四十條
配電箱內應有符合下列規定之空間，以供導線配置，及配電裝置金屬部分與箱
內其他組件保持間隔：
一、配電裝置基座與金屬箱壁間保持一‧六毫米以上之間隔。
二、任何帶電金屬部分與箱門間保持二十五毫米以上之間隔。但箱門之襯墊為
    絕緣材質者，其間隔得縮減至十二‧五毫米。
三、箱壁、箱背、配線槽金屬隔板或箱門，與箱內配電裝置暴露帶電部分最接
    近之間隔：
    (一)配電裝置電壓為二百五十伏特以下者，保持十二‧五毫米以上之間隔
        。
    (二)配電裝置電壓超過二百五十伏特至六百伏特者，保持二十五毫米以上
        之間隔。但箱門之襯墊為絕緣材質者，其間隔得縮減至十二‧五毫米
        。

      第三節  照明燈具
第一百四十一條
一般用電場所或臨時用電場所之固定式與可攜式照明燈具之配線及保護，應依
本節規定辦理。

第一百四十二條
照明燈具、燈座、燈泡及燈管不得露出帶電部分。但陶瓷型燈座裝設於距離地
面高度二‧五米以上者，不在此限。

第一百四十三條
衣櫥內之照明燈具應僅能採用具有完全密封型光源之 LED  照明燈具，或吸頂
式或嵌入式之螢光燈具。
吊燈或燈座不得裝設於衣櫥內。

第一百四十四條
裝設於可燃物附近之照明燈具應有防護裝置，使可燃物遭受之溫度不超過攝氏
九十度。

第一百四十五條
展示窗內之照明燈具不得裝用外部配線之型式。

第一百四十六條
照明燈具裝設於可燃物上方者，應採用無開關型之燈座。但每個燈具設有個別
開關，且其燈座裝設於距離地面高度二‧五米以上或裝有防護設施，使燈泡不
容易被取下或損壞者，不在此限。

第一百四十七條
照明燈具螺旋燈座之被接地導線應確實連接至螺旋套筒上。

第一百四十八條
照明燈具之配線應採用適用於所裝設環境條件、電流、電壓及溫度之絕緣導線
。

第一百四十九條
燈具線及分接導線僅得連接至其供電之分路，不得作為分路之導線使用。
前項分接導線之容許安培容量應依表三六八規定，運轉溫度不得超過其絕緣物
最高容許溫度。

第一百五十條
照明燈具電源導線之裝設及絕緣保護依下列規定辦理：
一、導線應加以固定，並使其絕緣不致遭受割傷或磨損。
二、導線通過金屬物體時，應有保護使其絕緣不致遭受磨損。
三、在燈具支架或吊桿內，導線不得接續或分接。
四、裝設燈具應避免非必要之導線接續或分接。
五、燈具之燈串及其可移動或可撓部分之配線，應採用絞線。
六、導線之配置不得使燈具重量或可移動部分對導線產生張力。

第一百五十一條
移動式單具展示櫃得採用可撓軟線連接至永久性裝設之插座。
六具以下之組合展示櫃間，得以可撓軟線及可分離之閉鎖型連接器互連，並由
其中一具展示櫃以可撓軟線連接至永久性裝設之插座。
前二項以可撓軟線連接至永久性裝設之插座應符合下列規定：
一、可撓軟線截面積不小於分路導線線徑，且其安培容量至少等於分路過電流
    保護裝置安培額定，並內含一條設備接地導線。
二、插座、接頭及附接插頭為接地型，且額定為十五安培或二十安培。
三、可撓軟線牢固裝設於展示櫃下方，並符合下列規定：
    (一)導線不致暴露遭受外力損傷。
    (二)展示櫃間之間隔不超過五十毫米，且第一個展示櫃與其電源插座之間
        隔不超過三百毫米。
    (三)組合展示櫃末端引出線不再向外延伸供其他展示櫃或設備連接。
四、展示櫃無引接供電給其他用電器具。
五、展示櫃以可撓軟線連接者，其每一放電管燈安定器之二次電路僅能連接於
    該展示櫃。

第一百五十二條
以可撓軟線連接之燈座及照明燈具裝設依下列規定辦理：
一、燈座：
    (一)金屬燈座入口應裝設絕緣護套。
    (二)燈座入口之線孔大小應適合可撓軟線線徑，且表面應為平滑狀。
    (三)護套孔直徑為七毫米者，得裝設於普通垂吊用可撓軟線；直徑為十一
        毫米者，得裝設於加強型可撓軟線。
二、放電管燈及 LED  燈符合下列規定者，得以可撓軟線連接：
    (一)燈具設置在出線盒或匯流排槽之正下方。
    (二)連接之可撓軟線皆為可視及，且不致遭受應力或外力損傷。
    (三)可撓軟線終端接於接地型附接插頭或匯流排槽插頭，或廠製連接接頭
        ，或具有應力釋放裝置之燈具組件及燈罩。
三、大型螺旋燈座之放電管燈得以可撓軟線連接於五十安培以下之分路。其插
    座及附接插頭之額定得小於分路額定惟不小於燈具滿載電流一‧二五倍。
四、凸緣型表面開口（flanged surface inlet） 之放電管燈得由具連接器之
    懸吊式可撓軟線連接供電。

第一百五十三條
幹線及分路距離安定器、LED 驅動元件、電源供應器或變壓器在七十五毫米以
內者，其導線絕緣溫度額定不得小於攝氏九十度。但照明燈具製造廠家說明書
指示另有適合之絕緣溫度者，從其指示辦理。
嵌入式照明燈具電源導線之絕緣應採用能承受燈具運轉溫度者。分路之導線絕
緣能承受燈具運轉溫度者，得連接至該燈具之接線端。

第一百五十四條
照明燈具之支撐依下列規定辦理：
一、燈具及燈座應牢固於裝設位置。燈具重量超過三公斤或尺寸超過四百毫米
    者，不得利用燈座支撐。
二、以金屬或非金屬燈桿支撐燈具，且當作電源導線之管槽者：
    (一)燈桿或燈桿基座應有面積為五十毫米乘以一百毫米以上之手孔及防雨
        罩，以供燈桿或燈桿基座內導線作終端處理。
    (二)金屬燈桿應具有接地端子。
    (三)金屬管槽應加以接地。
    (四)垂直燈桿作為管槽用者，導線穿在燈桿之支撐應依第三百條規定辦理
        。

第一百五十五條
照明燈具之支撐設施依下列規定辦理：
一、支撐燈具之懸吊式天花板系統結構框架應互相固定，並以適當間隔牢固裝
    設於建築物結構上。
二、燈具之固定螺栓應採用鋼、可鍛鐵或其他適用材質。
三、支撐燈具之管槽配件應能支撐整組照明燈具之重量。
四、出線盒作為燈具之支撐者，應符合第三百十八條規定。

第一百五十六條
照明燈具裝設於特殊之場所或區域者，依下列規定辦理：
一、潮濕場所或濕氣場所：燈具應為適用於潮濕場所或濕氣場所者，且不得讓
    水氣滲入或聚積於線盒、燈座或其他電氣部位。
二、腐蝕性場所：燈具應為適用於腐蝕性場所者。
三、商業用烹調場所：符合下列規定者，燈具得裝設於烹調抽油煙機煙罩內：
    (一)燈具為適用於商業用烹調抽油煙機，且不超過其使用材質之溫度極限
        。
    (二)燈具構造能使烹調時排出之所有揮發氣、蒸氣、油脂或油狀物不會進
        入燈具及配線盒，且其散光罩能承受熱衝擊。
    (三)暴露於抽油煙機煙罩範圍內之燈具配件具耐腐蝕性或有防腐蝕保護，
        表面為平滑且易清潔者。
    (四)燈具之配線未暴露於抽油煙機煙罩範圍內。
四、浴缸及淋浴區域：
    (一)可撓軟線連接之燈具、以鏈條或電纜懸吊之燈具、燈用軌道、懸吊式
        燈具或風扇，不得位於浴缸外緣水平距離九百毫米及自浴缸外緣頂部
        或淋浴間門檻垂直距離二‧五米範圍內。
    (二)位於前目規定範圍以外之燈具，若容易遭受淋浴水沫噴濺者，應為適
        用於潮濕場所者；其餘應為適用於濕氣場所者。

      第四節  放電管燈
第一百五十七條
開路電壓一千伏特以下放電管燈系統之裝設依下列規定辦理：
一、二次側開路電壓三百伏特以上之放電管燈，除特殊設計使燈管插入或取出
    時不露出帶電部分外，不得裝設於住宅場所。
二、附屬變壓器不得採用油浸型。
三、高強度放電管燈（HID 燈）：
    (一)嵌入式高強度放電管燈應配裝積熱保護。但符合下列規定之一者，不
        在此限：
        1.該燈具之構造及積熱特性，等同於有積熱保護。
        2.該燈具為適合裝設於澆灌之混凝土者。
    (二)放電管燈之遠端嵌入式安定器應具有與安定器整合之積熱保護。
    (三)除採用厚玻璃拋物線型反射燈泡者外，金屬鹵素燈泡之放電管燈應裝
        有隔板包封燈泡，或採用有外力防護裝置之燈泡。
四、隔離設備：
    (一)使用雙終端燈泡或燈管，且內含安定器之螢光放電管燈，裝設於住宅
        場所及其附屬構造物以外之室內場所者，應在每一燈具內部或外部裝
        設隔離設備。但符合下列規定之一者，從其規定：
        1.放電管燈裝設於第四百六十四條第一項規定之危險場所，得免裝設
          隔離設備。
        2.放電管燈供緊急照明用者，得免裝設隔離設備。
        3.放電管燈由附插頭可撓軟線連接，有可觸及之插頭及插座或個別接
          頭者，得以其作為隔離設備。
         4.多具放電管燈非由多線式分路供電，並已裝有隔離設備能使照明
           空間不會造成全黑狀況者，得免在每一燈具裝設隔離設備。
    (二)放電管燈連接於多線式分路時，其隔離設備應能同時啟斷所有連接至
        安定器之電源導線，包括被接地導線。
    (三)隔離設備應裝設於合格人員可觸及處。若隔離設備不在放電管燈內，
        該隔離設備應為單一配電裝置，並附裝於放電管燈上，或放電管燈應
        位於隔離設備處可視及範圍內。

第一百五十八條
放電管燈之裝設依下列規定辦理：
一、放電管燈暴露之安定器、變壓器 LED  驅動器或電源供應器，不得與可燃
    性材質接觸。
二、附有安定器、變壓器、LED 驅動器或電源供應器之放電管燈裝設於可燃性
    低密度纖維板平面時，其燈具應為適用於該纖維板者，或距離該纖維板表
    面三十八毫米以上。

第一百五十九條
直流電路之放電管燈應配裝專為直流運轉而設計之輔助設備及電阻器，且該燈
具應有標明供直流用之標識。

第一百六十條
非與放電管燈整體組裝之用電器具裝設依下列規定辦理：
一、放電管燈之輔助設備含電抗器、電容器、電阻器等，若與放電管燈分開裝
    設時，該輔助設備應裝設於可觸及之金屬箱體內。
二、安定器、變壓器、LED 驅動器或電源供應器若經設計者確認為可直接連接
    至用戶配線系統者，得免另加封裝。

第一百六十一條
自耦變壓器用於提升電壓至三百伏特以上，且作為放電管燈安定器之一部分者
，應由被接地之電源系統供電。

第一百六十二條
開路電壓超過一千伏特之放電管燈系統不得裝設於住宅場所；其放電管燈之端
子應視為帶電部分。

第一百六十三條
開路電壓超過一千伏特放電管燈系統之變壓器裝設依下列規定辦理：
一、變壓器應加以包封。
二、在任何負載狀況下，變壓器二次側電路電壓不得超過標稱電壓十五千伏特
    其輸出端子對地電壓不得超過七千五百伏特。
三、變壓器開路電壓超過七千五百伏特者，其二次側短路電流不得大於一百五
    十毫安培。變壓器開路電壓七千五百伏特以下者，其二次側短路電流不得
    大於三百毫安培。
四、變壓器二次側電路輸出不得並聯或串聯連接。

第一百六十四條
開路電壓超過一千伏特放電管燈系統之變壓器位置裝設依下列規定辦理：
一、變壓器應裝設於可檢視且不易碰觸之處。
二、變壓器與燈管之距離應儘量縮短。
三、變壓器裝設位置應使鄰近之可燃物所承受溫度不超過攝氏九十度。

第一百六十五條
開路電壓超過一千伏特放電管燈系統二次側電路之裝設依下列規定辦理：
一、配線應採用金屬導線管或金屬被覆電纜。
二、導線應採用有絕緣者。霓虹燈若懸吊於距離地面高度二‧五米以上或裝設
    於櫥窗內，且其管極間距離不超過五百毫米者，管極間導線得採用裸銅線
    並以玻璃管包裝之。
三、導線應避免過分曲折，以免損傷導線之絕緣。
四、以金屬導線管配裝單芯導線者，其長度不得超過六米。

第一百六十六條
開路電壓超過一千伏特放電管燈系統之燈管裝設依下列規定辦理：
一、燈管應有能承載其重量之支撐。
二、更換燈管時須移除燈具組件者，應有絞鏈或支撐物繫住燈具組件。
三、燈管或燈座設計應使燈管插接或移除時，無暴露之帶電部分。

第一百六十七條
開路電壓超過一千伏特放電管燈系統之控制依下列規定辦理：
一、放電管燈應由外部操作之開關或斷路器控制單具或多具燈管方式，啟斷所
    有一次側非接地導線。
二、開關或斷路器應裝設於放電管燈處可視及範圍內，或配裝附有啟斷位置可
    上鎖之固定式裝置。

      第五節  屋外照明
第一百六十八條
屋外照明之配線依下列規定辦理：
一、配線應儘量避免與電業供電線路、電信線路跨越交叉。
二、裝設於電桿、鐵塔、水泥壁者，應採用導線管或電纜配線。
三、距離地面高度應保持五米以上。但在不妨礙交通或無危險之處，得裝設於
    距離地面高度三米以上。
四、不得採用懸吊式線盒及可撓軟線，燈頭應採用瓷質防水或其他相同功能者
    燈頭朝上裝設者，應有遮雨防水燈罩或採用特殊防水燈具。
五、在易遭受外力損傷之處，以採用金屬導線管配線為原則。
六、屋外照明應依第二章第二節規定設置專用分路，並裝設過電流保護裝置。

第一百六十九條
位於建築物外之屋外照明應採用有絕緣之導線。除 MI 電纜外，該導線應為熱
固型或熱塑型者；其位於潮濕場所者，應具有防濕氣滲透之金屬被覆或適用於
潮濕場所者。

第一百七十條
以支桿作為屋外照明幹線或分路之最終跨距支撐者，應具足夠強度，或由斜撐
或支線支撐，以安全承受架空引下線之張力。

第一百七十一條
屋外照明配線之最小導線線徑及支撐依下列規定辦理：
一、架空導線：
    (一)架空跨距十五米以下，導線線徑不得小於五‧五平方毫米。
    (二)架空跨距超過十五米至五十米，導線線徑不得小於八平方毫米。
    (三)架空跨距超過五十米，導線線徑不得小於十四平方毫米。
    (四)附有吊線裝置時，兩支撐點距離不限制，得採用三‧五平方毫米以上
        之絕緣導線。
    (五)吊線兩端支撐點應加裝拉線礙子。
二、節慶彩燈照明：
    (一)除採用吊線支撐外，用於燈串照明之導線線徑不得小於三‧五平方毫
        米。
    (二)架空跨距超過十二米時，導線應由吊線支撐。
    (三)吊線應由拉線礙子支撐。
    (四)導線或吊線不得附掛於火災逃生門、落水管或給排水管路。

第一百七十二條
屋外照明採用多芯電纜配線，並以架空方式跨越者，其距離地面高度應符合下
列規定：
一、電纜對地電壓一百五十伏特以下，跨越行人可到達之地面及人行道：三米
    以上。
二、電纜對地電壓三百伏特以下，跨越住宅區及其車道，或卡車不得通行之商
    業區：三‧七米以上。
三、電纜對地電壓超過三百伏特，跨越住宅區及其車道，或卡車不得通行之商
    業區：四‧五米以上。
四、電纜跨越非住宅區巷道、道路、卡車停車區域、農地、牧場、森林或果園
    之車道，或有車輛通行之其他區域：五‧五米以上。

第一百七十三條
屋外照明燈具對地電壓不得超過一百五十伏特。但裝設於下列場所者，得為三
百伏特以下：
一、燈具裝設於建築物外、電桿或鐵塔上距離地面高度二‧五米以上。為非螺
    紋型燈座或維修時不露出帶電部分者不受前段高度規定限制。
二、燈具裝設於距離門窗、陽台或安全門梯九百毫米以上。
三、供公眾使用之路燈裝設於人行道距離地面高度三‧五米以上，或裝設於車
    輛通行道距離地面高度四米以上。

第一百七十四條
屋外照明之導線裝設於建築物、電桿或鐵塔上，應依第六十九條規定加以防護
，以免遭受外力損傷。

第一百七十五條
屋外照明裝設於建築物外側之管槽應設計可排水，且適用於潮濕場所。
導線管垂直裝設時，其管口應裝設防水分線頭，以防水氣滲入。

第一百七十六條
屋外照明之導線管自地下用戶配線系統引入建築物時，應依第三百零三條第七
款規定加以密封。

      第六節  用電器具
第一百七十七條
住宅場所或其他場所內用電器具之配線及保護，應依本節規定辦理。

第一百七十八條
用電器具不得露出帶電部分。但電爐之電熱線及其他類似情形，不在此限。

第一百七十九條
用電器具分路額定決定依下列規定辦理：
一、專用分路：
    (一)專用分路額定不得小於用電器具標示額定。以電動機驅動之用電器具
        未標示額定者，其專用分路額定應符合本章第八節第三款規定。
    (二)除以電動機驅動之用電器具外，連續運轉之用電器具分路額定，不得
        小於用電器具標示額定一‧二五倍。
二、分路同時供電給用電器具及其他負載者，其額定應依第四十四條規定辦理
    。

第一百八十條
用電器具之過電流保護應符合前條規定，並依下列規定辦理：
一、用電器具分路應依第七十九條規定裝設過電流保護裝置。用電器具有標示
    保護裝置之安培額定者，其分路過電流保護裝置安培額定不得大於該標示
    值。
二、附有表面加熱元件之用電器具依表五六計算所得最大需量負載電流大於六
    十安培時，應由二個以上分路供電，並分別裝設安培額定五十安培以下之
    過電流保護裝置。
三、非以電動機驅動之單一用電器具未標示保護裝置之安培額定者，其分路過
    電流保護依下列規定辦理：
    (一)用電器具額定電流在十五安培以下者，其分路過電流保護裝置安培額
        定不得大於二十安培。
    (二)用電器具額定電流大於十五安培者，其分路過電流保護裝置安培額定
        不得大於用電器具額定電流一‧五倍。與標準安培額定不能配合時，
        得選用次高一級者。
四、工廠組裝電阻型加熱元件電熱器具額定電流大於四十八安培者，其加熱元
    件負載應加以分割，分割後每一負載分路不得大於四十八安培，且應分別
    裝設安培額定六十安培以下之過電流保護裝置。
五、使用遮蔽型加熱元件之商業用廚房及烹飪用電器具符合下列規定之一者，
    加熱元件負載得予分割，分割後每一負載分路不得大於一百二十安培，且
    應分別裝設安培額定一百五十安培以下之過電流保護裝置：
    (一)加熱元件與烹飪料理台為整套型組裝。
    (二)加熱元件完全裝在適合作為此用途之箱體內。
六、冷凍、空調用壓縮機等以電動機驅動之用電器具，其過電流保護裝置與用
    電器具分開裝設者，應有符合本章第八節第五款規定之過載保護。

第一百八十一條
除固定式電暖器外，中央電暖器應以專用分路供電。但符合下列規定之一者，
不在此限：
一、與電暖器結合之幫浦、閥、加濕器或靜電空氣清淨器等輔助設備得連接於
    同一分路。
二、與空調設備永久性連接之中央電暖器得共接於同一分路。

第一百八十二條
固定貯備型電熱水器容量在四百五十公升以下者，應視為連續負載，並據以選
用分路。

第一百八十三條
中央集塵器出線口組件之裝設依下列規定辦理：
一、中央集塵器出線口組件得連接至第四十四條第一款規定之分路。
二、連接導線之安培容量不得小於其所連接分路導線安培容量。
三、中央集塵器出線口組件之非載流金屬配件應連接至設備接地導線。

第一百八十四條
電動廚餘處理機、洗碗機、抽油煙機以可撓軟線連接電源者，其裝設依下列規
定辦理：
一、終端應採用接地型附插頭可撓軟線。
二、插座位置應避免可撓軟線遭受外力損傷，並設置於可觸及處。
整套型嵌入式蒸烤箱及流理台烹飪用電器具得採用永久性電氣連接，或以附插
頭可撓軟線連接電源。

第一百八十五條
固定式用電器具之隔離設備裝設依下列規定辦理：
一、額定容量三百伏安或八分之一馬力以下之固定式用電器具，其分路過電流
    保護裝置得作為隔離設備。
二、額定容量超過三百伏安之固定式用電器具，其分路開關或斷路器位於用電
    器具處可視及範圍內，或配裝附有啟斷位置可上鎖之固定式裝置者，該分
    路開關或斷路器得作為隔離設備。
三、以額定容量超過八分之一馬力電動機驅動之固定式用電器具，其隔離設備
    應符合第二百十條及第二百十一條規定，並位於用電器具處可視及範圍內
    或配裝附有啟斷位置可上鎖之固定式裝置。

第一百八十六條
附插頭可撓軟線連接用電器具之隔離依下列規定辦理：
一、插頭與插座或可分離式接頭為可觸及者，得作為隔離設備；為非可觸及者
    應依前條規定裝設隔離設備。
二、住宅場所用電爐之附插頭可撓軟線與插座由其抽屜式箱體打開後即可觸及
    者，得作為隔離設備。
三、插座或可分離式接頭之額定不得小於所連接之用電器具額定。有需量因數
    者，其額定得以需量決定。

第一百八十七條
電熱器具之裝設依下列規定辦理：
一、電熱器具裝用於住宅場所以外存在可燃性物質場所者，應裝設警示信號器
    或整套型組裝之溫度限制器。
二、電熨斗、電鍋或其他電熱器具之額定容量達五十瓦特以上，且其表面產生
    溫度超過攝氏一百二十一度者，應採用耐熱可撓軟線。
三、附插頭可撓軟線連接電熱器具裝用於存在可燃性物質場所者，應裝設適用
    之放置台。該放置台得為分開裝置或為電熱器具之一部分。

第一百八十八條
電熱器具之裝設依下列規定辦理：
一、電熱器具額定電流大於十二安培者，除符合第二款規定外，應以專用分路
    供電。
二、小容量電熱器具符合下列規定者，得與大容量電熱器具共用分路：
    (一)最大電熱器具容量二十安培以上，其他電熱器具容量總和在十五安培
        以下且為最大電熱器具容量二分之一以下。
    (二)分路導線安培容量視合計負載容量而定，為三十安培以上。
    (三)各分接點裝有過電流保護裝置。
三、電熱操作器應裝設於可觸及處。但符合下列規定之一者，不在此限：
    (一)附有開關之電熱器具由插座接用。
    (二)一‧五千瓦特以下之電熱器具由插座接用。
    (三)分路開關兼作電熱操作器。
四、固定式電熱器具與可燃性物質或易因受熱而變色、變形之物體間，應保持
    充分之間隔，或有隔熱裝置，以免發生火災危險或其他物體損傷。

第一百八十九條
電熱器具分路及幹線之裝設依下列規定辦理：
一、電熱器具分路：
    (一)分路供電給額定電流五十安培以下電熱器具，其過電流保護裝置安培
        額定在五十安培以下者，導線線徑應依第四十條規定選用。
    (二)分路供電給額定電流大於五十安培單具電熱器具，其過電流保護裝置
        安培額定不得大於該電熱器具額定電流。但分路過電流保護裝置安培
        額定不能配合時，導線安培容量大於電熱器具額定電流及過電流保護
        裝置安培額定，且無連接其他負載者，得選用較高一級。
二、電熱器具幹線：
    (一)幹線導線安培容量應大於所接電熱器具額定電流之總和。已知需量因
        數及功率因數者，得依實際計算負載電流選擇適當導線，且採用安培
        容量不小於實際計算負載電流之導線。
    (二)幹線過電流保護裝置安培額定不得大於幹線導線安培容量。

第一百九十條
電熱器具之配線應採用導線管、導線槽、匯流排槽、電纜架或電纜等方法施作
。

第一百九十一條
固定式電暖器分路之裝設依下列規定辦理：
一、供電給二具以上固定式電暖器之分路，其額定應為三十安培以下。
二、單一住宅以外場所裝設固定式紅外線電暖器者，得由額定五十安培以下之
    分路供電。
三、固定式電暖器及電動機應視為連續負載。

第一百九十二條
固定式電暖器電源導線之絕緣物溫度超過攝氏六十度者，其接線箱應有耐久且
明顯標識。

第一百九十三條
固定式電暖器之位置裝設依下列規定辦理：
一、暴露於可能遭受外力損傷之處者，應加以防護。
二、位於濕氣場所或潮濕場所者，應使水氣或其他液體不致滲入或聚積於電氣
    配件或管槽內。

第一百九十四條
固定式電暖器之電源導線應裝設隔離設備，以隔離電源所有非接地導線。
固定式電暖器有一個以上之電源者，其隔離設備應加以分組並設有標識。
固定式電暖器之隔離設備應配裝附有啟斷位置可上鎖之固定式裝置。
固定式電暖器之隔離設備安培額定不得小於內含電動機及電熱器具合計負載一
‧二五倍並依下列規定辦理：
一、裝有過電流保護裝置者，隔離設備應位於過電流保護裝置處可視及範圍之
    電源側。
二、以熔線作為過電流保護裝置者：
    (一)內含額定容量八分之一馬力以下電動機之電暖器，其隔離設備位於電
        動機操作器及電熱器處可視及範圍內，或配裝附有啟斷位置可上鎖之
        固定式裝置者，該熔線得作為電動機操作器及電暖器之隔離設備。
    (二)內含超過額定容量八分之一馬力電動機之電暖器，其隔離設備位於電
        動機操作器及電熱器處可視及範圍內，且符合電動機隔離設備規定者
        ，該熔線得作為電動機操作器及電暖器之隔離設備。
三、未裝有過電流保護裝置者：
    (一)不含電動機或內含額定容量八分之一馬力以下電動機之電暖器，其分
        路開關或斷路器位於電暖器處可視及範圍內，或配裝附有啟斷位置可
        上鎖之固定式裝置者，該分路開關或斷路器得作為隔離設備。
    (二)內含超過額定容量八分之一馬力電動機之電暖器，其隔離設備應位於
        電動機操作器處可視及範圍內。

第一百九十五條
固定式電暖器之過電流保護依下列規定辦理：
一、電暖器之過電流保護得由其電源分路過電流保護裝置作保護。
二、電暖器內之電阻型加熱元件應裝設六十安培以下之過電流保護裝置。負載
    額定大於四十八安培者，加熱元件負載應加以分割，分割後每一負載分路
    額定不得大於四十八安培。
三、依前款規定負載分割後之過電流保護裝置應由工廠組裝在電熱控制箱內，
    或由工廠提供之過電流保護分開裝置且為可觸及，並適用於作分路保護者
    採用筒型熔線作為分割後負載之過電流保護裝置者，分割後數個負載得共
    用一具隔離設備。
四、電暖器額定五十千瓦特以上，並由溫度驅動裝置控制電暖器之週期性運轉
    者，其分路導線安培容量不得小於電暖器銘牌標示之額定。

      第七節  特別低壓設施
第一百九十六條
電壓在三十伏特以下，並採用隔離變壓器及相關設備組成之特別低壓設施配線
及保護，應依本節規定辦理。
隔離變壓器應以二十安培以下之分路供電，且一次側電壓在二百五十伏特以下
，輸出電路最大額定為三十伏特及二十五安培。

第一百九十七條
特別低壓設施之電路裝設依下列規定辦理：
一、二次側電路不得接地。
二、隔離變壓器：
    (一)二次側電路與其電源分路應以隔離變壓器予以隔離，不得採用自耦變
        壓器。
    (二)銘牌應有一次側及二次側電壓、二次側短路電流及製造廠家名稱等。
    (三)一次側端子應附加防護設備，使人員不可輕易觸及。
    (四)一次側及二次側端子應附加明顯標識，以資識別。
    (五)一次側非接地導線應裝設過電流保護裝置。
    (六)二具以上隔離變壓器同時使用者，其二次側不得並聯連接。
三、暴露之二次側電路導線：
    (一)絕緣導線、可撓軟線或電纜應裝設於距離地面高度二‧一米以上。
    (二)導線線徑不得小於一‧○平方毫米。
    (三)二次側可撓軟線之長度不限制在三米以下。

第一百九十八條
特別低壓線路之裝設依下列規定辦理：
一、特別低壓線路與其他用電線路、水管、燃氣供給管路間，應保持一百五十
    毫米以上之間隔。
二、特別低壓線路裝設於易遭受外力損傷之處者，應以導線管防護。

      第八節  低壓電動機
        第一款  一般規定
第一百九十九條
電動機及其控制線路、操作器及電動機控制中心之配線及保護，應依本節規定
辦理。

第二百條
本節用詞定義規定如下：
一、調速驅動器：指電力轉換器、電動機及其附裝輔助裝置之組合，例如編碼
    計、轉速計、積熱開關及偵測器、鼓風機、電熱器及振動感測器。
二、調速驅動系統：指互相連接設備之組合，可調整電動機耦合之機械負載速
    度，通常由調速驅動器及輔助設備所組成。
三、操作器：指作為起動或停止電動機之任何開關或設備。
四、電動機控制線路：指控制設備或系統中，承載操作器信號之電路，而非承
    載主要電力電流。
五、系統隔離設備：指可由多組監視遙控接觸器隔離系統，此系統在多個遠端
    處，皆可利用閉鎖開關提供分段或隔離功能，且該閉鎖開關於啟斷位置時
    ，有鎖扣裝置。
六、電動閥組電動機（ VAM）：指工廠組裝由驅動電動機及其他組件，例如操
    作器、轉矩開關、極限開關及過載保護裝置等，驅動一個閥件。

第二百零一條
電動機之配線應採用導線管、導線槽、匯流排槽及電纜等方法施作。
電動機、電動機操作器或其他工廠組裝之操作器等整套型設備之配線，不適用
第二章第五節、第三章第一節及第四章第九節規定。

第二百零二條
電動機及其相關設備之電源導線安培容量，應依第二十五條規定選用，並符合
下列規定；採用可撓軟線者，其安培容量應依表三六八規定選用。
一、一般型電動機：
    (一)導線安培容量、開關及分路過電流保護裝置之安培額定，應依表二五
        八～一至表二五八～三規定之電動機滿載電流選用，不得使用電動機
        銘牌標示之額定電流。電動機以安培標示而不用馬力標示者，應依表
        二五八～一至表二五八～三規定值換算。
    (二)每分鐘轉速低於一千二百轉之低速（高轉矩）電動機有較高之滿載電
        流，及滿載電流常隨速率變動之多段速電動機，應採用銘牌標示之額
        定電流。
    (三)多段速電動機應依第二百十四條第二款及第二百二十條規定辦理。
    (四)用電器具有標示電動機型式之蔽極式或永久分相電容式風扇或鼓風機
        者，應以其銘牌標示之滿載電流替代馬力額定，選用隔離設備、操作
        器、分路導線、過電流保護及個別過載保護之額定或安培容量。
    (五)用電器具同時標示電動機馬力及滿載電流者，應以所標示之滿載電流
        選用隔離設備、操作器、分路導線、過電流保護及個別過載保護之安
        培容量或額定。
    (六)個別電動機過載保護應依電動機銘牌標示之額定電流為準。
二、轉矩電動機額定電流應為其堵轉電流，且以銘牌標示之額定電流依第二百
    十四條及第二百十六條規定選用導線安培容量、電動機過載保護之安培額
    定，及符合第二百二十條第二款規定分路過電流保護裝置之安培額定。
三、用於交流、可調電壓、可調轉矩驅動系統之電動機，其導線安培容量、開
    關或分路過電流保護裝置及其他用電器具之安培額定，應依電動機或操作
    器銘牌標示之最大運轉電流，或兩者中較大者為準。銘牌未標示最大運轉
    電流者，得依表二五八～二、表二五八～三規定電動機滿載電流一‧五倍
    設定。
四、電動閥組電動機額定電流應為銘牌標示之滿載電流，且應以該電流選用電
    動機分路過電流保護裝置之最大安培額定及導線安培容量。

第二百零三條
標準電動機配線應包括下列各部分，如圖二○三所示：
一、幹線分接導線（W1）：自幹線分接點至分路過電流保護裝置之線路。
二、分路（W2）：自分路過電流保護裝置至電動機之線路。
三、電動機控制線路（W3）：包括有適當過電流保護裝置。
四、二次側導線（W4）：繞線型電動機自轉子至二次操作器間之導線；其載流
    量不小於二次側全載電流一‧二五倍。為非連續性負載者，得以溫升限制
    為條件，選擇較小導線。
五、分路過電流保護裝置（P1）：保護分路配線、操作器及電動機之過電流、
    短路及接地故障。
六、隔離設備（SM）：於電動機或操作器檢修時隔離電路。
七、電動機過載保護裝置（P2）：保護電動機及其分路，避免因電動機過載而
    燒損。
八、操作器（ C）：控制電動機之起動、停止、反向或變速，裝於鄰近電動機
    ，使操作者可視及電動機之運轉。

第二百零四條
部分繞組電動機之每一繞組，應有分路過電流保護裝置；其安培額定不得大於
表二二○規定值二分之一。
過電流保護裝置允許電動機起動者，該裝置得用於兩繞組。採用延時性（雙元
件）熔線者，其安培額定得為電動機滿載電流一‧五倍以下。

第二百零五條
電動機裝設於可能被滴到或噴到油、水及其他液體之場所者，其暴露帶電部分
及其引出線絕緣部分，應有防護或封閉箱體保護。但電動機設計適用於前述場
所者，不在此限。

第二百零六條
電動機裝設位置依下列規定辦理：
一、電動機裝設位置應通風良好，並易於軸承潤滑或電刷更換等維修作業。但
    沉水式電動機或無需通風者，不在此限。
二、附有整流子或集電環之開放型電動機，應有防護措施使其產生之火花不會
    引燃鄰近可燃性物質。
三、裝設於存在爆炸性氣體、可燃性粉塵及飛絮等危險場所，應依第五章有關
    規定辦理。

第二百零七條
電動機裝設於非危險場所，所在位置易有灰塵或漂浮物累積於電動機上，嚴重
影響電動機之通風或冷卻，以致有高溫危害之虞者，應採用防塵式電動機。

        第二款  隔離設備
第二百零八條
隔離設備（SM）之位置裝設依下列規定辦理：
一、每一台電動機操作器應有個別之隔離設備，可啟閉電源，並裝設於操作器
    處可視及範圍內。但有下列情形之一者，不在此限：
    (一)單一機器由數具可協調之操作器群組驅動，且隔離設備置於操作器處
        可視及範圍內，且隔離設備及操作器位於機器處可視及範圍內者，其
        操作器得裝設單一隔離設備。
    (二)電動閥組電動機之隔離設備裝設位置對人員或財產會增加危害，且有
        依下列規定辦理者，得免裝設於可視及範圍內：
        1.於閥組上設有標明隔離設備位置之警告標識。
        2.隔離設備配裝附有啟斷位置可上鎖之固定式裝置。
二、每具電動機應有隔離設備，並依下列規定辦理：
    (一)隔離設備應裝設於個別電動機及其驅動機械處可視及範圍內。
    (二)符合前款規定之操作器隔離設備，且裝設於個別電動機及其驅動機械
        處可視及範圍內者，得作為電動機之隔離設備。
    (三)依前款規定裝設之操作器隔離設備配裝附有啟斷位置可上鎖之固定式
        裝置，並符合下列情形之一者，電動機得免裝設隔離設備：
        1.電動機隔離設備裝設之位置為不可行，或對人員、財產會增加危害
          。
        2.於工業廠區訂有安全操作程序書，且由合格人員維修及管理監督。
三、單一用戶僅有一具電動機者，該用戶之用戶總開關得兼作為電動機之隔離
    設備。

第二百零九條
隔離設備應有標明啟斷位置或閉合位置之明顯標識。
隔離設備應能同時啟斷所有非接地導線，而無法單極操作啟斷電路，且不得自
動閉合。
隔離設備得與操作器裝設於同一封閉箱體內。

第二百十條
隔離設備除有第三項至第八項規定情形外，應為下列規定型式之一：
一、以馬力為額定之電動機電路開關。
二、模殼式斷路器。
三、模殼式開關。
四、電動機操作器組合附裝之瞬時跳脫斷路器。
五、自我保護之組合型操作器。
六、有標明適用於電動機隔離之手動電動機操作器。
以前項第六款手動電動機操作器作為隔離設備者，僅得用於下列規定之一：
一、電動機分路短路保護裝置與電動機間。
二、在固態電動機操作器系統中，其電力電子裝置以表二二○規定選定之熔線
    替代時，裝設於該熔線之電源側。該熔線視為後衛保護，且有分路過電流
    保護裝置裝設於手動電動機操作器之電源側。
額定容量八分之一馬力以下固定式電動機之分路過電流保護裝置得作為隔離設
備。
額定容量二馬力以下且電壓三百伏特以下固定式電動機之隔離設備得選用下列
規定之一：
一、一般型開關：其安培額定不小於電動機滿載電流二倍。
二、一般型交流手捺開關：電動機滿載電流不大於其安培額定百分之八十。
三、手動電動機操作器：其馬力額定不小於電動機額定，且有標明適用於電動
    機隔離之標識。
額定容量超過二馬力至一百馬力之自耦變壓器型電動機操作器，符合下列規定
者，其個別隔離設備得採用一般型開關：
一、電動機驅動發電機裝有過載保護。
二、操作器可啟斷電動機之堵轉電流，具有無電壓釋放及不大於電動機滿載電
    流一‧二五倍之過載保護。
三、電動機分路具有個別熔線或反時限斷路器其安培額定不大於電動機滿載電
    流一‧五倍。
額定容量超過四十馬力之直流固定式電動機，或額定容量超過一百馬力之交流
固定式電動機，其隔離設備得採用標明有載下不得操作之一般型開關或隔離開
關。
附插頭可撓軟線之電動機除為下列情形之一外其附接插頭及插座之馬力額定不
小於電動機額定者，得作為隔離設備：
一、第一百八十六條規定之附插頭可撓軟線連接用電器具。
二、額定容量三分之一馬力以下之可攜式電動機。
一般型開關得作為轉矩電動機之隔離設備。

第二百十一條
電動機電路隔離設備之安培額定不得小於電動機滿載電流一‧一五倍。但電動
機電路開關之馬力額定不小於電動機馬力者，不在此限。
轉矩電動機隔離設備之安培額定，應為電動機銘牌標示之額定電流一‧一五倍
以上。
二具以上電動機同時使用，或一具以上電動機與其他負載同時使用，且採用單
一隔離設備者，此組合負載之馬力及安培額定依下列規定決定：
一、隔離設備之額定應以滿載條件及電動機堵轉條件下所有電流總和決定，其
    計算方式如下：
    (一)每一具電動機馬力額定之等值滿載電流依表二五八～一至表二五八～
        三規定選定，加上其他負載安培額定之總和。
    (二)等值堵轉電流：
        1.每一具電動機馬力額定之等值堵轉電流依表二五九～一或表二五九
          ～二規定選定。
        2.二具以上電動機以會同時起動之電動機或群組電動機之最大堵轉電
          流決定等值堵轉電流。
    (三)若部分同時使用之負載為電阻性負載，且隔離設備為以馬力及安培為
        額定之開關，其安培額定不小於電動機堵轉電流加上電阻性負載者，
        該開關得具有不小於電動機組合負載之馬力額定。
二、隔離設備之安培額定不得小於前款所定滿載條件之電流總和一‧一五倍。
    但馬力額定大於組合負載之等值馬力，且依前款規定決定無熔線電動機電
    路開關時其安培額定得小於滿載條件下電流總和一‧一五倍。
三、表二五九～一及表二五九～二未規定之小型電動機堵轉電流應假設為滿載
    電流六倍。

第二百十二條
每一具電動機應裝有個別隔離設備。但單一隔離設備之額定符合前條第三項組
合負載規定，且有下列情形之一者，得作為群組電動機之隔離設備：
一、數具電動機同時驅動單一機器或設備數個部分時，如金屬工具機或木工機
    、電動起重機及吊車。
二、群組電動機符合第二百二十一條第一款規定由一組分路保護裝置保護。
三、群組電動機位於隔離設備處可視及之同一房間內。

第二百十三條
電動機及其操作設備由一個以上之電源供電者，每一個電源之隔離設備應緊鄰
所供電之電動機或操作設備。每一個電源得採用個別隔離設備。採用多具隔離
設備者，應於每具隔離設備上或鄰近處設置耐久之警告標識。
電動機由一個以上電源供電，且其操作器之隔離設備能在啟斷位置閉鎖者，其
主電源之隔離設備得免緊鄰電動機。

        第三款  電動機分路及幹線
第二百十四條
連續責務之單具電動機分路（W2）之導線安培容量，不得小於表二五八～一至
表二五八～三電動機滿載電流一‧二五倍或下列規定值：
一、由整流器供電之直流電動機：
    (一)整流器電源側之導線安培容量不得小於整流輸入電流一‧二五倍。
    (二)直流電動機由單相半波整流器供電整流器配線輸出端子與該電動機間
        之導線安培容量，不得小於電動機滿載電流一‧九倍。由單相全波整
        流器供電者，其導線安培容量不得小於電動機滿載電流一‧五倍。
二、多段速電動機：
    (一)操作器電源側之分路導線安培容量應依電動機銘牌標示之最大滿載電
        流選定。
    (二)操作器與電動機間之分路導線安培容量不得小於繞組額定電流一‧二
        五倍。
三、Y －△起動運轉電動機：
    (一)操作器電源側之分路導線安培容量不得小於表二五八～一至表二五八
        ～三電動機滿載電流一‧二五倍。
    (二)操作器與電動機間之分路導線安培容量不得小於表二五八～一至表二
        五八～三電動機滿載電流百分之七十二。
四、部分繞組電動機：
    (一)操作器電源側之分路導線安培容量不得小於表二五八～一至表二五八
        ～三電動機滿載電流一‧二五倍。
    (二)操作器與電動機間之導線安培容量不得小於表二五八～一至表二五八
        ～三電動機滿載電流百分之六十二‧五。
五、供電給短時、間歇性、週期性或變動責務負載電動機分路導線安培容量，
    不得小於表二一四所列電動機銘牌標示之額定電流百分比。
六、小型電動機分路導線線徑不得小於三‧五平方毫米。但小型電動機裝設於
    封閉箱體內，符合下列規定之一者，不在此限：
    (一)電動機電路之滿載電流在五安培以下，並具有過載及過電流保護裝置
        者，得採用○‧九平方毫米以上銅導線。
    (二)電動機電路之滿載電流大於五安培且為八安培以下，並具有過載及過
        電流保護裝置者，得採用一‧二五平方毫米銅導線。

第二百十五條
繞線型轉子電動機二次側導線（W4）之安培容量依下列規定決定：
一、連續責務之繞線型轉子電動機二次側至操作器之導線安培容量，不得小於
    電動機二次側滿載電流一‧二五倍。
二、非連續責務之繞線型轉子電動機二次側至操作器之導線安培容量，不得小
    於表二一四規定之額定電流百分比。
三、二次側電阻器與操作器分離者，操作器與電阻器間之導線安培容量不得小
    於表二一五規定之滿載電流百分比。

第二百十六條
供電給多具電動機或電動機與其他負載之幹線分接導線（W1），其導線安培容
量不得小於下列負載之總和：
一、最大電動機滿載電流一‧二五倍。
二、所有同組之其他電動機滿載電流之總和。
三、除電動機外之非連續性負載之滿載電流。
四、除電動機外之連續性負載滿載電流一‧二五倍。
符合下列規定者，不受前項規定限制：
一、在多具電動機中，有一具以上為短時、間歇性、週期性或變動責務使用者
    ，電動機額定電流應依表二一四規定計算電流總和。最大電動機額定電流
    之選定，以表二一四規定所得結果，與最大連續責務電動機滿載電流一‧
    二五倍，兩者中取較大者列入計算。
二、以電動機操作之固定式電暖器應視為連續性負載。
三、為防止電動機或其他負載同時運轉而將電路互鎖者，該電路之導線安培容
    量得依可能同時運轉之電動機及其他負載之最大總電流決定。

第二百十七條
供電給多具電動機及組合負載之整套型設備，其導線安培容量不得小於該設備
標示之最小導線安培容量。設備非製造廠家配線者，其導線安培容量應依前條
規定決定。

第二百十八條
電動機為責務週期、間歇性或非同時運轉，其幹線之導線安培容量足以承載依
電動機容量、具數，與其負載及責務特性所決定之最大負載者，該導線安培容
量經設計者確認得小於第二百十六條規定。

第二百十九條
幹線分接導線終端應接至分路過電流保護裝置，並符合下列規定之一：
一、分接導線裝設於封閉之操作器或管槽內，且長度在三米以下者，幹線過電
    流保護裝置之安培額定不得大於分接導線安培容量十倍。
二、分接導線裝設於可避免遭受外力損傷之處或封閉之管槽內，且長度不超過
    八米者，其導線安培容量不得小於幹線過電流保護裝置安培額定三分之一
    。
三、分接導線長度超過八米者，應與幹線具有同等安培容量。

        第四款  過電流保護
第二百二十條
電動機之分路過電流保護裝置（P1）應具有承載電動機起動電流之能力。除轉
矩電動機外，電動機分路過電流保護裝置安培額定依下列規定辦理：
一、電動機分路過電流保護裝置之安培額定不得大於表二二○規定值。但有下
    列情形之一者，不在此限：
    (一)依表二二○所決定分路過電流保護裝置之安培額定，與熔線、斷路器
        、積熱保護裝置之額定電流不能配合時，得選用較高一級者。
    (二)依前目規定調整之安培額定仍不足以承受電動機之起動電流，並符合
        下列規定之一者，得選用較高一級：
        1.六百安培以下非延時性熔線安培額定不大於滿載電流四倍。
        2.延時性熔線安培額定不大於滿載電流二‧二五倍。
        3.滿載電流一百安培以下，反時限斷路器安培額定不大於滿載電流四
          倍；滿載電流大於一百安培，反時限斷路器安培額定不大於滿載電
          流三倍。
        4.大於六百安培至六千安培熔線安培額定不大於滿載電流三倍。
二、依製造廠家之過載電驛表搭配電動機操作器或用電器具標示選用之最大分
    路過電流保護裝置安培額定，不得大於前款規定之容許值。
三、可調式瞬時跳脫斷路器與電動機操作器組合使用，其與電動機過載、過電
    流保護應可協調，且設定值不得超過表二二○規定值。但符合下列規定之
    一者，不在此限：
    (一)表二二○規定之安培額定不足以承受電動機起動電流時，得選用較高
        一級者，且不大於滿載電流十三倍。
    (二)電動機滿載電流為八安培以下，瞬時跳脫斷路器之連續電流為十五安
        培以下之組合式電動機操作器，且電動機分路過載與過電流保護裝置
        間可協調者，得將操作器銘牌標示值予以加大。
四、多段速電動機：
    (一)二個以上繞組之多段速電動機，其保護裝置之安培額定不大於被保護
        最小繞組銘牌標示額定依表二二○適用之百分比者，該多段速電動機
        得以單一過電流保護裝置作為保護。
    (二)符合下列規定者，多段速電動機得以單一過電流保護裝置作為保護，
        且其安培額定依最高電流繞組之滿載電流選定：
        1.每一個繞組配有個別過載保護，安培額定依其滿載電流選定。
        2.供電給各繞組之分路導線安培容量依最高電流繞組之滿載電流選定
          。
        3.電動機各繞組之操作器馬力額定不小於繞組之最大馬力額定。
五、固態電動機操作器系統之電力電子裝置得以表二二○規定之適當額定熔線
    替代。
六、自我保護組合式操作器，得用於替代表二二○規定之保護裝置。為中高效
    能電動機者，其可調式瞬時跳脫設定值不得大於電動機滿載電流十三倍。
七、組合式電動機短路保護器與分路之過電流及過載保護可協調，且其短路保
    護器短路電流大於電動機滿載電流十三倍時能開啟電路者，該電動機短路
    保護器得用於替代表二二○規定之過電流保護裝置。

第二百二十一條
二具以上電動機或一具以上電動機與其他負載連接於同一分路依下列規定辦理
。其分路過電流保護裝置應採用熔線或反時限斷路器。
一、數具額定容量不超過一馬力之電動機，符合下列規定者，得連接於同一標
    稱電壓一百五十伏特以下，額定不大於二十安培之分路，或標稱電壓六百
    伏特以下，額定不大於十五安培之分路：
    (一)每具電動機之滿載電流不大於六安培。
    (二)分路過電流保護裝置安培額定未大於任一操作器上之標示值。
    (三)個別過載保護符合第二百二十五條規定。
二、有個別過載保護之二具以上電動機或一具以上電動機與其他負載，其分路
    過電流保護裝置安培額定不大於前條規定時，若能確定正常運轉下，該保
    護裝置在最壞情況下不會啟開電路者得連接於同一分路。
三、其他群組裝設之電動機個別過載保護符合下列規定者，得連接於同一分路
    ：
    (一)電動機操作器與過載保護裝置為下列規定之一：
        1.由工廠組裝，且該電動機分路過電流保護裝置為其組件之一部分，
          或為其標識指定之組件。
        2.電動機分路過電流保護裝置、操作器與過載保護裝置為個別組件，
          依製造廠家說明書指示於現場組裝。
    (二)個別電動機過載保護裝置符合下列規定之一：
        1.為群組裝設之個別電動機過載保護裝置有最大安培額定之熔線、反
          時限斷路器，或兩者之組合。
        2.選定之電動機分路過電流保護裝置安培額定不大於前條規定。
    (三)個別電動機操作器符合下列規定之一：
        1.為群組裝設之個別電動機操作器有最大安培額定之熔線、斷路器，
          或兩者之組合。
        2.選定之電動機分路過電流保護裝置安培額定不大於前條規定。
    (四)每具斷路器為反時限者。
    (五)分路以熔線或反時限斷路器保護，其安培額定不大於分路連接之最大
        電動機額定，加上其他電動機滿載電流及其他負載電流之總和。上列
        計算結果之安培額定小於電源導線安培容量者，得提高熔線或斷路器
        之最大安培額定，且不大於第七十九條第一項第二款規定。
    (六)分路熔線或反時限斷路器之安培額定不大於第二百三十條規定之安培
        額定，作為保護群組中最小額定電動機之過載電驛。
二具以上電動機或一具以上電動機與其他負載連接於同一分路，由任一分接點
供電至單一電動機之導線符合下列規定之一者，得免裝設個別分路過電流保護
裝置：
一、分接電動機之導線安培容量不小於分路導線安培容量。
二、分接電動機之過電流保護裝置安培額定不小於分路導線安培容量三分之一
    分接點至電動機過載保護裝置之導線長度不超過八米，且裝設於封閉之管
    槽內，以免遭受外力損傷。
三、自分路分接至手動電動機操作器之導線安培容量，不小於分路過電流保護
    裝置安培額定十分之一。操作器至電動機之導線安培容量符合第二百十四
    條規定。分接點至操作器之導線安培容量不小於分路導線安培容量，導線
    長度不超過三米，且裝設於封閉之操作器或管槽內，以免遭受外力損傷。

第二百二十二條
多具電動機及組合負載設備之分路短路及接地故障保護裝置之額定，不得大於
製造廠家標示於設備之額定。
電動機過載保護裝置之安培額定，符合第二百二十五條連續責務電動機過載保
護之規定者，電動機分路短路、接地故障及過載保護，得合併為單一保護裝置
。
熔線作為電動機分路過電流保護者，其熔線座大小不得小於表二二○規定之熔
線安培額定。

第二百二十三條
電動機幹線之過電流保護依下列規定辦理：
一、供電給固定式電動機，且符合第二百十六條規定導線安培容量之幹線應有
    過電流保護裝置，其安培額定不得大於表二二○規定任一電動機分路過電
    流保護裝置之最大安培額定，加上群組中其他電動機滿載電流之總和。幹
    線供電給二個以上分路，其最大分路過電流保護裝置有二個以上相同額定
    者，以其中一個保護裝置視為前段規定之最大者。
二、供電給其他裝置之幹線，其導線安培容量大於第二百十六條規定者，幹線
    過電流保護裝置之安培額定得依幹線之導線安培容量決定。

第二百二十四條
供電給電動機與其他負載之幹線，其過電流保護裝置之安培額定不得小於其他
負載加上下列規定之總和：
一、單具電動機依第二百二十條規定。
二、二具以上電動機依前條規定。

        第五款  過載保護
第二百二十五條
連續責務電動機之過載保護（P2）依下列規定辦理：
一、額定容量超過一馬力之電動機過載保護依下列規定之一辦理：
    (一)與電動機分開之過載保護裝置，其跳脫值或額定動作電流值不得大於
        下列電動機銘牌標示之滿載電流百分比。但過載保護裝置不需承受電
        動機銘牌標示之全部電流，如採Y－△起動者，該保護裝置之選定或
        設定值對應銘牌標示電流之百分比，應明顯標示於電動機上。
        1.電動機銘牌標示負載係數在一‧一五以上：百分之一百二十五。
        2.電動機銘牌標示溫升在攝氏四十度以下：百分之一百二十五。
        3.不屬於上列之其他電動機：百分之一百十五。
    (二)整合於電動機之積熱保護器，於過載或起動失敗時，應能保護電動機
        ，以防止危險性之過熱。積熱保護器之最大跳脫電流不得大於第二百
        五十八條規定電動機滿載電流，再乘以下列規定之百分比。電磁開關
        等電動機啟斷裝置與電動機分開裝設，其控制回路由整合於電動機內
        之積熱保護器所控制者，當積熱保護器啟斷控制回路時，該分開裝設
        之啟斷裝置應能自動切斷電動機之負載電流。
        1.電動機滿載電流九安培以下：百分之一百七十。
        2.電動機滿載電流大於九安培至二十安培：百分之一百五十六。
        3.電動機滿載電流大於二十安培百分之一百四十。
    (三)整合於電動機之保護裝置，能防止電動機起動失敗所導致之損壞者，
        得作為保護電動機使用。
二、額定容量一馬力以下自動起動之電動機過載保護依下列規定之一辦理：
    (一)與電動機分開之過載保護裝置，應符合前款第一目規定。
    (二)整合於電動機之積熱保護器，於過載或起動失敗時，應能保護電動機
        ，以防止危險性之過熱。電磁開關等電動機啟斷裝置與電動機分開裝
        設，其控制回路由整合於電動機內之積熱保護器所控制者，當積熱保
        護器啟斷控制回路時，該分開裝設之啟斷裝置應能自動切斷電動機之
        負載電流。
    (三)整合於電動機之保護裝置，能防止電動機起動失敗所導致之損壞，且
        符合下列規定之一者，得作為保護電動機使用：
        1.電動機為設備組合之一部分，且該組合不會使電動機過載。
        2.設備組合裝有安全控制能防止電動機起動失敗導致之損壞，且該安
          全控制標示於該設備組合銘牌上，並置於可視及範圍內。
    (四)電動機繞組之阻抗足以防止因起動失敗導致過熱，且電動機為設備組
        合之一部分，能使電動機自行限制不發生危險過熱者，手動起動之電
        動機得依第四款第一目規定作保護。
三、過載保護裝置之選定：
    (一)依第一款第一目及前款第一目規定選擇過載保護裝置感測元件、安培
        額定，不足以使電動機完成起動或承載負載，且其跳脫電流值不大於
        下列電動機銘牌標示之滿載電流百分比者，得選用高一級之感測元件
        ，或將過載保護裝置之安培額定調高：
        1.電動機銘牌標示負載係數在一‧一五以上：百分之一百四十。
        2.電動機銘牌標示溫升在攝氏四十度以下：百分之一百四十。
        3.不屬於上列之其他電動機：百分之一百三十。
    (二)於電動機起動期間未依第二百二十七條規定將過載保護裝置旁路者，
        過載保護裝置應有足夠之時間延遲，以利電動機之起動及加速至正常
        負載。
四、額定容量一馬力以下非自動起動之固定式電動機過載保護，應依第二款規
    定辦理。非固定式電動機之過載保護依下列規定辦理：
    (一)電動機位於操作器處可視及範圍內，且該保護裝置之安培額定不大於
        第二百二十條至第二百二十二條規定者，得以分路過電流保護裝置作
        為其過載保護。若該電動機裝設於標稱電壓一百五十伏特以下之分路
        ，得以二十安培以下保護裝置保護。
    (二)電動機位於操作器處不可視及範圍者，其過載保護應依第二款規定辦
        理。
五、繞線型轉子交流電動機之二次側電路，包括導線、操作器、電阻器等，得
    以電動機過載保護裝置作為過載保護。
六、連續責務電動機容量十五馬力以上，或容量在十五馬力以下屬灌溉用電、
    位於存在危險物質、可燃性粉塵或飛絮之場所者，應有低電壓保護。

第二百二十六條
表二一四所列使用於短時間、間歇性、週期性或變動責務運轉之電動機，其過
電流保護裝置之安培額定未大於表二二○規定值者，得以分路過電流保護裝置
作為過載保護。
除電動機驅動之用電器具無法使電動機連續運轉外，電動機在任何使用狀況下
，應視為連續責務。

第二百二十七條
電動機起動期間之旁路依下列規定辦理：
一、非自動起動之電動機：分路熔線或反時性斷路器之安培額定不大於電動機
    滿載電流四倍者，於電動機起動期間電動機過載保護裝置得予旁路或切離
    電路。
二、自動起動之電動機：於電動機起動期間，電動機過載保護裝置不得旁路或
    切離電路。但電動機起動時間超過電動機過載保護裝置之時間延遲設定，
    並符合下列規定者，得予旁路或切離電路：
    (一)偵測電動機轉動，於電動機起動失敗時自動防止旁路或切離過載保護
        裝置。
    (二)限制過載保護之旁路或切離時間，使其小於被保護電動機之堵轉時間
        額定。
    (三)如未達電動機運轉條件，可關閉或手動再起動。

第二百二十八條
除熔線或積熱保護器外，電動機之過載保護裝置應能同時啟斷各非接地導線，
以啟斷電動機電流。
三相三線電動機之過載保護裝置應接於每一非接地導線及被接地導線。單相二
線及單相三線電動機之過載保護裝置應接於每一非接地導線。

第二百二十九條
電動機操作器之過載元件符合前條規定，其過載元件可在電動機起動及運轉位
置動作者該電動機操作器得作為過載保護裝置。

第二百三十條
以過載電驛及其他裝置作為電動機過載保護，而無法啟斷故障電流者，應以熔
線或斷路器保護，且其安培額定符合第二百二十條規定，或以符合第二百二十
條規定之電動機過電流保護裝置保護。

第二百三十一條
電動機連接於一般分路之過載保護依下列規定辦理：
一、一具以上一馬力以下電動機，無個別過載保護，而有第二百二十五條第二
    款或第四款規定過載保護，且符合第二百二十一條第一款第一目及第二目
    規定者，該電動機得連接於一般分路。
二、數具超過一馬力之電動機依第二百二十五條規定選定過載保護裝置者，該
    電動機得連接於一般分路。如過電流保護裝置依第二百二十一條規定選用
    者，得與操作器及電動機之過載保護裝置裝設一起。
三、附插頭可撓軟線連接：
    (一)電動機以附插頭可撓軟線連接至分路，且符合第一款規定無個別過載
        保護者，其插頭及插座或連接器之額定電壓在二百五十伏特以下者，
        不得大於十五安培。
    (二)電動機或電動機操作之用電器具以附插頭可撓軟線連接至分路，依前
        款規定須有個別過載保護者，其保護裝置應為該電動機或用電器具之
        一部分，其插頭及插座或連接器之額定應大於電動機所連接之分路額
        定。
四、電動機或電動機操作之用電器具所連接之分路過電流保護裝置應有符合其
    特性之時間延遲，以利電動機之起動及加速至正常負載。

第二百三十二條
電動機自動再起動有危害人員之虞者，不得裝設具有自動再起動功能之過載保
護裝置。

第二百三十三條
電動機過載保護動作自動停機有危害人員之虞，或電動機需繼續運轉使設備或
製程安全停機者，得將電動機過載感測裝置連接至警報監視裝置，以啟動應變
措施或依序停機替代立即啟斷電動機。

第二百三十四條
電動機驅動之消防幫浦及其附屬設備停電會造成災害者，不得裝設過載保護裝
置。

第二百三十五條
電動機或其他用電器具於電源欠相時，有失效或損傷之虞者，應裝設欠相保護
裝置；於電源反相時，有失效或損傷之虞者，應裝設反相保護裝置。

        第六款  電動機控制線路
第二百三十六條
電動機控制線路（W3）之過電流保護依下列規定辦理：
一、電動機控制線路由分路過電流保護裝置之負載側分接，作為連接至該分路
    電動機之控制用，其過電流保護應符合本條規定。引接至控制線路之分接
    導線，不得視為分路，並應由該分路過電流保護裝置或另裝設保護裝置，
    加以保護。
二、導線保護依下列規定辦理：
    (一)電動機分路過電流保護裝置未能依第二目規定提供保護者，應裝設個
        別過電流保護裝置，其安培額定不得大於表二三六第一欄規定值。
    (二)導線得以電動機分路過電流保護裝置保護。導線在控制設備封閉箱體
        內者，其過電流保護裝置安培額定不得大於表二三六第二欄規定值。
        導線延伸出控制設備封閉箱體外者，其過電流保護裝置安培額定不得
        大於表二三六第三欄規定值。
    (三)消防幫浦電動機或類似設備之控制線路僅能有短路保護，或以電動機
        分路過電流保護裝置保護。
    (四)單相變壓器二次側僅有單一電壓二線式供電之導線，得以變壓器一次
        側之過電流保護裝置保護，惟該保護不大於表二三六規定二次側導線
        過電流保護裝置之最大安培額定與二次側對一次側電壓比相乘之值。
        變壓器二次側導線除二線式外，不得由一次側過電流保護裝置保護。
三、裝有控制變壓器者，其控制線路之過電流保護依下列規定辦理：
    (一)控制變壓器應依第二百六十七條規定裝設過電流保護裝置。
    (二)額定容量小於五十伏安之控制變壓器為電動機操作器之一部分，且裝
        設於電動機操作器封閉箱體內者，得以一次側過電流保護裝置或其他
        內建式保護裝置加以保護。
    (三)控制變壓器一次側額定電流小於二安培者，其一次側電路得採用安培
        額定不大於一次側額定電流五倍之過電流保護裝置。
    (四)消防幫浦電動機或類似設備之控制線路在開路時有導致危險之虞者，
        得省略過電流保護裝置。
四、電動機控制電路之一條導線被接地者，於電動機控制器遠端之控制電路發
    生接地故障時，控制電路應符合下列規定：
    (一)不能啟動電動機。
    (二)不可旁路手動操作停機裝置，或不可旁路自動安全停機裝置。

第二百三十七條
電動機控制線路之隔離依下列規定辦理：
一、電動機控制線路之隔離設備在啟斷位置時，該控制線路應與所有供電電源
    隔離。隔離設備得由二個以上個別配電裝置組成，其一能將電動機及操作
    器與電源隔離，另一能將電動機控制線路與其電源隔離，且上列個別配電
    裝置應裝設於緊鄰位置。
二、採用控制變壓器或其他配電裝置降低電動機控制線路電壓，並裝設於操作
    器封閉箱體內者，該控制變壓器或其他配電裝置應連接至電動機控制線路
    隔離設備之負載側。

        第七款  電動機操作器
第二百三十八條
所有電動機應有適用之操作器（ C）。
八分之一馬力以下固定式電動機，如計時電動機或類似用電器具，於運轉時不
因過載或起動失敗而導致損壞者，得以分路之隔離設備作為操作器。
三分之一馬力以下可攜式電動機得以附插頭可撓軟線與插座作為操作器。

第二百三十九條
電動機操作器之設計依下列規定辦理：
一、每一操作器應能起動及停止其所控制之電動機，且能啟斷電動機之堵轉電
    流。
二、自耦變壓起動器應具有啟斷位置、運轉位置及一個以上之起動位置，使其
    不能持續停留在起動位置，或使電路過載保護裝置失效之位置。
三、變阻器：
    (一)電動機起動變阻器應能使接觸臂不會停留於中間段。操作器於起動位
        置時，接觸臂所停留位置不得與電阻器有電氣性連接。
    (二)定電壓供電之直流電動機所使用之起動變阻器，應有自動裝置，使電
        動機轉速降至正常速率三分之一以下時啟斷電源。

第二百四十條
電動機操作器之額定依下列規定辦理：
一、反時限斷路器及模殼式開關以外之操作器，在使用電壓下之馬力額定，不
    得小於電動機之馬力額定。
二、以安培為額定之分路反時限斷路器或模殼式開關，得作為所有電動機之操
    作器。
三、任兩導線間之標稱電壓不得超過電動機操作器之額定電壓。
二馬力以下且三百伏特以下固定式電動機之操作器得為下列規定之一種：
一、安培額定不小於電動機滿載電流二倍之一般型開關。
二、僅適用於交流之一般型手捺開關，且電動機滿載電流不大於該開關安培額
    定百分之八十。
轉矩電動機之操作器應為連續責務，且其滿載電流不得小於電動機銘牌標示之
額定電流。以馬力為額定而未標示上列額定電流之電動機操作器，其等值額定
電流應依第二百五十八條規定之馬力額定決定。

第二百四十一條
每具電動機應有個別操作器。但符合下列規定之一者，不在此限：
一、電動機額定為六百伏特以下，且符合下列規定之一，其單一操作器額定不
    小於群組中所有電動機依第二百十一條第三項第一款規定決定之等值馬力
    者，得控制群組電動機：
    (一)數具電動機同時驅動單一機器之數個部分，例如金屬及木工機、電動
        起重機、吊車或類似裝置。
    (二)群組電動機有第二百二十一條第一項第一款規定之過電流保護裝置保
        護。
    (三)群組電動機裝設於同一房間且位於操作器處可視及範圍內。
二、分路之隔離設備符合第二百三十八條第二項規定作為操作器者，得控制一
    具以上之電動機。

第二百四十二條
下列型式之機器應有速率限制裝置或其他速率限制設施：
一、他激直流電動機。
二、串激電動機。
三、當電流逆向或減載時，於直流側可能超速驅動之電動發電機組及換流機。
符合下列規定之一者，得免裝設分離速率限制裝置或設施：
一、機器、系統或負載及機械連接之固有特性可安全限制速度。
二、機器由合格人員手動控制。

第二百四十三條
三相電動機起動電流不得超過下列規定之限制，否則應採用降壓型或限流型操
作器：
一、二百二十伏特供電：每具容量不超過十五馬力者，不加限制。
二、三百八十伏特供電：每具容量不超過五十馬力者，不加限制。
三、低壓供電每具容量超過前二款之限制者，不超過該電動機額定電流三‧五
    倍。
四、高壓供電之低壓電動機：每具容量不超過二百馬力者，不加限制。超過此
    限制者，不得超過該電動機額定電流三‧五倍。

        第八款  電動機控制中心
第二百四十四條
電動機控制中心應有過電流保護裝置，其安培額定不得大於其主匯流排之額定
。該過電流保護裝置應為電動機控制中心電源端之過電流保護裝置，或電動機
控制中心之主過電流保護裝置。

第二百四十五條
多盤式電動機控制中心應以符合表九三～二規定之設備接地導線，或同等電流
值接地匯流排搭接一起。
前項設備接地導線應連接至接地端子板或匯流排，或各盤電動機控制中心之接
地端子板。

第二百四十六條
電動機控制中心之匯流排及導線裝設依下列規定辦理：
一、匯流排支撐及配置應依第一百二十七條第一款及第六款規定辦理。
二、最小配線空間及在電動機控制中心內端子處之導線最小彎曲空間應符合第
    一百三十九條、第一百四十條及第三百十三條規定。
三、電動機控制中心匯流排端子與其他裸露金屬部分之最小間隔，應符合表一
    三五規定。

        第九款  可調速驅動系統
第二百四十七條
可調速驅動系統導線之最小安培容量依下列規定決定：
一、可調速驅動系統之電力轉換設備電源導線安培容量不得小於電力轉換設備
    額定輸入電流一‧二五倍。
二、可調速驅動系統使用旁路裝置之導線安培容量不得小於第二百零二條規定
    電力轉換設備為該驅動系統之一部分者，其電源導線安培容量應選用下列
    規定兩者中較大者：
    (一)電力轉換設備額定輸入電流一‧二五倍。
    (二)依第二百零二條規定決定之電動機滿載電流一‧二五倍。

第二百四十八條
可調速驅動系統之電動機過載保護依下列規定辦理：
一、電力轉換設備銘牌標示內含電動機過載保護者，得免另裝設過載保護。
二、可調速驅動系統之旁路裝置容許電動機在滿載速度運轉者，該旁路電路應
    裝設符合本節第五款規定之過載保護。
三、使用多具電動機者，個別電動機應裝設符合本節第五款規定之過載保護。

第二百四十九條
電動機過熱保護依下列規定辦理：
一、可調速驅動系統之電動機運轉於非銘牌標示之額定電流，且超出所要求之
    速度範圍者，應有第二百二十五條規定之過載保護，並應依下列規定之一
    加以過熱保護：
    (一)依第二百二十五條規定裝設整合於電動機之積熱保護器。
    (二)可調速驅動系統具有負載及速度感測過載保護，且在停機或停電時有
        熱記憶保留功能。為連續責務負載者，無需具有熱記憶保留功能。
    (三)利用嵌入電動機之熱感測器偵測溫度而動作之積熱保護電驛，以達到
        電動機之過熱保護功能。
    (四)利用嵌入電動機之熱感測器，其信號可由可調速驅動系統接收及動作
        。
二、使用多具電動機者，應有符合前款規定之個別電動機過熱保護。
三、自動重新起動之電動機過熱保護應符合第二百三十二條規定；依序停止運
    轉之電動機過熱保護應符合第二百三十三條規定。

第二百五十條
可調速驅動系統隔離設備得裝設於轉換設備之電源側，其額定不得小於轉換單
元額定輸入電流一‧一五倍。

        第十款  帶電部分之防護
第二百五十一條
電動機及操作器之暴露帶電部分端電壓在五十伏特以上者，應以封閉箱體或下
列方式加以防護：
一、裝設於僅限合格人員可觸及之房間或封閉空間。
二、裝設於可防止非合格人員接近之陽台、走廊或平台。
三、裝設於距離地面高度二‧五米以上之處。
運轉時端電壓五十伏特以上之固定式電動機終端托架內有換向器、集電器及電
刷，且不與對地電壓一百五十伏特以上之電源電路相連者，其端子間帶電部分
得免另加防護。

第二百五十二條
運轉於對地電壓超過五十伏特之電動機或操作器帶電部分應裝設於前條第一項
規定之位置加以防護。於該用電器具運轉期間若需要調整或維修者，應提供人
員站立之絕緣墊或絕緣平台。

        第十一款  接地
第二百五十三條
電動機及操作器非帶電金屬部分應加以接地。特定情況下採用絕緣、隔離或防
護等措施者，得替代電動機之接地。

第二百五十四條
固定式電動機之裝設有下列規定之一者，其框架應加以接地：
一、以金屬導線管配線供電。
二、裝設於潮濕場所，未加以隔離或防護。
三、裝設於第四百六十四條第一項規定之危險場所。
四、運轉於對地電壓超過一百五十伏特。
電動機之框架未加以接地者，應永久且有效與大地絕緣。

第二百五十五條
運轉於對地電壓超過一百五十伏特之可攜式電動機，其框架應加以接地或防護
。但電動機操作之工具設備或用電器具符合下列規定者得免接地：
一、以雙重絕緣或具同等效果之系統保護。雙重絕緣設備應有明顯標識。
二、採用附插頭可撓軟線連接。

第二百五十六條
電動機操作器之封閉箱體不分電壓，皆應連接至設備接地導線。操作器封閉箱
體應配置供設備接地導線終端連接之設施。但封閉箱體附裝於非接地之移動式
用電器具者，得免接地。

第二百五十七條
電動機操作器裝設之儀表用變比器二次側、非帶電金屬部分、其他導電部分或
計器、儀表電驛及儀表用變比器等之外殼應加以接地。

        第十二款  附表
第二百五十八條
各種電動機電源導線安培容量應依下列規定滿載電流計算：
一、直流電動機滿載電流依表二五八～一規定。
二、交流單相電動機之滿載電流依表二五八～二規定。
三、交流三相電動機滿載電流依表二五八～三規定。

第二百五十九條
單相電動機堵轉電流轉換以馬力及電壓之額定選用隔離設備及操作器者，應依
表二五九～一規定。
三相電動機堵轉電流轉換以馬力及電壓之額定選用隔離設備及操作器者，應依
表二五九～二規定。

      第九節  備用發電機
第二百六十條
非與電業供電電源併聯運轉之備用發電機，包括依建築技術相關法規規定作為
緊急電源之備用發電機，其配線及保護應依本節規定辦理。

第二百六十一條
備用發電機之過電流保護，除定電壓交流發電機之勵磁機外，其過載保護應由
製造廠家或經設計者設計，並以斷路器、熔線、保護電驛或其他經設計者確認
之過電流保護裝置加以保護。

第二百六十二條
由備用發電機輸出端子至第一個過電流保護裝置之導線安培容量，不得小於發
電機銘牌標示之額定電流一‧一五倍，其中性線安培容量得依第五十九條規定
以非接地導線負載百分之七十選用。

第二百六十三條
導線通過封閉箱體、導管穿線匣或隔板等開口處，有銳利邊緣開口者，應裝設
護套以保護導線。

第二百六十四條
備用發電機應裝設附有啟斷位置可上鎖之隔離設備，該隔離設備應可隔離由發
電機供電電路引供之所有保護裝置及控制設備。

第二百六十五條
備用發電機應裝設自動切換開關（ ATS），並依第九百七十三條規定辦理。

      第十節  低壓變壓器
第二百六十六條
低壓變壓器除為下列規定者外，其配線及保護應依本節規定辦理：
一、比流器。
二、作為其他用電機具部分組件之乾式變壓器。
三、作為 X  光、高週波或靜電式電鍍機具整合組件之變壓器。
四、招牌廣告燈及造型照明之變壓器。
五、放電管燈之變壓器。
六、作為研究、開發或測試之變壓器。
七、適用於第四百六十四條第一項規定危險場所之變壓器。

第二百六十七條
低壓變壓器應有過電流保護裝置，其最大安培額定依表二六七規定辦理。

第二百六十八條
低壓變壓器之防護依下列辦理：
一、變壓器暴露於可能遭受外力損傷之處時，應有防撞措施。
二、乾式變壓器應有不可燃、防潮之外殼或封閉箱體。
三、僅供變壓器封閉箱體內用電設備使用之低壓開關，僅由合格人員可觸及者
    該低壓開關得裝設於變壓器封閉箱體內；其所有帶電部分應依第八條規定
    加以防護。
四、變壓器裝置暴露之帶電部分運轉電壓應標明於用電設備或結構上。

第二百六十九條
低壓變壓器之裝設依下列規定辦理：
一、變壓器應有通風措施，使變壓器滿載損失產生之熱溫升，不致超過變壓器
    之額定溫升。
二、變壓器通風口不得有牆壁或其他阻礙物堵住。
三、變壓器裝設之接地，及圍籬、防護設施等暴露非帶電金屬部分之接地及搭
    接，應依第二章第五節規定辦理。
四、變壓器應能使合格人員於檢查及維修時可輕易觸及。
五、變壓器應有隔離設備，裝設於變壓器處可視及範圍內。裝設於遠處者，其
    隔離設備應配裝附有啟斷位置可上鎖之固定式裝置。

      第十一節  低壓電容器、電阻器及電抗器
第二百七十條
低壓電容器、電阻器及電抗器之配線及保護應依本節規定辦理。於第四百六十
四條第一項規定之危險場所裝設電容器者，亦同。
附裝於用電器具之電容器或突波保護電容器不適用本節規定。

第二百七十一條
低壓電容器之封閉及掩護依下列規定辦理：
一、含有超過十一公升可燃性液體之電容器應裝設於變電室內，或裝設於室外
    圍籬內。
二、非合格人員可觸及之電容器應加以封閉、裝設於適當場所或妥加防護，避
    免人員或其攜帶之導電物碰觸帶電部分。

第二百七十二條
低壓電容器應有釋放能量之裝置，於回路斷電後，釋放殘餘電壓依下列規定辦
理：
一、電容器於斷電後一分鐘內，其殘餘電壓應降至五十伏特以下。
二、放電電路應與電容器或電容器組之端子永久連接，或裝設自動裝置連接至
    電容器組之端子，以消除回路殘餘電壓，且不得以手動方式啟閉裝置或連
    接放電電路。

第二百七十三條
低壓電容器容量之決定依下列規定辦理：
一、電容器之容量以改善功率因數至百分之九十五為原則。
二、電容器以個別裝設於電動機操作器負載側為原則，且須能與該電動機同時
    啟斷電源。
三、電動機操作器負載側個別裝設電容器者，其容量以能提高該電動機之無負
    載功率因數達百分之百為最大值。
四、電動機以外之負載若個別裝設電容器時，其改善後之功率因數以百分之九
    十五為原則。

第二百七十四條
低壓電容器之裝設依下列規定辦理：
一、電容器電路導線安培容量不得小於電容器額定電流一‧三五倍。電容器配
    裝於電動機分路之導線，其安培容量不得小於電動機電路導線安培容量三
    分之一，且不小於電容器額定電流一‧三五倍。
二、每一電容器組之非接地導線應裝設斷路器或安全開關配裝熔線作為過電流
    保護裝置，其過電流保護裝置之安培額定，不得大於電容器額定電流一‧
    三五倍。但符合第七十九條第一項第二款規定，選用較高一級者，不在此
    限。
三、除電容器連接至電動機操作器負載側外，引接每一電容器組之每一條非接
    地導線應有隔離設備，並符合下列規定：
    (一)隔離設備應能同時啟斷所有非接地導線。
    (二)隔離設備應能依標準操作程序將電容器從線路切離。
    (三)隔離設備之額定不得小於電容器額定電流一‧三五倍。
    (四)低壓電容器之隔離設備得採用斷路器或安全開關。
四、電容器若裝設於電動機過載保護設備之負載側，得免加裝過電流保護裝置
    及隔離設備。

第二百七十五條
低壓電容器裝設於電動機過載保護裝置之負載側時，電動機過載保護設備之安
培額定，應依電動機電路改善後之功率因數決定。
依表二五八～一至表二五八～三規定電動機滿載電流一‧二五倍，及表二一四
規定電動機責務週期與額定電流百分比決定電動機電路導線安培容量時，得不
考慮電容器之影響。

第二百七十六條
低壓電阻器及電抗器應裝設於不致遭受外力損傷之處。
低壓電阻器及電抗器與可燃性物質之間隔若小於三百毫米者，應於兩者之間裝
設隔熱裝置。
電阻元件與控制器間連接之導線應採用導線絕緣物容許溫度為攝氏溫度九十度
以上者。

      第十二節  固定式蓄電池
第二百七十七條
供電磁通信、電機機器、緊急用電源等用途之固定式蓄電池配線及保護，應依
本節規定辦理。

第二百七十八條
本節用詞定義規定如下：
一、單電池：指具有正極及負極，用來儲存及充放電能之電化學電池基本單元
    。
二、電池槽：指容納電極板、電解液及其他蓄電池元件之容器。
三、電解液：指在電池正極與負極之間提供離子傳輸之介質。
四、電池間連接導體：指連接相鄰單電池之導電棒或導線。
五、排層間連接導體：指連接同一機櫃不同排或不同層二個電池芯模組之導線
    。
六、端子：指單電池、電池槽或蓄電池供外部連接之桿、柱或極等部分。
七、標稱電壓（用於蓄電池）：指以蓄電池數量及型式為基準之電壓。
八、蓄電池：指由一個以上可重複充電之鉛酸、鎳鎘、鋰離子、鋰鐵或其他可
    重複充電之電化學作用型式單電池構成者。
九、蓄電池系統：指由一具以上之蓄電池與電池充電器及可能含有變流器、轉
    換器，及相關用電器具所組合之互聯蓄電池系統。

第二百七十九條
蓄電池及其單電池端子之裝設依下列規定辦理：
一、連接異質金屬時應採用製造廠家說明書指示之抗氧化材料。
二、現場組裝電池間、排層間之連接導體截面積及導線安培容量，應使其在最
    大負載及最高周圍溫度下之溫升，不致超過導線絕緣物或導線支持物材質
    之安全運轉溫度。
三、電氣連接至蓄電池，及不同層或機櫃上單電池間之導線，不得對蓄電池端
    子造成機械應力。若實務上可行，應裝設端子板。
四、所有單電池及蓄電池之端子應為可輕易觸及，以供檢視及清潔。電池槽應
    有一側透明且可輕易觸及，以供檢查內部組件。

第二百八十條
蓄電池供電給原動機起動、點火或控制用，標稱電壓低於五十伏特者，其導線
得免裝設過電流保護裝置，且不適用第二百九十條規定。

第二百八十一條
由標稱電壓超過五十伏特蓄電池系統供電之所有非接地導線應有隔離設備，並
裝設於蓄電池系統處可視及範圍內之可輕易觸及處。
獨棟或雙併住宅場所之蓄電池系統隔離設備或其遙控器應裝設於建築物外可輕
易觸及處以供緊急使用，並有緊急隔離之標識。
蓄電池直流電路線間電壓或對地電壓超過二百四十伏特，於合格人員現場維護
時，應將串聯電路分割成不超過二百四十伏特之區段。其分割得採用螺栓式或
插入式無載啟斷隔離設備，或製造廠家說明書指示之隔離方式。
啟動蓄電池隔離設備之控制器若不在蓄電池系統可視及範圍內者，該隔離設備
應配裝附有啟斷位置可上鎖之固定式裝置，並有現場標識標明控制器所在位置
。
裝設直流匯流排槽系統者，其隔離設備得裝設於該匯流排槽內。
隔離設備應有標明蓄電池標稱電壓之耐久且明顯標識。非住宅場所用之蓄電池
另應標明蓄電池系統可能產生之故障電流及電弧閃絡標識。隔離設備未在蓄電
池現場者，應有標識設置於蓄電池附近明顯位置。

第二百八十二條
蓄電池若由導電性電池槽組成，且該電池槽與大地間會產生電壓者，應有絕緣
支持物。

第二百八十三條
電解液若具有腐蝕性者，支撐蓄電池之結構應能抗電解液之劣化作用。
各單電池之金屬結構應提供非導電性支撐構件，或應採用連續絕緣材質構成。
僅上油漆不得視為有絕緣。

第二百八十四條
蓄電池若會產生氣體者，其裝設位置應採取適用於蓄電池之通風技術，使氣體
充分流通及散逸，避免危害人體或爆炸性混合氣體之累積。
蓄電池帶電部分之防護應符合第八條規定。
蓄電池系統之工作空間應符合表八或表九四八～一規定。其工作空間量測應從
蓄電池箱體、機櫃或托架之邊緣開始。
蓄電池機櫃之電池槽與維護時不需接近之牆壁或構造物側間，應保持二十五毫
米以上之間隔。
上出線式蓄電池裝設於分層機櫃或蓄電池櫃架上者，其最高點與該點上方之機
櫃或天花板間，應有蓄電池製造廠家說明書指示之工作空間。
蓄電池室之出入門應朝出口方向對外開啟，並配裝緊急或消防出口適用之門把
。
蓄電池系統之工作空間應裝設照明燈具。該燈具不得僅以自動裝置控制。若有
相鄰光源照射之工作空間，得免加裝照明燈具。照明燈具之位置不得使人員在
蓄電池空間內維修照明燈具時，暴露於蓄電池之帶電部分，或於照明燈具故障
時，對蓄電池造成危害。
蓄電池儲存室不得有瓦斯管線經過。

第二百八十五條
蓄電池端子至鄰近接線盒之連接得採用六十平方毫米以上可撓電纜。蓄電池與
單電池間之連接亦得採用可撓電纜。其採用之可撓電纜應具防潮性。
細絞可撓電纜應僅連接至端子、接線片、配電裝置或連接接頭，且符合第二十
三條規定
第二百八十六條
蓄電池電路線間電壓或對地電壓超過一百伏特者，得以非接地導線運轉，並裝
設接地故障檢測及指示器，以監視接地故障。

    第四章  低壓配線方法
      第一節  通則
第二百八十七條
除本規則另有規定外，所有低壓用電設備之配線方法，應依本章規定辦理。

第二百八十八條
用戶用電線路之裝設依下列規定辦理：
一、線路應裝設於不可輕易觸及，且不易遭受外力損傷處。
二、在有震動及可能發生危險之地點，不得裝設線路。
三、導線除電纜另有規定外，不得與敷設面直接接觸，亦不得嵌置壁內。
四、線路穿過建築物或金屬物時，應有防護導線損傷之設施。
五、線路裝設於管道間或其他中空之空間，應裝設阻隔裝置，以防有害氣體或
    火焰等迅速蔓延；穿過具防火時效之隔板、牆壁、地板或天花板之開口時
    ，應有防火阻隔之設施，維持其防火時效等級。
用電設備裝在建築物之表面時，應加以固定。
若在圓木、屋椽上裝設平底型之吊線盒、插座、手捺開關等應附設固定底座。
導線分接之施工應避免有張力。

第二百八十九條
低壓線路與其他管路、發熱構造物之間隔依下列規定辦理：
一、除光纖電纜外，低壓線路與電信線路、水管、燃氣供給管路及其他金屬物
    間應保持一百五十毫米以上之間隔。但有加裝隔離物隔離，或採用導線管
    、電纜配線者，不在此限。
二、低壓線路與煙囪、熱水管或其他發散熱氣物體間，應保持五百毫米以上之
    間隔。但有加裝隔熱裝置者，不在此限。

第二百九十條
交流電路同一回路之所有導線及設備接地導線，應裝設於同一管槽、電纜架或
電纜內。
前項同一回路之所有導線指單相二線式電路中之二線、單相三線式及三相三線
式電路中之三線及三相四線式電路中之四線。
不同電力系統之導線依下列規定裝設：
一、標稱電壓六百伏特以下交流電路及直流電路之所有導線，其絕緣額定至少
    等於所在封閉箱體、電纜架或管槽內導線之最高電路電壓者，得裝設於同
    一配線封閉箱體、電纜架或管槽內。
二、標稱電壓超過六百伏特之電路導線，與標稱電壓六百伏特以下之電路導線
    ，不得裝設於同一配線封閉箱體、電纜架或管槽內。但有下列情形者，不
    在此限：
    (一)一千伏特以下放電管燈一次側與二次側配線符合各自電壓絕緣等級者
        ，得裝於同一燈具、招牌廣告燈或造型照明之封閉箱體內。
    (二)激磁、控制、儀表及電驛等之引接導線，連接於個別電動機或啟動器
        者，得裝於同一封閉箱體內，作為電動機回路導線。
    (三)不同電壓之導線得裝於同一電動機、開關設備、控制組件及類似設備
        內。

第二百九十一條
管槽、電纜架、電纜之鎧裝、電纜被覆、線盒、配電箱、配電盤、肘型彎管、
管子接頭配件及支撐等器材之裝設依下列規定辦理：
一、鐵磁性金屬器材：
    (一)器材內、外面應鍍上防腐蝕材質保護。
    (二)若需防腐蝕，且金屬導線管在現場作絞牙者，該絞牙應塗上導電性防
        腐蝕材料。
    (三)以琺瑯作防腐蝕保護者，不得裝設於室外或潮濕場所。
    (四)有防腐蝕保護者，得裝設於混凝土內或直埋地下。
二、非金屬器材：
    (一)裝設於陽光直接照射處，應具耐日照特性者。
    (二)裝設於有化學氣體或化學溶劑等場所，應具耐化學特性者。
三、潮濕場所暴露之全部配線包含線盒、配件、管槽及電纜架，與牆壁或支持
    物表面間應保持六毫米以上之間隔。但非金屬管槽、線盒及配件裝設於混
    凝土、瓷磚或類似表面，或線盒、配件為不鏽鋼材質者，不在此限。
四、線盒及連接配件等不得有濕氣滲入，否則應採用防水型。

第二百九十二條
雨線外之配管依下列規定辦理：
一、採用有螺紋之管子接頭將金屬導線管互相接續應加以防水處理，其配件應
    採用防水型，必要時加裝橡皮墊圈。
二、在潮濕場所施工時，管路應避免造成 U  型之低處。
三、在配管中較低處位置應裝設排水裝置。
四、在垂直配管之上端應採用防水接頭。
五、在水平配管之終端應採用終端接頭或防水接頭。

第二百九十三條
管槽、電纜及其配件、線盒、管匣、配電箱及配件等應以獨立且牢固之支撐固
定，不得以天花板支架或其他管線作為支撐。
管槽之線盒或管匣依第三百十五條規定裝設者，管槽得作為其他管槽、電纜或
非用電設備之支撐。
電纜不得作為其他電纜、管槽或設備之支撐。

第二百九十四條
電力及控制導線之管槽或電纜架，不得再裝設蒸汽管、水管、空調管、瓦斯管
、排水管或非電氣之設施。
除光纖電纜外，弱電導線不得與電力及控制導線裝設於同一管槽或電纜架內。

第二百九十五條
導線之金屬管槽、電纜之鎧裝及其他金屬封閉箱體，應作金屬連接形成連續之
電氣導體且連接至所有金屬之線盒、配電箱及配件，提供有效之電氣連續性。
但由分路供電之設備封閉箱體，依第一百零四條第二款規定隔離者，不在此限
。

第二百九十六條
金屬或非金屬管槽、電纜之鎧裝及被覆，於配電箱、線盒、配件或其他封閉箱
體或出線口之間，應有機械連續性。但符合下列規定之一者，不在此限：
一、以短節管槽作支撐或保護電纜及其配件免受外力損傷。
二、管槽及電纜進入開關盤、電動機控制中心或亭置式變壓器等設備底部開口
    。

第二百九十七條
導線除不需作中間接續或終端處理外，於每一出線口、接線盒及開關點，應預
留未來連接照明燈具、配電裝置所需接線長度。

第二百九十八條
除下列各款規定情形外，以導線管、非金屬被覆電纜、MI  電纜、金屬被覆電
纜或其他電纜等配線，於每一條導線接續點、進出點、開關點、連接點、終端
點或拉線點，應裝設出線盒、拉線盒、接線盒或導管穿線匣等加以保護：
一、導線槽附有可拆卸式蓋板，且蓋板裝設於可觸及處。
二、屬於整套型設備之接線盒或配線箱得替代線盒。
三、電纜進出之導線管作為電纜支撐或保護，且於導線管終端採用避免電纜受
    損之配件。
四、非金屬被覆電纜採用整套型封閉箱體之配線用裝置，並有支架將該裝置固
    定於牆壁或天花板。
五、MI  電纜直線接續採用可觸及之配件。
六、中間接續點、開關點、終端點或拉線點位於下列規定之一：
    (一)配電箱內。
    (二)裝有開關、過電流保護裝置或電動機控制器之封閉箱體內，且有充足
        之容積。
    (三)電動機控制中心內。

第二百九十九條
管槽之裝設依下列規定辦理：
一、除匯流排槽或有鉸鏈、可打開蓋子之暴露式管槽外，於導線穿入管槽前，
    管槽應配裝完妥。
二、除有特別設計或另有規定外，金屬管槽不得以銲接方式支撐、固定或連接
    。
三、在鋼筋混凝土內配管時，不得減損建築物之強度，並符合下列規定：
    (一)集中配置時，不得超過混凝土厚度三分之一。但配置連接接戶管者，
        不在此限。
    (二)不得對建材造成過大之溝或孔。

第三百條
垂直管槽、電纜架內之絕緣導線及電纜支撐依下列規定辦理：
一、導線於垂直管槽之頂端或靠近頂端處，應加以支撐。
二、導線垂直裝設之支撐間隔不得超過表三○○規定。但需超過者，垂直管槽
    內之導線應增加中間支撐。
三、支撐方式應採用下列規定之一：
    (一)於管槽終端採用夾型裝置或絕緣楔子。
    (二)在前款規定之間隔內設置有蓋板之線盒作支撐，並以能承受導線重量
        之方法加以固定。
    (三)電纜在線盒內彎曲不小於九十度，平放距離不小於電纜直徑二倍，並
        以二個以上絕緣物支撐，支撐間隔不超過表三○○規定值百分之二十
        ，若需要固定，再以紮線綁住。
四、電纜敷設於垂直電纜架者，電纜架之橫桿得作為電纜之固定及支撐；其固
    定及支撐間隔不得超過五百毫米。

第三百零一條
鐵磁性金屬封閉箱體或金屬管槽之感應電流依下列規定處理：
一、交流電路之導線裝設於鐵磁性金屬封閉箱體或金屬管槽內，應將同一回路
    之相導線、被接地導線及設備接地導線綑綁成束，以保持磁場平衡。
二、同一回路之交流電路導線分開穿過鐵磁性金屬板時，應依下列規定之一辦
    理：
    (一)個別電路導線穿過金屬板時，其開孔與開孔間切割一條相連狹縫。
    (二)提供絕緣壁，面積足夠容納回路所有電路導線穿過。
真空或電氣放電管燈系統，或 X  光檢測器之電路導線，若裝設於金屬箱體內
或通過金屬體者，其感應效應得予忽略。

第三百零二條
用戶配線系統中分路及幹線之非接地導線識別依下列規定辦理：
一、用戶配線系統若有超過一個以上標稱電壓者，其分路及幹線之非接地導線
    所有終端、連接點及接續點，應標明其相電壓或線電壓及系統標稱電壓。
二、識別得採用不同色碼、標示帶、標籤或具同等效果之方法。
三、引接自每一分路配電箱或類似分路配電設備之導線識別，應以書面置於可
    輕易觸及處，或有耐久標識設置於每一分路配電箱或類似分路配電設備內
    。

第三百零三條
建築物外之地下配線應採用電纜穿入管路或管溝方式裝設，並依下列規定辦理
：
一、埋設於地下之電纜及其連接，應具有防潮性。
二、以管路裝設者，其埋設深度應符合表三○三規定。
三、建築物地下埋設電纜時，應將電纜穿入導線管內，並延伸至建築物牆外。
四、MI  電纜由地下引出地面時，應以配電箱或導線管保護，保護範圍至少為
    地面以上達二‧五米及地面以下達四百六十毫米。
五、纜線引出：
    (一)地下線路與架空線路連接，其露出地面之纜線應裝設於不會妨礙交通
        之位置。
    (二)若纜線裝設於人員可能觸及或易受損傷之場所者，應採用金屬導線管
        或非金屬導線管防護。
六、回填料：
    (一)不得含有大塊岩石、鋪路材料、煤渣、大塊或尖角物料或腐蝕性材料
